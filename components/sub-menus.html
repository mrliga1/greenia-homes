<style>
    /* ==========================================
       1. CSS NỀN TẢNG CỦA SUB-MENU
       ========================================== */
    #menu-vinhomes-saigon-park,
    #menu-the-global {
        position: relative;
        background-color: #05080f !important; /* Ép nền đen tuyền */
        border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        font-family: 'Manrope', sans-serif !important;
        z-index: 1000;
    }
    
    #menu-vinhomes-saigon-park .nav-link,
    #menu-the-global .nav-link {
        font-family: 'Manrope', sans-serif !important;
        font-weight: 500 !important;
        letter-spacing: 0.5px;
    }

    /* ==========================================
       2. CSS XỬ LÝ MENU MOBILE (ĐÃ ĐƯỢC CÁCH LY)
       ========================================== */
    
    /* Trên máy tính: Ẩn nút 3 gạch, hiện dàn menu ngang */
    @media (min-width: 969px) {
        #menu-vinhomes-saigon-park .mobile-menu-btn,
        #menu-the-global .mobile-menu-btn { display: none !important; }
        
        #menu-vinhomes-saigon-park .main-nav,
        #menu-the-global .main-nav { display: flex !important; }
    }

    /* Trên điện thoại (dưới 968px) */
    @media (max-width: 968px) {
        #menu-vinhomes-saigon-park .header-container,
        #menu-the-global .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            position: relative; /* Trụ cột để menu thả xuống từ đây */
        }
        
        /* Trang trí nút 3 gạch */
        #menu-vinhomes-saigon-park .mobile-menu-btn,
        #menu-the-global .mobile-menu-btn {
            display: block !important;
            background: transparent;
            border: none;
            font-size: 26px;
            color: #c5a059;
            cursor: pointer;
            padding: 5px 10px;
            outline: none;
        }

        /* Ẩn menu mặc định, biến thành khối nằm chờ thả xuống */
        #menu-vinhomes-saigon-park .main-nav,
        #menu-the-global .main-nav {
            display: none; 
            position: absolute;
            top: 100%; 
            left: 0;
            width: 100%;
            background: #0b1120;
            border-top: 1px solid #c5a059;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            z-index: 99999;
        }

        /* LỆNH QUAN TRỌNG: Mở menu */
        #menu-vinhomes-saigon-park .main-nav.active,
        #menu-the-global .main-nav.active {
            display: block !important;
        }

        /* Dàn các link dọc xuống */
        #menu-vinhomes-saigon-park .nav-list,
        #menu-the-global .nav-list {
            display: flex;
            flex-direction: column;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        #menu-vinhomes-saigon-park .nav-list li,
        #menu-the-global .nav-list li {
            width: 100%;
        }

        #menu-vinhomes-saigon-park .nav-link,
        #menu-the-global .nav-link {
            display: block;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #fff;
            text-align: left;
            font-size: 14px;
        }

        #menu-vinhomes-saigon-park .nav-link:hover,
        #menu-the-global .nav-link:hover {
            background: rgba(197, 160, 89, 0.1);
            color: #c5a059;
        }
    }
</style>
