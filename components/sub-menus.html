<style>
    /* ==========================================
       1. CSS NỀN TẢNG CỦA SUB-MENU
       ========================================== */
    #menu-vinhomes-saigon-park,
    #menu-the-global,
    #sub-menu { /* Đảm bảo nhận nền đen khi bị bơm ruột */
        position: relative;
        background-color: #05080f !important; 
        border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        font-family: 'Manrope', sans-serif !important;
        z-index: 1000;
    }
    
    #menu-vinhomes-saigon-park .nav-link,
    #menu-the-global .nav-link,
    #sub-menu .nav-link {
        font-family: 'Manrope', sans-serif !important;
        font-weight: 500 !important;
        letter-spacing: 0.5px;
    }

    /* ==========================================
       2. CSS XỬ LÝ MENU MOBILE
       ========================================== */
    @media (min-width: 969px) {
        .mobile-menu-btn { display: none !important; }
        #sub-menu .main-nav, .main-nav { display: flex !important; }
    }

    @media (max-width: 968px) {
        /* CỘT TRỤ CHÍNH: Căn Logo sang trái, Nút sang phải */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            position: relative; /* Dời position ra thẻ bao ngoài cùng để menu thả full màn hình */
            padding: 10px 0;
        }
        
        .header-center-group {
            display: flex;
            align-items: center;
        }

        .mobile-menu-btn {
            display: block !important;
            background: transparent;
            border: none;
            font-size: 26px;
            color: #c5a059;
            cursor: pointer;
            padding: 5px 15px;
            outline: none;
        }

        /* KHỐI THẢ XUỐNG CỦA MENU */
        #sub-menu .main-nav, .main-nav {
            display: none; 
            position: absolute;
            top: 100% !important; 
            left: 0;
            width: 100%;
            background: #0b1120;
            border-top: 1px solid #c5a059;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            z-index: 99999;
        }

        /* GIA TĂNG THÊM CSS ĐỂ DỰ PHÒNG */
        body #sub-menu .main-nav.active,
        #sub-menu .main-nav.active,
        .main-nav.active {
            display: block !important;
        }

        .nav-list {
            display: flex;
            flex-direction: column;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .nav-list li { width: 100%; }

        .nav-link {
            display: block;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #fff;
            text-align: left;
            font-size: 14px;
        }

        .nav-link:hover {
            background: rgba(197, 160, 89, 0.1);
            color: #c5a059;
        }
    }
</style>
