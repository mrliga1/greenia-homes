<div id="tpl-form-ngang">
    <form class="greenia-master-form layout-ngang">
        <input type="text" name="name" placeholder="Họ tên *" required>
        <input type="tel" name="phone" placeholder="Số điện thoại (Zalo/Viber) *" required pattern="[0-9]{10}">
        <input type="email" name="email" placeholder="Email (Không bắt buộc)">
        <input type="text" name="demand" placeholder="Nhu cầu (VD: Căn 2PN)" required>
        <button type="submit">NHẬN BÁO GIÁ</button>
    </form>
    <div class="master-success-msg">
        <h3 style="color:#2ecc71; margin-bottom: 5px;">✔ ĐĂNG KÝ THÀNH CÔNG!</h3>
        <p>Hệ thống đang gửi tài liệu qua Zalo/Email cho quý khách.</p>
    </div>
</div>
