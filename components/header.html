### Bước 2: Dọn dẹp rác ở file `index.html`
Vì bây giờ cái Header đã tự mang theo "quần áo" của nó rồi, nên bác mở file **`index.html`** (Trang chủ) ra, tìm và **XÓA BỎ** cái đoạn `<style>` tớ hướng dẫn dán vào lúc nãy đi để code cho gọn gàng:

```css
/* XÓA BỎ ĐOẠN NÀY TRONG INDEX.HTML ĐI NHÉ */
/* 3. ÉP HEADER HIỂN THỊ NỀN ĐEN TUYỀN NHƯ TRANG CON */
.site-header {
    position: relative; 
    background-color: #05080f !important; 
    border-bottom: 1px solid rgba(197, 160, 89, 0.2);
    z-index: 1000;
}
.site-header .nav-link {
    font-family: 'Manrope', sans-serif !important;
    font-weight: 500 !important; 
}
<header id="main-header" class="site-header">
    <div class="header-container">
        <div class="header-center-group">
            <div class="logo">
                <a href="index.html">
                    <img src="assets/images/logo-greenia-homes.png" alt="Greenia Homes Logo" class="logo-img">
                </a>
            </div>
            <nav class="main-nav">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">Trang Chủ</a></li>
                    <li><a href="san-pham.html" class="nav-link">Chuyển Nhượng</a></li>
                    <li><a href="du-an.html" class="nav-link">Dự Án</a></li>
                    <li><a href="tin-tuc.html" class="nav-link">Tin Tức</a></li>
                    <li><a href="lien-he.html" class="nav-link">Liên Hệ</a></li>

                </ul>
            </nav>
        </div>
        <div class="header-action">
            <button class="mobile-menu-btn" id="mobile-toggle">☰</button>
        </div>
    </div>
</header>
