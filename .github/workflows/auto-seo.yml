name: Auto Build SEO Pages
on:
  push:
    paths:
      - 'assets/data/posts.json'
      - 'assets/data/products.json'
      - 'build.js'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Lấy toàn bộ lịch sử để tránh xung đột
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Chay Script Build Web
        run: node build.js
      - name: Commit va Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Auto build SEO directories" || echo "Khong co thay doi"
          git pull --rebase origin main || echo "Bo qua rebase"
          git push origin HEAD:main
