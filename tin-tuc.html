<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tin Tức | Greenia Homes</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        body { background-color: #05080f; color: #b0b8c4; font-family: 'Manrope', sans-serif; margin: 0; padding: 0; }
        .blog-container { max-width: 1200px; margin: 60px auto; padding: 0 15px; padding-bottom: 50px; }
        
        .blog-header { text-align: center; margin-bottom: 50px; }
        .blog-title { font-size: 36px; color: #c5a059; margin: 0 0 15px; font-weight: 800; text-transform: uppercase; }
        .blog-desc { font-size: 16px; color: #888; max-width: 600px; margin: 0 auto; line-height: 1.6;}

        /* BỘ LỌC DANH MỤC */
        .blog-filter { display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; flex-wrap: wrap; }
        .filter-btn { background: #0b1120; color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 10px 25px; border-radius: 30px; cursor: pointer; transition: 0.3s; font-size: 14px; font-weight: 600;}
        .filter-btn:hover, .filter-btn.active { background: rgba(197, 160, 89, 0.1); border-color: #c5a059; color: #c5a059; }

        /* LƯỚI TIN TỨC */
        .blog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; transition: opacity 0.3s; }
        .blog-card { background: #0b1120; border: 1px solid rgba(197, 160, 89, 0.2); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; text-decoration: none; transition: 0.3s;}
        .blog-card:hover { transform: translateY(-5px); border-color: #c5a059; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .bc-thumb { height: 240px; overflow: hidden; position: relative; }
        .bc-thumb img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .blog-card:hover .bc-thumb img { transform: scale(1.1); }
        .bc-cat-tag { position: absolute; top: 15px; left: 15px; background: #c5a059; color: #000; font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 4px; text-transform: uppercase; z-index: 5; text-decoration: none; transition: 0.3s;}
        .bc-cat-tag:hover { background: #fff; color: #000;}
        
        .bc-body { padding: 25px; flex: 1; display: flex; flex-direction: column; }
        .bc-title { font-size: 18px; font-weight: 700; color: #fff; margin: 0 0 15px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; transition: 0.3s;}
        .blog-card:hover .bc-title { color: #c5a059; }
        .bc-excerpt { font-size: 14px; color: #888; margin-bottom: 25px; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .bc-meta { margin-top: auto; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #666; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;}
        .bc-meta i { color: #c5a059; margin-right: 5px; }

        @media (max-width: 992px) { .blog-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .blog-grid { grid-template-columns: 1fr; } .bc-thumb { height: 200px; } }
    </style>
</head>
<body>

    <div id="site-header"></div>
    <div id="sub-menu" class="sub-header"></div>

    <main class="blog-container">
        <div class="blog-header">
            <h1 class="blog-title">Tin Tức Bất Động Sản</h1>
            <p class="blog-desc">Cập nhật những thôngẽ mới nhất về thị trường, dự án và cẩm nang nhà ở.</p>
        </div>

        <div class="blog-filter" id="blog-filters"></div>

        <div class="blog-grid" id="blog-grid-result">
            <div style="grid-column: 1/-1; text-align: center; color: #c5a059; padding: 100px;"><i class="fas fa-circle-notch fa-spin fa-3x"></i></div>
        </div>
    </main>

    <div id="site-footer"></div>
    <script src="assets/js/ui.js"></script>

    <script>
        let allPosts = [];

        // Hàm tạo Slug để link đúng thư mục danh mục
        function createSafeSlug(title) {
            if(!title) return 'tin-tuc';
            return title.toString().toLowerCase().trim().replace(/\s+/g, '-').replace(/[áàảãạâấầẩẫậăắằẳẵặ]/g, 'a').replace(/[éèẻẽẹêếềểễệ]/g, 'e').replace(/[íìỉĩị]/g, 'i').replace(/[óòỏõọôốồổỗộơớờởỡợ]/g, 'o').replace(/[úùủũụưứừửữự]/g, 'u').replace(/[ýỳỷỹỵ]/g, 'y').replace(/đ/g, 'd').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-');
        }

        // Đã thêm tham số safeBaseUrl vào hàm để tính toán link chính xác
        function createPostCard(post, safeBaseUrl) {
            const tempDiv = document.createElement('div'); 
            tempDiv.innerHTML = post.content;
            const firstImg = tempDiv.querySelector('img');
            const thumbSrc = firstImg ? firstImg.src : 'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=800'; 
            const excerpt = tempDiv.textContent.substring(0, 150) + '...';

            // 🔥 Tự động tạo link chuẩn Silo: /tin-tuc/ten-danh-muc/ten-bai-viet/
            const catSlug = createSafeSlug(post.cat);
            const postSlug = post.slug || createSafeSlug(post.title);

            return `
                <a href="${safeBaseUrl}tin-tuc/${catSlug}/${postSlug}/" class="blog-card">
                    <div class="bc-thumb">
                        <object><a href="${safeBaseUrl}tin-tuc/${catSlug}/" class="bc-cat-tag">${post.cat}</a></object>
                        <img src="${window.resolveImg ? window.resolveImg(thumbSrc) : thumbSrc}" alt="${post.title}">
                    </div>
                    <div class="bc-body">
                        <h3 class="bc-title">${post.title}</h3>
                        <div class="bc-excerpt">${excerpt}</div>
                        <div class="bc-meta">
                            <span><i class="far fa-clock"></i> ${post.date}</span>
                            <span style="color:#c5a059; font-weight:600;">Xem chi tiết <i class="fas fa-arrow-right" style="font-size:10px; margin-left:5px;"></i></span>
                        </div>
                    </div>
                </a>
            `;
        }

        document.addEventListener("DOMContentLoaded", async function() {
            const safeBaseUrl = (typeof BASE_URL !== 'undefined') ? BASE_URL : '/greenia-homes/';
            
            try {
                // 🔥 Đã nâng cấp sử dụng đường dẫn tuyệt đối
                const res = await fetch(safeBaseUrl + 'assets/data/posts.json');
                allPosts = await res.json();
                
                const grid = document.getElementById('blog-grid-result');
                const filtersDiv = document.getElementById('blog-filters');

                // Sinh ra nút lọc tự động
                const categories = new Set(allPosts.map(p => p.cat));
                let filterHTML = `<button class="filter-btn active" data-cat="all">Tất cả</button>`;
                categories.forEach(cat => {
                    filterHTML += `<button class="filter-btn" data-cat="${cat}">${cat}</button>`;
                });
                filtersDiv.innerHTML = filterHTML;

                // Vẽ 100% bài viết (Truyền thêm safeBaseUrl)
                grid.innerHTML = allPosts.map(p => createPostCard(p, safeBaseUrl)).join('');

                // Gắn sự kiện JS lọc
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        
                        const selectedCat = this.getAttribute('data-cat');
                        grid.style.opacity = 0; 
                        
                        setTimeout(() => {
                            if (selectedCat === 'all') {
                                grid.innerHTML = allPosts.map(p => createPostCard(p, safeBaseUrl)).join('');
                            } else {
                                const filtered = allPosts.filter(p => p.cat === selectedCat);
                                grid.innerHTML = filtered.map(p => createPostCard(p, safeBaseUrl)).join('');
                            }
                            grid.style.opacity = 1;
                        }, 200);
                    });
                });

            } catch(e) {
                document.getElementById('blog-grid-result').innerHTML = "<div style='grid-column:1/-1; text-align:center; color:#ff4d4f;'>Hệ thống đang bảo trì dữ liệu.</div>";
            }
        });
    </script>
</body>
</html>
