<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài viết | Greenia Homes</title>
    
    <script>
        const originalFetch = window.fetch;
        window.fetch = async function() {
            let url = arguments[0];
            if (typeof url === 'string') {
                if (url === 'header.html' || url === 'footer.html' || url === 'sub-menu.html') {
                    arguments[0] = '../../' + url;
                }
            }
            return originalFetch.apply(this, arguments);
        };

        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                document.querySelectorAll('#site-header a, #site-footer a, #sub-menu a, #site-header img, #site-footer img').forEach(el => {
                    ['href', 'src'].forEach(attr => {
                        let val = el.getAttribute(attr);
                        if (val && !val.startsWith('http') && !val.startsWith('../../') && !val.startsWith('#') && !val.startsWith('mailto:') && !val.startsWith('tel:') && !val.startsWith('javascript:')) {
                            el.setAttribute(attr, '../../' + val.replace(/^\/+/, ''));
                        }
                    });
                });
            }, 1000); // Quét và sửa link Menu sau 1 giây
        });

        // Hàm thông minh xử lý link ảnh chống vỡ
        const resolveImg = (src) => {
            if (!src) return '';
            if (src.startsWith('http') || src.startsWith('data:')) return src;
            return '../../' + src.replace(/^\/+/, '');
        };
    </script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">

    <style>
        #gr-single-post { --bg: #05080f; --card: #0e121b; --border: rgba(197, 160, 89, 0.2); --gold: #c5a059; --text: #b0b8c4; --white: #fff; --red: #ff4d4f; --green: #00b894; font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.8; width: 100%; padding-bottom: 50px;}
        #gr-single-post * { box-sizing: border-box; } 
        #gr-single-post a { text-decoration: none; color: inherit; transition: 0.3s; }
        .gr-con { max-width: 1250px; margin: 0 auto; padding: 40px 15px; }

        .gr-sp-header { margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 1px; }
        .gr-breadcrumbs { font-size: 14px; color: #888; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
        .gr-breadcrumbs a:hover { color: var(--gold); } 
        .gr-breadcrumbs span.sep { color: var(--gold); font-size: 12px; }
        .gr-breadcrumbs span.current { color: #fff; font-weight: 500; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .gr-sp-title { font-size: 28px !important; font-weight: 600; color: #c5a059; line-height: 1.3; margin: 0 0 15px; }
        .gr-sp-meta { font-size: 13px; color: #666; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; margin-bottom: 15px;}
        .gr-sp-meta i { color: var(--gold); margin-right: 5px; }

        .gr-sp-body { display: flex; gap: 30px; position: relative; margin-top: 20px;}
        .gr-sp-main { width: 75%; } 
        .gr-sp-sidebar { width: 25%; position: -webkit-sticky; position: sticky; top: 70px; align-self: flex-start; display: flex; flex-direction: column; gap: 30px; }

        .gr-toc-wrap { margin-bottom: 30px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: rgba(14, 18, 27, 0.5); display: none; }
        .gr-toc-header { background: rgba(197, 160, 89, 0.1); padding: 12px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .gr-toc-tit { font-weight: 600; color: var(--gold); font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .gr-toc-icon { color: var(--gold); transition: transform 0.3s; font-size: 12px; } 
        .gr-toc-icon.rotate { transform: rotate(180deg); }
        .gr-toc-list { display: block; padding: 15px; border-top: 1px solid var(--border); list-style: none; margin: 0; }
        .gr-toc-item { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed rgba(255,255,255,0.05); } 
        .gr-toc-item:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0;}
        .gr-toc-link { color: #ccc; font-size: 14px; display: block; transition: 0.2s; } 
        .gr-toc-link:hover { color: var(--gold); transform: translateX(5px); }

        .gr-entry-content { color: #e2e8f0; text-align: left; font-size: 15px; line-height: 1.8; font-weight: 300; }
        .gr-entry-content a { color: #e67e22 !important; font-weight: 600; border-bottom: 1px solid rgba(230, 126, 34, 0.3); } 
        .gr-entry-content a:hover { color: var(--gold) !important; border-bottom-color: var(--gold); }
        .gr-entry-content strong, .gr-entry-content b { color: var(--gold); font-weight: 700; }
        .gr-entry-content h2 { color: var(--gold); font-size: 22px; font-weight: 600; margin-top: 40px; margin-bottom: 15px; scroll-margin-top: 80px; border-left: 4px solid var(--gold); padding-left: 10px;}
        .gr-entry-content p { margin-bottom: 20px; } 
        .gr-entry-content img { max-width: 100%; height: auto; border-radius: 5px; margin: 20px auto; display: block; border: 1px solid var(--border); }

        .gr-bottom-bar { margin-top: 40px; padding-top: 20px; border-top: 1px dashed #333; display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .gr-bot-cta { color: #888; font-size: 14px; } 
        .gr-bot-cta a { color: var(--gold); font-weight: 700; font-size: 16px; }
        .gr-share-group { display: flex; gap: 10px; align-items: center; }
        .gr-s-btn { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; background: rgba(255,255,255,0.1); border: none; cursor: pointer; transition: 0.3s;}
        .gr-s-btn.fb:hover { background: #3b5998; } .gr-s-btn.zalo:hover { background: #0068ff; }

        .gr-w-title { font-size: 16px; font-weight: 700; color: var(--white); margin: 0 0 20px; padding-bottom: 10px; border-bottom: 2px solid var(--gold); display: inline-block; text-transform: uppercase; }
        
        .gr-prod-list { display: flex; flex-direction: column; gap: 15px; }
        .gr-prod-card { display: flex; gap: 12px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); } 
        .gr-prod-card:last-child { border: none; }
        .gr-prod-thumb { width: 100px; height: 80px; flex-shrink: 0; border-radius: 4px; overflow: hidden; position: relative; border: 1px solid var(--border); }
        .gr-prod-thumb img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; } 
        .gr-prod-card:hover .gr-prod-thumb img { transform: scale(1.1); }
        .gr-tag-abs { position: absolute; top: 0; left: 0; padding: 3px 6px; font-size: 9px; font-weight: 700; color: #fff; z-index: 5; border-bottom-right-radius: 5px; }
        .tag-ban { background: var(--red); } .tag-thue { background: var(--green); }
        
        .gr-prod-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .gr-tit-mini { font-size: 13px !important; font-weight: 600; color: #fff; margin: 0 0 5px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; transition: 0.3s;}
        .gr-prod-card:hover .gr-tit-mini { color: var(--gold); }
        .gr-loc-mini { font-size: 11px; color: #999; margin-bottom: 5px; } .gr-loc-mini i { color: var(--gold); }
        .gr-meta-mini { font-size: 11px; color: #ccc; } .gr-hl { color: var(--gold); font-weight: 700; }

        .gr-ro-hang-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .s2-card { background: #0b1120; border: 1px solid rgba(197, 160, 89, 0.2); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; height: 100%; transition: 0.3s; position: relative;}
        .s2-card:hover { border-color: #c5a059; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.4);}
        .s2-thumb-box { height: 180px; position: relative; overflow: hidden; }
        .s2-thumb-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; display: block;}
        .s2-card:hover .s2-thumb-box img { transform: scale(1.1); }
        .s2-body { padding: 15px; flex: 1; display: flex; flex-direction: column; }
        .s2-tit { font-size: 14px !important; font-weight: 600; color: #fff; line-height: 1.4 !important; margin: 0 0 8px 0; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; transition: 0.3s;}
        .s2-card:hover .s2-tit { color: #c5a059; }

        @media (max-width: 900px) { .gr-sp-body { flex-direction: column; } .gr-sp-main, .gr-sp-sidebar { width: 100%; } .gr-sp-sidebar { position: static; } .gr-ro-hang-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .gr-ro-hang-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="site-header"></div>
    <div id="sub-menu" class="sub-header"></div>

    <main id="gr-single-post">
        <div class="gr-con" id="post-container">
            <div style="text-align:center; padding: 100px 0; color: #c5a059;">
                <i class="fas fa-circle-notch fa-spin fa-3x"></i>
                <p>Đang tải nội dung bài viết...</p>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>
    <script src="../../assets/js/ui.js"></script>

    <script>
        window.GREENIA_CURRENT_POST = null;

        document.addEventListener("DOMContentLoaded", async function() {
            const container = document.getElementById('post-container');
            const post = window.GREENIA_CURRENT_POST; 

            if (!post) {
                container.innerHTML = "<h2 style='text-align:center; color:#ff4d4f;'>Đây là file khuôn mẫu. Vui lòng xem bản build tại thư mục /blog/slug/</h2>";
                return;
            }

            try {
                const postRes = await fetch('../../assets/data/posts.json');
                const posts = await postRes.json();
                
                const prodRes = await fetch('../../assets/data/products.json');
                const prods = await prodRes.json();

                let sidebarHTML = ''; let relatedNewsHTML = '';
                
                const otherPosts = posts.filter(p => p.id != post.id).slice(0, 5);
                otherPosts.forEach(p => {
                    relatedNewsHTML += `<a href="../../blog/${p.slug}/" style="display:block; color:#888; text-decoration:none; margin-bottom:15px; font-size:14px; border-bottom:1px dashed rgba(255,255,255,0.05); padding-bottom:10px; transition:0.3s;" onmouseover="this.style.color='#c5a059'" onmouseout="this.style.color='#888'"><i class="fas fa-chevron-right" style="font-size:10px; color:#c5a059; margin-right:5px;"></i> ${p.title}</a>`;
                });

                const randomProds = [...prods].sort(() => 0.5 - Math.random()).slice(0, 5);
                randomProds.forEach(p => {
                    const tagClass = p.type === 'Bán' ? 'tag-ban' : 'tag-thue';
                    sidebarHTML += `
                        <a href="../../san-pham/${p.slug}/" class="gr-prod-card">
                            <div class="gr-prod-thumb"><span class="gr-tag-abs ${tagClass}">${p.type}</span><img src="${resolveImg(p.img)}"></div>
                            <div class="gr-prod-info">
                                <h4 class="gr-tit-mini">${p.title}</h4>
                                <div class="gr-loc-mini"><i class="fas fa-map-marker-alt"></i> ${p.loc}</div>
                                <div class="gr-meta-mini"><span class="gr-hl">${p.price}</span> | ${p.area} m²</div>
                            </div>
                        </a>`;
                });

                const roHangDuAn = prods.filter(p => p.projectCode === post.slug);
                let roHangHTML = '';
                if (roHangDuAn.length > 0) {
                    roHangHTML = `
                    <div style="margin-top: 60px; padding-top: 40px; border-top: 1px dashed rgba(197, 160, 89, 0.3);">
                        <h2 style="color:#c5a059; font-size: 24px; margin-bottom: 20px;">Sản phẩm thuộc dự án này</h2>
                        <div class="gr-ro-hang-grid">
                            ${roHangDuAn.map(p => `
                                <a href="../../san-pham/${p.slug}/" class="s2-card">
                                    <div class="s2-thumb-box"><span class="gr-tag-abs ${p.type === 'Bán' ? 'tag-ban' : 'tag-thue'}">${p.type}</span><img src="${resolveImg(p.img)}"></div>
                                    <div class="s2-body">
                                        <h3 class="s2-tit">${p.title}</h3>
                                        <div class="gr-loc-mini" style="margin-bottom:10px;"><i class="fas fa-map-marker-alt"></i> ${p.loc}</div>
                                        <div class="gr-meta-mini" style="border-top:1px solid rgba(255,255,255,0.05); padding-top:10px;">
                                            <span class="gr-hl" style="font-size:14px;">${p.price}</span> 
                                            <span style="float:right">${p.area} m² ${p.bed ? `| ${p.bed} PN` : ''}</span>
                                        </div>
                                    </div>
                                </a>`).join('')}
                        </div>
                    </div>`;
                }

                container.innerHTML = `
                    <div class="gr-sp-header">
                        <div class="gr-breadcrumbs">
                            <a href="../../index.html">Trang chủ</a> <span class="sep">/</span>
                            <a href="../../danh-muc.html">${post.cat}</a> <span class="sep">/</span>
                            <span class="current">${post.title}</span>
                        </div>
                        <h1 class="gr-sp-title">${post.title}</h1>
                        <div class="gr-sp-meta">
                            <span><i class="far fa-calendar-alt"></i> ${post.date}</span>
                            <span><i class="far fa-user"></i> ${post.author}</span>
                        </div>
                    </div>

                    <div class="gr-sp-body">
                        <div class="gr-sp-main">
                            <div class="gr-toc-wrap" id="gr-toc-wrapper">
                                <div class="gr-toc-header" onclick="toggleTOC()">
                                    <span class="gr-toc-tit"><i class="fas fa-list-ul"></i> Mục lục bài viết</span>
                                    <i class="fas fa-chevron-down gr-toc-icon" id="gr-toc-icon"></i>
                                </div>
                                <ul class="gr-toc-list" id="gr-toc-list"></ul>
                            </div>
                            <div class="gr-entry-content" id="gr-content-body">
                                ${post.content}
                            </div>
                            <div class="gr-bottom-bar">
                                <div class="gr-bot-cta">Quan tâm dự án? Gọi ngay: <a href="tel:0932966700">0932 966 700</a></div>
                                <div class="gr-share-group">
                                    <span style="color:#fff; font-size:13px;">Chia sẻ:</span>
                                    <button onclick="shareFB()" class="gr-s-btn fb"><i class="fab fa-facebook-f"></i></button>
                                    <button onclick="copyLink()" class="gr-s-btn copy" style="background:#c5a059; color:#000;"><i class="fas fa-link"></i></button>
                                </div>
                            </div>
                            ${roHangHTML}
                        </div>

                        <div class="gr-sp-sidebar">
                            <div>
                                <div class="gr-w-title">Bất động sản nổi bật</div>
                                <div class="gr-prod-list">${sidebarHTML}</div>
                            </div>
                            <div style="margin-top: 20px;">
                                <div class="gr-w-title">Tin tức mới nhất</div>
                                <div style="padding-top: 10px;">${relatedNewsHTML}</div>
                            </div>
                        </div>
                    </div>
                `;

                buildTOC();

            } catch (error) {
                container.innerHTML = "<h2 style='text-align:center; color:#ff4d4f;'>Lỗi xử lý dữ liệu.</h2>";
            }
        });

        window.shareFB = function() { window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(window.location.href), '_blank', 'width=600,height=400'); };
        window.copyLink = function() { navigator.clipboard.writeText(window.location.href); alert("Đã sao chép liên kết!"); };

        window.toggleTOC = function() {
            const list = document.getElementById('gr-toc-list');
            const icon = document.getElementById('gr-toc-icon');
            if(list.style.display === 'none' || list.style.display === '') {
                list.style.display = 'block'; icon.style.transform = 'rotate(180deg)';
            } else {
                list.style.display = 'none'; icon.style.transform = 'rotate(0deg)';
            }
        };

        function buildTOC() {
            const content = document.getElementById('gr-content-body');
            const tocList = document.getElementById('gr-toc-list');
            const tocWrapper = document.getElementById('gr-toc-wrapper');
            const headings = content.querySelectorAll('h2');
            if(headings.length > 0) {
                tocWrapper.style.display = 'block';
                document.getElementById('gr-toc-icon').style.transform = 'rotate(180deg)';
                headings.forEach((h2, index) => {
                    const id = 'heading-' + index;
                    h2.id = id;
                    const li = document.createElement('li');
                    li.className = 'gr-toc-item';
                    li.innerHTML = `<a href="#${id}" class="gr-toc-link" onclick="scrollToId('${id}')">${index + 1}. ${h2.innerText}</a>`;
                    tocList.appendChild(li);
                });
            }
        }

        window.scrollToId = function(id) {
            event.preventDefault();
            const element = document.getElementById(id);
            const y = element.getBoundingClientRect().top + window.scrollY - 80;
            window.scrollTo({top: y, behavior: 'smooth'});
        };
    </script>
</body>
</html>
