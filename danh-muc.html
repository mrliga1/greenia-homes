<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Mục Tin Tức | Greenia Homes</title>
    
    <link rel="icon" href="https://i.ibb.co/M515GTDh/Gemini-Generated-Image-px9jf4px9jf4px9j-removebg-preview-150x150.png" type="image/x-icon" />    <link rel="apple-touch-icon" href="/greenia-homes/apple-touch-icon.png">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/greenia-homes/assets/css/style.css">

    <style>
        #gr-v53 { --bg: #05080f; --card: #0e121b; --border: #232d45; --gold: #c5a059; --text: #b0b8c4; --white: #fff; --red: #ff4d4f; --green: #00b894; font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.5; width: 100%; overflow: hidden; padding-bottom: 60px;}
        #gr-v53 * { box-sizing: border-box; } #gr-v53 a { text-decoration: none; color: inherit; transition: 0.3s; } #gr-v53 img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .gr-con { max-width: 1250px; width: 100%; margin: 0 auto; padding: 40px 15px; }
        
        /* TABS */
        .s1-head-row { border-bottom: 1px solid var(--border); margin-bottom: 20px; display: flex; align-items: flex-end; }
        .s1-tabs-wrap { display: flex; gap: 25px; overflow-x: auto; width: 100%; scrollbar-width: none; padding-bottom: 5px;} .s1-tabs-wrap::-webkit-scrollbar { display: none; }
        .s1-tab { font-size: 16px; font-weight: 600; color: #888; cursor: pointer; margin-bottom: -1px; padding-bottom: 1px; border-bottom: 2px solid transparent; white-space: nowrap; transition: 0.3s; display: block;}
        .s1-tab:hover { color: #c5a059; } .s1-tab.active { color: #c5a059 !important; border-bottom: 2px solid #c5a059 !important; }
        
        .gr-cat-header-layer { margin-bottom: 25px; padding-bottom: 2px; border-bottom: 1px dashed var(--border); }
        .gr-cat-h1 { font-size: 26px; font-weight: 700; color: var(--gold); margin: 0 0 8px 0; line-height: 1.3; }
        
        /* GRID 3 CỘT TOP */
        .s1-grid-body { display: grid; grid-template-columns: 40% 30% 25%; gap: 2.5%; margin-bottom: 40px; align-items: start; }
        .s1-col-1 { background: var(--card); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
        .s1-hero-img-box { height: 260px; overflow: hidden; position: relative; } .s1-hero-img { transition: 0.5s; } .s1-col-1:hover .s1-hero-img { transform: scale(1.05); }
        .s1-hero-body { padding: 20px; display: flex; flex-direction: column; border-top: 1px solid var(--border); }
        .s1-hero-tit { font-size: 18px; font-weight: 800; color: var(--white); margin-bottom: 10px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .s1-hero-desc { font-size: 13px; color: #888; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .s1-hero-date { font-size: 11px; color: var(--gold); font-weight: 600; margin-top: 10px; }
        
        .s1-col-2 { display: flex; flex-direction: column; }
        .s1-news-item { padding: 12px 10px; border-bottom: 1px dashed var(--border); cursor: pointer; color: #94a3b8; font-weight: 500; font-size: 13px; transition: 0.2s; line-height: 1.4; }
        .s1-news-item:hover, .s1-news-item.active { background: rgba(197, 160, 89, 0.05); color: var(--gold); border-left: 3px solid var(--gold); padding-left: 12px; }
        
        .s1-col-3 { display: flex; flex-direction: column; }
        .s1-col3-title { font-size: 16px; font-weight: 700; color: var(--gold); margin: 0 0 15px; padding-bottom: 10px; border-bottom: 2px solid var(--gold); width: fit-content; text-transform: uppercase;}
        
        /* 70/30 SPLIT */
        .gr-sec2 { display: flex; gap: 30px; align-items: flex-start; margin-bottom: 40px;}
        .gr-sec2-left-wrap { width: calc(70% - 15px); display: flex; flex-direction: column; }
        .gr-sec2-right-wrap { width: calc(30% - 15px); display: flex; flex-direction: column; }
        .gr-sec2-left { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-content: start; }
        
        .gr-list-post { display: flex; gap: 12px; padding-bottom: 15px; border-bottom: 1px dashed var(--border); transition: 0.3s; align-items: center; }
        .gr-list-thumb { width: 90px; height: 65px; border-radius: 4px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--border); position: relative;}
        .gr-list-info { flex: 1; display: flex; flex-direction: column; justify-content: center;}
        .gr-list-tit { font-size: 13px !important; font-weight: 600 !important; color: #e2e8f0; margin: 0 0 6px; line-height: 1.4; transition: 0.3s; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
        .gr-list-date { font-size: 11px; color: var(--gold); margin-top: auto; }
        
        /* SIDEBAR PRODUCTS */
        .gr-sec2-right { display: flex; flex-direction: column; gap: 15px; }
        .gr-list-prod { display: flex; gap: 12px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s;}
        .gr-lprod-thumb { width: 100px; height: 75px; flex-shrink: 0; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        .gr-lprod-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .gr-lprod-tit { font-size: 13px !important; font-weight: 600 !important; color: #fff; line-height: 1.4 !important; margin-bottom: 6px !important; display: -webkit-box !important; -webkit-line-clamp: 2 !important; -webkit-box-orient: vertical !important; overflow: hidden !important; text-overflow: ellipsis !important; }
        .gr-lprod-loc { font-size: 11px; color: #999; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; } .gr-lprod-loc i { color: var(--gold); font-size: 10px; }
        .gr-lprod-hl { color: var(--gold); font-weight: 700; font-size: 12px; }

        /* CAROUSEL & GRID KHỐI DƯỚI */
        .s-head { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 20px; margin-top: 50px; }
        .s-tit { font-size: 20px; font-weight: 700; color: var(--white); text-transform: uppercase; border-left: 4px solid var(--gold); padding-left: 15px; margin: 0; line-height: 1; }
        .s3-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
        .gr-carousel-wrapper { position: relative; }
        .gr-carousel { display: flex; overflow-x: auto; gap: 20px; padding-bottom: 15px; scroll-snap-type: x mandatory; scroll-behavior: smooth; scrollbar-width: none; }
        .gr-carousel::-webkit-scrollbar { display: none; }
        .gr-carousel .s2-card { flex: 0 0 calc(20% - 16px); max-width: calc(20% - 16px); scroll-snap-align: start; }
        
        .gr-nav-btn { position: absolute; top: 40%; transform: translateY(-50%); width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--border); background: rgba(14, 18, 27, 0.8); color: var(--white); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; transition: 0.3s; }
        .gr-nav-btn:hover { background: var(--gold); color: #000; border-color: var(--gold); }
        .gr-prev { left: -15px; } .gr-next { right: -15px; }
        
        .s2-card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; position: relative; height: 100%; }
        .s2-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .s2-thumb-box { height: 180px; position: relative; overflow: hidden; }
        .s2-body { padding: 15px; flex: 1; display: flex; flex-direction: column; }
        .gr-tit { font-size: 13px !important; font-weight: 600 !important; color: #fff; line-height: 1.4 !important; margin-bottom: 6px !important; display: -webkit-box !important; -webkit-line-clamp: 2 !important; -webkit-box-orient: vertical !important; overflow: hidden !important; transition: 0.3s; }
        .s2-card:hover .gr-tit { color: var(--gold) !important; }
        .s2-body .gr-meta { border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; justify-content: space-between; margin-top: auto; display: flex; align-items: center; gap: 8px; font-size: 11px; }
        .gr-hl { color: var(--gold); font-weight: 700; font-size: 14px; }

        /* TAGS */
        .gr-tag-abs { position: absolute; top: 0; left: 0; padding: 4px 10px; font-size: 10px; font-weight: 700; color: #fff; z-index: 5; border-bottom-right-radius: 5px; text-transform: uppercase; background: var(--gold); }
        .tag-ban { background: var(--red); } .tag-thue { background: var(--green); }

        .s1-btn-wrap { width: 100%; text-align: center; margin-top: 25px; }
        .s1-btn { display: inline-block; font-size: 11px; color: var(--gold); font-weight: 700; text-transform: uppercase; padding: 10px 30px; border: 1px solid var(--gold); border-radius: 3px; transition: 0.3s; text-decoration: none; cursor: pointer; background: transparent; }
        .s1-btn:hover { background: rgba(197, 160, 89, 0.15); color: var(--gold); }

        @media (max-width: 900px) { .s1-grid-body { display: flex; flex-direction: column; gap: 30px; } .gr-sec2 { flex-direction: column; gap: 30px; } .gr-sec2-left-wrap, .gr-sec2-right-wrap { width: 100%; } .s3-grid { grid-template-columns: repeat(2, 1fr); } .gr-carousel .s2-card { flex: 0 0 calc(50% - 10px); max-width: calc(50% - 10px); } }
    </style>
</head>
<body>

    <div id="site-header"></div>
    <div id="sub-menu" class="sub-header"></div>

    <div id="gr-v53">
        <div class="gr-con">
            <div class="s1-head-row">
                <div class="s1-tabs-wrap" id="dynamic-tabs"></div>
            </div>

            <div class="gr-cat-header-layer">
                <h1 class="gr-cat-h1" id="dyn-cat-title">Đang cập nhật...</h1>
                <div class="gr-cat-desc" style="color:#888;"></div>
            </div>

            <div class="s1-grid-body" id="top-grid-container" style="opacity: 0; transition: 0.5s;">
                <div class="s1-col-1" id="hero-col"></div>
                <div class="s1-col-2" id="hover-list-col"></div>
                <div class="s1-col-3">
                    <h3 class="s1-col3-title">Tin nổi bật</h3>
                    <div id="related-col"></div>
                </div>
            </div>

            <div class="s-head"><h3 class="s-tit">Danh sách bài viết</h3></div>
            <div class="gr-sec2">
                <div class="gr-sec2-left-wrap">
                    <div class="gr-sec2-left" id="main-post-grid"></div>
                    <div class="s1-btn-wrap" id="load-more-wrap">
                        <button class="s1-btn" onclick="loadMorePosts()">Xem thêm bài viết</button>
                    </div>
                </div>
                <div class="gr-sec2-right-wrap">
                    <div class="gr-sec2-right" id="sidebar-products-grid"></div>
                    <div class="s1-btn-wrap"><a href="/greenia-homes/san-pham.html" class="s1-btn">Xem tất cả sản phẩm</a></div>
                </div>
            </div>
            
            <div class="s-head"><h3 class="s-tit">Bất động sản dành cho bạn</h3></div>
            <div class="s3-grid" id="foryou-grid"></div>

            <div class="s-head"><h3 class="s-tit">Tin nhà đất bán mới nhất</h3></div>
            <div class="gr-carousel-wrapper">
                <button class="gr-nav-btn gr-prev" onclick="grScrollHorizontal('sale-scroll', -1)"><i class="fas fa-chevron-left"></i></button>
                <div id="sale-scroll" class="gr-carousel"></div>
                <button class="gr-nav-btn gr-next" onclick="grScrollHorizontal('sale-scroll', 1)"><i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="s-head"><h3 class="s-tit">Tin nhà đất cho thuê mới nhất</h3></div>
            <div class="gr-carousel-wrapper">
                <button class="gr-nav-btn gr-prev" onclick="grScrollHorizontal('rent-scroll', -1)"><i class="fas fa-chevron-left"></i></button>
                <div id="rent-scroll" class="gr-carousel"></div>
                <button class="gr-nav-btn gr-next" onclick="grScrollHorizontal('rent-scroll', 1)"><i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="s-head"><h3 class="s-tit">Dự án nổi bật</h3></div>
            <div class="gr-carousel-wrapper">
                <button class="gr-nav-btn gr-prev" onclick="grScrollHorizontal('feat-scroll', -1)"><i class="fas fa-chevron-left"></i></button>
                <div id="feat-scroll" class="gr-carousel"></div>
                <button class="gr-nav-btn gr-next" onclick="grScrollHorizontal('feat-scroll', 1)"><i class="fas fa-chevron-right"></i></button>
            </div>

        </div>
    </div>

    <div id="site-footer"></div>
    <script src="/greenia-homes/assets/js/ui.js"></script>

    <script>
        // Lệnh này để con Bot Build.js tìm và nhét thông số danh mục vào
        window.GREENIA_CURRENT_CATEGORY = null; 

        // KHO KHAI BÁO BIẾN ĐÃ ĐƯỢC TỐI ƯU CÔ LẬP
        let allPosts = [];
        let allProducts = [];
        let postsInThisCat = []; // Cô lập dữ liệu: Chỉ chứa bài của đúng danh mục này
        let currentTabPosts = [];
        let loadedCount = 0;
        const postsPerPage = 10;
        let mixedPostsPool = [];
        let independentProjects = [];

        const safeBaseUrl = (typeof BASE_URL !== 'undefined') ? BASE_URL : '/greenia-homes/';

        function createSafeSlug(title) {
            if(!title) return 'tin-tuc';
            return title.toString().toLowerCase().trim().replace(/\s+/g, '-').replace(/[áàảãạâấầẩẫậăắằẳẵặ]/g, 'a').replace(/[éèẻẽẹêếềểễệ]/g, 'e').replace(/[íìỉĩị]/g, 'i').replace(/[óòỏõọôốồổỗộơớờởỡợ]/g, 'o').replace(/[úùủũụưứừửữự]/g, 'u').replace(/[ýỳỷỹỵ]/g, 'y').replace(/đ/g, 'd').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-');
        }

        function extractPostData(p) {
            const tempDiv = document.createElement('div'); tempDiv.innerHTML = p.content;
            const firstImg = tempDiv.querySelector('img');
            const img = firstImg ? firstImg.src : 'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=800'; 
            const excerpt = tempDiv.textContent.substring(0, 120) + '...';
            const catSlug = createSafeSlug(p.cat);
            const pSlug = p.slug || createSafeSlug(p.title);
            const link = `${safeBaseUrl}tin-tuc/${catSlug}/${pSlug}/`;
            return { img: window.resolveImg ? window.resolveImg(img) : img, excerpt, link, catSlug, pSlug, title: p.title, date: p.date, cat: p.cat };
        }

        function createProdCardHTML(p, isList = false) {
            const catSlug = createSafeSlug(p.cat || 'san-pham');
            const pSlug = p.slug || createSafeSlug(p.title);
            const tagClass = p.type === 'Bán' ? 'tag-ban' : 'tag-thue';
            const tagText = p.type === 'Bán' ? 'Đang bán' : 'Cho thuê';
            const imgUrl = window.resolveImg ? window.resolveImg(p.img) : p.img;
            const link = `${safeBaseUrl}san-pham/${catSlug}/${pSlug}/`;

            if(isList) {
                return `<a href="${link}" class="gr-list-prod">
                            <div class="gr-lprod-thumb"><span class="gr-tag-abs ${tagClass}">${tagText}</span><img src="${imgUrl}"></div>
                            <div class="gr-lprod-info"><h4 class="gr-lprod-tit">${p.title}</h4><div class="gr-lprod-loc"><i class="fas fa-map-marker-alt"></i> ${p.loc}</div><div class="gr-lprod-meta"><span class="gr-lprod-hl">${p.price}</span></div></div>
                        </a>`;
            } else {
                const bedHtml = p.bed ? `<span style="color:#444;">|</span> <span class="gr-hl" style="font-size:12px;font-weight:400;">${p.bed} PN</span>` : '';
                return `<a href="${link}" class="s2-card">
                            <div class="s2-thumb-box"><span class="gr-tag-abs ${tagClass}">${tagText}</span><img src="${imgUrl}"></div>
                            <div class="s2-body"><h3 class="gr-tit">${p.title}</h3><div class="gr-loc"><i class="fas fa-map-marker-alt"></i> ${p.loc}</div><div class="gr-meta"><span class="gr-hl">${p.price}</span><div style="display:flex; gap:10px;"><span class="gr-hl" style="font-size:12px;font-weight:400;">${p.area} m²</span>${bedHtml}</div></div></div>
                        </a>`;
            }
        }

        document.addEventListener("DOMContentLoaded", async function() {
            try {
                const [postRes, prodRes] = await Promise.all([
                    fetch(safeBaseUrl + 'assets/data/posts.json'),
                    fetch(safeBaseUrl + 'assets/data/products.json')
                ]);
                allPosts = await postRes.json();
                allProducts = await prodRes.json();

                try {
                    const projRes = await fetch(safeBaseUrl + 'assets/data/projects.json');
                    if (projRes.ok) { independentProjects = await projRes.json(); }
                } catch(e) {}

                // 1. GẮN THÔNG TIN DANH MỤC HIỆN TẠI VÀO TIÊU ĐỀ
                const currentCatName = window.GREENIA_CURRENT_CATEGORY ? window.GREENIA_CURRENT_CATEGORY.name : 'Tin Tức';
                
                if(window.GREENIA_CURRENT_CATEGORY) {
                    document.getElementById('dyn-cat-title').innerText = currentCatName;
                    document.querySelector('.gr-cat-desc').innerText = window.GREENIA_CURRENT_CATEGORY.desc || `Cập nhật những bài viết mới nhất thuộc chuyên mục ${currentCatName}.`;
                }

                // 2. CÔ LẬP BÀI VIẾT: Chỉ lấy bài viết thuộc về danh mục này
                postsInThisCat = window.GREENIA_CURRENT_CATEGORY ? allPosts.filter(p => p.cat === currentCatName) : [...allPosts];

                // 3. TẠO TABS THÔNG MINH: Chỉ hiển thị "Tất cả" & Các Danh Mục Con (Nếu có)
                const subCategories = []; // Mảng rỗng chờ nâng cấp Admin trong tương lai
                const tabs = ['Tất cả', ...subCategories];

                const tabsHtml = tabs.map((cat, idx) => `<div class="s1-tab ${idx === 0 ? 'active' : ''}" onclick="switchSubTab('${cat}', this)">${cat}</div>`).join('');
                document.getElementById('dynamic-tabs').innerHTML = tabsHtml;

                // 4. KÍCH HOẠT TAB MẶC ĐỊNH
                switchSubTab('Tất cả', document.querySelector('.s1-tab'));

                // XỬ LÝ RENDER CAROUSEL SẢN PHẨM & DỰ ÁN BÊN DƯỚI (Giữ nguyên)
                const sidebarProds = [...allProducts].sort(() => 0.5 - Math.random()).slice(0, 6);
                document.getElementById('sidebar-products-grid').innerHTML = sidebarProds.map(p => createProdCardHTML(p, true)).join('');

                const forYouProds = [...allProducts].sort(() => 0.5 - Math.random()).slice(0, 10);
                document.getElementById('foryou-grid').innerHTML = forYouProds.map(p => createProdCardHTML(p)).join('');

                const saleProds = allProducts.filter(p => p.type === 'Bán').slice(0, 10);
                document.getElementById('sale-scroll').innerHTML = saleProds.map(p => createProdCardHTML(p)).join('');

                const rentProds = allProducts.filter(p => p.type === 'Thuê').slice(0, 10);
                document.getElementById('rent-scroll').innerHTML = rentProds.map(p => createProdCardHTML(p)).join('');

                if (independentProjects.length > 0) {
                    document.getElementById('feat-scroll').innerHTML = independentProjects.map(p => {
                        const imgSrc = window.resolveImg ? window.resolveImg(p.img) : p.img;
                        return `<a href="${p.link}" class="s2-card">
                                    <div class="s2-thumb-box"><span class="gr-tag-abs" style="background:#ff4d4f;">Dự án</span><img src="${imgSrc}"></div>
                                    <div class="s2-body">
                                        <h3 class="gr-tit">${p.title}</h3>
                                        <div class="gr-meta" style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; margin-top: auto; display: flex; align-items: center; color: #888; font-size: 11px;">
                                            <i class="far fa-star" style="margin-right:5px; color:#c5a059;"></i> ${p.status || 'Đang mở bán'}
                                        </div>
                                    </div>
                                </a>`;
                    }).join('');
                } else {
                    document.getElementById('feat-scroll').innerHTML = '<div style="color:#888; padding:20px;">Đang cập nhật dự án...</div>';
                }

            } catch(e) {
                document.getElementById('top-grid-container').innerHTML = "<div style='color:#ff4d4f; padding:50px; text-align:center;'>Hệ thống đang cập nhật dữ liệu.</div>";
                document.getElementById('top-grid-container').style.opacity = 1;
            }
        });

        // HÀM LỌC NỘI BỘ TRONG DANH MỤC
        window.switchSubTab = function(subCatName, btnEl) {
            document.querySelectorAll('.s1-tab').forEach(t => t.classList.remove('active'));
            if(btnEl) btnEl.classList.add('active');
            
            // Tìm trong mảng đã được cô lập (postsInThisCat)
            currentTabPosts = subCatName === 'Tất cả' ? [...postsInThisCat] : postsInThisCat.filter(p => p.subCat === subCatName);
            
            if(currentTabPosts.length === 0) {
                document.getElementById('top-grid-container').style.opacity = 1;
                document.getElementById('top-grid-container').innerHTML = "<div style='grid-column: 1/-1; color:#888; padding:50px; text-align:center;'>Chưa có bài viết nào trong mục này.</div>";
                document.getElementById('main-post-grid').innerHTML = '';
                document.getElementById('load-more-wrap').style.display = 'none';
                return;
            }

            // Gắn lại khung nếu có dữ liệu
            document.getElementById('top-grid-container').innerHTML = `
                <div class="s1-col-1" id="hero-col"></div>
                <div class="s1-col-2" id="hover-list-col"></div>
                <div class="s1-col-3"><h3 class="s1-col3-title">Tin nổi bật</h3><div id="related-col"></div></div>
            `;

            renderHero(currentTabPosts[0]);
            
            const hoverPosts = currentTabPosts.slice(1, 7);
            document.getElementById('hover-list-col').innerHTML = hoverPosts.map((p, idx) => {
                const pd = extractPostData(p);
                return `<div class="s1-news-item ${idx === 0 ? 'active' : ''}" onmouseenter="updateHero('${pd.link}', '${pd.img}', \`${pd.title}\`, \`${pd.excerpt}\`, '${pd.date}', this)" onclick="window.location.href='${pd.link}'">${pd.title}</div>`;
            }).join('');
            
            const relatedPosts = currentTabPosts.slice(7, 12);
            document.getElementById('related-col').innerHTML = relatedPosts.map(p => {
                const pd = extractPostData(p);
                return `<a href="${pd.link}" class="gr-prod-card" style="align-items: center;"><div class="gr-img-col3"><img src="${pd.img}"></div><div class="gr-prod-info"><h4 class="gr-tit">${pd.title}</h4><div class="gr-meta" style="color: #888; font-size: 11px; border-top: none; padding-top: 0;"><i class="far fa-clock"></i> ${pd.date}</div></div></a>`;
            }).join('') || '<div style="color:#888; font-size:12px;">Đang cập nhật...</div>';
            
            document.getElementById('top-grid-container').style.opacity = 1;
            
            mixedPostsPool = [...currentTabPosts]; 
            loadedCount = 0;
            document.getElementById('main-post-grid').innerHTML = ''; 
            document.getElementById('load-more-wrap').style.display = 'block';
            loadMorePosts();
        };

        window.renderHero = function(p) {
            const pd = extractPostData(p);
            document.getElementById('hero-col').innerHTML = `<div class="s1-hero-img-box"><a href="${pd.link}" id="hero-link"><img src="${pd.img}" id="hero-img" class="s1-hero-img"></a></div><div class="s1-hero-body"><a href="${pd.link}"><h3 class="s1-hero-tit" id="hero-tit">${pd.title}</h3></a><div class="s1-hero-desc" id="hero-desc">${pd.excerpt}</div><div class="s1-hero-date" id="hero-date"><i class="far fa-clock"></i> ${pd.date}</div></div>`;
        }

        window.updateHero = function(link, img, tit, desc, date, el) {
            document.getElementById('hero-link').href = link; document.querySelector('.s1-hero-body a').href = link;
            document.getElementById('hero-img').src = img; document.getElementById('hero-tit').innerText = tit;
            document.getElementById('hero-desc').innerText = desc; document.getElementById('hero-date').innerHTML = `<i class="far fa-clock"></i> ${date}`;
            document.querySelectorAll('.s1-news-item').forEach(item => item.classList.remove('active')); el.classList.add('active');
        }

        window.loadMorePosts = function() {
            const grid = document.getElementById('main-post-grid');
            const batch = mixedPostsPool.slice(loadedCount, loadedCount + postsPerPage);
            if(batch.length === 0) return;
            let html = batch.map(p => {
                const pd = extractPostData(p);
                return `<a href="${pd.link}" class="gr-list-post"><div class="gr-list-thumb"><img src="${pd.img}"></div><div class="gr-list-info"><h4 class="gr-list-tit">${pd.title}</h4><div class="gr-list-date"><i class="far fa-clock"></i> ${pd.date}</div></div></a>`;
            }).join('');
            grid.insertAdjacentHTML('beforeend', html);
            loadedCount += batch.length;
            if(loadedCount >= mixedPostsPool.length) document.getElementById('load-more-wrap').style.display = 'none';
        }

        window.grScrollHorizontal = function(id, dir) {
            var el = document.getElementById(id); if(!el) return;
            var item = el.querySelector(".s2-card"); if(!item) return;
            var w = item.offsetWidth + 20; el.scrollBy({left: w * dir, behavior: "smooth"});
        };
    </script>
</body>
</html>
