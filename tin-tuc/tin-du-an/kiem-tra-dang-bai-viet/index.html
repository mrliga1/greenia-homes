    <div id="site-header"></div>
    <div id="sub-menu" class="sub-header"></div>

    <main id="gr-single-post">
        <div class="gr-con" id="post-container">
            <div style="text-align:center; padding: 100px 0; color: #c5a059;">
                <i class="fas fa-circle-notch fa-spin fa-3x"></i>
                <p>Đang tải nội dung...</p>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>
    
    <script src="/assets/js/ui.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: String.fromCharCode(65,73,122,97,83,121,68,105,79,69,122,77,57,114,78,65,102,106,45,109,88,97,70,53,49,89,86,78,74,103,121,85,45,99,104,105,51,116,115),
          authDomain: "greenia-homes.firebaseapp.com",
          projectId: "greenia-homes",
          storageBucket: "greenia-homes.appspot.com",
          messagingSenderId: "24027695632",
          appId: "1:24027695632:web:13a23aa156e864f7d55895",
          measurementId: "G-YRK63BNPP0"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        let defaultPost = null;
        try { 
            defaultPost = {
                id: "10",
                title: "kiểm tra đăng bài viết",
                slug: "kiem-tra-dang-bai-viet",
                cat: "tin dự án",
                date: "15/4/2026",
                author: "Ban Biên Tập",
                thumb: "",
                content: `<p>kiểm tra nội dung</p>
`
            };
        } catch(e) {}
        window.GREENIA_CURRENT_POST = defaultPost;

        function createSafeSlug(title) {
            if(!title) return 'tin-tuc';
            return title.toString().toLowerCase().trim().replace(/\s+/g, '-').replace(/[áàảãạâấầẩẫậăắằẳẵặ]/g, 'a').replace(/[éèẻẽẹêếềểễệ]/g, 'e').replace(/[íìỉĩị]/g, 'i').replace(/[óòỏõọôốồổỗộơớờởỡợ]/g, 'o').replace(/[úùủũụưứừửữự]/g, 'u').replace(/[ýỳỷỹỵ]/g, 'y').replace(/đ/g, 'd').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-');
        }

        // HÀM BỔ SUNG: Chuyên tách danh mục để làm link sạch sẽ, chống dính chữ
        function getPrimaryCatSlug(catData, defaultSlug) {
            if (!catData) return defaultSlug;
            let primaryCat = Array.isArray(catData) ? catData[0] : String(catData).split(',')[0].trim();
            return createSafeSlug(primaryCat);
        }

        function createProdCardHTML(p) {
            let catSlug = getPrimaryCatSlug(p.cat, 'san-pham');
            const pSlug = p.slug || createSafeSlug(p.title);
            const tagClass = p.type === 'Bán' ? 'tag-ban' : 'tag-thue';
            const tagText = p.type === 'Bán' ? 'Đang bán' : 'Cho thuê';
            const imgUrl = window.resolveImg ? window.resolveImg(p.img) : (p.img || '');
            const fallbackImg = "https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=600";
            
            const link = `${window.BASE_URL || '/'}san-pham/${catSlug}/${pSlug}/`;
            
            let areaBedHtml = "";
            if (p.area || p.bed) {
                let areaPart = p.area ? `<span style="color: var(--gold); font-size:12px;">${p.area} m²</span>` : "";
                let bedPart = p.bed ? `<span style="color: var(--gold); font-size:12px;">${p.bed} PN</span>` : "";
                let divider = (p.area && p.bed) ? `<span style="color:#555; margin: 0 6px;">|</span>` : "";
                areaBedHtml = `<div style="display:flex; align-items:center;">${areaPart}${divider}${bedPart}</div>`;
            }

            return `<a href="${link}" class="s2-card">
                        <div class="s2-thumb-box">
                            <span class="gr-tag-abs ${tagClass}">${tagText}</span>
                            <img src="${imgUrl}" onerror="this.src='${fallbackImg}';">
                        </div>
                        <div class="s2-body">
                            <h3 class="gr-tit">${p.title}</h3>
                            <div class="gr-loc" style="font-size: 11px; color: #999; margin-bottom: 6px;"><i class="fas fa-map-marker-alt"></i> ${p.loc || ''}</div>
                            <div class="gr-meta" style="display:flex; justify-content:space-between; align-items:center;">
                                <span class="gr-hl">${p.price || 'Liên hệ'}</span>
                                ${areaBedHtml}
                            </div>
                        </div>
                    </a>`;
        }

        function autoGenerateArticleSchema(postData) {
            const oldSchema = document.getElementById('gr-dynamic-schema-article');
            if (oldSchema) oldSchema.remove();

            const pTitle = postData.title || "Bài viết Bất động sản";
            const pImage = window.resolveImg ? window.resolveImg(postData.thumb) : (postData.thumb || "https://i.ibb.co/M515GTDh/Gemini-Generated-Image-px9jf4px9jf4px9j-removebg-preview-150x150.png");
            
            let cleanDesc = "Đang cập nhật nội dung.";
            if(postData.content) {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = postData.content;
                cleanDesc = tempDiv.textContent.replace(/(\r\n|\n|\r)/gm, " ").substring(0, 200) + '...';
            }

            const schemaObj = {
                "@context": "https://schema.org",
                "@type": "Article",
                "mainEntityOfPage": {
                    "@type": "WebPage",
                    "@id": window.location.href
                },
                "headline": pTitle,
                "image": [pImage],
                "datePublished": postData.date ? postData.date : new Date().toISOString(),
                "author": {
                    "@type": "Person",
                    "name": postData.author || "Ban Biên Tập Greenia Homes"
                },
                "publisher": {
                    "@type": "Organization",
                    "name": "Greenia Homes",
                    "logo": {
                        "@type": "ImageObject",
                        "url": "https://i.ibb.co/M515GTDh/Gemini-Generated-Image-px9jf4px9jf4px9j-removebg-preview-150x150.png"
                    }
                },
                "description": cleanDesc
            };

            const script = document.createElement('script');
            script.id = 'gr-dynamic-schema-article';
            script.type = "application/ld+json";
            script.text = JSON.stringify(schemaObj);
            document.head.appendChild(script);
        }

        document.addEventListener("DOMContentLoaded", async function() {
            const container = document.getElementById('post-container');
            const post = window.GREENIA_CURRENT_POST; 
            const safeBaseUrl = window.BASE_URL;

            autoGenerateArticleSchema(post);

            try {
                const [postSnap, prodSnap, projSnap] = await Promise.all([
                    db.collection('posts').get(),
                    db.collection('products').get(),
                    db.collection('projects').get()
                ]);
                
                let posts = postSnap.docs.map(doc => doc.data()).sort((a,b) => b.id - a.id);
                let prods = prodSnap.docs.map(doc => doc.data()).sort((a,b) => b.id - a.id);
                let independentProjects = projSnap.docs.map(doc => doc.data()).sort((a,b) => b.id - a.id);

                // =========================================================================
                // 1. Sidebar - Danh mục Sản Phẩm (ĐỌC NHÓM TỪ ADMIN)
                // =========================================================================
                let countBan = prods.filter(p => p.type === 'Bán').length;
                let countThue = prods.filter(p => p.type === 'Thuê').length;

                let typeLinesHTML = '';
                if(countBan > 0) typeLinesHTML += `<a href="${safeBaseUrl}san-pham/chuyen-nhuong/"><span>Chuyển nhượng</span><span class="gr-cat-count">(${countBan})</span></a>`;
                if(countThue > 0) typeLinesHTML += `<a href="${safeBaseUrl}san-pham/cho-thue/"><span>Cho thuê</span><span class="gr-cat-count">(${countThue})</span></a>`;

                let locLinesHTML = '';
                let priceLinesHTML = '';

                // Load danh mục từ bảng categories để lấy chuẩn xác
                const catSnap = await db.collection('categories').get();
                let allCategories = catSnap.docs.map(d => d.data());

                if (allCategories && allCategories.length > 0) {
                    let prodCategories = allCategories.filter(c => c.type === 'prod'); 
                    
                    prodCategories.forEach(c => {
                        let catName = c.title || c.name || "";
                        let catSlug = createSafeSlug(c.slug || catName);
                        let catGroup = c.group || 'type'; 
                        
                        if (catSlug !== 'ban' && catSlug !== 'cho-thue' && catSlug !== 'chuyen-nhuong' && catName !== '') {
                            let isMatch = (pData, targetSlug) => {
                                let catsArray = Array.isArray(pData.cat) ? pData.cat : (pData.cat ? String(pData.cat).split(',') : []);
                                return catsArray.some(cItem => createSafeSlug(cItem) === targetSlug);
                            };
                            let count = prods.filter(p => isMatch(p, catSlug)).length;
                            
                            if (count > 0 || c.showEmpty) {
                                let lineHTML = `<a href="${safeBaseUrl}san-pham/${catSlug}/"><span>${catName}</span><span class="gr-cat-count">(${count})</span></a>`;
                                
                                if (catGroup === 'price') priceLinesHTML += lineHTML;
                                else if (catGroup === 'loc') locLinesHTML += lineHTML;
                                else typeLinesHTML += lineHTML;
                            }
                        }
                    });
                }

                let catWidgetHTML = '';
                if (typeLinesHTML !== '') catWidgetHTML += `<div class="gr-cat-widget" style="margin-bottom:25px;"><div class="gr-cat-h">DANH MỤC SẢN PHẨM</div><div class="gr-cat-l">${typeLinesHTML}</div></div>`;
                if (priceLinesHTML !== '') catWidgetHTML += `<div class="gr-cat-widget" style="margin-bottom:25px;"><div class="gr-cat-h">KHOẢNG GIÁ</div><div class="gr-cat-l">${priceLinesHTML}</div></div>`;
                if (locLinesHTML !== '') catWidgetHTML += `<div class="gr-cat-widget" style="margin-bottom:25px;"><div class="gr-cat-h">KHU VỰC / VỊ TRÍ</div><div class="gr-cat-l">${locLinesHTML}</div></div>`;

                // 2. Sidebar - Tin mới & BĐS Nổi bật
                let latestNewsHTML = posts.filter(p => p.id != post.id).slice(0, 5).map(p => {
                    let thumbUrl = p.thumb || 'https://via.placeholder.com/800x450?text=News';
                    let catSlug = getPrimaryCatSlug(p.cat, 'tin-tuc');
                    return `
                    <a href="${safeBaseUrl}tin-tuc/${catSlug}/${p.slug}/" style="display:flex; gap:10px; margin-bottom:12px; text-decoration:none;">
                        <div style="width:60px; height:45px; flex-shrink:0; border-radius:4px; overflow:hidden; border: 1px solid rgba(255,255,255,0.1);"><img src="${thumbUrl}" style="width:100%; height:100%; object-fit:cover;"></div>
                        <div style="flex:1;">
                            <h4 style="font-size:12px; color:#fff; margin:0; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${p.title}</h4>
                            <div style="color:#666; font-size:10px; margin-top:3px;"><i class="far fa-clock"></i> ${p.date || 'Mới cập nhật'}</div>
                        </div>
                    </a>`
                }).join('');

                let sidebarProdHTML = prods.sort(() => 0.5 - Math.random()).slice(0, 5).map(p => {
                    let specArr = [];
                    if (p.area) specArr.push(`${p.area} m²`);
                    if (p.bed) specArr.push(`${p.bed} PN`);
                    
                    let catSlug = getPrimaryCatSlug(p.cat, 'san-pham');
                    let pSlug = p.slug || createSafeSlug(p.title);
                    
                    return `
                    <a href="${safeBaseUrl}san-pham/${catSlug}/${pSlug}/" class="gr-prod-card">
                        <div class="gr-prod-thumb"><span class="gr-tag-abs ${p.type==='Bán'?'tag-ban':'tag-thue'}">${p.type==='Bán'?'Bán':'Thuê'}</span><img src="${p.img || 'https://via.placeholder.com/600'}"></div>
                        <div class="gr-prod-info">
                            <h4 class="gr-tit-mini">${p.title}</h4>
                            <div class="gr-meta-mini"><span class="gr-hl">${p.price || 'Liên hệ'}</span><span style="color:#444;">|</span><span style="color:#c5a059;">${specArr.join(' - ')}</span></div>
                        </div>
                    </a>`}).join('');

                // 3. Rổ hàng (Nếu bài viết liên kết Dự án)
                const projectProds = prods.filter(p => p.projectCode && p.projectCode.toLowerCase() === createSafeSlug(post.title));
                let roHangHTML = projectProds.length > 0 ? `
                    <div style="margin-top:50px; border-top:1px dashed #333; padding-top:30px; margin-bottom:40px;">
                        <h2 style="color:#c5a059; font-size:20px; margin-bottom:20px; font-weight:700;">SẢN PHẨM NỔI BẬT TẠI DỰ ÁN</h2>
                        <div class="gr-ro-hang-grid">${projectProds.slice(0,3).map(p => {
                            let catSlug = getPrimaryCatSlug(p.cat, 'san-pham');
                            let pSlug = p.slug || createSafeSlug(p.title);
                            return `<a href="${safeBaseUrl}san-pham/${catSlug}/${pSlug}/" class="s2-card"><div class="s2-thumb-box"><img src="${p.img || 'https://via.placeholder.com/600'}"></div><div class="s2-body"><h3 class="s2-tit">${p.title}</h3><div style="color:#c5a059;font-weight:bold; font-size:14px;">${p.price}</div></div></a>`;
                        }).join('')}</div>
                    </div>` : '';

                // 4. Tin tức cùng danh mục
                const relatedPosts = posts.filter(p => p.cat === post.cat && p.id != post.id);
                let relatedPostsHTML = relatedPosts.length > 0 ? `
                    <div class="gr-related-section">
                        <h3 class="gr-w-title" style="margin-bottom:20px;">Bài viết cùng danh mục</h3>
                        <div class="gr-carousel-wrapper">
                            <button class="gr-nav-btn gr-prev" onclick="grScrollHorizontal('gr-news-scroll', -1)"><i class="fas fa-chevron-left"></i></button>
                            <div id="gr-news-scroll" class="gr-carousel">
                                ${relatedPosts.map(p => {
                                    let thumbUrl = p.thumb || 'https://via.placeholder.com/800x450?text=News';
                                    const excerpt = (p.content || '').replace(/<[^>]*>?/gm, '').substring(0, 100) + '...';
                                    let catSlug = getPrimaryCatSlug(p.cat, 'tin-tuc');
                                    
                                    return `
                                    <a href="${safeBaseUrl}tin-tuc/${catSlug}/${p.slug}/" class="gr-news-card-v">
                                        <div class="gr-nc-thumb"><img src="${thumbUrl}"></div>
                                        <div class="gr-nc-body">
                                            <h4 class="gr-nc-tit">${p.title}</h4>
                                            <div class="gr-nc-desc">${excerpt}</div>
                                            <div class="gr-nc-footer"><div class="gr-nc-date"><i class="far fa-clock"></i> ${p.date}</div><div style="color:#c5a059; font-weight:700;">Chi tiết <i class="fas fa-arrow-right" style="font-size:10px;"></i></div></div>
                                        </div>
                                    </a>`;
                                }).join('')}
                            </div>
                            <button class="gr-nav-btn gr-next" onclick="grScrollHorizontal('gr-news-scroll', 1)"><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>` : '';

                // 5. Carousel BĐS gợi ý
                let viewedHistory = JSON.parse(localStorage.getItem('greenia_smart_history')) || { cats: [], ids: [] };
                let smartRecommended = [];
                if (viewedHistory.cats.length > 0) {
                    let matchedByCat = prods.filter(p => {
                        let pCats = Array.isArray(p.cat) ? p.cat : (typeof p.cat === 'string' ? p.cat.split(',') : []);
                        return pCats.some(c => viewedHistory.cats.includes(createSafeSlug(c)));
                    });
                    smartRecommended = matchedByCat.sort(() => 0.5 - Math.random()).slice(0, 10);
                }
                if (smartRecommended.length < 10) {
                    let fallbackProds = prods.sort(() => 0.5 - Math.random()).slice(0, 10 - smartRecommended.length);
                    smartRecommended = [...new Set([...smartRecommended, ...fallbackProds])];
                }
                let forYouHTML = smartRecommended.length > 0 ? `
                    <div class="s-head"><h2 class="s-tit">Bất động sản dành cho bạn</h2></div>
                    <div class="gr-carousel-wrapper">
                        <button class="gr-nav-btn gr-prev" onclick="grScrollHorizontal('foryou-scroll', -1)"><i class="fas fa-chevron-left"></i></button>
                        <div id="foryou-scroll" class="gr-carousel">${smartRecommended.map(p => createProdCardHTML(p)).join('')}</div>
                        <button class="gr-nav-btn gr-next" onclick="grScrollHorizontal('foryou-scroll', 1)"><i class="fas fa-chevron-right"></i></button>
                    </div>` : '';

                // 6. Bán & Thuê mới nhất
                const saleProds = prods.filter(p => p.type === 'Bán').slice(0, 10);
                let saleHTML = saleProds.length > 0 ? `
                    <div class="s-head" style="margin-top:60px;"><h2 class="s-tit">Tin nhà đất bán mới nhất</h2></div>
                    <div class="gr-carousel-wrapper">
                        <button class="gr-nav-btn gr-prev" onclick="grScrollHorizontal('sale-scroll-latest', -1)"><i class="fas fa-chevron-left"></i></button>
                        <div id="sale-scroll-latest" class="gr-carousel">${saleProds.map(p => createProdCardHTML(p)).join('')}</div>
                        <button class="gr-nav-btn gr-next" onclick="grScrollHorizontal('sale-scroll-latest', 1)"><i class="fas fa-chevron-right"></i></button>
                    </div>` : '';

                const rentProds = prods.filter(p => p.type === 'Thuê').slice(0, 10);
                let rentHTML = rentProds.length > 0 ? `
                    <div class="s-head" style="margin-top:60px;"><h2 class="s-tit">Tin nhà đất cho thuê mới nhất</h2></div>
                    <div class="gr-carousel-wrapper">
                        <button class="gr-nav-btn gr-prev" onclick="grScrollHorizontal('rent-scroll-latest', -1)"><i class="fas fa-chevron-left"></i></button>
                        <div id="rent-scroll-latest" class="gr-carousel">${rentProds.map(p => createProdCardHTML(p)).join('')}</div>
                        <button class="gr-nav-btn gr-next" onclick="grScrollHorizontal('rent-scroll-latest', 1)"><i class="fas fa-chevron-right"></i></button>
                    </div>` : '';

                // 7. Dự án nổi bật
                let projHTML = independentProjects.length > 0 ? `
                    <div class="s-head" style="margin-top:60px;"><h2 class="s-tit">Dự án nổi bật</h2></div>
                    <div class="gr-carousel-wrapper">
                        <button class="gr-nav-btn gr-prev" onclick="grScrollHorizontal('feat-scroll', -1)"><i class="fas fa-chevron-left"></i></button>
                        <div id="feat-scroll" class="gr-carousel">
                            ${independentProjects.slice(0, 10).map(p => `
                                <a href="${p.link}" class="s2-card">
                                    <div class="s2-thumb-box"><span class="gr-tag-abs tag-ban" style="background:#ff9f43; color:#000;">Dự án</span><img src="${p.img || 'https://via.placeholder.com/600'}"></div>
                                    <div class="s2-body"><h3 class="gr-tit">${p.title}</h3><div class="gr-meta"><span style="color:#c5a059; font-weight:700;">Đang mở bán</span></div></div>
                                </a>`).join('')}
                        </div>
                        <button class="gr-nav-btn gr-next" onclick="grScrollHorizontal('feat-scroll', 1)"><i class="fas fa-chevron-right"></i></button>
                    </div>` : '';

                // BƠM GIAO DIỆN CHÍNH
                const shareLink = encodeURIComponent(window.location.href);
                const zaloIconUrl = 'https://cdn.haitrieu.com/wp-content/uploads/2022/01/Logo-Zalo-Arc.png';

                container.innerHTML = `
                    <div class="gr-sp-header">
                        <div class="gr-breadcrumbs">
                            <a href="${safeBaseUrl}">Trang chủ</a> <span class="sep">&gt;</span>
                            <a href="${safeBaseUrl}tin-tuc.html">Tin tức</a> <span class="sep">&gt;</span>
                            <a href="${safeBaseUrl}tin-tuc/${createSafeSlug(post.cat)}/">${post.cat}</a> <span class="sep">&gt;</span>
                            <span class="current">${post.title}</span>
                        </div>
                        <h1 class="gr-sp-title">${post.title}</h1>
                        <div class="gr-sp-meta">
                            <span><i class="far fa-calendar-alt"></i> ${post.date}</span>
                            <span><i class="fas fa-user-edit"></i> ${post.author || 'Ban Biên Tập'}</span>
                        </div>
                    </div>
                    
                    <div class="gr-sp-body">
                        <div class="gr-sp-main">
                            <div class="gr-toc-wrap" id="gr-toc-wrapper"><div class="gr-toc-header" onclick="toggleTOC()"><span class="gr-toc-tit"><i class="fas fa-list-ul"></i> Mục lục bài viết</span><i class="fas fa-chevron-down gr-toc-icon" id="gr-toc-icon"></i></div><ul class="gr-toc-list" id="gr-toc-list"></ul></div>
                            
                            <div class="gr-entry-content" id="gr-content-body">${post.content}</div>
                            
                            <div class="gr-bottom-bar">
                                <div class="gr-bot-cta">Tư vấn dự án: <a href="tel:0932966700">0932 966 700</a></div>
                                <div class="gr-share-group">
                                    <span class="gr-share-lbl">Chia sẻ:</span>
                                    <a href="https://www.facebook.com/sharer/sharer.php?u=${shareLink}" target="_blank" class="gr-s-btn fb"><i class="fab fa-facebook-f"></i></a>
                                    <a href="https://zalo.me/share/?url=${shareLink}" target="_blank" class="gr-s-btn" style="background:transparent;"><img src="${zaloIconUrl}" style="width:25px; object-fit:contain;" referrerpolicy="no-referrer"></a>
                                </div>
                            </div>
                            
                            ${roHangHTML}
                            
                            <section id="vhgp-reviews-ip">
                                <div class="rev-container">
                                    <div class="rev-head">
                                        <div class="rev-title"><h2>Tham Gia Thảo Luận</h2></div>
                                        <div class="rev-stats">
                                            <div class="rs-score" id="avg-score">5.0</div>
                                            <div class="rs-meta"><div class="rs-stars">★★★★★</div><div class="rs-count" id="total-reviews">0 ĐÁNH GIÁ</div></div>
                                        </div>
                                    </div>
                                    <div class="rev-intro">🔒 Thông tin cá nhân của bạn được <strong>cam kết bảo mật tuyệt đối</strong>.</div>
                                    <div class="rev-layout">
                                        <div class="rev-form-box">
                                            <span class="form-lbl">Đánh giá để tham gia thảo luận</span>
                                            <form id="mainForm">
                                                <div class="rate-input">
                                                    <input type="radio" id="c-st5" name="rate" value="5" required checked/><label for="c-st5">★</label>
                                                    <input type="radio" id="c-st4" name="rate" value="4" /><label for="c-st4">★</label>
                                                    <input type="radio" id="c-st3" name="rate" value="3" /><label for="c-st3">★</label>
                                                    <input type="radio" id="c-st2" name="rate" value="2" /><label for="c-st2">★</label>
                                                    <input type="radio" id="c-st1" name="rate" value="1" /><label for="c-st1">★</label>
                                                </div>
                                                <div class="rev-row-inputs">
                                                    <input type="text" id="c-name" class="rev-input" placeholder="Họ tên *" required>
                                                    <input type="tel" id="c-phone" class="rev-input" placeholder="Số điện thoại *" required pattern="[0-9]{10}">
                                                    <input type="email" id="c-email" class="rev-input" placeholder="Email (Để nhận thông báo)" required>
                                                </div>
                                                <textarea id="c-comment" class="rev-textarea" placeholder="Nội dung thảo luận của bạn..." required></textarea>
                                                <button type="submit" id="c-btn-submit" class="rev-btn">Gửi Đánh Giá</button>
                                            </form>
                                        </div>
                                        <div class="rev-list" id="rev-list-container"><div style="font-size:12px; color:#666;">Đang kết nối dữ liệu...</div></div>
                                    </div>
                                </div>
                            </section>
                        </div>

                        <div class="gr-sp-sidebar">
                            <section id="vhgp-final-v15-vertical">
                                <div class="v15-ver-container">
                                    <h3 class="v15-ver-title">Nhận Bảng Giá</h3>
                                    <div class="v15-ver-rating-box"><span class="v15-ver-stars">★★★★★</span><span class="v15-ver-count" id="count-v15-ver">(Đang tải...)</span></div>
                                    <p class="v15-ver-desc">Nhận bảng giá & chính sách ưu đãi qua Zalo/Email.</p>
                                    <form id="leadFormV15Ver" class="v15-ver-form">
                                        <input type="text" id="v15-ver-name" class="v15-ver-input" placeholder="Họ tên *" required>
                                        <input type="tel" id="v15-ver-phone" class="v15-ver-input" placeholder="Số điện thoại *" required pattern="[0-9]{10}">
                                        <input type="email" id="v15-ver-email" class="v15-ver-input" placeholder="Email" required>
                                        <input type="text" id="v15-ver-demand" class="v15-ver-input" placeholder="Nhu cầu (Căn 2PN...)" required>
                                        <button type="submit" id="btn-v15-ver-submit" class="v15-ver-btn">NHẬN BÁO GIÁ</button>
                                    </form>
                                    <div id="v15-ver-success" class="success-overlay"><div style="font-weight:bold;">✔ THÀNH CÔNG!</div><div style="font-size:11px;">Hệ thống đang xử lý.</div></div>
                                </div>
                            </section>

                            <!-- ĐÃ TÁCH THÀNH 3 WIDGET RIÊNG BIỆT -->
                            ${catWidgetHTML}

                            <div style="margin-top:10px;">
                                <div class="gr-w-title">BĐS Nổi bật</div>
                                <div class="gr-prod-list">${sidebarProdHTML}</div>
                            </div>

                            <div style="margin-top:10px;">
                                <div class="gr-w-title">Tin mới nhất</div>
                                <div style="display:flex; flex-direction:column;">${latestNewsHTML}</div>
                            </div>
                        </div>
                    </div>

                    ${relatedPostsHTML}
                    ${forYouHTML}
                    ${saleHTML}
                    ${rentHTML}
                    ${projHTML}
                `;

                initTOC();
                initReviewsAndCTA();
            } catch (e) { console.error(e); }
        });

        function toggleTOC() { const l = document.getElementById('gr-toc-list'); l.style.display = l.style.display==='none'?'block':'none'; document.getElementById('gr-toc-icon').classList.toggle('rotate'); }
        
        function initTOC() {
            const headings = document.querySelectorAll('.gr-entry-content h2');
            const tocList = document.getElementById('gr-toc-list');
            if(headings.length > 0) {
                document.getElementById('gr-toc-wrapper').style.display = 'block';
                headings.forEach((h, i) => {
                    const id = 'toc-' + i; h.id = id;
                    const li = document.createElement('li'); li.className = 'gr-toc-item';
                    li.innerHTML = `<a href="#${id}" class="gr-toc-link">${i+1}. ${h.innerText}</a>`;
                    li.onclick = (e) => { e.preventDefault(); document.getElementById(id).scrollIntoView({behavior:'smooth'}); };
                    tocList.appendChild(li);
                });
            }
        }

        function initReviewsAndCTA() {
            const PAGE_ID = window.location.pathname;
            const API_REVIEWS = 'https://script.google.com/macros/s/AKfycbyLqotNzi0pN1-trXxNhNvjF-1lqGSXhRUL5JMKz5J-j9mfe-QESaqTFR-pHeaFHvZTsA/exec'; 
            const API_LEAD = 'https://script.google.com/macros/s/AKfycbxMkdZKscj17D2CRG7zUpzHWx_YiTbvg35zGm3eGdim3n4cA76j42d7VoxmNXrxpvPA-Q/exec'; 
            
            let currentCountVer = 186; 
            fetch(API_LEAD + "?action=count")
                .then(res => res.json())
                .then(data => {
                    if(data.count !== undefined) {
                        currentCountVer = parseInt(data.count);
                        if(currentCountVer < 5) currentCountVer = 186;
                        const countEl = document.getElementById('count-v15-ver');
                        if(countEl) countEl.innerText = `(5.0/5 - ${currentCountVer} đánh giá)`;
                    }
                }).catch(err => {
                    const countEl = document.getElementById('count-v15-ver');
                    if(countEl) countEl.innerText = `(5.0/5 - 186 đánh giá)`;
                });

            document.getElementById('leadFormV15Ver').addEventListener('submit', e => {
                e.preventDefault();
                const btn = document.getElementById('btn-v15-ver-submit');
                btn.innerText = "ĐANG GỬI..."; btn.disabled = true;
                let fd = new FormData();
                fd.append("project", window.GREENIA_CURRENT_POST.title);
                fd.append("name", document.getElementById('v15-ver-name').value);
                fd.append("phone", document.getElementById('v15-ver-phone').value);
                fd.append("email", document.getElementById('v15-ver-email').value);
                fd.append("demand", document.getElementById('v15-ver-demand').value);
                fd.append("url", window.location.href);
                fd.append("rating", 5);
                
                fetch(API_LEAD, { method: 'POST', body: fd }).then(res => {
                    document.getElementById('leadFormV15Ver').style.display = 'none';
                    document.getElementById('v15-ver-success').style.display = 'block';
                    currentCountVer++;
                    document.getElementById('count-v15-ver').innerText = `(5.0/5 - ${currentCountVer} đánh giá)`;
                }).catch(() => { alert("Lỗi mạng!"); btn.innerText = "NHẬN BÁO GIÁ"; btn.disabled = false; });
            });

            fetch(API_REVIEWS + "?action=get").then(res => res.json()).then(data => {
                const container = document.getElementById('rev-list-container');
                const pageReviews = data.filter(item => item.pageId === PAGE_ID);
                if(pageReviews.length === 0) { container.innerHTML = '<div style="font-size:12px; color:#666;">Chưa có thảo luận nào. Hãy là người đầu tiên!</div>'; return; }
                
                document.getElementById('total-reviews').innerText = pageReviews.length + " ĐÁNH GIÁ";
                container.innerHTML = pageReviews.map(p => `
                    <div class="rev-item">
                        <div class="rev-avatar">${(p.name || 'U').charAt(0).toUpperCase()}</div>
                        <div class="rev-content">
                            <div class="rev-top-row"><span class="rev-name">${p.name}</span><span class="rev-date">${p.date}</span></div>
                            <span class="rev-stars-small">${"★".repeat(p.rating)}${"☆".repeat(5-p.rating)}</span>
                            <p class="rev-text">${p.comment}</p>
                        </div>
                    </div>
                `).join('');
            }).catch(() => { document.getElementById('rev-list-container').innerHTML = '<div style="font-size:12px; color:#666;">Chưa tải được bình luận.</div>'; });

            document.getElementById('mainForm').addEventListener('submit', e => {
                e.preventDefault();
                const btn = document.getElementById('c-btn-submit');
                btn.innerText = "Đang gửi..."; btn.disabled = true;
                let fd = new FormData();
                fd.append("name", document.getElementById('c-name').value);
                fd.append("phone", document.getElementById('c-phone').value);
                fd.append("email", document.getElementById('c-email').value);
                fd.append("comment", document.getElementById('c-comment').value);
                fd.append("rating", document.querySelector('input[name="rate"]:checked').value);
                fd.append("pageId", PAGE_ID);
                fetch(API_REVIEWS, { method: 'POST', body: fd }).then(() => {
                    alert("Cảm ơn bạn đã đánh giá!");
                    document.getElementById('mainForm').reset();
                    btn.innerText = "Gửi Đánh Giá"; btn.disabled = false;
                });
            });
        }

        window.grScrollHorizontal = function(id, dir) {
            var el = document.getElementById(id); if(!el) return;
            var item = el.querySelector(".s2-card") || el.querySelector(".gr-news-card-v"); if(!item) return;
            var w = item.offsetWidth + 20; el.scrollBy({left: w * dir, behavior: "smooth"});
        };
    </script>
</body>
</html>
