    <style>
        #gr-single-post { --bg: #05080f; --card: #0e121b; --border: rgba(197, 160, 89, 0.2); --gold: #c5a059; --text: #b0b8c4; --white: #fff; font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.8; width: 100%; padding-bottom: 50px;}
        #gr-single-post * { box-sizing: border-box; } 
        #gr-single-post a { text-decoration: none; color: inherit; transition: 0.3s; }
        .gr-con { max-width: 1250px; margin: 0 auto; padding: 40px 15px; }

        .gr-sp-header { margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 1px; }
        .gr-breadcrumbs { font-size: 14px; color: #888; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; text-transform: none; }
        .gr-breadcrumbs a:hover { color: var(--gold); } 
        .gr-breadcrumbs span.sep { color: var(--gold); font-size: 12px; }
        .gr-breadcrumbs span.current { color: #fff; font-weight: 500; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .gr-sp-title { font-size: 28px !important; font-weight: 600; color: #c5a059; line-height: 1.3; margin: 0 0 15px; }
        .gr-sp-meta { font-size: 13px; color: #666; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; margin-bottom: 15px;}
        .gr-sp-meta i { color: var(--gold); margin-right: 5px; }

        .gr-sp-body { display: flex; gap: 30px; position: relative; margin-top: 20px;}
        .gr-sp-main { width: 75%; } 
        .gr-sp-sidebar { width: 25%; position: -webkit-sticky; position: sticky; top: 70px; align-self: flex-start; display: flex; flex-direction: column; gap: 30px; }

        .gr-toc-wrap { margin-bottom: 30px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: rgba(14, 18, 27, 0.5); display: none; }
        .gr-toc-header { background: rgba(197, 160, 89, 0.1); padding: 12px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .gr-toc-tit { font-weight: 600; color: var(--gold); font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .gr-toc-list { display: block; padding: 15px; border-top: 1px solid var(--border); list-style: none; margin: 0; }
        .gr-toc-item { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed rgba(255,255,255,0.05); } 
        .gr-toc-link { color: #ccc; font-size: 14px; display: block; transition: 0.2s; } 
        .gr-toc-link:hover { color: var(--gold); transform: translateX(5px); }

        .gr-entry-content { color: #e2e8f0; text-align: left; font-size: 15px; line-height: 1.8; font-weight: 300; }
        .gr-entry-content p a, .gr-entry-content li a { color: #e67e22 !important; font-weight: 600; text-decoration: none; transition: 0.3s; border-bottom: 1px solid rgba(230, 126, 34, 0.3); }
        .gr-entry-content p a:hover, .gr-entry-content li a:hover { color: var(--gold) !important; border-bottom: 1px solid var(--gold); }
        .gr-entry-content strong, .gr-entry-content b { color: var(--gold); font-weight: 700; }
        .gr-entry-content h1, .gr-entry-content h2, .gr-entry-content h3 { margin: 30px 0 15px; line-height: 1.5; text-align: left; }
        .gr-entry-content h1, .gr-entry-content h2 { color: var(--gold); font-size: 22px; font-weight: 600; margin-top: 40px; margin-bottom: 15px; border-left: 4px solid var(--gold); padding-left: 10px; }
        .gr-entry-content h3 { color: #d4b886 !important; font-size: 20px; font-weight: 500; margin-top: 35px; }
        .gr-entry-content p { margin-bottom: 20px; text-indent: 0; } 
        .gr-entry-content img { max-width: 100%; height: auto; border-radius: 5px; margin: 20px auto; display: block; border: 1px solid var(--border); }
        .gr-entry-content figcaption, .gr-entry-content .wp-caption-text { text-align: center; font-size: 13px; font-style: italic; color: #94a3b8; margin-bottom: 25px; line-height: 1.5; }
        .gr-entry-content ul, .gr-entry-content ol { margin-bottom: 25px; padding-left: 20px; } 
        .gr-entry-content blockquote { background: rgba(197, 160, 89, 0.1); border-left: 3px solid var(--gold); padding: 20px; font-style: italic; color: #fff; margin: 30px 0; }

        .gr-bottom-bar { margin-top: 40px; padding-top: 20px; border-top: 1px dashed #333; display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .gr-bot-cta a { color: var(--gold); font-weight: 700; font-size: 14px; }
        .gr-share-group { display: flex; gap: 10px; align-items: center; }
        .gr-s-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; transition: 0.3s; background: rgba(255,255,255,0.1); }
        .gr-s-btn.fb:hover { background: #3b5998; } .gr-s-btn.zalo:hover { background: #0068ff; } .gr-s-btn img { width: 20px; height: 20px; }

        .gr-w-title { font-size: 16px; font-weight: 700; color: var(--white); margin: 0 0 20px; padding-bottom: 10px; border-bottom: 2px solid var(--gold); display: inline-block; text-transform: uppercase; }
        
        /* Rổ hàng & BĐS Nổi Bật Sidebar */
        .gr-ro-hang-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .s2-card { background: #0b1120; border: 1px solid rgba(197, 160, 89, 0.2); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; text-decoration: none; transition: 0.3s;}
        .s2-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .s2-thumb-box { height: 160px; overflow: hidden; }
        .s2-thumb-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .s2-card:hover .s2-thumb-box img { transform: scale(1.05); }
        .s2-body { padding: 12px; flex: 1; }
        .s2-tit { font-size: 13px !important; font-weight: 600; color: #fff; margin-bottom: 5px; }

        .gr-prod-card { display: flex; gap: 12px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: flex-start; }
        .gr-prod-thumb { width: 100px; height: 80px; flex-shrink: 0; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
        .gr-prod-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .gr-tit-mini { font-size: 13px !important; font-weight: 600; color: #fff; margin: 0 0 4px; }
        
        .gr-related-section { margin-top: 60px; padding-top: 40px; border-top: 1px solid var(--border); }
        .gr-carousel-wrapper { position: relative; }
        .gr-carousel { display: flex; overflow-x: auto; gap: 20px; padding-bottom: 15px; scrollbar-width: none;}
        .gr-carousel::-webkit-scrollbar { display: none; }
        .gr-news-card-v { flex: 0 0 280px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; }
        .gr-news-card-v:hover { border-color: var(--gold); }
        .gr-nc-thumb { height: 160px; overflow: hidden; }
        .gr-nc-thumb img { width: 100%; height: 100%; object-fit: cover; } 
        .gr-nc-body { padding: 15px; flex: 1; display: flex; flex-direction: column; }
        .gr-nc-tit { font-size: 13px !important; font-weight: 600; color: #fff; margin: 0 0 10px; }
        .gr-nc-desc { font-size: 12px; color: #888; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px; }
        .gr-nc-footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
        
        /* Đăng ký Tư vấn & Bình luận */
        :root { --rev-bg: #05080f; --rev-gold: #c5a059; --rev-border: rgba(255, 255, 255, 0.08); --rev-glass: rgba(255, 255, 255, 0.02); }
        #vhgp-reviews-ip { background-color: var(--rev-bg); padding: 20px; color: #fff; font-size: 14px; margin-top: 40px;}
        .rev-head { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--rev-border); padding-bottom: 5px; margin-bottom: 10px; }
        .rev-title h2 { font-size: 20px; margin: 0; color: #fff; }
        .rs-score { font-size: 32px; font-weight: 700; color: var(--rev-gold); }
        .rs-meta { text-align: right; } .rs-stars { color: var(--rev-gold); font-size: 12px; } .rs-count { font-size: 10px; color: #666; }
        .rev-intro { margin-bottom: 35px; font-size: 13px; color: #9ca3af; border-left: 2px solid var(--rev-gold); padding-left: 15px; }
        .rev-form-box { background: var(--rev-glass); border: 1px solid var(--rev-border); padding: 15px; border-radius: 4px; }
        .rev-row-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .rev-input, .rev-textarea { width: 100%; background: transparent; border: 1px solid var(--rev-border); padding: 10px 12px; color: #fff; border-radius: 4px; }
        .rev-input:focus, .rev-textarea:focus { border-color: var(--rev-gold); outline: none; }
        .rev-textarea { height: 80px; resize: none; margin-bottom: 10px; }
        .rev-btn { width: 200px; background: transparent; color: var(--rev-gold); border: 1px solid var(--rev-border); padding: 12px; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .rev-btn:hover { background: rgba(197, 160, 89, 0.1); border-color: #c5a059; }
        .rev-list { display: flex; flex-direction: column; gap: 20px; margin-top: 20px;}
        
        #vhgp-final-v15-vertical { background: linear-gradient(180deg, #0b0f19 0%, #151b2b 100%); border: 1px solid var(--gold); padding: 25px 15px; text-align: center; border-radius: 8px; margin-bottom: 30px;}
        .v15-ver-title { font-size: 20px; font-weight: 700; color: var(--gold); margin: 0 0 5px 0; text-transform: uppercase; }
        .v15-ver-rating-box { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 10px; color: #f1c40f; background: rgba(255,255,255,0.03); padding: 3px 12px; border-radius: 20px; }
        .v15-ver-desc { font-size: 12px; color: #ccc; margin-bottom: 15px; }
        .v15-ver-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 10px 15px; font-size: 12px; border-radius: 50px; margin-bottom: 10px; outline: none; }
        .v15-ver-btn { width: 100%; padding: 10px 15px; background: transparent; color: var(--gold); border: 1px solid var(--gold); font-weight: 700; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .v15-ver-btn:hover { background: #d4af37; color: #000; }
        .success-overlay { display: none; padding: 15px; margin-top: 15px; background: rgba(46, 204, 113, 0.1); border: 1px solid #2ecc71; border-radius: 8px; }

        @media (max-width: 900px) {
            .gr-sp-body { flex-direction: column; } .gr-sp-main, .gr-sp-sidebar { width: 100%; } .gr-sp-sidebar { position: static; }
            .gr-ro-hang-grid { grid-template-columns: repeat(2, 1fr); }
            .rev-row-inputs { grid-template-columns: 1fr; } .rev-btn { width: 100%; }
        }
    </style>

<body>

    <div id="site-header"></div>
    <div id="sub-menu" class="sub-header"></div>

    <main id="gr-single-post">
        <div class="gr-con" id="post-container">
            <div style="text-align:center; padding: 100px 0; color: #c5a059;">
                <i class="fas fa-circle-notch fa-spin fa-3x"></i>
                <p>Đang tải nội dung...</p>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>
    
    <script src="../../../../assets/js/ui.js"></script>

    <script>
        window.GREENIA_CURRENT_POST = {"id":10,"title":"kiểm tra đăng bài viết","slug":"kiem-tra-dang-bai-viet","cat":"tin dự án","date":"15/4/2026","author":"Ban Biên Tập","thumb":"","content":"<p>kiểm tra nội dung</p>\n","seoTitle":"kiểm tra đăng bài viết","seoDesc":"kiểm tra nội dung\n...","seoKeywords":"tin dự án, tin tức"};

        function createSafeSlug(title) {
            if(!title) return 'tin-tuc';
            return title.toString().toLowerCase().trim().replace(/\s+/g, '-').replace(/[áàảãạâấầẩẫậăắằẳẵặ]/g, 'a').replace(/[éèẻẽẹêếềểễệ]/g, 'e').replace(/[íìỉĩị]/g, 'i').replace(/[óòỏõọôốồổỗộơớờởỡợ]/g, 'o').replace(/[úùủũụưứừửữự]/g, 'u').replace(/[ýỳỷỹỵ]/g, 'y').replace(/đ/g, 'd').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-');
        }

        document.addEventListener("DOMContentLoaded", async function() {
            const container = document.getElementById('post-container');
            const post = window.GREENIA_CURRENT_POST; 
            const safeBaseUrl = (typeof BASE_URL !== 'undefined') ? BASE_URL : '/greenia-homes/';

            if (!post) { window.location.replace(safeBaseUrl + 'tin-tuc.html'); return; }

            try {
                const [postRes, prodRes] = await Promise.all([
                    fetch(safeBaseUrl + 'assets/data/posts.json'),
                    fetch(safeBaseUrl + 'assets/data/products.json')
                ]);
                const posts = await postRes.json();
                const prods = await prodRes.json();

                let latestNewsHTML = '';
                posts.filter(p => p.id != post.id).slice(0, 5).forEach(p => {
                    const pCat = createSafeSlug(p.cat);
                    const pSlug = p.slug || createSafeSlug(p.title);
                    latestNewsHTML += `<a href="${safeBaseUrl}tin-tuc/${pCat}/${pSlug}/" style="display:block; color:#888; margin-bottom:12px; font-size:14px; border-bottom:1px dashed rgba(255,255,255,0.05); padding-bottom:8px; transition:0.3s;" onmouseover="this.style.color='#c5a059'" onmouseout="this.style.color='#888'"><i class="fas fa-chevron-right" style="color:#c5a059; margin-right:5px; font-size:10px;"></i> ${p.title}</a>`;
                });

                let sidebarProdHTML = '';
                [...prods].sort(() => 0.5 - Math.random()).slice(0, 5).forEach(p => {
                    const pCatSlug = createSafeSlug(p.cat || 'san-pham');
                    const pSlug = p.slug || createSafeSlug(p.title);
                    const imgUrl = window.resolveImg ? window.resolveImg(p.img) : p.img;
                    sidebarProdHTML += `
                        <a href="${safeBaseUrl}san-pham/${pCatSlug}/${pSlug}/" class="gr-prod-card">
                            <div class="gr-prod-thumb"><img src="${imgUrl}"></div>
                            <div class="gr-prod-info">
                                <h4 class="gr-tit-mini">${p.title}</h4>
                                <div style="color:#c5a059; font-weight:bold; font-size:12px;">${p.price}</div>
                            </div>
                        </a>`;
                });

                const projectProds = prods.filter(p => p.projectCode && p.projectCode.toLowerCase() === createSafeSlug(post.title));
                let roHangHTML = '';
                if(projectProds.length > 0) {
                    roHangHTML = `
                        <div style="margin-top: 50px; padding-top: 30px; border-top: 1px dashed #333; margin-bottom: 50px;">
                            <h2 style="color:#c5a059; font-size: 22px; margin-bottom: 20px; font-weight: bold;">Sản phẩm nổi bật</h2>
                            <div class="gr-ro-hang-grid">
                                ${projectProds.slice(0, 3).map(p => {
                                    const pCatSlug = createSafeSlug(p.cat || 'san-pham');
                                    const pSlug = p.slug || createSafeSlug(p.title);
                                    const imgUrl = window.resolveImg ? window.resolveImg(p.img) : p.img;
                                    return `
                                    <a href="${safeBaseUrl}san-pham/${pCatSlug}/${pSlug}/" class="s2-card">
                                        <div class="s2-thumb-box"><img src="${imgUrl}"></div>
                                        <div class="s2-body">
                                            <h3 class="s2-tit">${p.title}</h3>
                                            <div style="color:#c5a059; font-weight:bold; font-size:14px;">${p.price}</div>
                                        </div>
                                    </a>`;
                                }).join('')}
                            </div>
                        </div>`;
                }

                const relatedPosts = posts.filter(p => p.cat === post.cat && p.id != post.id);
                let carouselHTML = '';
                if(relatedPosts.length > 0) {
                    carouselHTML = `
                    <div class="gr-related-section">
                        <h3 class="gr-w-title" style="margin-bottom:20px;">Bài viết liên quan</h3>
                        <div class="gr-carousel-wrapper">
                            <div id="gr-news-scroll" class="gr-carousel">
                                ${relatedPosts.map(p => {
                                    const pCat = createSafeSlug(p.cat);
                                    const pSlug = p.slug || createSafeSlug(p.title);
                                    const thumbUrl = window.resolveImg ? window.resolveImg(p.thumb) : p.thumb;
                                    const excerpt = p.content.replace(/<[^>]*>?/gm, '').substring(0, 100) + '...';
                                    return `
                                    <a href="${safeBaseUrl}tin-tuc/${pCat}/${pSlug}/" class="gr-news-card-v">
                                        <div class="gr-nc-thumb"><img src="${thumbUrl}"></div>
                                        <div class="gr-nc-body">
                                            <h4 class="gr-nc-tit">${p.title}</h4>
                                            <div class="gr-nc-desc">${excerpt}</div>
                                            <div class="gr-nc-footer"><div class="gr-nc-date"><i class="far fa-clock"></i> ${p.date}</div></div>
                                        </div>
                                    </a>`;
                                }).join('')}
                            </div>
                        </div>
                    </div>`;
                }

                const catSlug = createSafeSlug(post.cat);
                const shareLink = encodeURIComponent(window.location.href);
                const zaloIcon = 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Icon_of_Zalo.svg/1200px-Icon_of_Zalo.svg.png';

                container.innerHTML = `
                    <div class="gr-sp-header">
                        <div class="gr-breadcrumbs">
                            <a href="${safeBaseUrl}">Trang chủ</a> <span class="sep">/</span>
                            <a href="${safeBaseUrl}tin-tuc/${catSlug}/">${post.cat}</a> <span class="sep">/</span>
                            <span class="current">${post.title}</span>
                        </div>
                        <h1 class="gr-sp-title">${post.title}</h1>
                        <div class="gr-sp-meta">
                            <span><i class="far fa-calendar-alt"></i> ${post.date}</span>
                            <span><i class="far fa-user"></i> ${post.author || 'Ban Biên Tập'}</span>
                        </div>
                    </div>

                    <div class="gr-sp-body">
                        <div class="gr-sp-main">
                            
                            <div class="gr-toc-wrap" id="gr-toc-wrapper">
                                <div class="gr-toc-header" onclick="document.getElementById('gr-toc-list').style.display = document.getElementById('gr-toc-list').style.display==='none'?'block':'none';">
                                    <span class="gr-toc-tit"><i class="fas fa-list-ul"></i> Mục lục bài viết</span><i class="fas fa-chevron-down gr-toc-icon"></i>
                                </div>
                                <ul class="gr-toc-list" id="gr-toc-list"></ul>
                            </div>

                            <div class="gr-entry-content" id="gr-content-body">${post.content}</div>

                            <div class="gr-bottom-bar">
                                <div class="gr-bot-cta">Quan tâm dự án? Gọi ngay: <a href="tel:0932966700">0932 966 700</a></div>
                                <div class="gr-share-group">
                                    <span class="gr-share-lbl">Chia sẻ:</span>
                                    <a href="https://www.facebook.com/sharer/sharer.php?u=${shareLink}" target="_blank" class="gr-s-btn fb"><i class="fab fa-facebook-f"></i></a>
                                    <a href="https://zalo.me/share/?url=${shareLink}" target="_blank" class="gr-s-btn zalo"><img src="${zaloIcon}"></a>
                                </div>
                            </div>

                            ${roHangHTML}

                            <section id="vhgp-reviews-ip" style="border-radius: 8px; border: 1px solid var(--border);">
                                <div class="rev-container">
                                    <div class="rev-head">
                                        <div class="rev-title"><h2>Tham Gia Thảo Luận</h2></div>
                                        <div class="rev-stats">
                                            <div class="rs-score" id="avg-score">5.0</div>
                                            <div class="rs-meta">
                                                <div class="rs-stars" id="avg-stars">★★★★★</div>
                                                <div class="rs-count" id="total-reviews">0 ĐÁNH GIÁ</div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="rev-intro">🔒 Thông tin cá nhân của bạn được <strong>cam kết bảo mật tuyệt đối</strong>.</div>
                                    <div class="rev-layout">
                                        <div class="rev-form-box">
                                            <span style="font-size: 10px; color: #888;">Đánh giá để tham gia thảo luận</span>
                                            <form id="mainForm" style="margin-top:10px;">
                                                <div class="rev-row-inputs">
                                                    <input type="text" id="c-name" class="rev-input" placeholder="Họ tên *" required>
                                                    <input type="tel" id="c-phone" class="rev-input" placeholder="Số điện thoại *" required>
                                                    <input type="email" id="c-email" class="rev-input" placeholder="Email (Tuỳ chọn)">
                                                </div>
                                                <textarea id="c-comment" class="rev-textarea" placeholder="Nội dung thảo luận của bạn..." required></textarea>
                                                <button type="submit" id="c-btn-submit" class="rev-btn">Gửi Đánh Giá</button>
                                            </form>
                                        </div>
                                        <div class="rev-list" id="rev-list-container"><div style="font-size:12px; color:#666;">Đang kết nối dữ liệu...</div></div>
                                    </div>
                                </div>
                            </section>

                        </div>

                        <div class="gr-sp-sidebar">
                            <section id="vhgp-final-v15-vertical">
                                <h3 class="v15-ver-title">Đăng Ký Tư Vấn</h3>
                                <div class="v15-ver-rating-box"><span style="font-size:12px;">★★★★★</span><span style="font-size:11px;color:#aaa;">(5.0/5)</span></div>
                                <p class="v15-ver-desc">Nhận bảng giá & chính sách ưu đãi qua Zalo/Email.</p>
                                <form id="leadFormV15Ver" style="display:flex; flex-direction:column;">
                                    <input type="text" id="v15-ver-name" class="v15-ver-input" placeholder="Họ tên *" required>
                                    <input type="tel" id="v15-ver-phone" class="v15-ver-input" placeholder="Số ĐT *" required>
                                    <input type="text" id="v15-ver-demand" class="v15-ver-input" placeholder="Nhu cầu (VD: Căn 2PN)" required>
                                    <button type="submit" id="btn-v15-ver-submit" class="v15-ver-btn">NHẬN BÁO GIÁ</button>
                                </form>
                                <div id="v15-ver-success" class="success-overlay"><div style="color:#2ecc71; font-weight:bold;">✔ THÀNH CÔNG!</div><div style="font-size:11px; color:#ccc;">Hệ thống đang gửi tài liệu cho quý khách.</div></div>
                            </section>

                            <div><div class="gr-w-title">BĐS Nổi bật</div><div class="gr-prod-list">${sidebarProdHTML}</div></div>
                            <div style="margin-top:30px;"><div class="gr-w-title">Tin mới nhất</div>${latestNewsHTML}</div>
                        </div>
                    </div>
                    ${carouselHTML}
                `;

                setTimeout(() => {
                    initTOC();
                    initReviewsAndCTA();
                }, 300);

            } catch (e) { console.error("Lỗi:", e); }
        });

        function initTOC() {
            const content = document.getElementById('gr-content-body');
            const tocList = document.getElementById('gr-toc-list');
            const tocWrapper = document.getElementById('gr-toc-wrapper');
            if(content && tocList) {
                const headings = content.querySelectorAll('h2');
                if(headings.length > 0) {
                    tocWrapper.style.display = 'block';
                    headings.forEach((h2, index) => {
                        const id = 'toc-' + index; h2.id = id;
                        const li = document.createElement('li'); li.className = 'gr-toc-item';
                        li.innerHTML = `<a href="#${id}" class="gr-toc-link">${index + 1}. ${h2.innerText}</a>`;
                        li.querySelector('a').onclick = (e) => { e.preventDefault(); document.getElementById(id).scrollIntoView({behavior: 'smooth'}); };
                        tocList.appendChild(li);
                    });
                }
            }
        }

        function initReviewsAndCTA() {
            const PAGE_ID = window.location.pathname;
            const API_REVIEWS = 'https://script.google.com/macros/s/AKfycbyLqotNzi0pN1-trXxNhNvjF-1lqGSXhRUL5JMKz5J-j9mfe-QESaqTFR-pHeaFHvZTsA/exec'; 
            const API_LEAD = 'https://script.google.com/macros/s/AKfycbxMkdZKscj17D2CRG7zUpzHWx_YiTbvg35zGm3eGdim3n4cA76j42d7VoxmNXrxpvPA-Q/exec'; 
            
            document.getElementById('leadFormV15Ver').addEventListener('submit', e => {
                e.preventDefault();
                const btn = document.getElementById('btn-v15-ver-submit');
                btn.innerText = "ĐANG GỬI..."; btn.disabled = true;
                let fd = new FormData();
                fd.append("project", window.GREENIA_CURRENT_POST.title);
                fd.append("name", document.getElementById('v15-ver-name').value);
                fd.append("phone", document.getElementById('v15-ver-phone').value);
                fd.append("demand", document.getElementById('v15-ver-demand').value);
                fd.append("url", window.location.href);
                
                fetch(API_LEAD, { method: 'POST', body: fd }).then(res => {
                    document.getElementById('leadFormV15Ver').style.display = 'none';
                    document.getElementById('v15-ver-success').style.display = 'block';
                }).catch(() => { alert("Lỗi mạng!"); btn.innerText = "NHẬN BÁO GIÁ"; btn.disabled = false; });
            });

            fetch(API_REVIEWS + "?action=get").then(res => res.json()).then(data => {
                const container = document.getElementById('rev-list-container');
                const pageReviews = data.filter(item => item.pageId === PAGE_ID);
                if(pageReviews.length === 0) { container.innerHTML = '<div style="font-size:12px; color:#666;">Chưa có thảo luận nào. Hãy là người đầu tiên!</div>'; return; }
                
                document.getElementById('total-reviews').innerText = pageReviews.length + " ĐÁNH GIÁ";
                container.innerHTML = pageReviews.map(p => `
                    <div class="rev-item">
                        <div class="rev-main-content" style="display:flex; gap:15px; margin-bottom:15px;">
                            <div style="width:40px;height:40px;border-radius:50%;background:#151a25;color:#c5a059;display:flex;align-items:center;justify-content:center;border:1px solid #c5a059;font-weight:bold;">${p.name.charAt(0).toUpperCase()}</div>
                            <div style="width:100%;">
                                <div style="display:flex;justify-content:space-between;"><span style="font-weight:bold;color:#fff;font-size:13px;">${p.name}</span><span style="color:#666;font-size:11px;">${p.date}</span></div>
                                <p style="color:#ccc; font-size:13px; line-height:1.6; margin-top:5px; margin-bottom:0;">${p.comment}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            }).catch(() => { document.getElementById('rev-list-container').innerHTML = '<div style="font-size:12px; color:#666;">Chưa tải được bình luận.</div>'; });

            document.getElementById('mainForm').addEventListener('submit', e => {
                e.preventDefault();
                const btn = document.getElementById('c-btn-submit');
                btn.innerText = "Đang gửi..."; btn.disabled = true;
                let fd = new FormData();
                fd.append("name", document.getElementById('c-name').value);
                fd.append("phone", document.getElementById('c-phone').value);
                fd.append("email", document.getElementById('c-email').value);
                fd.append("comment", document.getElementById('c-comment').value);
                fd.append("rating", 5);
                fd.append("pageId", PAGE_ID);
                fetch(API_REVIEWS, { method: 'POST', body: fd }).then(() => {
                    alert("Cảm ơn bạn đã đánh giá!");
                    document.getElementById('mainForm').reset();
                    btn.innerText = "Gửi Đánh Giá"; btn.disabled = false;
                });
            });
        }
    </script>
</body>
</html>
