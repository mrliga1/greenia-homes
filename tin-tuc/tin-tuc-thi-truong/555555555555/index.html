                            <span class="gr-tag-abs ${tagClass}">${tagText}</span>
                            <img src="${imgUrl}" onerror="this.src='${fallbackImg}';">
                        </div>
                        <div class="s2-body">
                            <h3 class="gr-tit">${p.title}</h3>
                            <div class="gr-loc"><i class="fas fa-map-marker-alt"></i> ${p.loc || ''}</div>
                            <div class="gr-meta">
                                <span class="gr-hl">${p.price || 'Liên hệ'}</span>
                                ${areaBedHtml}
                            </div>
                        </div>
                    </a>`;
        }

        document.addEventListener("DOMContentLoaded", async function() {
            const container = document.getElementById('post-container');
            const post = window.GREENIA_CURRENT_POST; 
            const safeBaseUrl = (typeof BASE_URL !== 'undefined') ? BASE_URL : '/greenia-homes/';

            // ĐÃ XÓA BỎ LỆNH ĐÁ VĂNG
            if (!post || String(post.id).includes("{{") || post.id === "") { 
                container.innerHTML = `
                    <div style="text-align:center; padding: 100px 20px;">
                        <i class="fas fa-tools fa-4x" style="color:#c5a059; margin-bottom:20px;"></i>
                        <h2 style="color:#fff; font-size:24px;">BÀI VIẾT ĐANG ĐƯỢC CẬP NHẬT</h2>
                        <p style="color:#b0b8c4; font-size:15px; margin-bottom: 30px;">
                            Dữ liệu của bài viết này chưa được đồng bộ hoàn chỉnh hoặc đang bảo trì.<br>
                            <b>Dành cho Admin:</b> Hãy vào trang Quản trị, chọn bài viết này và bấm <b>LƯU CẬP NHẬT</b> để đúc lại file.
                        </p>
                        <a href="${safeBaseUrl}tin-tuc.html" style="padding:10px 20px; background:#c5a059; color:#000; font-weight:bold; border-radius:5px; text-decoration:none;">Quay lại danh sách</a>
                    </div>`;
                return; 
            }

            try {
                const [postSnap, prodSnap, projSnap] = await Promise.all([
                    db.collection('posts').get(),
                    db.collection('products').get(),
                    db.collection('projects').get()
                ]);
                
                let posts = postSnap.docs.map(doc => doc.data()).sort((a,b) => b.id - a.id);
                let prods = prodSnap.docs.map(doc => doc.data()).sort((a,b) => b.id - a.id);
                let independentProjects = projSnap.docs.map(doc => doc.data()).sort((a,b) => b.id - a.id);

                // 1. Lọc Danh mục chuẩn (Không trùng lặp)
                let otherCats = {}; let countBan = 0, countThue = 0;
                prods.forEach(p => {
                    if(p.type === 'Bán') countBan++; 
                    else if(p.type === 'Thuê') countThue++;
                    
                    if(p.cat) { 
                        let cList = Array.isArray(p.cat) ? p.cat : p.cat.split(',');
                        cList.forEach(c => {
                            let cTrim = c.trim();
                            let cSlug = createSafeSlug(cTrim);
                            // Chặn cứng các hệ phái Bán/Thuê/Sản phẩm để không bị lọt vào đây
                            if(cSlug !== '' && cSlug !== 'ban' && cSlug !== 'cho-thue' && cSlug !== 'chuyen-nhuong' && cSlug !== 'san-pham') {
                                otherCats[cTrim] = (otherCats[cTrim] || 0) + 1; 
                            }
                        });
                    }
                });
                let catLines = [];
                if(countBan > 0) catLines.push(`<a href="${safeBaseUrl}san-pham/chuyen-nhuong/"><span>Chuyển nhượng</span><span class="gr-cat-count">(${countBan})</span></a>`);
                if(countThue > 0) catLines.push(`<a href="${safeBaseUrl}san-pham/cho-thue/"><span>Cho thuê</span><span class="gr-cat-count">(${countThue})</span></a>`);
                Object.keys(otherCats).forEach(c => {
                    catLines.push(`<a href="${safeBaseUrl}san-pham/${createSafeSlug(c)}/"><span>${c}</span><span class="gr-cat-count">(${otherCats[c]})</span></a>`);
                });

                // 2. Tin mới & BĐS Nổi bật (Sidebar)
                let latestNewsHTML = posts.filter(p => p.id != post.id).slice(0, 5).map(p => {
                    let thumbUrl = p.thumb || 'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=800';
                    return `
                    <a href="${safeBaseUrl}tin-tuc/${createSafeSlug(p.cat)}/${p.slug}/" style="display:flex; gap:10px; margin-bottom:12px; text-decoration:none;">
                        <div style="width:60px; height:45px; flex-shrink:0; border-radius:4px; overflow:hidden; border: 1px solid rgba(255,255,255,0.1);"><img src="${thumbUrl}" style="width:100%; height:100%; object-fit:cover;"></div>
                        <div style="flex:1;"><h4 style="font-size:12px; color:#fff; margin:0; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${p.title}</h4></div>
                    </a>`
                }).join('');

                let sidebarProdHTML = prods.sort(() => 0.5 - Math.random()).slice(0, 5).map(p => `
                    <a href="${safeBaseUrl}san-pham/${createSafeSlug(p.cat)}/${p.slug}/" class="gr-prod-card">
                        <div class="gr-prod-thumb"><span class="gr-tag-abs ${p.type==='Bán'?'tag-ban':'tag-thue'}">${p.type==='Bán'?'Bán':'Cho thuê'}</span><img src="${p.img}"></div>
                        <div class="gr-prod-info"><h4 class="gr-tit-mini">${p.title}</h4><div class="gr-hl">${p.price}</div></div>
                    </a>`).join('');

                // 3. Tin tức liên quan
                const relatedPosts = posts.filter(p => p.cat === post.cat && p.id != post.id);
                let relatedPostsHTML = '';
                if(relatedPosts.length > 0) {
                    relatedPostsHTML = `
                    <div class="gr-related-section">
                        <h3 class="gr-w-title" style="margin-bottom:20px;">Bài viết cùng danh mục</h3>
                        <div class="gr-carousel-wrapper">
                            <button class="gr-nav-btn gr-prev" onclick="grScrollHorizontal('gr-news-scroll', -1)"><i class="fas fa-chevron-left"></i></button>
                            <div id="gr-news-scroll" class="gr-carousel">
                                ${relatedPosts.map(p => {
                                    let thumbUrl = p.thumb || 'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=800';
                                    const excerpt = (p.content || '').replace(/<[^>]*>?/gm, '').substring(0, 100) + '...';
                                    return `
                                    <a href="${safeBaseUrl}tin-tuc/${createSafeSlug(p.cat)}/${p.slug}/" class="gr-news-card-v">
                                        <div class="gr-nc-thumb"><img src="${thumbUrl}"></div>
                                        <div class="gr-nc-body">
                                            <h4 class="gr-nc-tit">${p.title}</h4>
                                            <div class="gr-nc-desc">${excerpt}</div>
                                            <div class="gr-nc-footer"><div class="gr-nc-date"><i class="far fa-clock"></i> ${p.date}</div><div class="gr-nc-more">Chi tiết <i class="fas fa-arrow-right" style="font-size:10px;"></i></div></div>
                                        </div>
                                    </a>`;
                                }).join('')}
                            </div>
                            <button class="gr-nav-btn gr-next" onclick="grScrollHorizontal('gr-news-scroll', 1)"><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>`;
                }

                // 4. Bất động sản dành cho bạn (Smart Recommended)
                let viewedHistory = JSON.parse(localStorage.getItem('greenia_smart_history')) || { cats: [], ids: [] };
                let smartRecommended = [];
                if (viewedHistory.cats.length > 0) {
                    let matchedByCat = prods.filter(p => {
                        let pCats = Array.isArray(p.cat) ? p.cat : (typeof p.cat === 'string' ? p.cat.split(',') : []);
                        return pCats.some(c => viewedHistory.cats.includes(createSafeSlug(c)));
                    });
                    smartRecommended = matchedByCat.sort(() => 0.5 - Math.random()).slice(0, 10);
                }
                if (smartRecommended.length < 10) {
                    let fallbackProds = prods.sort(() => 0.5 - Math.random()).slice(0, 10 - smartRecommended.length);
                    smartRecommended = [...new Set([...smartRecommended, ...fallbackProds])];
                }
                let forYouHTML = smartRecommended.length > 0 ? `
                    <div class="s-head"><h2 class="s-tit">Bất động sản dành cho bạn</h2></div>
                    <div class="gr-carousel-wrapper">
                        <button class="gr-nav-btn gr-prev" onclick="grScrollHorizontal('foryou-scroll', -1)"><i class="fas fa-chevron-left"></i></button>
                        <div id="foryou-scroll" class="gr-carousel">${smartRecommended.map(p => createProdCardHTML(p)).join('')}</div>
                        <button class="gr-nav-btn gr-next" onclick="grScrollHorizontal('foryou-scroll', 1)"><i class="fas fa-chevron-right"></i></button>
                    </div>` : '';

                // 5. Bán & Thuê mới nhất
                const saleProds = prods.filter(p => p.type === 'Bán').slice(0, 10);
                let saleHTML = saleProds.length > 0 ? `
                    <div class="s-head" style="margin-top:60px;"><h2 class="s-tit">Tin nhà đất bán mới nhất</h2></div>
                    <div class="gr-carousel-wrapper">
                        <button class="gr-nav-btn gr-prev" onclick="grScrollHorizontal('sale-scroll-latest', -1)"><i class="fas fa-chevron-left"></i></button>
                        <div id="sale-scroll-latest" class="gr-carousel">${saleProds.map(p => createProdCardHTML(p)).join('')}</div>
                        <button class="gr-nav-btn gr-next" onclick="grScrollHorizontal('sale-scroll-latest', 1)"><i class="fas fa-chevron-right"></i></button>
                    </div>` : '';

                const rentProds = prods.filter(p => p.type === 'Thuê').slice(0, 10);
                let rentHTML = rentProds.length > 0 ? `
                    <div class="s-head" style="margin-top:60px;"><h2 class="s-tit">Tin nhà đất cho thuê mới nhất</h2></div>
                    <div class="gr-carousel-wrapper">
                        <button class="gr-nav-btn gr-prev" onclick="grScrollHorizontal('rent-scroll-latest', -1)"><i class="fas fa-chevron-left"></i></button>
                        <div id="rent-scroll-latest" class="gr-carousel">${rentProds.map(p => createProdCardHTML(p)).join('')}</div>
                        <button class="gr-nav-btn gr-next" onclick="grScrollHorizontal('rent-scroll-latest', 1)"><i class="fas fa-chevron-right"></i></button>
                    </div>` : '';

                // 6. Dự án nổi bật
                let projHTML = '';
                if (independentProjects && independentProjects.length > 0) {
                    projHTML = `
                    <div class="s-head" style="margin-top:60px;"><h2 class="s-tit">Dự án nổi bật</h2></div>
                    <div class="gr-carousel-wrapper">
                        <button class="gr-nav-btn gr-prev" onclick="grScrollHorizontal('feat-scroll', -1)"><i class="fas fa-chevron-left"></i></button>
                        <div id="feat-scroll" class="gr-carousel">
                            ${independentProjects.slice(0, 10).map(p => {
                                const imgUrl = window.resolveImg ? window.resolveImg(p.img) : p.img;
                                return `<a href="${p.link}" class="s2-card">
                                    <div class="s2-thumb-box"><span class="gr-tag-abs tag-ban" style="background:#ff9f43; color:#000;">Dự án</span><img src="${imgUrl}"></div>
                                    <div class="s2-body"><h3 class="gr-tit s2-tit">${p.title}</h3><div style="margin-top:auto; font-size:11px; color:#888;"><i class="far fa-star" style="color:#c5a059;"></i> ${p.status || 'Đang mở bán'}</div></div>
                                </a>`;
                            }).join('')}
                        </div>
                        <button class="gr-nav-btn gr-next" onclick="grScrollHorizontal('feat-scroll', 1)"><i class="fas fa-chevron-right"></i></button>
                    </div>`;
                }


                // LẮP RÁP GIAO DIỆN
                const shareLink = encodeURIComponent(window.location.href);
                const zaloIconUrl = 'https://cdn.haitrieu.com/wp-content/uploads/2022/01/Logo-Zalo-Arc.png';

                container.innerHTML = `
                    <div class="gr-sp-header">
                        <div class="gr-breadcrumbs">
                            <a href="${safeBaseUrl}">Trang chủ</a> <span class="sep">&gt;</span>
                            <a href="${safeBaseUrl}tin-tuc.html">Tin tức</a> <span class="sep">&gt;</span>
                            <a href="${safeBaseUrl}tin-tuc/${createSafeSlug(post.cat)}/">${post.cat}</a> <span class="sep">&gt;</span>
                            <span class="current">${post.title}</span>
                        </div>
                        <h1 class="gr-sp-title">${post.title}</h1>
                        <div class="gr-sp-meta"><span><i class="far fa-calendar-alt"></i> ${post.date}</span><span><i class="fas fa-user-edit"></i> ${post.author}</span></div>
                    </div>
                    <div class="gr-sp-body">
                        <div class="gr-sp-main">
                            <div class="gr-toc-wrap" id="gr-toc-wrapper"><div class="gr-toc-header" onclick="toggleTOC()"><span class="gr-toc-tit"><i class="fas fa-list-ul"></i> Mục lục bài viết</span><i class="fas fa-chevron-down gr-toc-icon" id="gr-toc-icon"></i></div><ul class="gr-toc-list" id="gr-toc-list"></ul></div>
                            
                            <div class="gr-entry-content" id="gr-content-body">${post.content}</div>
                            
                            <div class="gr-bottom-bar">
                                <div class="gr-bot-cta">Tư vấn dự án: <a href="tel:0932966700">0932 966 700</a></div>
                                <div class="gr-share-group">
                                    <span class="gr-share-lbl">Chia sẻ:</span>
                                    <a href="https://www.facebook.com/sharer/sharer.php?u=${shareLink}" target="_blank" class="gr-s-btn fb"><i class="fab fa-facebook-f"></i></a>
                                    <a href="https://zalo.me/share/?url=${shareLink}" target="_blank" class="gr-s-btn" style="background:transparent;"><img src="${zaloIconUrl}" style="width:25px; object-fit:contain;" referrerpolicy="no-referrer"></a>
                                </div>
                            </div>
                            
                            <section id="vhgp-reviews-ip">
                                <div class="rev-container">
                                    <div class="rev-head">
                                        <div class="rev-title"><h2>Tham Gia Thảo Luận</h2></div>
                                        <div class="rev-stats">
                                            <div class="rs-score" id="avg-score">5.0</div>
                                            <div class="rs-meta">
                                                <div class="rs-stars" id="avg-stars">★★★★★</div>
                                                <div class="rs-count" id="total-reviews">0 ĐÁNH GIÁ</div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="rev-intro">🔒 Thông tin cá nhân của bạn được <strong>cam kết bảo mật tuyệt đối</strong>.</div>
                                    <div class="rev-layout">
                                        <div class="rev-form-box">
                                            <span class="form-lbl">Đánh giá để tham gia thảo luận</span>
                                            <form id="mainForm">
                                                <div class="rate-input">
                                                    <input type="radio" id="c-st5" name="rate" value="5" required checked/><label for="c-st5">★</label>
                                                    <input type="radio" id="c-st4" name="rate" value="4" /><label for="c-st4">★</label>
                                                    <input type="radio" id="c-st3" name="rate" value="3" /><label for="c-st3">★</label>
                                                    <input type="radio" id="c-st2" name="rate" value="2" /><label for="c-st2">★</label>
                                                    <input type="radio" id="c-st1" name="rate" value="1" /><label for="c-st1">★</label>
                                                </div>
                                                <div class="rev-row-inputs">
                                                    <input type="text" id="c-name" class="rev-input" placeholder="Họ tên *" required>
                                                    <input type="tel" id="c-phone" class="rev-input" placeholder="Số điện thoại *" required pattern="[0-9]{10}">
                                                    <input type="email" id="c-email" class="rev-input" placeholder="Email (Để nhận thông báo)" required>
                                                </div>
                                                <textarea id="c-comment" class="rev-textarea" placeholder="Nội dung thảo luận của bạn..." required></textarea>
                                                <button type="submit" id="c-btn-submit" class="rev-btn">Gửi Đánh Giá</button>
                                            </form>
                                        </div>
                                        <div class="rev-list" id="rev-list-container"><div style="font-size:12px; color:#666;">Đang kết nối dữ liệu...</div></div>
                                    </div>
                                </div>
                            </section>

                        </div>
                        <div class="gr-sp-sidebar">
                            <section id="vhgp-final-v15-vertical">
                                <h3 class="v15-ver-title">Nhận Bảng Giá</h3>
                                <div class="v15-ver-rating-box"><span class="v15-ver-stars">★★★★★</span><span class="v15-ver-count" id="count-v15-ver">(Đang tải...)</span></div>
                                <form id="leadForm" class="v15-ver-form">
                                    <input type="text" id="l-name" class="v15-ver-input" placeholder="Họ tên *" required>
                                    <input type="tel" id="l-phone" class="v15-ver-input" placeholder="Số điện thoại *" required>
                                    <button type="submit" class="v15-ver-btn">Gửi yêu cầu</button>
                                </form>
                            </section>
                            <div class="gr-cat-widget"><div class="gr-cat-h">Danh mục BĐS</div><div class="gr-cat-l">${catLines.join('')}</div></div>
                            <div><div class="gr-w-title">BĐS Nổi bật</div><div class="gr-prod-list">${sidebarProdHTML}</div></div>
                            <div style="margin-top: 10px;"><div class="gr-w-title">Tin mới nhất</div><div style="display:flex; flex-direction:column;">${latestNewsHTML}</div></div>
                        </div>
                    </div>
                    
                    ${relatedPostsHTML}
                    ${forYouHTML}
                    ${saleHTML}
                    ${rentHTML}
                    ${projHTML}
                `;

                setTimeout(() => {
                    initTOC();
                    initReviewsAndCTA();
                }, 500);

            } catch (e) { console.error(e); }
        });

        function initTOC() {
            const content = document.getElementById('gr-content-body');
            const tocList = document.getElementById('gr-toc-list');
            const headings = content.querySelectorAll('h2');
            if(headings.length > 0) {
                document.getElementById('gr-toc-wrapper').style.display = 'block';
                headings.forEach((h, i) => {
                    const id = 'toc-' + i; h.id = id;
                    const li = document.createElement('li'); li.className = 'gr-toc-item';
                    li.innerHTML = `<a href="#${id}" class="gr-toc-link">${i+1}. ${h.innerText}</a>`;
                    li.querySelector('a').onclick = (e) => { e.preventDefault(); document.getElementById(id).scrollIntoView({behavior:'smooth'}); };
                    tocList.appendChild(li);
                });
            }
        }
        function toggleTOC() { const l = document.getElementById('gr-toc-list'); l.style.display = l.style.display==='none'?'block':'none'; document.getElementById('gr-toc-icon').classList.toggle('rotate'); }

        function initReviewsAndCTA() {
            const PAGE_ID = window.location.pathname;
            const API_REVIEWS = 'https://script.google.com/macros/s/AKfycbyLqotNzi0pN1-trXxNhNvjF-1lqGSXhRUL5JMKz5J-j9mfe-QESaqTFR-pHeaFHvZTsA/exec'; 
            const API_LEAD = 'https://script.google.com/macros/s/AKfycbxMkdZKscj17D2CRG7zUpzHWx_YiTbvg35zGm3eGdim3n4cA76j42d7VoxmNXrxpvPA-Q/exec'; 
            
            let currentCountVer = 186; 
            fetch(API_LEAD + "?action=count")
                .then(res => res.json())
                .then(data => {
                    if(data.count !== undefined) {
                        currentCountVer = parseInt(data.count);
                        if(currentCountVer < 5) currentCountVer = 186;
                        const countEl = document.getElementById('count-v15-ver');
                        if(countEl) countEl.innerText = `(5.0/5 - ${currentCountVer} đánh giá)`;
                    }
                }).catch(err => {
                    const countEl = document.getElementById('count-v15-ver');
                    if(countEl) countEl.innerText = `(5.0/5 - 186 đánh giá)`;
                });

            document.getElementById('leadForm').addEventListener('submit', e => {
                e.preventDefault();
                const btn = document.querySelector('.v15-ver-btn');
                btn.innerText = "ĐANG GỬI..."; btn.disabled = true;
                let fd = new FormData();
                fd.append("project", window.GREENIA_CURRENT_POST.title);
                fd.append("name", document.getElementById('l-name').value);
                fd.append("phone", document.getElementById('l-phone').value);
                fd.append("url", window.location.href);
                fd.append("rating", 5);
                
                fetch(API_LEAD, { method: 'POST', body: fd }).then(res => {
                    alert("Cảm ơn bạn! Hệ thống đang xử lý và sẽ gửi bảng giá cho bạn.");
                    btn.innerText = "NHẬN BÁO GIÁ"; btn.disabled = false;
                }).catch(() => { alert("Lỗi mạng!"); btn.innerText = "NHẬN BÁO GIÁ"; btn.disabled = false; });
            });

            fetch(API_REVIEWS + "?action=get").then(res => res.json()).then(data => {
                const container = document.getElementById('rev-list-container');
                const pageReviews = data.filter(item => item.pageId === PAGE_ID);
                if(pageReviews.length === 0) { container.innerHTML = '<div style="font-size:12px; color:#666;">Chưa có thảo luận nào. Hãy là người đầu tiên!</div>'; return; }
                
                document.getElementById('total-reviews').innerText = pageReviews.length + " ĐÁNH GIÁ";
                container.innerHTML = pageReviews.map(p => `
                    <div class="rev-item">
                        <div class="rev-main-content">
                            <div class="rev-avatar">${(p.name || 'U').charAt(0).toUpperCase()}</div>
                            <div class="rev-content">
                                <div class="rev-top-row"><span class="rev-name">${p.name}</span><span class="rev-date">${p.date}</span></div>
                                <span class="rev-stars-small">${"★".repeat(p.rating)}${"☆".repeat(5-p.rating)}</span>
                                <p class="rev-text">${p.comment}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            }).catch(() => { document.getElementById('rev-list-container').innerHTML = '<div style="font-size:12px; color:#666;">Chưa tải được bình luận.</div>'; });

            document.getElementById('mainForm').addEventListener('submit', e => {
                e.preventDefault();
                const btn = document.getElementById('c-btn-submit');
                btn.innerText = "Đang gửi..."; btn.disabled = true;
                let fd = new FormData();
                fd.append("name", document.getElementById('c-name').value);
                fd.append("phone", document.getElementById('c-phone').value);
                fd.append("email", document.getElementById('c-email').value);
                fd.append("comment", document.getElementById('c-comment').value);
                fd.append("rating", document.querySelector('input[name="rate"]:checked').value);
                fd.append("pageId", PAGE_ID);
                fetch(API_REVIEWS, { method: 'POST', body: fd }).then(() => {
                    alert("Cảm ơn bạn đã đánh giá!");
                    document.getElementById('mainForm').reset();
                    btn.innerText = "Gửi Đánh Giá"; btn.disabled = false;
                });
            });
        }

        window.grScrollHorizontal = function(id, dir) {
            var el = document.getElementById(id); if(!el) return;
            var item = el.querySelector(".s2-card") || el.querySelector(".gr-news-card-v"); if(!item) return;
            var w = item.offsetWidth + 20; el.scrollBy({left: w * dir, behavior: "smooth"});
        };
    </script>
</body>
</html>
