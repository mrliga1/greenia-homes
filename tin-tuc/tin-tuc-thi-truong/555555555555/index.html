<p>&lt;div class=&quot;gr-related-item&quot;&gt;&lt;span class=&quot;gr-hot-icon&quot;&gt;👉&lt;/span&gt; &lt;a href=&quot;https://mrliga1.github.io/greenia-homes/san-pham/nha-pho/pppppppppppp/&quot; class=&quot;gr-related-link&quot; target=&quot;_blank&quot;&gt;Cập Nhật Mới11&lt;/a&gt;&lt;/div&gt;</p>
`
            };
        } catch(e) {}
        window.GREENIA_CURRENT_POST = defaultPost;

        function createSafeSlug(title) {
            if(!title) return 'tin-tuc';
            return title.toString().toLowerCase().trim().replace(/\s+/g, '-').replace(/[áàảãạâấầẩẫậăắằẳẵặ]/g, 'a').replace(/[éèẻẽẹêếềểễệ]/g, 'e').replace(/[íìỉĩị]/g, 'i').replace(/[óòỏõọôốồổỗộơớờởỡợ]/g, 'o').replace(/[úùủũụưứừửữự]/g, 'u').replace(/[ýỳỷỹỵ]/g, 'y').replace(/đ/g, 'd').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-');
        }

        function createProdCardHTML(p) {
            const catSlug = createSafeSlug(p.cat || 'san-pham');
            const pSlug = p.slug || createSafeSlug(p.title);
            const tagClass = p.type === 'Bán' ? 'tag-ban' : 'tag-thue';
            const imgUrl = window.resolveImg ? window.resolveImg(p.img) : (p.img || '');
            const link = `/greenia-homes/san-pham/${catSlug}/${pSlug}/`;

            let specHtml = "";
            if (p.area || p.bed) {
                let areaPart = p.area ? `<span style="color: #c5a059;">${p.area} m²</span>` : "";
                let bedPart = p.bed ? `<span style="color: #c5a059;">${p.bed} PN</span>` : "";
                let divider = (p.area && p.bed) ? `<span style="color:#555; margin: 0 6px;">|</span>` : "";
                specHtml = `<div style="display:flex; align-items:center;">${areaPart}${divider}${bedPart}</div>`;
            }

            return `<a href="${link}" class="s2-card">
                        <div class="s2-thumb-box"><img src="${imgUrl}" onerror="this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=600';"></div>
                        <div class="s2-body">
                            <h3 class="gr-tit">${p.title}</h3>
                            <div class="gr-meta"><span class="gr-hl">${p.price || 'Liên hệ'}</span>${specHtml}</div>
                        </div>
                    </a>`;
        }

        document.addEventListener("DOMContentLoaded", async function() {
            const container = document.getElementById('post-container');
            const post = window.GREENIA_CURRENT_POST; 
            const safeBaseUrl = (typeof BASE_URL !== 'undefined') ? BASE_URL : '/greenia-homes/';

            if (!post || String(post.id).includes("{{") || post.id === "") { 
                container.innerHTML = `<div style="text-align:center; padding: 100px 20px;"><i class="fas fa-tools fa-4x" style="color:#c5a059; margin-bottom:20px;"></i><h2 style="color:#fff; font-size:24px;">BÀI VIẾT ĐANG CẬP NHẬT</h2><p style="color:#b0b8c4;">Vui lòng vào Admin bấm <b>Lưu Cập Nhật</b> để đúc lại file.</p><a href="${safeBaseUrl}tin-tuc.html" style="padding:10px 20px; background:#c5a059; color:#000; font-weight:bold; border-radius:5px;">Quay lại danh sách</a></div>`;
                return; 
            }

            try {
                const [postSnap, prodSnap, projSnap] = await Promise.all([
                    db.collection('posts').get(),
                    db.collection('products').get(),
                    db.collection('projects').get()
                ]);
                
                let posts = postSnap.docs.map(doc => doc.data()).sort((a,b) => b.id - a.id);
                let prods = prodSnap.docs.map(doc => doc.data()).sort((a,b) => b.id - a.id);
                let independentProjects = projSnap.docs.map(doc => doc.data()).sort((a,b) => b.id - a.id);

                // 1. Sidebar - Danh mục BĐS chuẩn (Không trùng)
                let otherCats = {}; let countBan = 0, countThue = 0;
                prods.forEach(p => {
                    let pType = String(p.type || '').toLowerCase();
                    if(pType.includes('bán') || pType.includes('nhượng')) countBan++; 
                    else if(pType.includes('thuê')) countThue++;
                    
                    if(p.cat) { 
                        let cList = Array.isArray(p.cat) ? p.cat : p.cat.split(',');
                        cList.forEach(c => {
                            let cTrim = c.trim(); let cSlug = createSafeSlug(cTrim);
                            if(cSlug !== '' && !['ban','cho-thue','chuyen-nhuong','san-pham'].includes(cSlug)) {
                                otherCats[cTrim] = (otherCats[cTrim] || 0) + 1; 
                            }
                        });
                    }
                });
                let catLines = [];
                if(countBan > 0) catLines.push(`<a href="${safeBaseUrl}san-pham/chuyen-nhuong/"><span>Chuyển nhượng</span><span style="color:#666;font-size:10px;">(${countBan})</span></a>`);
                if(countThue > 0) catLines.push(`<a href="${safeBaseUrl}san-pham/cho-thue/"><span>Cho thuê</span><span style="color:#666;font-size:10px;">(${countThue})</span></a>`);
                Object.keys(otherCats).forEach(c => catLines.push(`<a href="${safeBaseUrl}san-pham/${createSafeSlug(c)}/"><span>${c}</span><span style="color:#666;font-size:10px;">(${otherCats[c]})</span></a>`));

                // 2. Sidebar - Tin mới (Có ngày) & BĐS Nổi bật (Có thông số)
                let latestNewsHTML = posts.filter(p => p.id != post.id).slice(0, 5).map(p => `
                    <a href="${safeBaseUrl}tin-tuc/${createSafeSlug(p.cat)}/${p.slug}/" style="display:flex; gap:10px; margin-bottom:12px; text-decoration:none;">
                        <div style="width:60px; height:45px; flex-shrink:0; border-radius:4px; overflow:hidden;"><img src="${p.thumb || 'https://via.placeholder.com/60'}" style="width:100%; height:100%; object-fit:cover;"></div>
                        <div style="flex:1;">
                            <h4 style="font-size:12px; color:#fff; margin:0; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${p.title}</h4>
                            <div style="color:#666; font-size:10px; margin-top:3px;"><i class="far fa-clock"></i> ${p.date || 'Mới cập nhật'}</div>
                        </div>
                    </a>`).join('');

                let sidebarProdHTML = prods.sort(() => 0.5 - Math.random()).slice(0, 5).map(p => {
                    let specArr = [];
                    if (p.area) specArr.push(`${p.area} m²`);
                    if (p.bed) specArr.push(`${p.bed} PN`);
                    return `
                    <a href="${safeBaseUrl}san-pham/${createSafeSlug(p.cat)}/${p.slug}/" class="gr-prod-card">
                        <div class="gr-prod-thumb"><span class="gr-tag-abs ${p.type==='Bán'?'tag-ban':'tag-thue'}">${p.type==='Bán'?'Bán':'Thuê'}</span><img src="${p.img}"></div>
                        <div class="gr-prod-info">
                            <h4 class="gr-tit-mini">${p.title}</h4>
                            <div class="gr-meta-mini"><span class="gr-hl">${p.price || 'Liên hệ'}</span><span style="color:#444;">|</span><span style="color:#888;">${specArr.join(' - ')}</span></div>
                        </div>
                    </a>`}).join('');

                // 3. Tin tức cùng danh mục
                const relatedPosts = posts.filter(p => p.cat === post.cat && p.id != post.id);
                let relatedPostsHTML = relatedPosts.length > 0 ? `
                    <div class="gr-related-section">
                        <h3 class="gr-w-title">Bài viết cùng danh mục</h3>
                        <div class="gr-carousel-wrapper">
                            <button class="gr-nav-btn gr-prev" onclick="grScrollHorizontal('gr-news-scroll', -1)"><i class="fas fa-chevron-left"></i></button>
                            <div id="gr-news-scroll" class="gr-carousel">${relatedPosts.map(p => `<a href="${safeBaseUrl}tin-tuc/${createSafeSlug(p.cat)}/${p.slug}/" class="gr-news-card-v"><div class="gr-nc-thumb"><img src="${p.thumb || 'https://via.placeholder.com/280x160'}"></div><div class="gr-nc-body"><h4 class="gr-nc-tit">${p.title}</h4><div class="gr-nc-footer"><div class="gr-nc-date"><i class="far fa-clock"></i> ${p.date}</div><div style="color:#c5a059; font-weight:700;">Chi tiết <i class="fas fa-arrow-right"></i></div></div></div></a>`).join('')}</div>
                            <button class="gr-nav-btn gr-next" onclick="grScrollHorizontal('gr-news-scroll', 1)"><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>` : '';

                // 4. Các Carousel BĐS (Dành cho bạn / Bán / Thuê / Dự án)
                let smartRecommended = prods.sort(() => 0.5 - Math.random()).slice(0, 10);
                let forYouHTML = `<div class="s-head"><h2 class="s-tit">Bất động sản dành cho bạn</h2></div><div class="gr-carousel-wrapper"><button class="gr-nav-btn gr-prev" onclick="grScrollHorizontal('foryou-scroll', -1)"><i class="fas fa-chevron-left"></i></button><div id="foryou-scroll" class="gr-carousel">${smartRecommended.map(p => createProdCardHTML(p)).join('')}</div><button class="gr-nav-btn gr-next" onclick="grScrollHorizontal('foryou-scroll', 1)"><i class="fas fa-chevron-right"></i></button></div>`;

                const saleProds = prods.filter(p => p.type === 'Bán').slice(0, 10);
                let saleHTML = `<div class="s-head"><h2 class="s-tit">Tin nhà đất bán mới nhất</h2></div><div class="gr-carousel-wrapper"><button class="gr-nav-btn gr-prev" onclick="grScrollHorizontal('sale-scroll', -1)"><i class="fas fa-chevron-left"></i></button><div id="sale-scroll" class="gr-carousel">${saleProds.map(p => createProdCardHTML(p)).join('')}</div><button class="gr-nav-btn gr-next" onclick="grScrollHorizontal('sale-scroll', 1)"><i class="fas fa-chevron-right"></i></button></div>`;

                const rentProds = prods.filter(p => p.type === 'Thuê').slice(0, 10);
                let rentHTML = `<div class="s-head"><h2 class="s-tit">Tin nhà đất cho thuê mới nhất</h2></div><div class="gr-carousel-wrapper"><button class="gr-nav-btn gr-prev" onclick="grScrollHorizontal('rent-scroll', -1)"><i class="fas fa-chevron-left"></i></button><div id="rent-scroll" class="gr-carousel">${rentProds.map(p => createProdCardHTML(p)).join('')}</div><button class="gr-nav-btn gr-next" onclick="grScrollHorizontal('rent-scroll', 1)"><i class="fas fa-chevron-right"></i></button></div>`;

                let projHTML = independentProjects.length > 0 ? `<div class="s-head"><h2 class="s-tit">Dự án nổi bật</h2></div><div class="gr-carousel-wrapper"><button class="gr-nav-btn gr-prev" onclick="grScrollHorizontal('feat-scroll', -1)"><i class="fas fa-chevron-left"></i></button><div id="feat-scroll" class="gr-carousel">${independentProjects.map(p => `<a href="${p.link}" class="s2-card"><div class="s2-thumb-box"><img src="${p.img}"></div><div class="s2-body"><h3 class="gr-tit">${p.title}</h3><div class="gr-meta"><span style="color:#c5a059; font-weight:700;">Đang mở bán</span></div></div></a>`).join('')}</div><button class="gr-nav-btn gr-next" onclick="grScrollHorizontal('feat-scroll', 1)"><i class="fas fa-chevron-right"></i></button></div>` : '';

                // BƠM GIAO DIỆN
                container.innerHTML = `
                    <div class="gr-sp-header">
                        <div class="gr-breadcrumbs"><a href="${safeBaseUrl}">Trang chủ</a> <span class="sep">&gt;</span> <a href="${safeBaseUrl}tin-tuc.html">Tin tức</a> <span class="sep">&gt;</span> <span class="current">${post.title}</span></div>
                        <h1 class="gr-sp-title">${post.title}</h1>
                        <div class="gr-sp-meta"><span><i class="far fa-calendar-alt"></i> ${post.date}</span><span><i class="fas fa-user-edit"></i> ${post.author}</span></div>
                    </div>
                    <div class="gr-sp-body">
                        <div class="gr-sp-main">
                            <div class="gr-toc-wrap" id="gr-toc-wrapper"><div class="gr-toc-header" onclick="toggleTOC()"><span class="gr-toc-tit">Mục lục</span><i class="fas fa-chevron-down gr-toc-icon" id="gr-toc-icon"></i></div><ul class="gr-toc-list" id="gr-toc-list"></ul></div>
                            <div class="gr-entry-content">${post.content}</div>
                            <div class="gr-bottom-bar"><div class="gr-bot-cta">Tư vấn dự án: <a href="tel:0932966700">0932 966 700</a></div></div>
                            
                            <section id="vhgp-reviews-ip">
                                <div class="rev-container">
                                    <div class="rev-head"><div class="rev-title"><h2>Tham Gia Thảo Luận</h2></div><div class="rev-stats"><div class="rs-score" id="avg-score">5.0</div><div class="rs-meta"><div class="rs-stars">★★★★★</div><div class="rs-count" id="total-reviews">0 ĐÁNH GIÁ</div></div></div></div>
                                    <div class="rev-layout">
                                        <div class="rev-form-box">
                                            <form id="mainForm">
                                                <div class="rate-input"><input type="radio" id="c-st5" name="rate" value="5" checked/><label for="c-st5">★</label><input type="radio" id="c-st4" name="rate" value="4"/><label for="c-st4">★</label><input type="radio" id="c-st3" name="rate" value="3"/><label for="c-st3">★</label><input type="radio" id="c-st2" name="rate" value="2"/><label for="c-st2">★</label><input type="radio" id="c-st1" name="rate" value="1"/><label for="c-st1">★</label></div>
                                                <div class="rev-row-inputs">
                                                    <input type="text" id="c-name" class="rev-input" placeholder="Họ tên *" required>
                                                    <input type="tel" id="c-phone" class="rev-input" placeholder="SĐT *" required>
                                                    <input type="email" id="c-email" class="rev-input" placeholder="Email" required>
                                                </div>
                                                <textarea id="c-comment" class="rev-textarea" placeholder="Thảo luận..." required></textarea>
                                                <button type="submit" id="c-btn-submit" class="rev-btn">Gửi Đánh Giá</button>
                                            </form>
                                        </div>
                                        <div class="rev-list" id="rev-list-container"></div>
                                    </div>
                                </div>
                            </section>
                        </div>

                        <div class="gr-sp-sidebar">
                            <section id="vhgp-final-v15-vertical">
                                <h3 class="v15-ver-title">Nhận Bảng Giá</h3>
                                <div class="v15-ver-rating-box"><span class="v15-ver-stars">★★★★★</span><span class="v15-ver-count" id="count-v15-ver">5.0/5</span></div>
                                <form id="leadForm" class="v15-ver-form">
                                    <input type="text" id="l-name" class="v15-ver-input" placeholder="Họ tên *" required>
                                    <input type="tel" id="l-phone" class="v15-ver-input" placeholder="Số điện thoại *" required>
                                    <input type="email" id="l-email" class="v15-ver-input" placeholder="Email *" required>
                                    <input type="text" id="l-demand" class="v15-ver-input" placeholder="Nhu cầu (VD: Căn 2PN...)" required>
                                    <button type="submit" class="v15-ver-btn">Gửi yêu cầu</button>
                                </form>
                            </section>
                            <div class="gr-cat-widget"><div class="gr-cat-h">Danh mục BĐS</div><div class="gr-cat-l">${catLines.join('')}</div></div>
                            <div><div class="gr-w-title">BĐS Nổi bật</div><div class="gr-prod-list">${sidebarProdHTML}</div></div>
                            <div><div class="gr-w-title">Tin mới nhất</div><div>${latestNewsHTML}</div></div>
                        </div>
                    </div>

                    ${relatedPostsHTML}
                    ${forYouHTML}
                    ${saleHTML}
                    ${rentHTML}
                    ${projHTML}
                `;

                initTOC();
                handleForms();
            } catch (e) { console.error(e); }
        });

        function toggleTOC() { const l = document.getElementById('gr-toc-list'); l.style.display = l.style.display==='none'?'block':'none'; document.getElementById('gr-toc-icon').classList.toggle('rotate'); }
        
        function initTOC() {
            const headings = document.querySelectorAll('.gr-entry-content h2');
            const tocList = document.getElementById('gr-toc-list');
            if(headings.length > 0) {
                document.getElementById('gr-toc-wrapper').style.display = 'block';
                headings.forEach((h, i) => {
                    const id = 'toc-' + i; h.id = id;
                    const li = document.createElement('li'); li.className = 'gr-toc-item';
                    li.innerHTML = `<a href="#${id}" class="gr-toc-link">${i+1}. ${h.innerText}</a>`;
                    li.onclick = (e) => { e.preventDefault(); document.getElementById(id).scrollIntoView({behavior:'smooth'}); };
                    tocList.appendChild(li);
                });
            }
        }

        function handleForms() {
            const API_LEAD = 'https://script.google.com/macros/s/AKfycbxMkdZKscj17D2CRG7zUpzHWx_YiTbvg35zGm3eGdim3n4cA76j42d7VoxmNXrxpvPA-Q/exec';
            document.getElementById('leadForm').onsubmit = e => {
                e.preventDefault();
                const btn = e.target.querySelector('button'); btn.innerText = "ĐANG GỬI..."; btn.disabled = true;
                let fd = new FormData();
                fd.append("project", window.GREENIA_CURRENT_POST.title);
                fd.append("name", document.getElementById('l-name').value);
                fd.append("phone", document.getElementById('l-phone').value);
                fd.append("email", document.getElementById('l-email').value);
                fd.append("demand", document.getElementById('l-demand').value);
                fd.append("url", window.location.href);
                fetch(API_LEAD, { method: 'POST', body: fd }).then(() => { alert("Gửi yêu cầu thành công!"); btn.innerText = "GỬI YÊU CẦU"; btn.disabled = false; e.target.reset(); });
            };
        }

        window.grScrollHorizontal = function(id, dir) {
            var el = document.getElementById(id); if(!el) return;
            var item = el.querySelector(".s2-card") || el.querySelector(".gr-news-card-v"); if(!item) return;
            var w = item.offsetWidth + 20; el.scrollBy({left: w * dir, behavior: "smooth"});
        };
    </script>
</body>
</html>
