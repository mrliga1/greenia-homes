<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Dự Án Bất Động Sản | Greenia Homes</title>
    <meta name="description" content="Khám phá các dự án bất động sản, căn hộ, nhà phố cao cấp đang mở bán với chính sách ưu đãi tốt nhất." />
    <link rel="canonical" href="https://greeniahomes.vn/du-an/" />

    <link rel="icon" href="/favicon.png" type="image/png" sizes="any">
    <link rel="apple-touch-icon" href="/favicon.png">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">

    <style>
        body, html { margin: 0; padding: 0; background: #05080f; color: #b0b8c4; font-family: 'Manrope', sans-serif; overflow-x: clip !important;}
        
        #lux-uni-catalog { background-color: #05080f; color: #b0b8c4; padding: 35px 0 60px 0 !important; width: 100%; box-sizing: border-box; overflow: visible !important;}
        #lux-uni-catalog * { box-sizing: border-box; }
        .luc-inner { max-width: 1280px; margin: 0 auto; padding: 0 15px; }
        
        .luc-sticky-wrapper { background-color: #05080f; padding: 1px 0; margin-bottom: 0px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); border-bottom: 1px solid rgba(197, 160, 89, 0.1); transition: all 0.3s ease; z-index: 99999 !important; width: 100%; }
        .luc-sticky-wrapper.is-stuck { position: fixed; top: 0; left: 0; right: 0; background-color: rgba(5, 8, 15, 0.95); backdrop-filter: blur(10px); animation: luxSlideDown 0.4s ease; }
        @keyframes luxSlideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        
        .luc-nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 0; max-width: 1280px; margin: 0 auto; }
        .luc-nav-left-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .luc-nav-right-group { display: flex; align-items: center; }
        
        .luc-nav-item { cursor: pointer; padding: 2px 8px; border: 1px solid rgba(255,255,255,0.1); color: #fff; text-transform: none; font-size: 12px; font-weight: 500; transition: 0.3s; border-radius: 10px; white-space: nowrap; background: transparent; text-decoration: none !important; display: inline-block;}
        .luc-nav-item:hover, .luc-nav-item.active { background: rgba(197, 160, 89, 0.1); color: #c5a059; border-color: #c5a059; }
        
        #luc-search-form { position: relative; width: 250px; display: block; margin: 0; }
        #luc-search-form input { width: 100%; background: #0b1120; border: 1px solid rgba(197,160,89,0.3); padding: 5px 30px 5px 15px; border-radius: 10px; color: #fff; outline: none; transition: 0.3s; font-size: 12px; }
        #luc-search-btn { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); color: #c5a059; font-size: 12px; cursor: pointer; background: transparent; border: none; outline: none; padding: 5px 5px; }
        
        .gr-breadcrumbs { font-size: 14px; color: #888; margin-bottom: 25px; margin-top: 20px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; font-family: 'Be Vietnam Pro', sans-serif; }
        .gr-breadcrumbs a { text-decoration: none; color: inherit; transition: 0.3s; }
        .gr-breadcrumbs a:hover { color: #c5a059; } 
        .gr-breadcrumbs span.sep { color: #c5a059; font-size: 10px; }
        .gr-breadcrumbs span.current { color: #fff; font-weight: 500; }

        .luc-status-bar { padding: 15px 0; margin-bottom: 20px; color: #fff; font-size: 14px; display: flex; align-items: center; border-bottom: 1px dashed rgba(197, 160, 89, 0.3); }
        .luc-clear-search { cursor: pointer; color: #ff6b6b; font-size: 12px; text-decoration: underline; margin-left: 10px; }

        .luc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; }
        .luc-loader { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); color: #c5a059; font-size: 30px; display: none; }
        .luc-loader.show { display: block; }
        
        .luc-load-wrap { text-align: center; margin-top: 40px; border-top: 1px dashed rgba(35,45,69,1); padding-top: 25px; }
        .luc-load-btn { background: transparent; border: 1px solid #c5a059; color: #c5a059; padding: 10px 30px; font-family: 'Be Vietnam Pro', sans-serif; font-weight: 700; cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-block; font-size: 13px; text-transform: uppercase; border-radius: 4px;}
        .luc-load-btn:hover { background: rgba(197, 160, 89, 0.15); color: #c5a059; }

        /* Style Card Dự Án */
        .s2-card { background: #0b1120; border: 1px solid rgba(197, 160, 89, 0.2); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; height: 100%; transition: 0.3s; text-decoration: none;}
        .s2-card:hover { border-color: #c5a059; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .s2-thumb-box { height: 220px; position: relative; overflow: hidden; }
        .s2-thumb-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; display: block;}
        .s2-card:hover .s2-thumb-box img { transform: scale(1.1); }
        .s2-body { padding: 18px; flex: 1; display: flex; flex-direction: column; }
        .gr-tag-abs { position: absolute; top: 0 !important; left: 0 !important; padding: 5px 12px; font-size: 11px; font-weight: 700; color: #000; background: #ff9f43; z-index: 5; border-bottom-right-radius: 8px;}
        .gr-tit { font-size: 15px !important; font-weight: 700; color: #fff; line-height: 1.4 !important; margin: 0 0 10px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .s2-card:hover .gr-tit { color: #c5a059; }
        .gr-loc { font-size: 12px; color: #999; margin-bottom: 15px; display: flex; align-items: flex-start; gap: 6px; line-height: 1.5; }
        .gr-loc i { margin-top: 3px; color: #c5a059; }
        .gr-meta { display: flex; align-items: center; justify-content: space-between; font-size: 12px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; margin-top: auto; }
        .gr-hl { color: #c5a059; font-weight: 800; font-size: 16px; }

        .page-header-title { text-align: center; margin-bottom: 30px; }
        .page-header-title h1 { font-family: 'Playfair Display', serif; font-size: 32px; color: #fff; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 10px 0; }
        .page-header-title p { color: #94a3b8; font-size: 15px; margin: 0; max-width: 600px; margin: 0 auto; }

        @media (max-width: 1024px) { .luc-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 767px) { 
            .luc-grid { grid-template-columns: repeat(1, 1fr); gap: 20px; } 
            .luc-nav-bar { flex-direction: column; align-items: flex-start; gap: 1px; } 
            .luc-nav-left-group { width: 100%; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 5px; } 
            .luc-nav-right-group { width: 100%; } 
            #luc-search-form { width: 100%; }
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

    <div id="site-header"></div>
    <div id="sub-menu" class="sub-header"></div>

    <div id="lux-uni-catalog">
        <div class="luc-inner">
            <div class="page-header-title">
                <h1>Dự Án Nổi Bật</h1>
                <p>Khám phá bộ sưu tập các dự án bất động sản tiềm năng, pháp lý minh bạch và sinh lời cao.</p>
            </div>

            <div class="gr-breadcrumbs">
                <a href="/">Trang chủ</a> <span class="sep">&gt;</span>
                <span class="current">Dự án</span>
            </div>

            <div id="luc-filter-placeholder"></div>
            <div class="luc-sticky-wrapper" id="luc-filter-bar">
                <div class="luc-nav-bar">
                    <div class="luc-nav-left-group">
                        <div class="luc-nav-item active" onclick="filterStatus('')">Tất cả dự án</div>
                        <div class="luc-nav-item" onclick="filterStatus('Đang mở bán')">Đang mở bán</div>
                        <div class="luc-nav-item" onclick="filterStatus('Sắp ra mắt')">Sắp ra mắt</div>
                        <div class="luc-nav-item" onclick="filterStatus('Đã bàn giao')">Đã bàn giao</div>
                    </div>
                    <div class="luc-nav-right-group">
                        <form id="luc-search-form" onsubmit="return false;">
                            <input type="text" id="luc-keyword" placeholder="Tìm tên dự án, vị trí..." autocomplete="off">
                            <button type="submit" id="luc-search-btn"><i class="fas fa-search"></i></button>
                        </form>
                    </div>
                </div>
            </div>

            <div id="luc-search-status" class="luc-status-bar" style="display:none;"></div>
            
            <div style="position: relative; min-height: 300px; margin-top: 30px;">
                <div class="luc-loader" id="grid-loader"><i class="fas fa-circle-notch fa-spin"></i></div>
                <div class="luc-grid" id="luc-grid-result"></div>
            </div>
            
            <div class="luc-load-wrap" id="load-more-wrap" style="display: none;">
                <button id="luc-load-more-btn" class="luc-load-btn">XEM THÊM <i class="fas fa-chevron-down"></i></button>
            </div>
        </div>
    </div>

    <div id="site-footer"></div>
    <script src="/assets/js/ui.js"></script>

    <script>
        // MÃ HÓA BẢO MẬT API KEY BẰNG BASE64 CHỐNG BOT GITHUB
        const firebaseConfig = {
          apiKey: String.fromCharCode(65,73,122,97,83,121,68,105,79,69,122,77,57,114,78,65,102,106,45,109,88,97,70,53,49,89,86,78,74,103,121,85,45,99,104,105,51,116,115),
          authDomain: "greenia-homes.firebaseapp.com",
          projectId: "greenia-homes",
          storageBucket: "greenia-homes.appspot.com",
          messagingSenderId: "24027695632",
          appId: "1:24027695632:web:13a23aa156e864f7d55895",
          measurementId: "G-YRK63BNPP0"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allProjects = [];
        let filteredProjects = [];
        const itemsPerPage = 12;
        let currentPage = 1;
        let currentStatus = '';
        let currentKeyword = '';

        document.addEventListener("DOMContentLoaded", async function() {
            // Xử lý hiệu ứng thanh Tab cố định
            const filterBar = document.getElementById('luc-filter-bar');
            const placeholder = document.getElementById('luc-filter-placeholder');
            if(filterBar) {
                window.addEventListener('scroll', () => {
                    if (window.scrollY > 250) {
                        filterBar.classList.add('is-stuck');
                        if(placeholder) placeholder.style.height = filterBar.offsetHeight + 'px';
                    } else {
                        filterBar.classList.remove('is-stuck');
                        if(placeholder) placeholder.style.height = '0px';
                    }
                });
            }

            // Xử lý tìm kiếm
            document.getElementById('luc-search-form').addEventListener('submit', function(e) {
                e.preventDefault(); 
                currentKeyword = document.getElementById('luc-keyword').value.trim();
                runFilter();
            });

            // Tải thêm
            document.getElementById('luc-load-more-btn').addEventListener('click', function() { 
                this.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Đang tải..."; 
                currentPage++; 
                setTimeout(() => runFilter(true), 300); 
            });

            // Gọi dữ liệu DỰ ÁN từ Firebase
            try {
                document.getElementById('grid-loader').classList.add('show');
                const projSnap = await db.collection('projects').get();
                allProjects = projSnap.docs.map(doc => doc.data()).sort((a,b) => b.id - a.id);
                document.getElementById('grid-loader').classList.remove('show');
                runFilter();
            } catch(e) {
                console.error(e);
                document.getElementById('luc-grid-result').innerHTML = "<div style='grid-column:1/-1;text-align:center;color:#ff4d4f;'>Lỗi tải dữ liệu. Vui lòng F5 lại trang.</div>";
            }
        });

        // Chọn Tab Trạng thái
        window.filterStatus = function(status) {
            currentStatus = status;
            document.querySelectorAll('.luc-nav-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            runFilter();

            // Hiệu ứng tự động cuộn lên thanh Tab cực mượt
            const anchor = document.getElementById('luc-filter-placeholder');
            if(anchor) {
                window.scrollTo({ 
                    top: anchor.getBoundingClientRect().top + window.scrollY - 50, 
                    behavior: 'smooth' 
                });
            }
        }

        // Lọc và render dữ liệu
        function runFilter(isLoadMore = false) {
            if(!isLoadMore) currentPage = 1;
            
            filteredProjects = allProjects.filter(p => {
                let matchStatus = true;
                if(currentStatus !== '') {
                    matchStatus = p.status === currentStatus || (currentStatus === 'Đang mở bán' && !p.status); // Default nếu trống là đang mở bán
                }
                
                let matchKw = true;
                if(currentKeyword !== '') {
                    const kw = currentKeyword.toLowerCase();
                    matchKw = (p.title && String(p.title).toLowerCase().includes(kw)) || 
                              (p.loc && String(p.loc).toLowerCase().includes(kw));
                }
                return matchStatus && matchKw;
            });

            const statusDiv = document.getElementById('luc-search-status');
            if(currentKeyword !== '') {
                statusDiv.style.display = 'flex';
                statusDiv.innerHTML = `Tìm thấy <strong style="margin: 0 5px; color:#c5a059;">${filteredProjects.length}</strong> dự án cho: "<strong>${currentKeyword}</strong>" <span class='luc-clear-search' onclick='clearSearch()'>Xóa tìm kiếm</span>`;
            } else { 
                statusDiv.style.display = 'none'; 
            }

            const paginatedData = filteredProjects.slice(0, currentPage * itemsPerPage);
            const grid = document.getElementById('luc-grid-result');
            
            if(paginatedData.length > 0) {
                grid.innerHTML = paginatedData.map(p => renderProjectCard(p)).join('');
            } else {
                grid.innerHTML = "<div style='grid-column:1/-1;text-align:center;padding:50px;color:#888;'>Không tìm thấy dự án phù hợp.</div>";
            }

            const loadBtnWrap = document.getElementById('load-more-wrap');
            if(paginatedData.length >= filteredProjects.length) { 
                loadBtnWrap.style.display = 'none'; 
            } else { 
                loadBtnWrap.style.display = 'block'; 
                document.getElementById('luc-load-more-btn').innerHTML = "XEM THÊM DỰ ÁN <i class='fas fa-chevron-down'></i>"; 
            }
        }
        
        window.clearSearch = function() { 
            document.getElementById('luc-keyword').value = '';
            currentKeyword = '';
            runFilter();
        }

        function renderProjectCard(p) {
            const imgUrl = window.resolveImg ? window.resolveImg(p.img) : (p.img || 'https://via.placeholder.com/600x400?text=Greenia+Homes');
            const link = p.link || `/du-an/${p.slug || p.id}/`;
            const statusText = p.status || 'Đang mở bán';
            const priceText = p.price || 'Đang cập nhật';
            const locText = p.loc || 'Đang cập nhật vị trí';

            return `
            <a href="${link}" class="s2-card">
                <div class="s2-thumb-box">
                    <span class="gr-tag-abs">${statusText}</span>
                    <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/600x400?text=Greenia+Homes';">
                </div>
                <div class="s2-body">
                    <h3 class="gr-tit">${p.title}</h3>
                    <div class="gr-loc"><i class="fas fa-map-marker-alt"></i> <span>${locText}</span></div>
                    <div class="gr-meta">
                        <span style="color:#94a3b8;">Giá từ:</span>
                        <span class="gr-hl">${priceText}</span>
                    </div>
                </div>
            </a>`;
        }
    </script>
</body>
</html>
