    <style>
        /* ==============================================================
           CSS NỀN TẢNG CHO TRANG CHI TIẾT DỰ ÁN (BÁC GIỮ NGUYÊN)
           ============================================================== */
        body, html { margin: 0; padding: 0; background: #05080f; color: #b0b8c4; font-family: 'Manrope', sans-serif; overflow-x: hidden; }
        * { box-sizing: border-box; }
        
        :root {
            --lux-gold: #c5a059;
            --lux-gold-hover: #d4af37;
            --lux-dark: #05080f;
            --lux-white: #ffffff;
        }

        .greenia-luxury-theme {
            width: 100%;
            min-height: 70vh;
        }

        /* Container chuẩn để gom nội dung vào giữa màn hình */
        .pj-container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 40px 20px;
        }

        /* ==============================================================
           BÁC VIẾT CSS ĐỘC QUYỀN CHO DỰ ÁN NÀY XUỐNG BÊN DƯỚI NAY
           ============================================================== */
        
        /* Hiệu ứng chuyển động */
        @keyframes vspFadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* KHỐI BANNER CHÍNH */
        .vsp-hero {
            position: relative;
            width: 100%;
            height: 100vh;
            min-height: 650px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            /* Nếu menu của bác trong suốt, bỏ margin-top đi. Nếu menu màu đen đặc thì dùng margin-top: -80px để đẩy ảnh lên kịch trần */
        }
        
        .vsp-hero-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
        }
        
        .vsp-hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        
        /* Lớp phủ đen Gradient mờ ảo dần xuống dưới để khớp với màu nền web */
        .vsp-hero-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(5,8,15,0.6) 0%, rgba(5,8,15,0.3) 50%, #05080f 100%);
            z-index: 2;
        }

        /* Nội dung Banner */
        .vsp-hero-content {
            position: relative;
            z-index: 3;
            opacity: 0;
            animation: vspFadeUp 1.2s ease-out forwards;
        }

        .vsp-badge {
            display: inline-block;
            background: rgba(197, 160, 89, 0.1);
            color: var(--lux-gold);
            border: 1px solid var(--lux-gold);
            padding: 8px 25px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.2);
            backdrop-filter: blur(5px);
        }

        .vsp-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(40px, 7vw, 80px);
            color: var(--lux-white);
            line-height: 1.1;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            font-weight: 700;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .vsp-slogan {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(18px, 2vw, 22px);
            color: #d1d5db;
            max-width: 800px;
            margin: 0 auto 40px auto;
            line-height: 1.6;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .vsp-cta-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Nút Vàng */
        .vsp-btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--lux-gold);
            color: #000;
            padding: 16px 40px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 15px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid var(--lux-gold);
        }
        .vsp-btn-primary:hover {
            background: transparent;
            color: var(--lux-gold);
            box-shadow: 0 10px 30px rgba(197, 160, 89, 0.4);
            transform: translateY(-3px);
        }

        /* Nút Viền Kính */
        .vsp-btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(11, 17, 32, 0.4);
            backdrop-filter: blur(8px);
            color: var(--lux-white);
            padding: 16px 40px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 15px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .vsp-btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--lux-white);
            transform: translateY(-3px);
        }

        /* Responsive Banner cho Mobile */
        @media (max-width: 768px) {
            .vsp-hero { height: auto; min-height: 80vh; padding: 120px 0 60px 0; }
            .vsp-cta-group { flex-direction: column; width: 100%; padding: 0 15px; }
            .vsp-btn-primary, .vsp-btn-secondary { width: 100%; justify-content: center; }
        }
           
    </style>
