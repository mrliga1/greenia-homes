<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Sản Phẩm | Greenia Homes</title>
    
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            // Hàm tự động thêm ../../ vào tất cả các link và ảnh trên Menu để không bị vỡ
            const fixLinks = (html) => html.replace(/(href|src)=["'](?!\w+:|#|data:|\/|tel:|mailto:)([^"']+)["']/g, '$1="../../$2"');
            
            try {
                // Ép tải Header và Footer trực tiếp từ thư mục gốc
                const [header, footer, sub] = await Promise.all([
                    fetch('../../header.html').then(r => r.ok ? r.text() : ''),
                    fetch('../../footer.html').then(r => r.ok ? r.text() : ''),
                    fetch('../../sub-menu.html').then(r => r.ok ? r.text() : '')
                ]);
                
                if (header) document.getElementById('site-header').innerHTML = fixLinks(header);
                if (footer) document.getElementById('site-footer').innerHTML = fixLinks(footer);
                if (sub) {
                    let subEl = document.getElementById('sub-menu');
                    if(subEl) subEl.innerHTML = fixLinks(sub);
                }
            } catch(e) { console.log('Lỗi tải menu:', e); }
        });

        // Hàm thông minh xử lý link ảnh chống vỡ cho thân bài
        const resolveImg = (src) => {
            if (!src) return '';
            if (src.startsWith('http') || src.startsWith('data:')) return src;
            return '../../' + src.replace(/^\/+/, '');
        };
    </script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">

    <style>
        body { background-color: #05080f; color: #b0b8c4; font-family: 'Manrope', sans-serif; margin: 0; padding: 0; }
        .ct-container { max-width: 1200px; margin: 40px auto; padding: 0 15px; padding-bottom: 60px; }
        .ct-breadcrumb { font-size: 13px; color: #888; margin-bottom: 20px; }
        .ct-breadcrumb a { color: #888; text-decoration: none; transition: 0.3s; } 
        .ct-breadcrumb a:hover { color: #c5a059; }
        .ct-title-box { border-bottom: 1px dashed rgba(197, 160, 89, 0.3); padding-bottom: 20px; margin-bottom: 30px; }
        .ct-title { font-size: 32px; color: #c5a059; margin: 0 0 10px; font-weight: 700; line-height: 1.3; }
        .ct-loc { font-size: 14px; color: #b0b8c4; } 
        .ct-loc i { color: #c5a059; margin-right: 5px; }
        .ct-main-split { display: flex; gap: 30px; margin-bottom: 40px; }
        .ct-gallery-col { width: 65%; }
        .ct-info-col { width: 35%; }
        .ct-main-img { width: 100%; height: 500px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(197, 160, 89, 0.2); margin-bottom: 15px; }
        .ct-thumb-list { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .ct-thumb-list::-webkit-scrollbar { display: none; }
        .ct-thumb { width: 100px; height: 75px; object-fit: cover; border-radius: 4px; cursor: pointer; border: 2px solid transparent; opacity: 0.5; transition: 0.3s; }
        .ct-thumb:hover, .ct-thumb.active { opacity: 1; border-color: #c5a059; }
        .ct-price-box { background: rgba(197, 160, 89, 0.1); border: 1px solid #c5a059; border-radius: 8px; padding: 25px; text-align: center; margin-bottom: 20px; }
        .ct-price { font-size: 36px; color: #fff; font-weight: 800; margin: 0; }
        .ct-type-tag { display: inline-block; background: #c5a059; color: #000; font-size: 13px; font-weight: 700; padding: 5px 15px; border-radius: 20px; text-transform: uppercase; margin-bottom: 10px;}
        .ct-specs { background: #0b1120; border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .ct-spec-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed rgba(255,255,255,0.05); font-size: 15px; }
        .ct-spec-item:last-child { border: none; padding-bottom: 0; }
        .ct-spec-item span:first-child { color: #888; } 
        .ct-spec-item span:last-child { color: #fff; font-weight: 600; }
        .ct-contact-btn { display: block; width: 100%; background: linear-gradient(135deg, #c5a059 0%, #d4af37 100%); color: #000; text-align: center; padding: 16px; font-size: 16px; font-weight: 700; text-decoration: none; border-radius: 4px; transition: 0.3s; text-transform: uppercase; }
        .ct-contact-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(197,160,89,0.3); }
        .ct-desc-box { background: #0b1120; border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 30px; margin-bottom: 40px; }
        .ct-section-title { font-size: 22px; font-weight: 700; color: #fff; margin: 0 0 20px; padding-bottom: 10px; border-bottom: 2px solid #c5a059; display: inline-block; text-transform: uppercase;}
        .ct-desc-content { font-size: 15px; line-height: 1.8; color: #ccc; }
        .ct-desc-content p { margin-bottom: 15px; }
        .ct-desc-content strong { color: #c5a059; }
        .ct-desc-content img { max-width: 100%; height: auto; border-radius: 6px; margin: 15px 0; border: 1px solid rgba(197, 160, 89, 0.2);}
        .ct-related-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 20px;}
        .gr-card { background: #0b1120; border: 1px solid rgba(197, 160, 89, 0.2); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; text-decoration: none; transition: 0.3s;}
        .gr-card:hover { border-color: #c5a059; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5);}
        .gr-thumb-box { height: 180px; overflow: hidden; position: relative;} 
        .gr-thumb-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s;}
        .gr-card:hover .gr-thumb-box img { transform: scale(1.1); }
        .gr-body { padding: 15px; display: flex; flex-direction: column; flex: 1;} 
        .gr-tit { font-size: 14px; font-weight: 600; color: #fff; margin: 0 0 10px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; transition: 0.3s;} 
        .gr-card:hover .gr-tit { color: #c5a059; }
        .gr-meta { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; margin-top: auto;}
        .gr-meta span:first-child { color: #c5a059; font-weight: 700; font-size: 15px;}
        .gr-meta span:last-child { color: #888; font-size: 12px;}

        @media (max-width: 1024px) { .ct-related-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 900px) { .ct-main-split { flex-direction: column; } .ct-gallery-col, .ct-info-col { width: 100%; } .ct-related-grid { grid-template-columns: repeat(2, 1fr); } .ct-main-img { height: 400px; } }
        @media (max-width: 480px) { .ct-related-grid { grid-template-columns: 1fr; } .ct-main-img { height: 250px; } }
    </style>
</head>
<body>

    <div id="site-header"></div>
    <div id="sub-menu" class="sub-header"></div>

    <main class="ct-container" id="product-container">
        <div style="text-align:center; padding: 150px 0; color: #c5a059;">
            <i class="fas fa-circle-notch fa-spin fa-3x"></i><p style="margin-top:20px;">Đang tải thông tin sản phẩm...</p>
        </div>
    </main>

    <div id="site-footer"></div>
    <script src="../../assets/js/ui.js"></script>

    <script>
        window.GREENIA_CURRENT_PRODUCT = null;

        document.addEventListener("DOMContentLoaded", async function() {
            const container = document.getElementById('product-container');
            const currentProd = window.GREENIA_CURRENT_PRODUCT;

            if (!currentProd) {
                container.innerHTML = "<h2 style='text-align:center; color:#ff4d4f;'>Đây là file khuôn mẫu. Vui lòng xem bản build tại thư mục /san-pham/slug/</h2>";
                return;
            }

            let galleryHTML = '';
            if (currentProd.gallery && currentProd.gallery.length > 0) {
                currentProd.gallery.forEach((imgSrc, index) => {
                    const activeClass = index === 0 ? 'active' : '';
                    galleryHTML += `<img src="${resolveImg(imgSrc)}" class="ct-thumb ${activeClass}" onclick="changeMainImage('${resolveImg(imgSrc)}', this)">`;
                });
            } else {
                galleryHTML = `<img src="${resolveImg(currentProd.img)}" class="ct-thumb active">`;
            }

            let relatedHTML = '';
            try {
                const res = await fetch('../../assets/data/products.json');
                const products = await res.json();
                
                let relatedProds = [];
                if (currentProd.projectCode && currentProd.projectCode.trim() !== "") {
                    relatedProds = products.filter(p => p.projectCode === currentProd.projectCode && p.id != currentProd.id).slice(0, 4);
                } 
                if (relatedProds.length === 0) {
                    relatedProds = products.filter(p => p.cat === currentProd.cat && p.id != currentProd.id).slice(0, 4);
                }

                if (relatedProds.length > 0) {
                    relatedHTML = `<div style="margin-top: 60px;">
                        <h2 class="ct-section-title">Sản phẩm tương tự</h2>
                        <div class="ct-related-grid">
                            ${relatedProds.map(p => {
                                const pSlug = p.slug || p.title.toLowerCase().replace(/ /g, '-').replace(/[^\w-]/g, '');
                                return `
                                <a href="../../san-pham/${pSlug}/" class="gr-card">
                                    <div class="gr-thumb-box">
                                        <span style="position:absolute; top:0; left:0; background:${p.type==='Bán'?'#ff4d4f':'#00b894'}; color:#fff; font-size:10px; font-weight:700; padding:4px 10px; border-bottom-right-radius:6px; z-index:5;">${p.type}</span>
                                        <img src="${resolveImg(p.img)}">
                                    </div>
                                    <div class="gr-body">
                                        <h3 class="gr-tit">${p.title}</h3>
                                        <div class="gr-meta"><span>${p.price}</span> <span>${p.area} m²</span></div>
                                    </div>
                                </a>`
                            }).join('')}
                        </div>
                    </div>`;
                }
            } catch(e) { console.log("Không tải được dữ liệu sản phẩm liên quan"); }

            container.innerHTML = `
                <div class="ct-breadcrumb">
                    <a href="../../index.html">Trang chủ</a> / <a href="../../san-pham.html">Sản phẩm</a> / ${currentProd.catName || currentProd.cat}
                </div>

                <div class="ct-title-box">
                    <h1 class="ct-title">${currentProd.title}</h1>
                    <div class="ct-loc"><i class="fas fa-map-marker-alt"></i> ${currentProd.loc}</div>
                </div>

                <div class="ct-main-split">
                    <div class="ct-gallery-col">
                        <img src="${resolveImg(currentProd.img)}" id="mainImage" class="ct-main-img">
                        <div class="ct-thumb-list">${galleryHTML}</div>
                    </div>

                    <div class="ct-info-col">
                        <div class="ct-price-box">
                            <span class="ct-type-tag">${currentProd.type}</span>
                            <h2 class="ct-price">${currentProd.price}</h2>
                        </div>

                        <div class="ct-specs">
                            <h3 style="margin: 0 0 20px; color:#c5a059; font-size:16px; text-transform:uppercase;">Thông số kỹ thuật</h3>
                            ${currentProd.area ? `<div class="ct-spec-item"><span>Diện tích</span><span>${currentProd.area} m²</span></div>` : ''}
                            ${currentProd.bed ? `<div class="ct-spec-item"><span>Phòng ngủ</span><span>${currentProd.bed} PN</span></div>` : ''}
                            ${currentProd.wc ? `<div class="ct-spec-item"><span>Phòng tắm</span><span>${currentProd.wc} WC</span></div>` : ''}
                            ${currentProd.direction ? `<div class="ct-spec-item"><span>Hướng nhà</span><span>${currentProd.direction}</span></div>` : ''}
                            ${currentProd.legal ? `<div class="ct-spec-item"><span>Pháp lý</span><span>${currentProd.legal}</span></div>` : ''}
                        </div>

                        <a href="tel:0932966700" class="ct-contact-btn"><i class="fas fa-phone-alt"></i> Gọi tư vấn ngay</a>
                    </div>
                </div>

                <div class="ct-desc-box">
                    <h2 class="ct-section-title">Thông tin chi tiết</h2>
                    <div class="ct-desc-content">${currentProd.content || currentProd.desc || 'Đang cập nhật nội dung chi tiết...'}</div>
                </div>

                ${currentProd.map ? `<div class="ct-desc-box" style="padding:15px;"><h2 class="ct-section-title" style="margin:15px;">Bản đồ vị trí</h2>${currentProd.map}</div>` : ''}

                ${relatedHTML}
            `;
        });

        window.changeMainImage = function(src, element) {
            document.getElementById('mainImage').src = src;
            document.querySelectorAll('.ct-thumb').forEach(img => img.classList.remove('active'));
            element.classList.add('active');
        };
    </script>
</body>
</html>
