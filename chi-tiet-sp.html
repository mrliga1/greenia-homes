<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Sản phẩm | Greenia Homes</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/greenia-homes/assets/css/style.css">

    <style>
        body, html { margin: 0; padding: 0; background: #05080f; color: #b0b8c4; font-family: 'Manrope', sans-serif; overflow-x: clip !important;}
        #lux-uni-catalog { background-color: #05080f; color: #b0b8c4; font-family: 'Manrope', sans-serif; padding: 0; width: 100%; box-sizing: border-box; padding-bottom: 50px; overflow: visible !important;}
        #lux-uni-catalog * { box-sizing: border-box; }
        .luc-inner { max-width: 1280px; margin: 0 auto; padding: 0 15px; overflow: visible !important;}
        .luc-clearfix { clear: both; display: block; width: 100%; height: 1px; }
        .luc-spacer { height: 0px; width: 100%; display: block; margin-top: 20px; }
        
        .gr-breadcrumbs { font-size: 14px; color: #888; margin-bottom: 15px; margin-top: 20px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; text-transform: none; font-family: 'Be Vietnam Pro', sans-serif; }
        .gr-breadcrumbs a { text-decoration: none; color: inherit; transition: 0.3s; }
        .gr-breadcrumbs a:hover { color: #c5a059; } 
        .gr-breadcrumbs span.sep { color: #c5a059; font-size: 10px; }
        .gr-breadcrumbs span.current { color: #fff; font-weight: 500; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .v261-intro { display:flex; gap:20px; margin-bottom:40px; align-items:flex-start; margin-top: 20px; padding-top: 0px; overflow: visible !important;}
        .v261-c1 { width:60%; background:#0b1120; border-radius:10px; overflow:hidden; border:1px solid rgba(197,160,89,0.2); display:flex; flex-direction:column; }
        
        .v261-c2 { width:25%; position: -webkit-sticky; position: sticky; top: 90px; z-index: 10; height: max-content; } 
        .v261-c3 { width:15%; position: -webkit-sticky; position: sticky; top: 90px; z-index: 10; height: max-content; }
        
        .v261-box { background:#0b1120; border:1px solid #c5a059; border-radius:10px; padding:20px; text-align:center; height:100%; display:flex; flex-direction:column; justify-content:center; }
        .v261-logo { width:60px; margin:0 auto 10px; display:block; }
        .v261-box h4 { color:#c5a059; font-size:15px; font-weight:700; margin:0 0 15px; text-transform:none; }
        .v261-box ul { padding: 0; margin: 0; list-style: none; }
        .v261-box li { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; line-height: 1.5; font-size: 13px; color: #b0b8c4; text-align: left; }
        .v261-box li::before { content: "\2713"; display: flex; justify-content: center; align-items: center; width: 18px; height: 18px; background: #27ae60; color: #f1c40f; border-radius: 50%; font-weight: bold; font-size: 11px; flex-shrink: 0; margin-top: 2px; }
        .v261-btns { margin-top:20px; display:flex; flex-direction:column; gap:12px; }
        .v261-btn { display: flex; align-items: center; justify-content: center; padding: 10px 20px; border-radius: 50px; text-decoration: none; color: #fff; font-weight: 700; font-size: 14px; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; position: relative; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-transform: uppercase; letter-spacing: 0.5px; }
        .v261-btn img { width: 24px; height: 24px; object-fit: contain; margin-right: 10px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2)); }
        .v261-btn.gr { background: linear-gradient(135deg, #0f9b0f 0%, #00b894 100%); box-shadow: 0 4px 15px rgba(15, 155, 15, 0.4); }
        .v261-btn.bl { background: linear-gradient(135deg, #0068ff 0%, #00a8ff 100%); box-shadow: 0 4px 15px rgba(0, 104, 255, 0.4); }
        .v261-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,255,255,0.15); filter: brightness(1.1); }
        
        .v261-cat { background:#0b1120; border:1px dashed #c5a059; border-radius:10px; height:100%; overflow:hidden; display:flex; flex-direction:column; }
        .v261-cat .h { background:#1a1f2e; padding:10px; font-weight:700; font-size:13px; color:#fff; text-align:center; border-bottom:1px solid #c5a059; }
        .v261-cat .l { overflow-y:auto; flex-grow:1; padding:0; max-height: 400px; }
        .v261-cat a { display:flex; justify-content:space-between; padding:10px; color:#b0b8c4; font-size:12px; text-decoration:none; border-bottom:1px solid #222; }
        .v261-cat a:hover { color:#c5a059; background:#1a1f2e; }
        
        .v261-gallery-container { width: 100%; position: relative; }
        .v261-gal-main-wrapper { position:relative; width:100%; height:450px; background: #000; overflow:hidden; border-bottom:1px solid #333; }
        .v261-gal-main { width:100%; height:100%; display:flex; overflow-x:auto; scroll-behavior:smooth; scroll-snap-type:x mandatory; scrollbar-width: none;}
        .v261-gal-main::-webkit-scrollbar { display: none; }
        .v261-gal-item { min-width:100%; height:100%; flex-shrink:0; scroll-snap-align:center; display:flex; justify-content:center; align-items:center; }
        .v261-gal-item img { width:100%; height:100%; object-fit:contain; cursor:zoom-in; }
        
        .v261-vid-wrap { width:100%; height:100%; position:relative; display:flex; justify-content:center; align-items:center; cursor:pointer; }
        .v261-play-icon { font-size:50px; color:#fff; position:absolute; z-index:5; opacity:0.8; }
        .v261-vid-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); z-index:2; }
        .v261-vid-thumb { width:100%; height:100%; object-fit:cover; }
        
        .v261-nav { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.5); color:#fff; border:none; padding:10px; cursor:pointer; z-index:10; }
        .v261-nav.p { left:5px; } .v261-nav.n { right:5px; }
        .v261-gal-thumbs { display:flex; gap:10px; padding:10px; background:#111; overflow-x:auto; margin-top: 0px; white-space: nowrap; flex-wrap: nowrap; flex-direction: row; }
        .v261-gal-thumbs::-webkit-scrollbar { height: 5px; } .v261-gal-thumbs::-webkit-scrollbar-thumb { background: #333; }
        .v261-thumb-item { width:80px; height:60px; flex-shrink:0; cursor:pointer; border:2px solid transparent; opacity:0.6; position:relative; transition: 0.3s; display: inline-block; }
        .v261-thumb-item.active { border-color:#c5a059; opacity:1; transform: scale(1.05); }
        .v261-thumb-item img { width:100%; height:100%; object-fit:cover; display:block; }
        .v261-th-icon { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#fff; font-size:12px; z-index:2; text-shadow:0 0 2px #000; }
        
        .v261-info-box { padding:10px 20px 10px 20px; }
        .v261-tit { font-size: 28px !important; font-weight: 500; color: #e2e8f0 !important; margin: 0 0 8px; line-height: 1.4; text-transform: none; }
        .v261-addr { font-size:12px; color:#b0b8c4; margin-bottom:0px; font-style:italic; } .v261-addr i { color:#c5a059; margin-right:5px; transform: skewX(-15deg); }
        .v261-meta-line { display:flex; flex-wrap:wrap; align-items:center; gap:20px; border-top:1px solid rgba(255,255,255,0.1); border-bottom:1px solid rgba(255,255,255,0.1); padding:5px 0; margin-bottom:10px; }
        .v261-price { color:#c5a059; font-size:20px; font-weight:800; letter-spacing:-0.5px; }
        .v261-meta-item { color:#e2e8f0; font-size:14px; display:flex; align-items:center; gap:6px; } .v261-meta-item i { color:#94a3b8; }
        .v261-share-group { margin-left:auto; display:flex; gap:10px; }
        .v261-s-btn { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; transition:0.3s; background:rgba(255,255,255,0.1); text-decoration: none;}
        .v261-s-btn.fb:hover { background:#3b5998; } .v261-s-btn.zalo:hover { background:#0068ff; }
        .v261-s-btn img { width:20px; height:20px; object-fit:contain; }
        
        .v261-specs { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; font-size:13px; }
        .v261-specs .r { display:flex; justify-content:space-between; border-bottom:1px solid #222; padding-bottom:0px; }
        .v261-specs .l { color:#888; } .v261-specs .v { color:#fff; font-weight:600; text-align:right; }
        
        .v261-thd { display:flex; border-bottom:1px solid #333; margin-bottom:15px; }
        .v261-tb { padding:10px 15px; cursor:pointer; color:#888; font-weight:600; font-size:13px; border-bottom:2px solid transparent; transition:0.3s; }
        .v261-tb.active { color:#c5a059; border-bottom-color:#c5a059; }
        .v261-pane { height:0; overflow:hidden; visibility:hidden; color:#ccc; font-size:14px; line-height:1.6; }
        .v261-pane.active { height:auto; visibility:visible; }
        .v261-desc-content { line-height: 1.5; color: #b0b8c4; text-align: justify; padding-bottom: 20px;} .v261-desc-content br { display: block; margin-bottom: 5px; content: ""; }
        .v261-desc-content img { max-width: 100%; height: auto; display: block; margin: 15px auto; border-radius: 8px;}
        .v261-map-box { width: 100%; min-height: 450px; background: #1a1f2e; position: relative; } .v261-map-box iframe { width:100% !important; height:100% !important; min-height:450px !important; border:0; display:block !important; }
        
        /* CSS CHO KHỐI XEM THÊM DANH MỤC TRONG BÀI VIẾT */
        .v261-readmore-cat { margin-top: 30px; padding-top: 20px; border-top: 1px dashed rgba(197, 160, 89, 0.3); font-size: 14px; color: #b0b8c4; display: flex; align-items: center; flex-wrap: wrap; gap: 5px;}
        .v261-readmore-cat span { color: #888; margin-right: 5px; }
        .v261-readmore-cat a { color: #c5a059; font-weight: 700; text-decoration: none; transition: 0.3s; display: inline-flex; align-items: center;}
        .v261-readmore-cat a:hover { color: #fff; text-decoration: underline; }
        .v261-readmore-cat .cat-count { font-size: 11px; background: rgba(197, 160, 89, 0.1); padding: 2px 6px; border-radius: 4px; margin-left: 5px; font-weight: normal; color: #c5a059;}

        /* LIGHTBOX CSS */
        .v261-lb-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); backdrop-filter:blur(8px); z-index:99999; display:none; justify-content:center; align-items:center; opacity:0; transition:opacity 0.3s; }
        .v261-lb-content { position:relative; width:90%; height:90%; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .v261-lb-close { position:absolute; top:20px; right:30px; font-size:40px; color:#fff; cursor:pointer; transition:0.3s; z-index:20; width:50px; height:50px; display:flex; align-items:center; justify-content:center; border-radius:50%; background:rgba(255,255,255,0.1); }
        .v261-lb-close:hover { color:#c5a059; background:rgba(255,255,255,0.2); transform:rotate(90deg); }
        .v261-lb-body { width:100%; height:100%; display:flex; justify-content:center; align-items:center; padding:0 60px; }
        .v261-lb-body img { max-width:100%; max-height:90vh; box-shadow:0 0 50px rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1); object-fit:contain;}
        .v261-lb-body video, .v261-lb-body iframe { max-width:90%; max-height:90vh; width:900px; height:506px; border:none; box-shadow:0 0 50px rgba(0,0,0,0.5); }
        .v261-lb-footer { position:absolute; bottom:20px; left:0; right:0; text-align:center; z-index:10; pointer-events:none; }
        .v261-lb-count { display:inline-block; padding:5px 15px; background:rgba(0,0,0,0.5); color:#c5a059; border-radius:20px; font-size:14px; font-weight:700; letter-spacing:1px; border:1px solid #c5a059; }
        .v261-lb-nav { position:absolute; top:50%; transform:translateY(-50%); width:50px; height:50px; border-radius:50%; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15); color:#fff; font-size:18px; cursor:pointer; transition:0.3s; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(5px); z-index:20; }
        .v261-lb-nav:hover { background:rgba(197, 160, 89, 0.2); border-color:#c5a059; color:#c5a059; transform:translateY(-50%) scale(1.1); box-shadow:0 0 15px rgba(197, 160, 89, 0.3); }
        .v261-lb-nav.prev { left:30px; } .v261-lb-nav.next { right:30px; }

        .s-head { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid rgba(35, 45, 69, 1); padding-bottom: 8px; margin-bottom: 15px; margin-top: 40px; }
        .s-tit { font-size: 20px !important; font-weight: 500; color: #fff; text-transform: uppercase; border-left: 4px solid #c5a059; padding-left: 15px; margin: 0; line-height: 1; }
        .gr-carousel-wrapper { position: relative; }
        .gr-carousel { display: flex; overflow-x: auto; gap: 20px; padding-bottom: 10px; scroll-behavior: smooth; scrollbar-width: none;}
        .gr-carousel::-webkit-scrollbar { display: none; }
        .gr-carousel .gr-card { flex: 0 0 calc(20% - 16px); max-width: calc(20% - 16px); }
        
        .gr-card { background: #0b1120; border: 1px solid rgba(197, 160, 89, 0.2); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; height: 100%; transition: 0.3s; text-decoration: none;}
        .gr-card:hover { border-color: #c5a059; transform: translateY(-5px); }
        .gr-thumb-box { height: 200px; position: relative; overflow: hidden; }
        .gr-thumb-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; display: block;}
        .gr-card:hover .gr-thumb-box img { transform: scale(1.1); }
        .gr-body { padding: 15px; flex: 1; display: flex; flex-direction: column; }
        .gr-tag-abs { position: absolute; top: 0 !important; left: 0 !important; padding: 4px 10px; font-size: 10px; font-weight: 700; color: #fff; background: #c5a059; color: #000; z-index: 5; border-bottom-right-radius: 6px; }
        .tag-ban { background: #ff4d4f; color: #fff; } .tag-thue { background: #00b894; color: #fff; }
        .gr-tit { font-size: 13px !important; font-weight: 600; color: #fff; height: 38px; line-height: 1.4 !important; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .gr-card:hover .gr-tit { color: #c5a059; }
        .gr-loc { font-size: 11px; color: #999; margin-bottom: 5px; display: flex; align-items: center; gap: 4px; }
        .gr-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; justify-content: space-between; margin-top: auto; }
        .gr-hl { color: #c5a059; font-weight: 700; font-size: 14px; }
        
        .gr-nav-btn { position: absolute; top: 40%; transform: translateY(-50%); width: 35px; height: 35px; border-radius: 50%; border: 1px solid rgba(35, 45, 69, 1); background: rgba(14, 18, 27, 0.8); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; transition: 0.3s; }
        .gr-nav-btn:hover { background: #c5a059; color: #000; border-color: #c5a059; }
        .gr-prev { left: -15px; } .gr-next { right: -15px; }

        .s1-btn { background: transparent; border: 1px solid #c5a059; color: #c5a059; padding: 8px 25px; font-weight: 700; cursor: pointer; transition: 0.3s; display: inline-block; font-size: 12px; text-decoration: none;}
        .s1-btn:hover { background: rgba(197, 160, 89, 0.15); color: #c5a059;}
        .s2-footer { text-align: center; margin-top: 20px; border-top: 1px dashed rgba(35,45,69,1); padding-top: 15px; }

        @media (max-width: 1024px) { .v261-intro { flex-wrap: wrap; } .v261-c1 { width: 100%; margin-bottom: 20px; } .v261-c2 { width: 58%; } .v261-c3 { width: 38%; } }
        @media (max-width: 767px) { 
            .v261-intro { flex-direction: column; } 
            /* GỠ STICKY TRÊN ĐIỆN THOẠI CHO CỘT TƯ VẤN & DANH MỤC */
            .v261-c1, .v261-c2, .v261-c3 { width: 100%; position: relative !important; top: 0 !important;} 
            .v261-specs { grid-template-columns: 1fr 1fr; } 
            .v261-lb-nav { width:40px; height:40px; font-size:16px; } .v261-lb-nav.prev { left:10px; } .v261-lb-nav.next { right:10px; } .v261-lb-close { right:10px; top:10px; } .v261-lb-body { padding:0; }
            .gr-carousel .gr-card { flex: 0 0 100% !important; max-width: 100% !important; }
            .gr-nav-btn { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="site-header"></div>
    <div id="sub-menu" class="sub-header"></div>

    <div id="lux-uni-catalog">
        <div class="luc-inner" id="sp-container">
            <div style="text-align:center; padding: 100px 0; color: #c5a059;">
                <i class="fas fa-circle-notch fa-spin fa-3x"></i>
                <p>Đang tải dữ liệu sản phẩm...</p>
            </div>
        </div>
    </div>

    <div id="v261-lb" class="v261-lb-overlay">
        <div class="v261-lb-content">
            <span class="v261-lb-close" onclick="v261CloseLB()">×</span>
            <div class="v261-lb-body" id="v261-lb-body"></div>
            <div class="v261-lb-footer"><span id="v261-lb-counter" class="v261-lb-count">1 / 1</span></div>
        </div>
        <button class="v261-lb-nav prev" onclick="v261LBSlide(-1)"><i class="fas fa-chevron-left"></i></button>
        <button class="v261-lb-nav next" onclick="v261LBSlide(1)"><i class="fas fa-chevron-right"></i></button>
    </div>

    <div id="site-footer"></div>
    
    <script src="/greenia-homes/assets/js/ui.js"></script>

    <script>
        window.GREENIA_CURRENT_PRODUCT = null;
        const safeBaseUrl = (typeof BASE_URL !== 'undefined') ? BASE_URL : '/greenia-homes/';
        
        const u_logo = 'https://mrliga1.github.io/greenia-homes/assets/images/logo.png'; 
        const zalo_img = 'https://cdn.haitrieu.com/wp-content/uploads/2022/01/Logo-Zalo-Arc.png';
        const phone_img = 'https://upload.wikimedia.org/wikipedia/commons/6/6c/Phone_icon.png'; 
        
        let mediaList = [];
        let currentIdx = 0;
        let isScrolling = false;
        let autoPlayInterval;
        let allProducts = [];
        let allPosts = [];
        let allCategories = [];

        function createSafeSlug(title) {
            if(!title) return 'san-pham';
            return String(title).toLowerCase().trim().replace(/\s+/g, '-').replace(/[áàảãạâấầẩẫậăắằẳẵặ]/g, 'a').replace(/[éèẻẽẹêếềểễệ]/g, 'e').replace(/[íìỉĩị]/g, 'i').replace(/[óòỏõọôốồổỗộơớờởỡợ]/g, 'o').replace(/[úùủũụưứừửữự]/g, 'u').replace(/[ýỳỷỹỵ]/g, 'y').replace(/đ/g, 'd').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-');
        }
        
        function beautifyCatName(slug) {
            if (!slug) return '';
            const words = String(slug).split('-');
            const map = {'ban':'Bán', 'cho':'Cho', 'thue':'Thuê', 'chuyen':'Chuyển', 'nhuong':'Nhượng', 'nha':'Nhà', 'pho':'Phố', 'can':'Căn', 'ho':'Hộ', 'du':'Dự', 'an':'Án', 'quan':'Quận'};
            return words.map(w => map[w.toLowerCase()] || (w.charAt(0).toUpperCase() + w.slice(1))).join(' ');
        }

        function isCatMatch(pData, targetCat) {
            if (!targetCat || targetCat === '') return true;
            const targetSlug = createSafeSlug(targetCat);
            
            if ((targetSlug === 'ban' || targetSlug === 'chuyen-nhuong' || targetSlug === 'dang-ban') && pData.type === 'Bán') return true;
            if ((targetSlug === 'cho-thue' || targetSlug === 'thue') && pData.type === 'Thuê') return true;

            let catsArray = [];
            if (Array.isArray(pData.cat)) catsArray = pData.cat;
            else if (typeof pData.cat === 'string') catsArray = pData.cat.split(',');
            else if (Array.isArray(pData.categories)) catsArray = pData.categories;
            else if (typeof pData.categories === 'string') catsArray = pData.categories.split(',');

            return catsArray.some(c => createSafeSlug(c) === targetSlug);
        }

        function renderCardHTML(p) {
            const pCat = p.cat ? String(p.cat) : 'san-pham';
            const pTitle = p.title ? String(p.title) : 'Sản phẩm';
            const catSlug = createSafeSlug(pCat);
            const pSlug = p.slug || createSafeSlug(pTitle);
            const tagClass = p.type === 'Bán' ? 'tag-ban' : 'tag-thue';
            const tagName = p.type === 'Bán' ? 'Đang bán' : 'Cho thuê';
            const imgUrl = window.resolveImg ? window.resolveImg(p.img) : (p.img || '');
            const link = `${safeBaseUrl}san-pham/${catSlug}/${pSlug}/`;
            
            const locStr = p.loc ? String(p.loc) : '';
            const locHtml = locStr ? `<div class="gr-loc"><i class="fas fa-map-marker-alt"></i> ${locStr.substring(0,40)}...</div>` : '';
            const areaHtml = p.area ? `<span class="gr-hl" style="font-size:12px;font-weight:400;">${p.area} m²</span>` : '';
            const bedHtml = p.bed ? `<span style="color:#444;">|</span> <span class="gr-hl" style="font-size:12px;font-weight:400;">${p.bed} PN</span>` : '';

            return `
            <a href="${link}" class="gr-card">
                <div class="gr-thumb-box">
                    <span class="gr-tag-abs ${tagClass}">${tagName}</span>
                    <img src="${imgUrl}" onerror="this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=500';">
                </div>
                <div class="gr-body">
                    <h3 class="gr-tit">${pTitle}</h3>
                    ${locHtml}
                    <div class="gr-meta">
                        <span class="gr-hl">${p.price || 'Liên hệ'}</span>
                        <div style="display:flex; gap:10px;">${areaHtml}${bedHtml}</div>
                    </div>
                </div>
            </a>`;
        }

        document.addEventListener("DOMContentLoaded", async function() {
            const container = document.getElementById('sp-container');
            const prod = window.GREENIA_CURRENT_PRODUCT; 

            if (!prod) { window.location.replace(safeBaseUrl + 'san-pham.html'); return; }

            try {
                const [prodRes, catRes] = await Promise.all([
                    fetch(safeBaseUrl + 'assets/data/products.json').catch(() => null),
                    fetch(safeBaseUrl + 'assets/data/categories.json').catch(() => null)
                ]);
                
                if(prodRes && prodRes.ok) {
                    const prodsData = await prodRes.json();
                    allProducts = Array.isArray(prodsData) ? prodsData.reverse() : [];
                }
                
                if(catRes && catRes.ok) {
                    allCategories = await catRes.json();
                }

                // 1. TẠO MEDIA LIST (Gallery)
                mediaList = [];
                if(prod.video) mediaList.push({type: 'video', url: prod.video, thumb: 'https://via.placeholder.com/800x450?text=Video+Preview'});
                if(prod.img) mediaList.push({type: 'image', url: window.resolveImg ? window.resolveImg(prod.img) : prod.img});
                if(prod.gallery && Array.isArray(prod.gallery)) {
                    prod.gallery.forEach(g => { mediaList.push({type: 'image', url: window.resolveImg ? window.resolveImg(g) : g}); });
                }
                if(mediaList.length === 0) mediaList.push({type: 'image', url: 'https://via.placeholder.com/800x450?text=No+Image'});

                // XÁC ĐỊNH DANH MỤC HIỆN TẠI TỪ URL
                let activeCatSlug = '';
                const paths = window.location.pathname.split('/').filter(Boolean);
                if (paths.length >= 3 && paths[paths.length - 3] === 'san-pham') {
                    activeCatSlug = createSafeSlug(paths[paths.length - 2]);
                } else if (prod.cat) {
                    activeCatSlug = createSafeSlug(prod.cat);
                }
                
                // NẾU TÌM ĐƯỢC DANH MỤC, TÍNH TOÁN SỐ LƯỢNG ĐỂ IN KHỐI "XEM THÊM"
                let readmoreCatHTML = '';
                if (activeCatSlug !== '') {
                    let catNameForReadmore = beautifyCatName(activeCatSlug);
                    if (allCategories && allCategories.length > 0) {
                        const matchedCat = allCategories.find(c => createSafeSlug(c.slug || c.name) === activeCatSlug);
                        if (matchedCat) catNameForReadmore = matchedCat.name || catNameForReadmore;
                    }
                    
                    // Lọc những sản phẩm cùng danh mục và đếm (Loại trừ sản phẩm hiện tại)
                    let relatedCount = allProducts.filter(p => isCatMatch(p, activeCatSlug) && p.id !== prod.id).length;
                    
                    if (relatedCount > 0) {
                        readmoreCatHTML = `
                        <div class="v261-readmore-cat">
                            <span>Xem thêm: </span>
                            <a href="${safeBaseUrl}san-pham/${activeCatSlug}/">${catNameForReadmore} <span class="cat-count">${relatedCount} sản phẩm</span></a>
                        </div>`;
                    }
                }

                // 2. DANH MỤC Ở CỘT PHẢI
                let countBan = 0, countThue = 0;
                let otherCats = {};
                
                // TRACKING THÔNG MINH BẰNG LOCALSTORAGE
                let viewedHistory = JSON.parse(localStorage.getItem('greenia_smart_history')) || { cats: [], ids: [] };
                if (prod) {
                    if (prod.id && !viewedHistory.ids.includes(prod.id)) {
                        viewedHistory.ids.unshift(prod.id);
                        if (viewedHistory.ids.length > 30) viewedHistory.ids.pop();
                    }
                    let prodCats = [];
                    if (Array.isArray(prod.cat)) prodCats = prod.cat;
                    else if (typeof prod.cat === 'string') prodCats = prod.cat.split(',');
                    
                    prodCats.forEach(c => {
                        let cleanSlug = createSafeSlug(c);
                        if (cleanSlug && cleanSlug !== 'ban' && cleanSlug !== 'cho-thue' && cleanSlug !== 'chuyen-nhuong') {
                            viewedHistory.cats = viewedHistory.cats.filter(existing => existing !== cleanSlug);
                            viewedHistory.cats.unshift(cleanSlug);
                        }
                    });
                    if (viewedHistory.cats.length > 5) viewedHistory.cats = viewedHistory.cats.slice(0, 5);
                    localStorage.setItem('greenia_smart_history', JSON.stringify(viewedHistory));
                }

                let rightSidebarCatHTML = `<a href="${safeBaseUrl}san-pham.html" style="font-weight: 700; color: #c5a059; background: rgba(197, 160, 89, 0.08); border-bottom: 1px solid rgba(197, 160, 89, 0.4); display:flex; justify-content:space-between; padding:10px; text-decoration:none;"><span>Tất cả danh mục</span></a>`;
                
                allProducts.forEach(p => {
                    if(p.type === 'Bán') countBan++;
                    else if(p.type === 'Thuê') countThue++;
                });

                if(countBan > 0) rightSidebarCatHTML += `<a href="${safeBaseUrl}san-pham/chuyen-nhuong/" style="padding-left: 20px; display:flex; justify-content:space-between; padding:10px 10px 10px 20px; color:#b0b8c4; text-decoration:none; border-bottom:1px solid #222;"><span>Chuyển nhượng</span><span style="color:#666; font-size:11px;">(${countBan})</span></a>`;
                if(countThue > 0) rightSidebarCatHTML += `<a href="${safeBaseUrl}san-pham/cho-thue/" style="padding-left: 20px; display:flex; justify-content:space-between; padding:10px 10px 10px 20px; color:#b0b8c4; text-decoration:none; border-bottom:1px solid #222;"><span>Cho thuê</span><span style="color:#666; font-size:11px;">(${countThue})</span></a>`;
                
                if (allCategories && allCategories.length > 0) {
                    allCategories.forEach(c => {
                        let catSlug = createSafeSlug(c.slug || c.name);
                        if (catSlug !== 'ban' && catSlug !== 'cho-thue' && catSlug !== 'chuyen-nhuong') {
                            let count = allProducts.filter(p => isCatMatch(p, catSlug)).length;
                            if (count > 0 || c.showEmpty) {
                                rightSidebarCatHTML += `<a href="${safeBaseUrl}san-pham/${catSlug}/" style="padding-left: 20px; display:flex; justify-content:space-between; padding:10px 10px 10px 20px; color:#b0b8c4; text-decoration:none; border-bottom:1px solid #222;"><span>${beautifyCatName(c.name || c.slug)}</span><span style="color:#666; font-size:11px;">(${count})</span></a>`;
                            }
                        }
                    });
                }

                // 3. CAROUSEL GỢI Ý CÙNG CHUYÊN MỤC (THÔNG MINH)
                let smartRecommended = [];
                if (viewedHistory.cats.length > 0) {
                    let matchedByCat = allProducts.filter(p => {
                        if (p.id === prod.id) return false; 
                        let pCats = Array.isArray(p.cat) ? p.cat : (typeof p.cat === 'string' ? p.cat.split(',') : []);
                        return pCats.some(c => viewedHistory.cats.includes(createSafeSlug(c)));
                    });
                    matchedByCat = matchedByCat.sort(() => 0.5 - Math.random());
                    smartRecommended = matchedByCat.slice(0, 10);
                }
                
                if (smartRecommended.length < 10) {
                    let fallbackProds = allProducts.filter(p => {
                        if (p.id === prod.id) return false;
                        return !smartRecommended.some(sp => sp.id === p.id);
                    }).sort(() => 0.5 - Math.random()).slice(0, 10 - smartRecommended.length);
                    smartRecommended = [...smartRecommended, ...fallbackProds];
                }

                let relatedHTML = '';
                if(smartRecommended.length > 0) {
                    relatedHTML = `
                    <div class="s-head"><h2 class="s-tit">Bất động sản dành cho bạn</h2></div>
                    <div class="gr-carousel-wrapper">
                        <button class="gr-nav-btn gr-prev" onclick="grScroll(-1, 'related-scroll')"><i class="fas fa-chevron-left"></i></button>
                        <div id="related-scroll" class="gr-carousel">
                            ${smartRecommended.map(p => renderCardHTML(p)).join('')}
                        </div>
                        <button class="gr-nav-btn gr-next" onclick="grScroll(1, 'related-scroll')"><i class="fas fa-chevron-right"></i></button>
                    </div>`;
                }

                // 4. MAP
                let mapHTML = '<div style="padding:20px;text-align:center;color:#888;">Đang cập nhật vị trí.</div>';
                if(prod.map) {
                    if(prod.map.includes('<iframe')) mapHTML = prod.map;
                    else mapHTML = `<iframe width="100%" height="450" frameborder="0" style="border:0" src="${prod.map}"></iframe>`;
                }

                const catSlug = createSafeSlug(prod.cat);
                const shareLink = encodeURIComponent(window.location.href);
                const contentStr = prod.content ? String(prod.content) : '';

                // ================= BƠM TOÀN BỘ GIAO DIỆN VÀO =================
                container.innerHTML = `
                    <div class="gr-breadcrumbs">
                        <a href="${safeBaseUrl}">Trang chủ</a> <span class="sep">&gt;</span>
                        <a href="${safeBaseUrl}san-pham.html">Sản phẩm</a> <span class="sep">&gt;</span>
                        <a href="${safeBaseUrl}san-pham/${catSlug}/">${beautifyCatName(prod.cat) || 'Khác'}</a> <span class="sep">&gt;</span>
                        <span class="current">${prod.title}</span>
                    </div>

                    <div id="luc-intro-section" class="v261-intro">
                        <div class="v261-c1">
                            <div class="v261-gallery-container">
                                <div class="v261-gal-main-wrapper">
                                    <div class="v261-gal-main" id="gal-main">
                                        ${mediaList.map((item, k) => `
                                            <div class="v261-gal-item" data-index="${k}">
                                                ${item.type === 'video' ? 
                                                    `<div class="v261-vid-wrap" onclick="v261OpenLB(${k})"><i class="fas fa-play-circle v261-play-icon"></i><div class="v261-vid-overlay"></div><img src="${item.thumb}" class="v261-vid-thumb"></div>` : 
                                                    `<img src="${item.url}" onclick="v261OpenLB(${k})">`
                                                }
                                            </div>
                                        `).join('')}
                                    </div>
                                    <button class="v261-nav p" onclick="v261Slide(-1)"><i class="fas fa-chevron-left"></i></button>
                                    <button class="v261-nav n" onclick="v261Slide(1)"><i class="fas fa-chevron-right"></i></button>
                                </div>
                                <div class="v261-gal-thumbs" id="gal-thumbs">
                                    ${mediaList.map((item, k) => `
                                        <div class="v261-thumb-item ${k === 0 ? 'active' : ''}" onclick="v261GoTo(${k})">
                                            ${item.type === 'video' ? `<i class="fas fa-video v261-th-icon"></i><img src="${item.thumb}">` : `<img src="${item.url}">`}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            <div class="v261-info-box">
                                <h1 class="v261-tit">${prod.title}</h1>
                                ${prod.loc ? `<div class="v261-addr"><i class="fas fa-map-marker-alt"></i> ${prod.loc}</div>` : ''}
                                <div class="v261-meta-line">
                                    <span class="v261-price">${prod.price || 'Liên hệ'}</span>
                                    ${prod.area ? `<span class="v261-meta-item"><i class="fas fa-expand"></i> ${prod.area} m²</span>` : ''}
                                    ${prod.bed ? `<span class="v261-meta-item"><i class="fas fa-bed"></i> ${prod.bed} PN</span>` : ''}
                                    <div class="v261-share-group">
                                        <a href="https://www.facebook.com/sharer/sharer.php?u=${shareLink}" target="_blank" class="v261-s-btn fb"><i class="fab fa-facebook-f"></i></a>
                                        <a href="https://zalo.me/share/?url=${shareLink}" target="_blank" class="v261-s-btn zalo"><img src="${zalo_img}" referrerpolicy="no-referrer"></a>
                                    </div>
                                </div>
                                
                                <div class="v261-specs">
                                    <div class="r"><span class="l">Mức giá:</span><span class="v">${prod.price || 'Liên hệ'}</span></div>
                                    <div class="r"><span class="l">Diện tích:</span><span class="v">${prod.area || '--'} m²</span></div>
                                    <div class="r"><span class="l">Hướng nhà:</span><span class="v">${prod.dir || '--'}</span></div>
                                    <div class="r"><span class="l">Số tầng:</span><span class="v">${prod.floor || '--'}</span></div>
                                    <div class="r"><span class="l">Phòng ngủ:</span><span class="v">${prod.bed || '--'} PN</span></div>
                                    <div class="r"><span class="l">WC:</span><span class="v">${prod.wc || '--'}</span></div>
                                    <div class="r"><span class="l">Mặt tiền:</span><span class="v">${prod.front || '--'} m</span></div>
                                    <div class="r"><span class="l">Pháp lý:</span><span class="v">${prod.legal || '--'}</span></div>
                                </div>

                                <div class="v261-tabs">
                                    <div class="v261-thd">
                                        <div class="v261-tb active" onclick="v261Tab('desc',this)">Thông tin chi tiết</div>
                                        <div class="v261-tb" onclick="v261Tab('map',this)">Vị trí</div>
                                    </div>
                                    <div class="v261-tbd">
                                        <div id="v261-desc" class="v261-pane active">
                                            <div class="v261-desc-content">
                                                ${contentStr ? contentStr.replace(/\n/g, '<br>') : 'Đang cập nhật mô tả.'}
                                            </div>
                                            ${readmoreCatHTML}
                                        </div>
                                        <div id="v261-map" class="v261-pane"><div class="v261-map-box">${mapHTML}</div></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="v261-c2">
                            <div class="v261-box">
                                <a href="${safeBaseUrl}"><img src="${u_logo}" class="v261-logo" onerror="this.style.display='none'"></a>
                                <h4>Tư vấn mua nhà chuyên sâu</h4>
                                <ul><li>Phân tích quỹ căn, chính sách, tiện ích giúp Khách hàng lựa chọn căn tốt nhất.</li><li>Giải đáp mọi thắc mắc của khách hàng.</li><li>Tuyệt đối bảo mật thông tin cá nhân.</li></ul>
                                <div class="v261-btns">
                                    <a href="tel:0932966700" class="v261-btn gr"><img src="${phone_img}"> 0932 966 700</a>
                                    <a href="https://zalo.me/0932966700" target="_blank" class="v261-btn bl"><img src="${zalo_img}" referrerpolicy="no-referrer"> Chat Zalo</a>
                                </div>
                            </div>
                        </div>

                        <div class="v261-c3">
                            <div class="v261-cat">
                                <div class="h">DANH MỤC SẢN PHẨM</div>
                                <div class="l">${rightSidebarCatHTML}</div>
                            </div>
                        </div>
                    </div>

                    ${relatedHTML}
                `;

                // KÍCH HOẠT GALLERY LOGIC JS
                setTimeout(initGallery, 300);

            } catch (e) {
                document.getElementById('sp-container').innerHTML = "<div style='text-align:center; padding:50px; color:#ff4d4f;'>Không tải được thông tin sản phẩm.</div>";
            }
        });

        // ================= GALLERY SCRIPT CHUẨN =================
        function initGallery() {
            const galMain = document.getElementById('gal-main');
            if(!galMain) return;

            galMain.addEventListener('scroll', function() {
                if (!isScrolling) {
                    window.requestAnimationFrame(function() {
                        const w = galMain.clientWidth;
                        const newIdx = Math.round(galMain.scrollLeft / w);
                        if (newIdx !== currentIdx && newIdx >= 0 && newIdx < mediaList.length) {
                            updateActiveThumb(newIdx);
                        }
                        isScrolling = false;
                    });
                    isScrolling = true;
                }
            });

            startAutoPlay();
            const galContainer = document.querySelector('.v261-gallery-container');
            if(galContainer) {
                galContainer.addEventListener('mouseenter', stopAutoPlay);
                galContainer.addEventListener('mouseleave', startAutoPlay);
            }
        }

        function startAutoPlay() {
            stopAutoPlay();
            autoPlayInterval = setInterval(() => {
                let nextIdx = currentIdx + 1;
                if (nextIdx >= mediaList.length) nextIdx = 0;
                v261GoTo(nextIdx); 
            }, 4000); 
        }

        function stopAutoPlay() { if (autoPlayInterval) clearInterval(autoPlayInterval); }

        window.v261Move = function(d) {
            const galMain = document.getElementById('gal-main');
            if(!galMain) return;
            const w = galMain.clientWidth;
            galMain.scrollBy({left: w * d, behavior:'smooth'});
        };
        
        window.v261Slide = function(d) { v261Move(d); };

        window.v261GoTo = function(i) {
            const galMain = document.getElementById('gal-main');
            if(!galMain) return;
            const w = galMain.clientWidth;
            galMain.scrollTo({left: w * i, behavior:'smooth'});
        };

        function updateActiveThumb(i) {
            currentIdx = i;
            const thumbsContainer = document.getElementById('gal-thumbs');
            const thumbs = thumbsContainer.querySelectorAll('.v261-thumb-item');
            if(!thumbs.length) return;

            thumbs.forEach((el, idx) => {
                if(idx === i) {
                    el.classList.add('active');
                    const leftPos = el.offsetLeft - (thumbsContainer.clientWidth / 2) + (el.clientWidth / 2);
                    thumbsContainer.scrollTo({ left: leftPos, behavior: 'smooth' });
                } else { el.classList.remove('active'); }
            });
        }

        // ================= LIGHTBOX SCRIPT CHUẨN =================
        window.v261OpenLB = function(i) {
            const lb = document.getElementById('v261-lb');
            currentIdx = i;
            renderLBContent();
            lb.style.display = 'flex';
            setTimeout(() => { lb.style.opacity = '1'; }, 10);
            document.addEventListener('keydown', lbKeyHandler);
            stopAutoPlay();
        };

        window.v261CloseLB = function() {
            const lb = document.getElementById('v261-lb');
            const lbBody = document.getElementById('v261-lb-body');
            lb.style.opacity = '0';
            setTimeout(() => { lb.style.display = 'none'; lbBody.innerHTML = ''; }, 300);
            document.removeEventListener('keydown', lbKeyHandler);
            startAutoPlay();
        };

        window.v261LBSlide = function(d) {
            currentIdx += d;
            if(currentIdx < 0) currentIdx = mediaList.length - 1;
            if(currentIdx >= mediaList.length) currentIdx = 0;
            renderLBContent();
        };

        function lbKeyHandler(e) {
            if(e.key === "Escape") v261CloseLB();
            if(e.key === "ArrowLeft") v261LBSlide(-1);
            if(e.key === "ArrowRight") v261LBSlide(1);
        }

        function renderLBContent() {
            const lbBody = document.getElementById('v261-lb-body');
            const lbCount = document.getElementById('v261-lb-counter');
            const item = mediaList[currentIdx];
            let html = '';
            if(item.type === 'video') {
                 if(item.url.indexOf('<iframe') !== -1) html = item.url;
                 else html = '<video controls autoplay src="'+item.url+'"></video>';
            } else { html = '<img src="'+item.url+'">'; }
            lbBody.innerHTML = html;
            lbCount.innerText = (currentIdx + 1) + ' / ' + mediaList.length;
        }

        // ================= TABS SCRIPT CHUẨN =================
        window.v261Tab = function(k, b) {
            document.querySelectorAll('.v261-tb').forEach(x=>x.classList.remove('active'));
            b.classList.add('active');
            document.querySelectorAll('.v261-pane').forEach(x=>x.classList.remove('active'));
            document.getElementById('v261-'+k).classList.add('active');
        };

        // CAROUSEL VUỐT NGANG
        window.grScroll = function(dir, id) { const el = document.getElementById(id); if(el) { const item = el.querySelector('.gr-card'); if(item) { const w = item.offsetWidth + 20; el.scrollBy({left: w * dir, behavior: 'smooth'}); } } }

    </script>
</body>
</html>
