<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bán nhà</title>
    <link rel="shortcut icon" href="/greenia-homes/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/greenia-homes/apple-touch-icon.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/css/style.css">
    <style>
        body { background-color: #05080f; color: #b0b8c4; font-family: 'Manrope', sans-serif; margin: 0; padding: 0; }
        .ct-container { max-width: 1200px; margin: 40px auto; padding: 0 15px; padding-bottom: 60px; }
        .ct-breadcrumb { font-size: 13px; color: #888; margin-bottom: 20px; }
        .ct-breadcrumb a { color: #888; text-decoration: none; transition: 0.3s; }
        .ct-breadcrumb a:hover { color: #c5a059; }
        .ct-title-box { border-bottom: 1px dashed rgba(197, 160, 89, 0.3); padding-bottom: 20px; margin-bottom: 30px; }
        .ct-title { font-size: 32px; color: #c5a059; margin: 0 0 10px; font-weight: 700; line-height: 1.3; }
        .ct-loc { font-size: 14px; } .ct-loc i { color: #c5a059; margin-right: 5px; }

        .ct-main-split { display: flex; gap: 30px; margin-bottom: 40px; }
        .ct-gallery-col { width: 65%; } .ct-info-col { width: 35%; }
        .ct-main-img { width: 100%; height: 500px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(197, 160, 89, 0.2); margin-bottom: 15px; }
        .ct-thumb-list { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .ct-thumb { width: 100px; height: 75px; object-fit: cover; border-radius: 4px; cursor: pointer; border: 2px solid transparent; opacity: 0.6; }
        .ct-thumb.active { opacity: 1; border-color: #c5a059; }

        .ct-price-box { background: rgba(197, 160, 89, 0.1); border: 1px solid #c5a059; border-radius: 8px; padding: 25px; text-align: center; margin-bottom: 20px; }
        .ct-price { font-size: 36px; color: #fff; font-weight: 800; margin: 0; }
        .ct-type-tag { display: inline-block; background: #c5a059; color: #000; font-size: 13px; font-weight: 700; padding: 5px 15px; border-radius: 20px; text-transform: uppercase; margin-bottom: 10px;}
        
        .ct-specs { background: #0b1120; border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .ct-spec-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed rgba(255,255,255,0.05); font-size: 15px; }
        .ct-spec-item:last-child { border: none; }
        .ct-spec-item span:first-child { color: #888; } .ct-spec-item span:last-child { color: #fff; font-weight: 600; }

        .ct-contact-btn { display: block; width: 100%; background: linear-gradient(135deg, #c5a059 0%, #d4af37 100%); color: #000; text-align: center; padding: 16px; font-size: 16px; font-weight: 700; text-decoration: none; border-radius: 4px; text-transform: uppercase; }
        .ct-desc-box { background: #0b1120; border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 30px; margin-bottom: 40px; }
        .ct-section-title { font-size: 22px; font-weight: 700; color: #fff; margin: 0 0 20px; padding-bottom: 10px; border-bottom: 2px solid #c5a059; display: inline-block; text-transform: uppercase;}

        @media (max-width: 900px) { .ct-main-split { flex-direction: column; } .ct-gallery-col, .ct-info-col { width: 100%; } .ct-main-img { height: 350px; } }
    </style>
    <link rel="canonical" href="https://mrliga1.github.io/greenia-homes/san-pham/nha-pho-quan-2/ban-nha/" />
    <script type="application/ld+json">
{
  "@context": "https://schema.org/",
  "@type": "Product",
  "name": "bán nhà",
  "image": "https://mrliga1.github.io/greenia-homes/bai-viet/kiem-tra-dang-bai-viet/",
  "description": "...",
  "offers": {
    "@type": "Offer",
    "url": "https://mrliga1.github.io/greenia-homes/san-pham/nha-pho-quan-2/ban-nha/",
    "priceCurrency": "VND",
    "price": "0",
    "availability": "https://schema.org/InStock"
  }
}
</script>
</head>
<body>
    <div id="site-header"></div>
    <div id="sub-menu" class="sub-header"></div>

    <main class="ct-container" id="product-container">
        <div style="text-align:center; padding: 150px 0; color: #c5a059;"><i class="fas fa-circle-notch fa-spin fa-3x"></i><p>Đang tải dữ liệu...</p></div>
    </main>

    <div id="site-footer"></div>
    
    <script src="../../../assets/js/ui.js"></script>

    <script>
        window.GREENIA_CURRENT_PRODUCT = {"id":10,"type":"Bán","title":"bán nhà","slug":"ban-nha","cat":"nha-pho-quan-2","projectCode":"the-global-city","loc":"an phú","price":"10 tỷ","area":"100 m2","bed":"","img":"https://mrliga1.github.io/greenia-homes/bai-viet/kiem-tra-dang-bai-viet/","gallery":["https://mrliga1.github.io/greenia-homes/bai-viet/kiem-tra-dang-bai-viet/"],"content":"","seoTitle":"bán nhà","seoDesc":"...","seoKeywords":"nha-pho-quan-2, bất động sản"};

        // Hàm tạo đường dẫn (slug) an toàn
        function createSafeSlug(title) {
            if(!title) return 'san-pham';
            return title.toString().toLowerCase().trim().replace(/\s+/g, '-').replace(/[áàảãạâấầẩẫậăắằẳẵặ]/g, 'a').replace(/[éèẻẽẹêếềểễệ]/g, 'e').replace(/[íìỉĩị]/g, 'i').replace(/[óòỏõọôốồổỗộơớờởỡợ]/g, 'o').replace(/[úùủũụưứừửữự]/g, 'u').replace(/[ýỳỷỹỵ]/g, 'y').replace(/đ/g, 'd').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-');
        }

        document.addEventListener("DOMContentLoaded", async function() {
            const container = document.getElementById('product-container');
            const prod = window.GREENIA_CURRENT_PRODUCT;
            
            // CƠ CHẾ CHUYỂN HƯỚNG THÔNG MINH
            if (!prod) { 
                const safeBaseUrl = (typeof BASE_URL !== 'undefined') ? BASE_URL : '/greenia-homes/';
                window.location.replace(safeBaseUrl + 'san-pham.html'); 
                return; 
            }

            let galleryHTML = `<img src="${window.resolveImg(prod.img)}" class="ct-thumb active" onclick="changeMainImage('${window.resolveImg(prod.img)}', this)">`;
            if (prod.gallery) prod.gallery.forEach(img => {
                galleryHTML += `<img src="${window.resolveImg(img)}" class="ct-thumb" onclick="changeMainImage('${window.resolveImg(img)}', this)">`;
            });

            // 🔥 Tự động tạo slug để trỏ về đúng thư mục danh mục
            const catSlug = createSafeSlug(prod.cat || 'san-pham');

            container.innerHTML = `
                <div class="ct-breadcrumb"><a href="../../../index.html">Trang chủ</a> / <a href="../../../san-pham.html">Sản phẩm</a> / <a href="../../../${catSlug}/">${prod.cat}</a></div>
                <div class="ct-title-box"><h1 class="ct-title">${prod.title}</h1><div class="ct-loc"><i class="fas fa-map-marker-alt"></i> ${prod.loc}</div></div>
                <div class="ct-main-split">
                    <div class="ct-gallery-col">
                        <img src="${window.resolveImg(prod.img)}" id="mainImage" class="ct-main-img">
                        <div class="ct-thumb-list">${galleryHTML}</div>
                    </div>
                    <div class="ct-info-col">
                        <div class="ct-price-box"><span class="ct-type-tag">${prod.type}</span><h2 class="ct-price">${prod.price}</h2></div>
                        <div class="ct-specs">
                            <h3 style="color:#c5a059; font-size:16px; margin-top:0;">THÔNG SỐ KỸ THUẬT</h3>
                            <div class="ct-spec-item"><span>Diện tích</span><span>${prod.area} m²</span></div>
                            ${prod.bed ? `<div class="ct-spec-item"><span>Phòng ngủ</span><span>${prod.bed} PN</span></div>` : ''}
                        </div>
                        <a href="tel:0932966700" class="ct-contact-btn">GỌI TƯ VẤN NGAY</a>
                    </div>
                </div>
                <div class="ct-desc-box"><h2 class="ct-section-title">Thông tin chi tiết</h2><div class="ct-desc-content">${prod.content || 'Đang cập nhật...'}</div></div>
            `;
        });
        window.changeMainImage = (src, el) => { document.getElementById('mainImage').src = src; document.querySelectorAll('.ct-thumb').forEach(t => t.classList.remove('active')); el.classList.add('active'); };
    </script>
</body>
</html>
