        // ================= JS CHO LỌC & TAB CHUYỂN ĐỔI =================
        function initFilterLogic() {
            const tabs = document.querySelectorAll("#luc-tabs-container .luc-nav-item:not(.luc-dd-trigger)");
            const introSection = document.getElementById('luc-intro-section');
            const gridContainer = document.getElementById('luc-grid-main-container');
            const ddGroup = document.getElementById("luc-cat-dropdown-group");
            const statusDiv = document.getElementById('luc-search-status');
            const searchForm = document.getElementById('luc-search-form');
            const keywordInput = document.getElementById('luc-keyword');

            function toggleView(view) {
                if (view === 'intro') {
                    introSection.style.display = 'flex'; gridContainer.style.display = 'none'; statusDiv.style.display = 'none';
                } else {
                    introSection.style.display = 'none'; gridContainer.style.display = 'block';
                }
            }

            function runFilter(append = false) {
                toggleView('grid');
                if(!append) currentPage = 1;
                
                filteredData = allProducts.filter(p => {
                    let matchType = filterState.type === '' || p.type === filterState.type;
                    let matchCat = filterState.cat === '' || p.cat === filterState.cat;
                    let matchKeyword = true;
                    if(filterState.keyword !== '') {
                        const kw = filterState.keyword.toLowerCase();
                        matchKeyword = (p.title && String(p.title).toLowerCase().includes(kw)) || (p.loc && String(p.loc).toLowerCase().includes(kw)) || (p.cat && String(p.cat).toLowerCase().includes(kw));
                    }
                    return matchType && matchCat && matchKeyword;
                });

                if(filterState.keyword !== '') {
                    statusDiv.style.display = 'flex';
                    statusDiv.innerHTML = `Tìm thấy <strong>${filteredData.length}</strong> kết quả cho: "<strong>${filterState.keyword}</strong>" <span class='luc-clear-search' onclick='clearLucSearch()'>Xóa</span>`;
                } else { statusDiv.style.display = 'none'; }

                const paginatedData = filteredData.slice(0, currentPage * itemsPerPage);
                const grid = document.getElementById('luc-grid-result');
                
                if(paginatedData.length > 0) grid.innerHTML = paginatedData.map(p => renderCardHTML(p)).join('');
                else grid.innerHTML = "<div style='grid-column:1/-1;text-align:center;padding:50px;color:#888;'>Không tìm thấy sản phẩm.</div>";

                const loadBtnWrap = document.querySelector('.luc-load-wrap');
                if(paginatedData.length >= filteredData.length) loadBtnWrap.style.display = 'none';
                else { loadBtnWrap.style.display = 'block'; document.getElementById('luc-load-more-btn').innerHTML = "XEM THÊM <i class='fas fa-chevron-down'></i>"; }
            }

            window.clearLucSearch = function() { filterState.keyword = ""; keywordInput.value = ""; runFilter(false); }

            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    tabs.forEach(t => t.classList.remove('active')); this.classList.add('active');
                    document.querySelectorAll('.luc-drop-item').forEach(i => i.classList.remove('selected'));
                    document.getElementById('luc-current-cat-name').innerText = "Danh mục khác";
                    
                    const type = this.getAttribute('data-type');
                    if(type === 'intro') { toggleView('intro'); } 
                    else { filterState.type = type === 'all' ? '' : type; filterState.cat = ''; filterState.keyword = ''; keywordInput.value = ''; runFilter(); }
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            });

            document.getElementById('dyn-cat-list').addEventListener('click', function(e) {
                if(e.target.closest('.luc-drop-item')) {
                    const item = e.target.closest('.luc-drop-item');
                    document.querySelectorAll('.luc-drop-item').forEach(i => i.classList.remove('selected')); item.classList.add('selected');
                    tabs.forEach(t => t.classList.remove('active')); document.getElementById('tab-all').classList.add('active');
                    filterState.cat = item.getAttribute('data-cat'); filterState.type = ''; filterState.keyword = ''; keywordInput.value = '';
                    document.getElementById('luc-current-cat-name').innerText = item.getAttribute('data-name');
                    ddGroup.classList.remove('active-drop');
                    runFilter();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });

            searchForm.addEventListener('submit', function(e) {
                e.preventDefault(); const val = keywordInput.value.trim();
                if(val !== '') { filterState.keyword = val; filterState.cat = ''; filterState.type = ''; tabs.forEach(t => t.classList.remove("active")); document.getElementById("tab-all").classList.add("active"); document.getElementById('luc-current-cat-name').innerText = "Danh mục khác"; runFilter(); window.scrollTo({ top: 0, behavior: 'smooth' });}
            });

            document.getElementById('luc-load-more-btn').addEventListener('click', function() { this.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Đang tải..."; currentPage++; setTimeout(() => runFilter(true), 300); });
            ddGroup.querySelector('.luc-dd-trigger').addEventListener('click', function(e) { e.stopPropagation(); ddGroup.classList.toggle('active-drop'); });
            document.addEventListener('click', e => { if(!ddGroup.contains(e.target)) ddGroup.classList.remove('active-drop'); });
        }

        function initGallery() {
            const galMain = document.getElementById('gal-main'); if(!galMain) return;
            galMain.addEventListener('scroll', function() {
                if (!isScrolling) { window.requestAnimationFrame(function() { const w = galMain.clientWidth; const newIdx = Math.round(galMain.scrollLeft / w); if (newIdx !== currentIdx && newIdx >= 0 && newIdx < mediaList.length) { updateActiveThumb(newIdx); } isScrolling = false; }); isScrolling = true; }
            });
            startAutoPlay();
            const galContainer = document.querySelector('.v261-gallery-container');
            if(galContainer) { galContainer.addEventListener('mouseenter', stopAutoPlay); galContainer.addEventListener('mouseleave', startAutoPlay); }
        }

        function startAutoPlay() { stopAutoPlay(); autoPlayInterval = setInterval(() => { let nextIdx = currentIdx + 1; if (nextIdx >= mediaList.length) nextIdx = 0; v261GoTo(nextIdx); }, 4000); }
        function stopAutoPlay() { if (autoPlayInterval) clearInterval(autoPlayInterval); }

        window.v261Move = function(d) { const galMain = document.getElementById('gal-main'); if(!galMain) return; const w = galMain.clientWidth; galMain.scrollBy({left: w * d, behavior:'smooth'}); };
        window.v261Slide = function(d) { v261Move(d); };
        window.v261GoTo = function(i) { const galMain = document.getElementById('gal-main'); if(!galMain) return; const w = galMain.clientWidth; galMain.scrollTo({left: w * i, behavior:'smooth'}); };

        function updateActiveThumb(i) {
            currentIdx = i; const thumbsContainer = document.getElementById('gal-thumbs'); const thumbs = thumbsContainer.querySelectorAll('.v261-thumb-item'); if(!thumbs.length) return;
            thumbs.forEach((el, idx) => { if(idx === i) { el.classList.add('active'); const leftPos = el.offsetLeft - (thumbsContainer.clientWidth / 2) + (el.clientWidth / 2); thumbsContainer.scrollTo({ left: leftPos, behavior: 'smooth' }); } else { el.classList.remove('active'); } });
        }

        window.v261OpenLB = function(i) { const lb = document.getElementById('v261-lb'); currentIdx = i; renderLBContent(); lb.style.display = 'flex'; setTimeout(() => { lb.style.opacity = '1'; }, 10); document.addEventListener('keydown', lbKeyHandler); stopAutoPlay(); };
        window.v261CloseLB = function() { const lb = document.getElementById('v261-lb'); const lbBody = document.getElementById('v261-lb-body'); lb.style.opacity = '0'; setTimeout(() => { lb.style.display = 'none'; lbBody.innerHTML = ''; }, 300); document.removeEventListener('keydown', lbKeyHandler); startAutoPlay(); };
        window.v261LBSlide = function(d) { currentIdx += d; if(currentIdx < 0) currentIdx = mediaList.length - 1; if(currentIdx >= mediaList.length) currentIdx = 0; renderLBContent(); };
        function lbKeyHandler(e) { if(e.key === "Escape") v261CloseLB(); if(e.key === "ArrowLeft") v261LBSlide(-1); if(e.key === "ArrowRight") v261LBSlide(1); }

        function renderLBContent() {
            const lbBody = document.getElementById('v261-lb-body'); const lbCount = document.getElementById('v261-lb-counter'); const item = mediaList[currentIdx]; let html = '';
            if(item.type === 'video') { if(item.url.indexOf('<iframe') !== -1) html = item.url; else html = '<video controls autoplay src="'+item.url+'"></video>'; } else { html = '<img src="'+item.url+'">'; }
            lbBody.innerHTML = html; lbCount.innerText = (currentIdx + 1) + ' / ' + mediaList.length;
        }

        window.v261Tab = function(k, b) { document.querySelectorAll('.v261-tb').forEach(x=>x.classList.remove('active')); b.classList.add('active'); document.querySelectorAll('.v261-pane').forEach(x=>x.classList.remove('active')); document.getElementById('v261-'+k).classList.add('active'); };
        window.grScroll = function(dir, id) { const el = document.getElementById(id); if(el) { const item = el.querySelector('.s2-card') || el.querySelector('.gr-card'); if(item) { const w = item.offsetWidth + 20; el.scrollBy({left: w * dir, behavior: 'smooth'}); } } }

    </script>
</body>
</html>
