    <script>
        let allProducts = [];
        let allPosts = [];
        let independentProjects = [];
        let filteredData = [];
        const itemsPerPage = 10;
        let currentPage = 1;
        
        let filterState = { type: '', cat: '', keyword: '' };

        const safeBaseUrl = (typeof BASE_URL !== 'undefined') ? BASE_URL : '/greenia-homes/';

        // HÀM CHUYỂN ĐỔI CHUỖI SANG SLUG ĐỂ SO SÁNH CHÍNH XÁC
        function createSafeSlug(title) {
            if(!title) return 'tin-tuc';
            return String(title).toLowerCase().trim().replace(/\s+/g, '-').replace(/[áàảãạâấầẩẫậăắằẳẵặ]/g, 'a').replace(/[éèẻẽẹêếềểễệ]/g, 'e').replace(/[íìỉĩị]/g, 'i').replace(/[óòỏõọôốồổỗộơớờởỡợ]/g, 'o').replace(/[úùủũụưứừửữự]/g, 'u').replace(/[ýỳỷỹỵ]/g, 'y').replace(/đ/g, 'd').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-');
        }

        // HÀM KIỂM TRA KHỚP DANH MỤC NGHIÊM NGẶT (FIX LỖI HIỆN TẤT CẢ SẢN PHẨM)
        function isCatMatch(pData, targetCat) {
            if (!targetCat || targetCat === '') return true;
            const targetSlug = createSafeSlug(targetCat);
            
            let catsArray = [];
            if (Array.isArray(pData.cat)) catsArray = pData.cat;
            else if (typeof pData.cat === 'string') catsArray = pData.cat.split(',');
            else if (Array.isArray(pData.categories)) catsArray = pData.categories;
            else if (typeof pData.categories === 'string') catsArray = pData.categories.split(',');

            return catsArray.some(c => createSafeSlug(c) === targetSlug);
        }

        function renderCardHTML(p) {
            const pCat = p.cat ? String(p.cat) : 'san-pham';
            const pTitle = p.title ? String(p.title) : 'Sản phẩm';
            const catSlug = createSafeSlug(pCat);
            const pSlug = p.slug || createSafeSlug(pTitle);
            const tagClass = p.type === 'Bán' ? 'tag-ban' : 'tag-thue';
            const tagName = p.type === 'Bán' ? 'Đang bán' : 'Cho thuê';
            const imgUrl = window.resolveImg ? window.resolveImg(p.img) : (p.img || '');
            const link = `${safeBaseUrl}san-pham/${catSlug}/${pSlug}/`;
            
            const locStr = p.loc ? String(p.loc) : '';
            const locHtml = locStr ? `<div class="gr-loc"><i class="fas fa-map-marker-alt"></i> ${locStr.substring(0,40)}...</div>` : '';
            const areaHtml = p.area ? `<span class="gr-hl" style="font-size:12px;font-weight:400;">${p.area} m²</span>` : '';
            const bedHtml = p.bed ? `<span style="color:#444;">|</span> <span class="gr-hl" style="font-size:12px;font-weight:400;">${p.bed} PN</span>` : '';

            return `
            <a href="${link}" class="gr-card">
                <div class="gr-thumb-box">
                    <span class="gr-tag-abs ${tagClass}">${tagName}</span>
                    <img src="${imgUrl}" onerror="this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=500';">
                </div>
                <div class="gr-body">
                    <h3 class="gr-tit">${pTitle}</h3>
                    ${locHtml}
                    <div class="gr-meta">
                        <span class="gr-hl">${p.price || 'Liên hệ'}</span>
                        <div style="display:flex; gap:10px;">${areaHtml}${bedHtml}</div>
                    </div>
                </div>
            </a>`;
        }

        document.addEventListener("DOMContentLoaded", async function() {
            try {
                // FETCH DATA
                const [postRes, prodRes] = await Promise.all([
                    fetch(safeBaseUrl + 'assets/data/posts.json').catch(() => null),
                    fetch(safeBaseUrl + 'assets/data/products.json').catch(() => null)
                ]);
                
                if(postRes && postRes.ok) allPosts = await postRes.json();
                if(prodRes && prodRes.ok) {
                    const prodsData = await prodRes.json();
                    allProducts = Array.isArray(prodsData) ? prodsData : [];
                }

                try {
                    const projRes = await fetch(safeBaseUrl + 'assets/data/projects.json');
                    if (projRes.ok) independentProjects = await projRes.json();
                } catch(e) {}

                // XÁC ĐỊNH CATEGORY HIỆN TẠI ĐỂ SET TIÊU ĐỀ VÀ BỘ LỌC
                const currCat = window.GREENIA_CURRENT_CATEGORY;
                let activeCatSlug = '';
                let displayTitle = "Tất cả Sản phẩm";
                let displayDesc = "";

                if (currCat && currCat.slug && currCat.slug !== 'tat-ca-san-pham') {
                    activeCatSlug = currCat.slug;
                    displayTitle = currCat.seoTitle || currCat.name || currCat.slug;
                    displayDesc = currCat.seoDesc || currCat.desc || "";

                    if (currCat.slug === 'ban') { filterState.type = 'Bán'; document.getElementById('tab-all').classList.remove('active'); document.querySelector('[data-type="Bán"]').classList.add('active'); }
                    else if (currCat.slug === 'cho-thue') { filterState.type = 'Thuê'; document.getElementById('tab-all').classList.remove('active'); document.querySelector('[data-type="Thuê"]').classList.add('active'); }
                    else { filterState.cat = currCat.slug; document.getElementById('tab-all').classList.remove('active');}
                } else {
                    // Fallback URL: Nhận diện danh mục nếu Bot không truyền biến xuống
                    const paths = window.location.pathname.split('/').filter(Boolean);
                    const slug = paths[paths.length - 1];
                    if (slug && slug !== 'san-pham' && slug !== 'tat-ca-san-pham' && slug.indexOf('.html') === -1) {
                        activeCatSlug = createSafeSlug(slug);
                        
                        // FIX LỖI TIÊU ĐỀ ALL CAPS: Format thành chữ hoa đầu mỗi từ
                        const words = slug.split('-');
                        const mappedWords = words.map(w => {
                            const map = {'ban':'Bán', 'cho':'Cho', 'thue':'Thuê', 'chuyen':'Chuyển', 'nhuong':'Nhượng', 'nha':'Nhà', 'pho':'Phố', 'can':'Căn', 'ho':'Hộ', 'du':'Dự', 'an':'Án', 'quan':'Quận'};
                            return map[w] || (w.charAt(0).toUpperCase() + w.slice(1));
                        });
                        displayTitle = mappedWords.join(' ');

                        if (slug === 'ban') { filterState.type = 'Bán'; document.getElementById('tab-all').classList.remove('active'); document.querySelector('[data-type="Bán"]').classList.add('active'); }
                        else if (slug === 'cho-thue') { filterState.type = 'Thuê'; document.getElementById('tab-all').classList.remove('active'); document.querySelector('[data-type="Thuê"]').classList.add('active'); }
                        else { filterState.cat = activeCatSlug; document.getElementById('tab-all').classList.remove('active');}
                    }
                }

                // Cập nhật Header SEO UI
                const titleEl = document.getElementById('g282-dyn-title');
                const descEl = document.getElementById('g282-dyn-desc');
                const boxEl = document.getElementById('g282-cat-info-box');

                if(titleEl) {
                    titleEl.innerText = displayTitle;
                    titleEl.style.textTransform = "none"; // Ép bỏ in hoa toàn bộ của CSS
                }
                if(descEl && displayDesc) {
                    descEl.innerHTML = displayDesc;
                    if(boxEl) boxEl.style.display = 'block';
                } else if(boxEl && activeCatSlug !== '') {
                    boxEl.style.display = 'block';
                }

                // TẠO DROPDOWN & TÍNH SỐ LƯỢNG
                let otherCats = {};
                allProducts.forEach(p => {
                    let catsArray = [];
                    if (Array.isArray(p.cat)) catsArray = p.cat;
                    else if (typeof p.cat === 'string') catsArray = p.cat.split(',');
                    else if (Array.isArray(p.categories)) catsArray = p.categories;
                    else if (typeof p.categories === 'string') catsArray = p.categories.split(',');

                    catsArray.forEach(c => {
                        let cleanCat = c.trim();
                        if(cleanCat !== '' && cleanCat.toLowerCase() !== 'bán' && cleanCat.toLowerCase() !== 'cho thuê') {
                            otherCats[cleanCat] = (otherCats[cleanCat] || 0) + 1;
                        }
                    });
                });

                const ddList = document.getElementById('dyn-cat-list');
                
                if (filterState.cat !== '') {
                    const allItem = ddList.querySelector('.g282-drop-item[data-cat=""]');
                    if (allItem) allItem.classList.remove('selected');
                }

                Object.keys(otherCats).forEach(c => {
                    // Kiểm tra active (Highlight)
                    const isSelected = (activeCatSlug !== '' && createSafeSlug(c) === activeCatSlug) ? 'selected' : '';
                    if (isSelected) {
                        const currentCatNameEl = document.getElementById('g282-current-cat-name');
                        if(currentCatNameEl) currentCatNameEl.innerText = c;
                    }
                    ddList.insertAdjacentHTML('beforeend', `<div class="g282-drop-item ${isSelected}" data-cat="${c}" data-name="${c}" style="display:flex; justify-content:space-between; align-items:center;"><span>${c}</span> <span style="color:#666; font-size:10px;">(${otherCats[c]})</span></div>`);
                });

                // INIT TÌM KIẾM & LỌC
                runFilter();
                
                // RENDER CAROUSELS PHỤ TRỢ DƯỚI CÙNG
                const rndProds = [...allProducts].sort(() => 0.5 - Math.random()).slice(0, 10);
                document.getElementById('for-you-scroll').innerHTML = rndProds.map(p => renderCardHTML(p)).join('');

                const saleProds = allProducts.filter(p => p.type === 'Bán').slice(0, 10);
                document.getElementById('sale-scroll').innerHTML = saleProds.map(p => renderCardHTML(p)).join('');

                const rentProds = allProducts.filter(p => p.type === 'Thuê').slice(0, 10);
                document.getElementById('rent-scroll').innerHTML = rentProds.map(p => renderCardHTML(p)).join('');

                // DỰ ÁN CAROUSEL
                if (independentProjects.length > 0) {
                    document.getElementById('feat-scroll').innerHTML = independentProjects.map(p => {
                        const imgUrl = window.resolveImg ? window.resolveImg(p.img) : p.img;
                        return `
                        <a href="${p.link}" class="gr-card">
                            <div class="gr-thumb-box"><span class="gr-tag-abs tag-ban">Dự án</span><img src="${imgUrl}"></div>
                            <div class="gr-body"><h3 class="gr-tit">${p.title}</h3><div style="margin-top:auto; font-size:11px; color:#888;"><i class="far fa-star" style="color:#c5a059;"></i> Đang mở bán</div></div>
                        </a>`;
                    }).join('');
                }

                // DỰ ÁN SECTION
                const projPosts = allPosts.filter(p => {
                    let catsArray = Array.isArray(p.cat) ? p.cat : (typeof p.cat === 'string' ? p.cat.split(',') : []);
                    return catsArray.some(c => createSafeSlug(c).includes('du-an'));
                }).slice(0,4);
                
                const projProds = allProducts.filter(p => {
                    let catsArray = Array.isArray(p.cat) ? p.cat : (typeof p.cat === 'string' ? p.cat.split(',') : []);
                    return catsArray.some(c => createSafeSlug(c).includes('du-an'));
                }).slice(0,4);
                
                if(projPosts.length > 0 || projProds.length > 0) {
                    document.getElementById('dyn-proj-section').style.display = 'block';
                    document.getElementById('dyn-proj-news').innerHTML = projPosts.map(p => {
                        const pCat = createSafeSlug(p.cat); const pSlug = p.slug || createSafeSlug(p.title);
                        const imgUrl = window.resolveImg ? window.resolveImg(p.thumb) : p.thumb;
                        const excerpt = p.content.replace(/<[^>]*>?/gm, '').substring(0, 80) + '...';
                        return `<a href="${safeBaseUrl}tin-tuc/${pCat}/${pSlug}/" class="gr-news-card"><div class="gr-news-thumb"><img src="${imgUrl}"></div><div class="gr-news-info"><h3 class="gr-news-tit">${p.title}</h3><div class="gr-news-desc">${excerpt}</div><div class="gr-news-date"><i class="far fa-clock"></i> ${p.date}</div></div></a>`;
                    }).join('');
                    document.getElementById('dyn-proj-prods').innerHTML = projProds.map(p => renderCardHTML(p)).join('');
                }

            } catch (e) {
                console.log(e);
                document.getElementById('g282-grid-result').innerHTML = "<div style='grid-column:1/-1; text-align:center; padding:50px; color:#ff4d4f;'>Không thể tải dữ liệu sản phẩm. Vui lòng F5 lại trang.</div>";
                document.querySelector('.g282-loader').style.display = 'none';
            }
        });

        // HÀM LỌC CHÍNH BỌC THÉP
        function runFilter(isLoadMore = false) {
            if(!isLoadMore) currentPage = 1;
            
            filteredData = allProducts.filter(p => {
                let matchType = filterState.type === '' || p.type === filterState.type;
                let matchCat = isCatMatch(p, filterState.cat);
                
                let matchKeyword = true;
                if(filterState.keyword !== '') {
                    const kw = filterState.keyword.toLowerCase();
                    matchKeyword = (p.title && String(p.title).toLowerCase().includes(kw)) || 
                                   (p.loc && String(p.loc).toLowerCase().includes(kw)) || 
                                   (p.cat && String(p.cat).toLowerCase().includes(kw));
                }
                return matchType && matchCat && matchKeyword;
            });

            // Status Search
            const statusDiv = document.getElementById('g282-status');
            if(filterState.keyword !== '') {
                statusDiv.style.display = 'flex';
                statusDiv.innerHTML = `Tìm thấy <strong>${filteredData.length}</strong> kết quả cho: "<strong>${filterState.keyword}</strong>" <span style='cursor:pointer;color:#ff6b6b;text-decoration:underline;margin-left:10px;' onclick='clearSearch()'>Xóa</span>`;
            } else { statusDiv.style.display = 'none'; }

            // Lấy Page
            const paginatedData = filteredData.slice(0, currentPage * itemsPerPage);
            
            const grid = document.getElementById('g282-grid-result');
            if(paginatedData.length > 0) {
                grid.innerHTML = paginatedData.map(p => renderCardHTML(p)).join('');
            } else {
                grid.innerHTML = "<div style='grid-column:1/-1;text-align:center;padding:50px;color:#888;'>Không tìm thấy sản phẩm phù hợp.</div>";
            }

            // Nút Load More
            const loadBtnWrap = document.querySelector('.g282-load-wrap');
            if(paginatedData.length >= filteredData.length) { loadBtnWrap.style.display = 'none'; } 
            else { loadBtnWrap.style.display = 'block'; document.getElementById('g282-load-btn').innerHTML = "XEM THÊM <i class='fas fa-chevron-down'></i>"; }
        }

        // TƯƠNG TÁC TABS VÀ TÌM KIẾM
        document.querySelectorAll('.g282-nav-item:not(.g282-dd-trigger)').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.g282-nav-item').forEach(t => t.classList.remove('active')); this.classList.add('active');
                filterState.type = this.getAttribute('data-type') === 'all' ? '' : this.getAttribute('data-type');
                filterState.cat = ''; document.querySelectorAll('.g282-drop-item').forEach(i => i.classList.remove('selected'));
                document.getElementById('g282-current-cat-name').innerText = "Danh mục khác";
                clearSearch(false); runFilter(); scrollToAnchor();
            });
        });

        document.getElementById('dyn-cat-list').addEventListener('click', function(e) {
            if(e.target.closest('.g282-drop-item')) {
                const item = e.target.closest('.g282-drop-item');
                document.querySelectorAll('.g282-drop-item').forEach(i => i.classList.remove('selected')); item.classList.add('selected');
                document.querySelectorAll('.g282-nav-item').forEach(t => t.classList.remove('active')); document.getElementById('tab-all').classList.add('active');
                filterState.cat = item.getAttribute('data-cat'); filterState.type = '';
                document.getElementById('g282-current-cat-name').innerText = item.getAttribute('data-name');
                document.getElementById('g282-dd').classList.remove('active-drop');
                clearSearch(false); runFilter(); scrollToAnchor();
            }
        });

        document.getElementById('g282-search-form').addEventListener('submit', function(e) {
            e.preventDefault(); const val = document.getElementById('g282-keyword').value.trim();
            if(val !== '') { filterState.keyword = val; filterState.cat = ''; filterState.type = ''; runFilter(); scrollToAnchor(); }
        });

        document.getElementById('g282-load-btn').addEventListener('click', function() { this.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Đang tải..."; currentPage++; setTimeout(() => runFilter(true), 300); });

        window.clearSearch = function(doRun = true) { filterState.keyword = ''; document.getElementById('g282-keyword').value = ''; if(doRun) runFilter(); }
        
        function scrollToAnchor() {
            const anchor = document.getElementById('g282-anchor'); const header = document.querySelector('.g282-sticky-wrapper');
            if(anchor && header) { const top = anchor.getBoundingClientRect().top + window.scrollY - header.offsetHeight - 40; window.scrollTo({top: top, behavior: 'smooth'}); }
        }

        // Logic Dropdown Fixed (Tránh che khuất trên mobile)
        const ddGroup = document.getElementById('g282-dd');
        const dropdownMenu = ddGroup.querySelector('.g282-dropdown');
        
        ddGroup.querySelector('.g282-dd-trigger').addEventListener('click', function(e) {
            e.stopPropagation(); ddGroup.classList.toggle('active-drop');
        });
        document.addEventListener('click', e => { if(!ddGroup.contains(e.target)) ddGroup.classList.remove('active-drop'); });

        window.grScroll = function(dir, id) { const el = document.getElementById(id); if(el) { const item = el.querySelector('.s2-card') || el.querySelector('.gr-card'); if(item) { const w = item.offsetWidth + 20; el.scrollBy({left: w * dir, behavior: 'smooth'}); } } }
    </script>
</body>
</html>
