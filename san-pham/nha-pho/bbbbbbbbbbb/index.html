    <script>
        // MÃ HÓA BẢO MẬT API KEY BẰNG BASE64 CHỐNG BOT GITHUB
        const firebaseConfig = {

        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // BẢO VỆ CHỐNG LỖI CÚ PHÁP TỪ TRÌNH BIÊN DỊCH
        let defaultProduct = null;
        try { 
            defaultProduct = {
                id: "56",
                title: "BBBBBBBBBB",
                slug: "bbbbbbbbbbb",
                type: "Bán",
                cat: "Nhà Phố, 2-5 tỷ, An Phú Quận 2",
                loc: "",
                price: "",
                area: "",
                dir: "",
                floor: "",
                bed: "",
                wc: "",
                front: "",

                img: "",
                gallery: '[]' === '{{' + 'GALLERY_JSON}}' ? [] : [],
                video: "",
                map: "",
                content: `<div class="gr-related-item"><span class="gr-hot-icon">👉</span> <a class="gr-related-link" href="https://greeniahomes.vn/san-pham/nha-pho/ban-nha-pho-quan-2/" target="_blank">B&aacute;n nh&agrave; phố quận 2</a></div>

<div class="gr-related-item"><span class="gr-hot-icon">👉</span> <a class="gr-related-link" href="https://greeniahomes.vn/san-pham/nha-pho/ban-nha-pho-quan-2/" target="_blank">B&aacute;n nh&agrave; phố quận 2</a></div>
`
            };
        } catch(e) {}
        window.GREENIA_CURRENT_PRODUCT = defaultProduct;

        const safeBaseUrl = window.BASE_URL;
        
        const u_logo = '/assets/images/logo-greenia-homes.png'; 
        const zalo_img = 'https://cdn.haitrieu.com/wp-content/uploads/2022/01/Logo-Zalo-Arc.png';
        const phone_img = 'https://upload.wikimedia.org/wikipedia/commons/6/6c/Phone_icon.png'; 
        
        let mediaList = [];
        let currentIdx = 0;
        let isScrolling = false;
        let autoPlayInterval;
        let allProducts = [];
        let allCategories = [];

        let filteredData = [];
        const itemsPerPage = 10;
        let currentPage = 1;
        let filterState = { type: '', cat: '', keyword: '' };

        function createSafeSlug(title) {
            if(!title) return 'san-pham';
            return String(title).toLowerCase().trim().replace(/\s+/g, '-').replace(/[áàảãạâấầẩẫậăắằẳẵặ]/g, 'a').replace(/[éèẻẽẹêếềểễệ]/g, 'e').replace(/[íìỉĩị]/g, 'i').replace(/[óòỏõọôốồổỗộơớờởỡợ]/g, 'o').replace(/[úùủũụưứừửữự]/g, 'u').replace(/[ýỳỷỹỵ]/g, 'y').replace(/đ/g, 'd').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-');
        }
        
        function beautifyCatName(slug) {
            if (!slug) return '';
            const words = String(slug).split('-');
            const map = {'ban':'Bán', 'cho':'Cho', 'thue':'Thuê', 'chuyen':'Chuyển', 'nhuong':'Nhượng', 'nha':'Nhà', 'pho':'Phố', 'can':'Căn', 'ho':'Hộ', 'du':'Dự', 'an':'Án', 'quan':'Quận'};
            return words.map(w => map[w.toLowerCase()] || (w.charAt(0).toUpperCase() + w.slice(1))).join(' ');
        }

        function isCatMatch(pData, targetCat) {
            if (!targetCat || targetCat === '') return true;
            const targetSlug = createSafeSlug(targetCat);
            let catsArray = Array.isArray(pData.cat) ? pData.cat : (pData.cat ? String(pData.cat).split(',') : []);
            return catsArray.some(c => createSafeSlug(c) === targetSlug);
        }

        function renderCardHTML(p) {
            let primaryCat = 'san-pham';
            if (p.cat) {
                primaryCat = Array.isArray(p.cat) ? p.cat[0] : String(p.cat).split(',')[0];
            }
            
            const catSlug = createSafeSlug(primaryCat);
            const pSlug = p.slug || createSafeSlug(p.title);
            const tagClass = p.type === 'Bán' ? 'tag-ban' : 'tag-thue';
            const tagName = p.type === 'Bán' ? 'Đang bán' : 'Cho thuê';
            const imgUrl = window.resolveImg ? window.resolveImg(p.img) : (p.img || '');
            
            const link = `${safeBaseUrl}san-pham/${catSlug}/${pSlug}/`;
            
            const locStr = p.loc ? String(p.loc) : '';
            const locHtml = locStr ? `<div class="gr-loc"><i class="fas fa-map-marker-alt"></i> ${locStr.substring(0,40)}...</div>` : '';
            const areaHtml = p.area ? `<span class="gr-hl" style="font-size:12px;font-weight:400;">${p.area} m²</span>` : '';
            const bedHtml = p.bed ? `<span style="color:#444;">|</span> <span class="gr-hl" style="font-size:12px;font-weight:400;">${p.bed} PN</span>` : '';

            return `
            <a href="${link}" class="s2-card">
                <div class="s2-thumb-box">
                    <span class="gr-tag-abs ${tagClass}">${tagName}</span>
                    <img src="${imgUrl}" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=500';">
                </div>
                <div class="s2-body">
                    <h3 class="gr-tit s2-tit">${p.title}</h3>
                    ${locHtml}
                    <div class="gr-meta">
                        <span class="gr-hl">${p.price || 'Liên hệ'}</span>
                        <div style="display:flex; gap:10px;">${areaHtml}${bedHtml}</div>
                    </div>
                </div>
            </a>`;
        }

        function autoGenerateSingleProductSchema(prodData) {
            const oldSchema = document.getElementById('gr-dynamic-schema-single');
            if (oldSchema) oldSchema.remove();

            const pTitle = prodData.title || "Sản phẩm Bất động sản";
            const pImage = window.resolveImg ? window.resolveImg(prodData.img) : (prodData.img || "https://i.ibb.co/M515GTDh/Gemini-Generated-Image-px9jf4px9jf4px9j-removebg-preview-150x150.png");
            
            let rawPrice = 0;
            if(prodData.price) {
                let priceStr = String(prodData.price).toLowerCase();
                let numPart = parseFloat(priceStr.replace(/[^0-9.,]/g, '').replace(',', '.'));
                if (!isNaN(numPart)) {
                    if(priceStr.includes('tỷ')) rawPrice = numPart * 1000000000;
                    else if (priceStr.includes('triệu')) rawPrice = numPart * 1000000;
                    else rawPrice = numPart;
                }
            }

            let cleanDesc = "Đang cập nhật mô tả.";
            if(prodData.content) {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = prodData.content;
                cleanDesc = tempDiv.textContent.replace(/(\r\n|\n|\r)/gm, " ").substring(0, 200) + '...';
            }

            const schemaObj = {
                "@context": "https://schema.org/",
                "@type": "Product",
                "name": pTitle,
                "image": pImage,
                "description": cleanDesc,
                "brand": {
                    "@type": "Brand",
                    "name": "Greenia Homes"
                },
                "offers": {
                    "@type": "Offer",
                    "url": window.location.href,
                    "priceCurrency": "VND",
                    "price": rawPrice,
                    "availability": "https://schema.org/InStock",
                    "itemCondition": "https://schema.org/NewCondition"
                },
                "additionalProperty": []
            };

            if(prodData.area) schemaObj.additionalProperty.push({"@type": "PropertyValue", "name": "Diện tích", "value": prodData.area + " m2"});
            if(prodData.bed) schemaObj.additionalProperty.push({"@type": "PropertyValue", "name": "Phòng ngủ", "value": prodData.bed});
            if(prodData.loc) schemaObj.additionalProperty.push({"@type": "PropertyValue", "name": "Vị trí", "value": prodData.loc});

            const script = document.createElement('script');
            script.id = 'gr-dynamic-schema-single';
            script.type = "application/ld+json";
            script.text = JSON.stringify(schemaObj);
            document.head.appendChild(script);
        }

        document.addEventListener("DOMContentLoaded", async function() {
            const container = document.getElementById('sp-container');
            const prod = window.GREENIA_CURRENT_PRODUCT; 

            autoGenerateSingleProductSchema(prod);

            try {
                const [prodSnap, catSnap, projSnap] = await Promise.all([
                    db.collection('products').get(),
                    db.collection('categories').get(),
                    db.collection('projects').get()
                ]);
                
                allProducts = prodSnap.docs.map(doc => doc.data()).sort((a,b) => b.id - a.id);
                allCategories = catSnap.docs.map(doc => doc.data());
                let independentProjects = projSnap.docs.map(doc => doc.data()).sort((a,b) => b.id - a.id);

                mediaList = [];
                if(prod.video) mediaList.push({type: 'video', url: prod.video, thumb: 'https://via.placeholder.com/800x450?text=Video+Preview'});
                if(prod.img) mediaList.push({type: 'image', url: window.resolveImg ? window.resolveImg(prod.img) : prod.img});
                if(prod.gallery && Array.isArray(prod.gallery)) {
                    prod.gallery.forEach(g => { mediaList.push({type: 'image', url: window.resolveImg ? window.resolveImg(g) : g}); });
                }
                if(mediaList.length === 0) mediaList.push({type: 'image', url: 'https://via.placeholder.com/800x450?text=No+Image'});

                let activeCatSlug = '';
                let breadcrumbCatName = 'Sản phẩm';
                
                if (prod.cat) {
                    let pCats = Array.isArray(prod.cat) ? prod.cat : (typeof prod.cat === 'string' ? prod.cat.split(',') : []);
                    let validCat = pCats.find(c => {
                        let s = createSafeSlug(c);
                        return s && s !== 'ban' && s !== 'cho-thue' && s !== 'chuyen-nhuong' && s !== 'san-pham';
                    });
                    if (validCat) {
                        activeCatSlug = createSafeSlug(validCat);
                        breadcrumbCatName = beautifyCatName(activeCatSlug);
                    } else if (pCats.length > 0) {
                        activeCatSlug = createSafeSlug(pCats[0]);
                        breadcrumbCatName = beautifyCatName(activeCatSlug);
                    }
                }
                if (!activeCatSlug) {
                    const paths = window.location.pathname.split('/').filter(Boolean);
                    if (paths.length >= 3 && paths[paths.length - 3] === 'san-pham') {
                        activeCatSlug = createSafeSlug(paths[paths.length - 2]);
                        breadcrumbCatName = beautifyCatName(activeCatSlug);
                    }
                }

                let readmoreCatHTML = '';
                if (activeCatSlug !== '') {
                    if (allCategories && allCategories.length > 0) {
                        const matchedCat = allCategories.find(c => createSafeSlug(c.slug || c.name) === activeCatSlug);
                        if (matchedCat) breadcrumbCatName = matchedCat.name || breadcrumbCatName;
                    }
                    
                    let currentProdSlug = prod.slug || createSafeSlug(prod.title);
                    let relatedCount = allProducts.filter(p => {
                        let loopProdSlug = p.slug || createSafeSlug(p.title);
                        return isCatMatch(p, activeCatSlug) && loopProdSlug !== currentProdSlug;
                    }).length;
                    
                    if (relatedCount > 0) {
                        readmoreCatHTML = `
                        <div class="v261-readmore-cat">
                            <span>Xem thêm sản phẩm cùng danh mục: </span>
                            <a href="${safeBaseUrl}danh-muc-sp.html?keyword=${activeCatSlug}">${breadcrumbCatName} <span class="cat-count">(${relatedCount})</span></a>
                        </div>`;
                    }
                }

                // ===============================================
                // 3. TẠO TỰ ĐỘNG DANH MỤC CỘT PHẢI (CHIA 3 KHỐI)
                // ===============================================
                let countBan = 0, countThue = 0;
                let typeCats = {}, priceCats = {}, locCats = {};

                function categorizeTag(tagName) {
                    let t = tagName.toLowerCase();
                    // Nhóm Giá
                    if (t.includes('tỷ') || t.includes('triệu') || t.includes('giá') || t.includes('thỏa thuận')) return 'price';
                    // Nhóm Khu Vực
                    if (t.includes('quận') || t.includes('huyện') || t.includes('phường') || t.includes('thành phố') || t.includes('tp') || t.includes('khu') || t.includes('vị trí')) return 'loc';
                    // Loại Hình
                    return 'type';
                }

                // Lịch sử người dùng (Gợi ý thông minh)
                let prodIdForTracking = prod.slug || createSafeSlug(prod.title);
                let viewedHistory = JSON.parse(localStorage.getItem('greenia_smart_history')) || { cats: [], ids: [] };
                if (prod) {
                    if (prodIdForTracking && !viewedHistory.ids.includes(prodIdForTracking)) {
                        viewedHistory.ids.unshift(prodIdForTracking);
                        if (viewedHistory.ids.length > 30) viewedHistory.ids.pop();
                    }
                    let prodCats = Array.isArray(prod.cat) ? prod.cat : (typeof prod.cat === 'string' ? prod.cat.split(',') : []);
                    prodCats.forEach(c => {
                        let cleanSlug = createSafeSlug(c);
                        if (cleanSlug && cleanSlug !== 'ban' && cleanSlug !== 'cho-thue' && cleanSlug !== 'chuyen-nhuong') {
                            viewedHistory.cats = viewedHistory.cats.filter(existing => existing !== cleanSlug);
                            viewedHistory.cats.unshift(cleanSlug);
                        }
                    });
                    if (viewedHistory.cats.length > 5) viewedHistory.cats = viewedHistory.cats.slice(0, 5);
                    localStorage.setItem('greenia_smart_history', JSON.stringify(viewedHistory));
                }

                allProducts.forEach(p => {
                    if(p.type === 'Bán') countBan++;
                    else if(p.type === 'Thuê') countThue++;
                    
                    if(p.cat) {
                        let catArray = Array.isArray(p.cat) ? p.cat : String(p.cat).split(',');
                        catArray.forEach(c => {
                            let cleanCat = c.trim();
                            let cleanLower = cleanCat.toLowerCase();
                            if(cleanCat !== '' && cleanLower !== 'bán' && cleanLower !== 'thuê' && cleanLower !== 'chuyển nhượng' && cleanLower !== 'cho thuê') {
                                let group = categorizeTag(cleanCat);
                                if (group === 'price') priceCats[cleanCat] = (priceCats[cleanCat] || 0) + 1;
                                else if (group === 'loc') locCats[cleanCat] = (locCats[cleanCat] || 0) + 1;
                                else typeCats[cleanCat] = (typeCats[cleanCat] || 0) + 1;
                            }
                        });
                    }
                    
                    // Nạp thêm trường vị trí vào mục Khu Vực (nếu có)
                    if (p.loc && p.loc.trim() !== '') {
                        let l = p.loc.trim();
                        locCats[l] = (locCats[l] || 0) + 1;
                    }
                });

                // Cập nhật thẻ Dropdown Header
                let ddListHTML = `<a href="${safeBaseUrl}danh-muc-sp.html" class="luc-drop-item" data-cat="" data-name="Tất cả danh mục"><span>Tất cả danh mục</span></a>`;
                if (allCategories && allCategories.length > 0) {
                    allCategories.forEach(c => {
                        let catSlug = createSafeSlug(c.slug || c.name);
                        if (catSlug !== 'ban' && catSlug !== 'cho-thue' && catSlug !== 'chuyen-nhuong') {
                            let count = allProducts.filter(p => isCatMatch(p, catSlug)).length;
                            if (count > 0 || c.showEmpty) {
                                ddListHTML += `<a href="${safeBaseUrl}danh-muc-sp.html?keyword=${catSlug}" class="luc-drop-item" data-cat="${catSlug}" data-name="${beautifyCatName(c.name || c.slug)}"><span>${beautifyCatName(c.name || c.slug)}</span> <span style="color:#666; font-size:10px;">(${count})</span></a>`;
                            }
                        }
                    });
                }

                // Xây HTML 3 Khối
                let typeLinesHTML = `<a href="${safeBaseUrl}danh-muc-sp.html" style="font-weight: 700; color: #c5a059; background: rgba(197, 160, 89, 0.08); border-bottom: 1px solid rgba(197, 160, 89, 0.4); display:flex; justify-content:space-between; padding:10px; text-decoration:none;"><span>Tất cả sản phẩm</span></a>`;
                if(countBan > 0) typeLinesHTML += `<a href="${safeBaseUrl}danh-muc-sp.html?keyword=bán" style="padding-left: 20px; display:flex; justify-content:space-between; padding:10px 10px 10px 20px; color:#b0b8c4; text-decoration:none; border-bottom:1px solid #222;"><span>Chuyển nhượng</span><span style="color:#666; font-size:11px;">(${countBan})</span></a>`;
                if(countThue > 0) typeLinesHTML += `<a href="${safeBaseUrl}danh-muc-sp.html?keyword=thuê" style="padding-left: 20px; display:flex; justify-content:space-between; padding:10px 10px 10px 20px; color:#b0b8c4; text-decoration:none; border-bottom:1px solid #222;"><span>Cho thuê</span><span style="color:#666; font-size:11px;">(${countThue})</span></a>`;
                Object.keys(typeCats).forEach(c => {
                    typeLinesHTML += `<a href="${safeBaseUrl}danh-muc-sp.html?keyword=${createSafeSlug(c)}" style="padding-left: 20px; display:flex; justify-content:space-between; padding:10px 10px 10px 20px; color:#b0b8c4; text-decoration:none; border-bottom:1px solid #222;"><span>${beautifyCatName(c)}</span><span style="color:#666; font-size:11px;">(${typeCats[c]})</span></a>`;
                });

                let locLinesHTML = '';
                let sortedLocs = Object.keys(locCats).sort((a,b) => locCats[b] - locCats[a]);
                sortedLocs.forEach(c => {
                    locLinesHTML += `<a href="${safeBaseUrl}danh-muc-sp.html?keyword=${encodeURIComponent(c)}" style="padding-left: 20px; display:flex; justify-content:space-between; padding:10px 10px 10px 20px; color:#b0b8c4; text-decoration:none; border-bottom:1px solid #222;"><span>${c}</span><span style="color:#666; font-size:11px;">(${locCats[c]})</span></a>`;
                });

                let priceLinesHTML = '';
                Object.keys(priceCats).forEach(c => {
                    priceLinesHTML += `<a href="${safeBaseUrl}danh-muc-sp.html?keyword=${createSafeSlug(c)}" style="padding-left: 20px; display:flex; justify-content:space-between; padding:10px 10px 10px 20px; color:#b0b8c4; text-decoration:none; border-bottom:1px solid #222;"><span>${beautifyCatName(c)}</span><span style="color:#666; font-size:11px;">(${priceCats[c]})</span></a>`;
                });

                // Gộp chung thành 1 biến
                let dynamicSidebarHTML = '';
                if (typeLinesHTML !== '') {
                    dynamicSidebarHTML += `<div class="v261-cat" style="margin-bottom: 20px;"><div class="h">LOẠI HÌNH BĐS</div><div class="l">${typeLinesHTML}</div></div>`;
                }
                if (locLinesHTML !== '') {
                    dynamicSidebarHTML += `<div class="v261-cat" style="margin-bottom: 20px;"><div class="h">THEO KHU VỰC</div><div class="l">${locLinesHTML}</div></div>`;
                }
                if (priceLinesHTML !== '') {
                    dynamicSidebarHTML += `<div class="v261-cat" style="margin-bottom: 20px;"><div class="h">KHOẢNG GIÁ</div><div class="l">${priceLinesHTML}</div></div>`;
                }

                // ===============================================

                // BƠM KHỐI GỢI Ý THÀNH DẠNG GRID (CÓ LOAD MORE)
                let smartRecommended = [];
                if (viewedHistory.cats.length > 0) {
                    let matchedByCat = allProducts.filter(p => {
                        let pSlug = p.slug || createSafeSlug(p.title);
                        if (pSlug === (prod.slug || createSafeSlug(prod.title))) return false; 
                        let pCats = Array.isArray(p.cat) ? p.cat : (typeof p.cat === 'string' ? p.cat.split(',') : []);
                        return pCats.some(c => viewedHistory.cats.includes(createSafeSlug(c)));
                    });
                    matchedByCat = matchedByCat.sort(() => 0.5 - Math.random());
                    smartRecommended = matchedByCat.slice(0, 20); 
                }
                
                if (smartRecommended.length < 20) {
                    let fallbackProds = allProducts.filter(p => {
                        let pSlug = p.slug || createSafeSlug(p.title);
                        if (pSlug === (prod.slug || createSafeSlug(prod.title))) return false;
                        return !smartRecommended.some(sp => (sp.slug || createSafeSlug(sp.title)) === pSlug);
                    }).sort(() => 0.5 - Math.random()).slice(0, 20 - smartRecommended.length);
                    smartRecommended = [...smartRecommended, ...fallbackProds];
                }

                window.smartRecommendedData = smartRecommended;
                let relatedHTML = '';
                if(smartRecommended.length > 0) {
                    relatedHTML = `
                    <div class="s-head"><h2 class="s-tit">Bất động sản dành cho bạn</h2></div>
                    <div class="gr-grid" id="related-grid">
                        ${smartRecommended.slice(0, 10).map(p => renderCardHTML(p)).join('')}
                    </div>
                    ${smartRecommended.length > 10 ? `<div class="s2-footer" style="margin-top:0;"><button id="btn-rec-more" class="s1-btn" onclick="loadMoreRec(event)">XEM THÊM <i class="fas fa-chevron-down"></i></button></div>` : ''}
                    `;
                }

                // 5. MAP
                let mapHTML = '<div style="padding:20px;text-align:center;color:#888;">Đang cập nhật vị trí.</div>';
                if(prod.map && prod.map !== "") {
                    if(prod.map.includes('<iframe')) mapHTML = prod.map;
                    else mapHTML = `<iframe width="100%" height="450" frameborder="0" style="border:0" src="${prod.map}"></iframe>`;
                }

                const shareLink = encodeURIComponent(window.location.href);
                const contentStr = prod.content ? String(prod.content) : '';

                // BƠM KHỐI BÁN/THUÊ THÀNH DẠNG GRID (CÓ LOAD MORE KÉP)
                const allSaleProds = allProducts.filter(p => p.type === 'Bán');
                window.allSaleProdsData = allSaleProds;
                let saleHTML = allSaleProds.length > 0 ? `
                    <div class="s-head" style="margin-top:60px;"><h2 class="s-tit">Tin nhà đất bán mới nhất</h2></div>
                    <div class="gr-grid" id="sale-grid">
                        ${allSaleProds.slice(0, 10).map(p => renderCardHTML(p)).join('')}
                    </div>
                    ${allSaleProds.length > 10 ? `<div class="s2-footer" style="margin-top:0;"><button id="btn-sale-more" class="s1-btn" onclick="loadMoreSale(event)">XEM THÊM <i class="fas fa-chevron-down"></i></button></div>` : `<div class="s2-footer" style="margin-top:0;"><a href="${safeBaseUrl}danh-muc-sp.html?keyword=bán" class="s1-btn">Xem tất cả BĐS Bán</a></div>`}
                ` : '';

                const allRentProds = allProducts.filter(p => p.type === 'Thuê');
                window.allRentProdsData = allRentProds;
                let rentHTML = allRentProds.length > 0 ? `
                    <div class="s-head" style="margin-top:60px;"><h2 class="s-tit">Tin nhà đất cho thuê mới nhất</h2></div>
                    <div class="gr-grid" id="rent-grid">
                        ${allRentProds.slice(0, 10).map(p => renderCardHTML(p)).join('')}
                    </div>
                    ${allRentProds.length > 10 ? `<div class="s2-footer" style="margin-top:0;"><button id="btn-rent-more" class="s1-btn" onclick="loadMoreRent(event)">XEM THÊM <i class="fas fa-chevron-down"></i></button></div>` : `<div class="s2-footer" style="margin-top:0;"><a href="${safeBaseUrl}danh-muc-sp.html?keyword=thuê" class="s1-btn">Xem tất cả BĐS Cho thuê</a></div>`}
                ` : '';

                let projHTML = '';
                if (independentProjects && independentProjects.length > 0) {
                    projHTML = `
                    <div class="s-head" style="margin-top:60px;"><h2 class="s-tit">Dự án nổi bật</h2></div>
                    <div class="gr-carousel-wrapper">
                        <button class="gr-nav-btn gr-prev" onclick="grScroll(-1, 'feat-scroll')"><i class="fas fa-chevron-left"></i></button>
                        <div id="feat-scroll" class="gr-carousel">
                            ${independentProjects.slice(0, 10).map(p => {
                                const imgUrl = window.resolveImg ? window.resolveImg(p.img) : p.img;
                                return `<a href="${p.link}" class="s2-card">
                                    <div class="s2-thumb-box"><span class="gr-tag-abs tag-ban" style="background:#ff9f43; color:#000;">Dự án</span><img src="${imgUrl}" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=500';"></div>
                                    <div class="s2-body"><h3 class="gr-tit s2-tit">${p.title}</h3><div style="margin-top:auto; font-size:11px; color:#888;"><i class="far fa-star" style="color:#c5a059;"></i> Đang mở bán</div></div>
                                </a>`;
                            }).join('')}
                        </div>
                        <button class="gr-nav-btn gr-next" onclick="grScroll(1, 'feat-scroll')"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="s2-footer"><a href="${safeBaseUrl}du-an/" class="s1-btn">Xem thêm Dự án</a></div>`;
                }

                // IN DỮ LIỆU RA GIAO DIỆN
                container.innerHTML = `
                    <div id="luc-filter-placeholder"></div>
                    <div class="luc-sticky-wrapper" id="luc-filter-bar">
                        <div class="luc-nav-bar">
                            <div class="luc-nav-left-group" id="luc-tabs-container">
                                <div class="luc-nav-item active" id="tab-intro">Chi tiết Sản phẩm</div>
                                <a href="${safeBaseUrl}danh-muc-sp.html" class="luc-nav-item" id="tab-all">Tất cả</a>
                                <a href="${safeBaseUrl}danh-muc-sp.html?keyword=bán" class="luc-nav-item" id="tab-ban">Bán</a>
                                <a href="${safeBaseUrl}danh-muc-sp.html?keyword=thuê" class="luc-nav-item" id="tab-thue">Cho thuê</a>
                                <div class="luc-nav-group" id="luc-cat-dropdown-group">
                                    <div class="luc-nav-item luc-dd-trigger"><span id="luc-current-cat-name">Danh mục khác</span> <i class="fas fa-chevron-down"></i></div>
                                    <div class="luc-dropdown">
                                        <div class="luc-drop-scroll" style="max-height:400px; overflow-y:auto;" id="dyn-cat-list">${ddListHTML}</div>
                                    </div>
                                </div>
                            </div>
                            <div class="luc-nav-right-group">
                                <form id="luc-search-form" class="luc-input-wrap" onsubmit="window.location.href='${safeBaseUrl}danh-muc-sp.html?keyword=' + document.getElementById('luc-keyword').value; return false;">
                                    <input type="text" id="luc-keyword" placeholder="Tìm dự án, khu vực..." autocomplete="off">
                                    <button type="submit" id="luc-search-btn"><i class="fas fa-search"></i></button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <div class="gr-breadcrumbs" style="padding: 0 15px;">
                        <a href="${safeBaseUrl}">Trang chủ</a> <span class="sep">&gt;</span>
                        <a href="${safeBaseUrl}danh-muc-sp.html">Sản phẩm</a> <span class="sep">&gt;</span>
                        <a href="${safeBaseUrl}danh-muc-sp.html?keyword=${activeCatSlug}">${breadcrumbCatName}</a> <span class="sep">&gt;</span>
                        <span class="current">${prod.title}</span>
                    </div>

                    <div class="luc-notification-area"><div id="luc-search-status" class="luc-status-bar" style="display:none;"></div></div>
                    <div id="luc-grid-anchor"></div>

                    <div id="luc-intro-section" class="v261-intro">
                        <div class="v261-c1">
                            <div class="v261-gallery-container">
                                <div class="v261-gal-main-wrapper">
                                    <div class="v261-gal-main" id="gal-main">
                                        ${mediaList.map((item, k) => `
                                            <div class="v261-gal-item" data-index="${k}">
                                                ${item.type === 'video' ? 
                                                    `<div class="v261-vid-wrap" onclick="v261OpenLB(${k})"><i class="fas fa-play-circle v261-play-icon"></i><div class="v261-vid-overlay"></div><img src="${item.thumb}" class="v261-vid-thumb" onerror="this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=500';"></div>` : 
                                                    `<img src="${item.url}" onclick="v261OpenLB(${k})" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=800';">`
                                                }
                                            </div>
                                        `).join('')}
                                    </div>
                                    <button class="v261-nav p" onclick="v261Slide(-1)"><i class="fas fa-chevron-left"></i></button>
                                    <button class="v261-nav n" onclick="v261Slide(1)"><i class="fas fa-chevron-right"></i></button>
                                </div>
                                <div class="v261-gal-thumbs" id="gal-thumbs">
                                    ${mediaList.map((item, k) => `
                                        <div class="v261-thumb-item ${k === 0 ? 'active' : ''}" onclick="v261GoTo(${k})">
                                            ${item.type === 'video' ? `<i class="fas fa-video v261-th-icon"></i><img src="${item.thumb}">` : `<img src="${item.url}" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=150';">`}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            <div class="v261-info-box">
                                <h1 class="v261-tit">${prod.title}</h1>
                                ${prod.loc ? `<div class="v261-addr"><i class="fas fa-map-marker-alt"></i> ${prod.loc}</div>` : ''}
                                <div class="v261-meta-line">
                                    <span class="v261-price">${prod.price || 'Liên hệ'}</span>
                                    ${prod.area ? `<span class="v261-meta-item"><i class="fas fa-expand"></i> ${prod.area} m²</span>` : ''}
                                    ${prod.bed ? `<span class="v261-meta-item"><i class="fas fa-bed"></i> ${prod.bed} PN</span>` : ''}
                                    <div class="v261-share-group">
                                        <a href="https://www.facebook.com/sharer/sharer.php?u=${shareLink}" target="_blank" class="v261-s-btn fb"><i class="fab fa-facebook-f"></i></a>
                                        <a href="https://zalo.me/share/?url=${shareLink}" target="_blank" class="v261-s-btn zalo"><img src="${zalo_img}" referrerpolicy="no-referrer"></a>
                                    </div>
                                </div>
                                
                                <div class="v261-specs">
                                    <div class="r"><span class="l">Mức giá:</span><span class="v">${prod.price || 'Liên hệ'}</span></div>
                                    <div class="r"><span class="l">Diện tích:</span><span class="v">${prod.area || '--'} m²</span></div>
                                    <div class="r"><span class="l">Hướng nhà:</span><span class="v">${prod.dir || '--'}</span></div>
                                    <div class="r"><span class="l">Số tầng:</span><span class="v">${prod.floor || '--'}</span></div>
                                    <div class="r"><span class="l">Phòng ngủ:</span><span class="v">${prod.bed || '--'} PN</span></div>
                                    <div class="r"><span class="l">WC:</span><span class="v">${prod.wc || '--'}</span></div>
                                    <div class="r"><span class="l">Mặt tiền:</span><span class="v">${prod.front || '--'} m</span></div>
                                    <div class="r"><span class="l">Pháp lý:</span><span class="v">${prod.legal || '--'}</span></div>
                                </div>

                                <div class="v261-tabs">
                                    <div class="v261-thd">
                                        <div class="v261-tb active" onclick="v261Tab('desc',this)">Thông tin chi tiết</div>
                                        <div class="v261-tb" onclick="v261Tab('map',this)">Vị trí</div>
                                    </div>
                                    <div class="v261-tbd">
                                        <div id="v261-desc" class="v261-pane active">
                                            <div class="v261-desc-content">
                                                ${contentStr ? contentStr.replace(/\n/g, '<br>') : 'Đang cập nhật mô tả.'}
                                            </div>
                                            ${readmoreCatHTML}
                                        </div>
                                        <div id="v261-map" class="v261-pane"><div class="v261-map-box">${mapHTML}</div></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="v261-c2">
                            <div class="v261-box">
                                <a href="${safeBaseUrl}"><img src="${u_logo}" class="v261-logo" onerror="this.style.display='none'"></a>
                                <h4>Tư vấn mua nhà chuyên sâu</h4>
                                <ul><li>Phân tích quỹ căn, chính sách, tiện ích giúp Khách hàng lựa chọn căn tốt nhất.</li><li>Giải đáp mọi thắc mắc của khách hàng.</li><li>Tuyệt đối bảo mật thông tin cá nhân.</li></ul>
                                <div class="v261-btns">
                                    <a href="tel:0932966700" class="v261-btn gr"><img src="${phone_img}"> 0932 966 700</a>
                                    <a href="https://zalo.me/0932966700" target="_blank" class="v261-btn bl"><img src="${zalo_img}" referrerpolicy="no-referrer"> Chat Zalo</a>
                                </div>
                            </div>
                        </div>

                        <div class="v261-c3">
                            ${dynamicSidebarHTML}
                        </div>
                    </div>

                    <div id="luc-grid-main-container" style="display:none;">
                        <div class="luc-grid-wrapper"><div class="luc-loader"><i class="fas fa-circle-notch fa-spin"></i></div><div class="luc-grid s2-grid" id="luc-grid-result"></div></div>
                        <div class="luc-load-wrap"><button id="luc-load-more-btn" class="luc-load-btn">XEM THÊM <i class="fas fa-chevron-down"></i></button></div>
                    </div>

                    <div class="luc-clearfix"></div><div class="luc-spacer"></div>

                    ${relatedHTML}
                    ${saleHTML}
                    ${rentHTML}
                    ${projHTML}
                `;

                setTimeout(initGallery, 300);
                
                const filterBar = document.getElementById('luc-filter-bar');
                if(filterBar) {
                    const placeholder = document.getElementById('luc-filter-placeholder');
                    window.addEventListener('scroll', () => {
                        if (window.scrollY > 120) {
                            filterBar.classList.add('is-stuck');
                            if(placeholder) placeholder.style.height = filterBar.offsetHeight + 'px';
                        } else {
                            filterBar.classList.remove('is-stuck');
                            if(placeholder) placeholder.style.height = '0px';
                        }
                    });
                }
                
                const ddGroup = document.getElementById('luc-cat-dropdown-group');
                if(ddGroup) {
                    ddGroup.querySelector('.luc-dd-trigger').addEventListener('click', function(e) {
                        e.preventDefault(); e.stopPropagation(); ddGroup.classList.toggle('active-drop');
                    });
                    document.addEventListener('click', e => { if(!ddGroup.contains(e.target)) ddGroup.classList.remove('active-drop'); });
                }

            } catch (e) {
                console.error("Lỗi:", e);
                document.getElementById('sp-container').innerHTML = "<div style='text-align:center; padding:50px; color:#ff4d4f;'>Hệ thống đang cập nhật dữ liệu. Vui lòng F5 lại trang.</div>";
            }
        });

        // ==========================================
        // CÁC HÀM AJAX LOAD MORE KÉP (DÀNH CHO GRID)
        // ==========================================
        window.recPage = 1;
        window.loadMoreRec = function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-rec-more');
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Đang tải...";
            setTimeout(() => {
                window.recPage++;
                const nextItems = window.smartRecommendedData.slice((window.recPage - 1) * 10, window.recPage * 10);
                document.getElementById('related-grid').insertAdjacentHTML('beforeend', nextItems.map(p => renderCardHTML(p)).join(''));
                if(window.recPage * 10 >= window.smartRecommendedData.length) {
                    btn.style.display = 'none';
                } else {
                    btn.innerHTML = "XEM THÊM BẤT ĐỘNG SẢN KHÁC <i class='fas fa-chevron-down'></i>";
                }
            }, 400);
        };

        window.saleClickCount = 0;
        window.loadMoreSale = function(e) {
            e.preventDefault();
            if(window.saleClickCount === 0) {
                const btn = document.getElementById('btn-sale-more');
                btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Đang tải...";
                setTimeout(() => {
                    const nextItems = window.allSaleProdsData.slice(10, 20);
                    document.getElementById('sale-grid').insertAdjacentHTML('beforeend', nextItems.map(p => renderCardHTML(p)).join(''));
                    window.saleClickCount++;
                    
                    if(window.allSaleProdsData.length <= 20) {
                         btn.innerHTML = "XEM TẤT CẢ BĐS BÁN <i class='fas fa-arrow-right'></i>";
                    } else {
                         btn.innerHTML = "XEM TẤT CẢ BĐS BÁN <i class='fas fa-arrow-right'></i>";
                    }
                }, 400);
            } else {
                window.location.href = window.BASE_URL + 'danh-muc-sp.html?keyword=bán';
            }
        };

        window.rentClickCount = 0;
        window.loadMoreRent = function(e) {
            e.preventDefault();
            if(window.rentClickCount === 0) {
                const btn = document.getElementById('btn-rent-more');
                btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Đang tải...";
                setTimeout(() => {
                    const nextItems = window.allRentProdsData.slice(10, 20);
                    document.getElementById('rent-grid').insertAdjacentHTML('beforeend', nextItems.map(p => renderCardHTML(p)).join(''));
                    window.rentClickCount++;
                    
                    if(window.allRentProdsData.length <= 20) {
                        btn.innerHTML = "XEM TẤT CẢ BĐS CHO THUÊ <i class='fas fa-arrow-right'></i>";
                    } else {
                        btn.innerHTML = "XEM TẤT CẢ BĐS CHO THUÊ <i class='fas fa-arrow-right'></i>";
                    }
                }, 400);
            } else {
                window.location.href = window.BASE_URL + 'danh-muc-sp.html?keyword=thuê';
            }
        };

        function initGallery() {
            const galMain = document.getElementById('gal-main');
            if(!galMain) return;

            galMain.addEventListener('scroll', function() {
                if (!isScrolling) {
                    window.requestAnimationFrame(function() {
                        const w = galMain.clientWidth;
                        const newIdx = Math.round(galMain.scrollLeft / w);
                        if (newIdx !== currentIdx && newIdx >= 0 && newIdx < mediaList.length) {
                            updateActiveThumb(newIdx);
                        }
                        isScrolling = false;
                    });
                    isScrolling = true;
                }
            });

            startAutoPlay();
            const galContainer = document.querySelector('.v261-gallery-container');
            if(galContainer) {
                galContainer.addEventListener('mouseenter', stopAutoPlay);
                galContainer.addEventListener('mouseleave', startAutoPlay);
            }
        }

        function startAutoPlay() {
            stopAutoPlay();
            autoPlayInterval = setInterval(() => {
                let nextIdx = currentIdx + 1;
                if (nextIdx >= mediaList.length) nextIdx = 0;
                v261GoTo(nextIdx); 
            }, 4000); 
        }

        function stopAutoPlay() { if (autoPlayInterval) clearInterval(autoPlayInterval); }

        window.v261Move = function(d) {
            const galMain = document.getElementById('gal-main');
            if(!galMain) return;
            const w = galMain.clientWidth;
            galMain.scrollBy({left: w * d, behavior:'smooth'});
        };
        
        window.v261Slide = function(d) { v261Move(d); };

        window.v261GoTo = function(i) {
            const galMain = document.getElementById('gal-main');
            if(!galMain) return;
            const w = galMain.clientWidth;
            galMain.scrollTo({left: w * i, behavior:'smooth'});
        };

        function updateActiveThumb(i) {
            currentIdx = i;
            const thumbsContainer = document.getElementById('gal-thumbs');
            const thumbs = thumbsContainer.querySelectorAll('.v261-thumb-item');
            if(!thumbs.length) return;

            thumbs.forEach((el, idx) => {
                if(idx === i) {
                    el.classList.add('active');
                    const leftPos = el.offsetLeft - (thumbsContainer.clientWidth / 2) + (el.clientWidth / 2);
                    thumbsContainer.scrollTo({ left: leftPos, behavior: 'smooth' });
                } else { el.classList.remove('active'); }
            });
        }

        window.v261OpenLB = function(i) {
            const lb = document.getElementById('v261-lb');
            currentIdx = i;
            renderLBContent();
            lb.style.display = 'flex';
            setTimeout(() => { lb.style.opacity = '1'; }, 10);
            document.addEventListener('keydown', lbKeyHandler);
            stopAutoPlay();
        };

        window.v261CloseLB = function() {
            const lb = document.getElementById('v261-lb');
            const lbBody = document.getElementById('v261-lb-body');
            lb.style.opacity = '0';
            setTimeout(() => { lb.style.display = 'none'; lbBody.innerHTML = ''; }, 300);
            document.removeEventListener('keydown', lbKeyHandler);
            startAutoPlay();
        };

        window.v261LBSlide = function(d) {
            currentIdx += d;
            if(currentIdx < 0) currentIdx = mediaList.length - 1;
            if(currentIdx >= mediaList.length) currentIdx = 0;
            renderLBContent();
        };

        function lbKeyHandler(e) {
            if(e.key === "Escape") v261CloseLB();
            if(e.key === "ArrowLeft") v261LBSlide(-1);
            if(e.key === "ArrowRight") v261LBSlide(1);
        }

        function renderLBContent() {
            const lbBody = document.getElementById('v261-lb-body');
            const lbCount = document.getElementById('v261-lb-counter');
            const item = mediaList[currentIdx];
            let html = '';
            if(item.type === 'video') {
                 if(item.url.indexOf('<iframe') !== -1) html = item.url;
                 else html = '<video controls autoplay src="'+item.url+'"></video>';
            } else { html = '<img src="'+item.url+'" onerror="this.src=\'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=800\'">'; }
            lbBody.innerHTML = html;
            lbCount.innerText = (currentIdx + 1) + ' / ' + mediaList.length;
        }

        window.v261Tab = function(k, b) {
            document.querySelectorAll('.v261-tb').forEach(x=>x.classList.remove('active'));
            b.classList.add('active');
            document.querySelectorAll('.v261-pane').forEach(x=>x.classList.remove('active'));
            document.getElementById('v261-'+k).classList.add('active');
        };

        window.grScroll = function(dir, id) { const el = document.getElementById(id); if(el) { const item = el.querySelector('.s2-card') || el.querySelector('.gr-card'); if(item) { const w = item.offsetWidth + 20; el.scrollBy({left: w * dir, behavior: 'smooth'}); } } }

    </script>
</body>
</html>
