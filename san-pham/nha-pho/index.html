    <script>
        const safeBaseUrl = (typeof BASE_URL !== 'undefined') ? BASE_URL : '/greenia-homes/';
        const defaultSeoTitle = "Greenia Homes - Mua bán, cho thuê Nhà phố, Biệt thự, Căn hộ giá tốt";
        const defaultSeoDesc = "Cập nhật các sản phẩm bán, cho thuê giá tốt được phân phối tại Greenia Homes. Các sản phẩm: Nhà phố, căn hộ, biệt thự riêng lẻ và các khu đô thị tại Tp HCM và khu vực lân cận.";
        
        let allProducts = [];
        let allCategories = [];
        let independentProjects = [];
        let filteredData = [];
        const itemsPerPage = 10;
        let currentPage = 1;
        let filterState = { type: '', cat: '', keyword: '' };
        let smartRecommended = [];
        let forYouPage = 1;
        const forYouItemsPerPage = 10;

        function createSafeSlug(title) {
            if(!title) return 'san-pham';
            return String(title).toLowerCase().trim().replace(/\s+/g, '-').replace(/[áàảãạâấầẩẫậăắằẳẵặ]/g, 'a').replace(/[éèẻẽẹêếềểễệ]/g, 'e').replace(/[íìỉĩị]/g, 'i').replace(/[óòỏõọôốồổỗộơớờởỡợ]/g, 'o').replace(/[úùủũụưứừửữự]/g, 'u').replace(/[ýỳỷỹỵ]/g, 'y').replace(/đ/g, 'd').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-');
        }

        function beautifyCatName(slug) {
            if (!slug) return '';
            const words = String(slug).split('-');
            const map = {'ban':'Bán', 'cho':'Cho', 'thue':'Thuê', 'chuyen':'Chuyển', 'nhuong':'Nhượng', 'nha':'Nhà', 'pho':'Phố', 'can':'Căn', 'ho':'Hộ', 'du':'Dự', 'an':'Án', 'quan':'Quận'};
            return words.map(w => map[w.toLowerCase()] || (w.charAt(0).toUpperCase() + w.slice(1))).join(' ');
        }

        function isCatMatch(pData, targetCat) {
            if (!targetCat || targetCat === '') return true;
            const targetSlug = createSafeSlug(targetCat);
            let catsArray = Array.isArray(pData.cat) ? pData.cat : (pData.cat ? String(pData.cat).split(',') : []);
            return catsArray.some(c => createSafeSlug(c) === targetSlug);
        }

        // ĐÃ BỎ HIDEMETA, HIỂN THỊ ĐẦY ĐỦ THÔNG SỐ
        function renderCardHTML(p) {
            const pCat = p.cat ? String(p.cat) : 'san-pham';
            const catSlug = createSafeSlug(pCat);
            const pSlug = p.slug || createSafeSlug(p.title);
            const tagClass = p.type === 'Bán' ? 'tag-ban' : 'tag-thue';
            const tagName = p.type === 'Bán' ? 'Đang bán' : 'Cho thuê';
            const imgUrl = window.resolveImg ? window.resolveImg(p.img) : (p.img || '');
            const link = `${safeBaseUrl}san-pham/${catSlug}/${pSlug}/`;
            const locStr = p.loc ? String(p.loc) : '';
            const locHtml = locStr ? `<div class="gr-loc"><i class="fas fa-map-marker-alt"></i> ${locStr.substring(0,40)}...</div>` : '';
            
            // LUÔN HIỂN THỊ META
            const metaHtml = `
            <div class="gr-meta">
                <span class="gr-hl">${p.price || 'Liên hệ'}</span>
                <div style="display:flex; gap:10px;">
                    <span class="gr-hl" style="font-size:12px;font-weight:400;">${p.area || '--'} m²</span>
                    <span style="color:#444;">|</span> 
                    <span class="gr-hl" style="font-size:12px;font-weight:400;">${p.bed || '--'} PN</span>
                </div>
            </div>`;
            
            return `<a href="${link}" class="s2-card"><div class="s2-thumb-box"><span class="gr-tag-abs ${tagClass}">${tagName}</span><img src="${imgUrl}" onerror="this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=500';"></div><div class="s2-body"><h3 class="gr-tit s2-tit">${p.title}</h3>${locHtml}${metaHtml}</div></a>`;
        }

        function updateSeoUI(targetCatSlug, targetType) {
            let displayTitle = defaultSeoTitle;
            let displayDesc = defaultSeoDesc;
            let searchSlug = targetCatSlug;
            if (targetCatSlug === '') {
                if (targetType === 'Bán') searchSlug = 'chuyen-nhuong'; 
                else if (targetType === 'Thuê') searchSlug = 'cho-thue';
            }
            if (searchSlug !== '') {
                let matchedCat = allCategories.find(c => createSafeSlug(c.slug || c.name) === searchSlug);
                if (matchedCat) {
                    displayTitle = matchedCat.seoTitle || matchedCat.name || beautifyCatName(searchSlug);
                    displayDesc = matchedCat.seoDesc || matchedCat.desc || "";
                } else { displayTitle = beautifyCatName(searchSlug); displayDesc = ""; }
            }
            const titleEl = document.getElementById('luc-seo-title');
            const descEl = document.getElementById('luc-seo-desc');
            const boxEl = document.getElementById('luc-seo-header');
            if(titleEl) titleEl.innerText = displayTitle;
            if(descEl) { descEl.innerHTML = displayDesc; descEl.style.display = displayDesc ? 'block' : 'none'; }
            if(boxEl) boxEl.style.display = 'block';
        }

        document.addEventListener("DOMContentLoaded", async function() {
            const filterBar = document.getElementById('luc-filter-bar');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 100) filterBar.classList.add('is-stuck');
                else filterBar.classList.remove('is-stuck');
            });

            try {
                const [prodRes, catRes, projRes] = await Promise.all([
                    fetch(safeBaseUrl + 'assets/data/products.json').catch(() => null),
                    fetch(safeBaseUrl + 'assets/data/categories.json').catch(() => null),
                    fetch(safeBaseUrl + 'assets/data/projects.json').catch(() => null)
                ]);
                if(prodRes && prodRes.ok) { const prodsData = await prodRes.json(); allProducts = Array.isArray(prodsData) ? prodsData.reverse() : []; }
                if(catRes && catRes.ok) { allCategories = await catRes.json(); }
                if(projRes && projRes.ok) { let pj = await projRes.json(); independentProjects = Array.isArray(pj) ? pj.reverse() : []; }

                const currCat = window.GREENIA_CURRENT_CATEGORY;
                let activeCatSlug = '';

                if (currCat && currCat.slug && currCat.slug !== 'tat-ca-san-pham') {
                    activeCatSlug = currCat.slug;
                    if (currCat.slug === 'ban') { filterState.type = 'Bán'; activeCatSlug = 'chuyen-nhuong'; } 
                    else if (currCat.slug === 'cho-thue') { filterState.type = 'Thuê'; activeCatSlug = 'cho-thue'; }
                    else { filterState.cat = currCat.slug; }
                } else {
                    const paths = window.location.pathname.split('/').filter(Boolean);
                    const slug = paths[paths.length - 1];
                    if (slug && slug !== 'san-pham' && slug !== 'tat-ca-san-pham' && slug.indexOf('.html') === -1) {
                        activeCatSlug = createSafeSlug(slug);
                        if (slug === 'ban' || slug === 'chuyen-nhuong') { filterState.type = 'Bán'; activeCatSlug = 'chuyen-nhuong'; }
                        else if (slug === 'cho-thue' || slug === 'thue') { filterState.type = 'Thuê'; activeCatSlug = 'cho-thue'; }
                        else { filterState.cat = activeCatSlug; }
                    }
                }

                document.querySelectorAll('.luc-nav-item').forEach(t => t.classList.remove('active'));
                if (filterState.type === 'Bán') { document.getElementById('tab-ban').classList.add('active'); }
                else if (filterState.type === 'Thuê') { document.getElementById('tab-thue').classList.add('active'); }
                else if (filterState.cat !== '') { /* handled by dropdown */ }
                else { document.getElementById('tab-all').classList.add('active'); }

                updateSeoUI(activeCatSlug, filterState.type);

                // FIX MENU ĐẾM ĐÚNG CHUẨN XÁC SỐ LƯỢNG SẢN PHẨM TRONG DANH MỤC
                const ddList = document.getElementById('dyn-cat-list');
                let ddListHTML = `<a href="${safeBaseUrl}san-pham.html" class="luc-drop-item ${activeCatSlug === '' ? 'selected' : ''}" data-cat="" data-name="Tất cả danh mục"><span>Tất cả danh mục</span></a>`;
                
                if (allCategories && allCategories.length > 0) {
                    allCategories.forEach(c => {
                        let cleanSlug = createSafeSlug(c.slug || c.name);
                        
                        if(cleanSlug !== 'ban' && cleanSlug !== 'cho-thue' && cleanSlug !== 'chuyen-nhuong') {
                            // CHỈ LỌC NHỮNG SẢN PHẨM NÀO CÓ CHỨA ĐÚNG SLUG CỦA DANH MỤC NÀY
                            let count = allProducts.filter(p => isCatMatch(p, cleanSlug)).length;
                            
                            if (count > 0 || c.showEmpty) {
                                let isSelected = (filterState.cat !== '' && cleanSlug === filterState.cat) ? 'selected' : '';
                                if (isSelected) {
                                    const currentCatNameEl = document.getElementById('luc-current-cat-name');
                                    if(currentCatNameEl) currentCatNameEl.innerText = beautifyCatName(cleanSlug);
                                }
                                ddListHTML += `<a href="${safeBaseUrl}san-pham/${cleanSlug}/" class="luc-drop-item ${isSelected}" data-cat="${cleanSlug}" data-name="${beautifyCatName(cleanSlug)}"><span>${beautifyCatName(cleanSlug)}</span> <span style="color:#666; font-size:10px;">(${count})</span></a>`;
                            }
                        }
                    });
                }
                ddList.innerHTML = ddListHTML;

                runFilter();
                
                let viewedHistory = JSON.parse(localStorage.getItem('greenia_smart_history')) || { cats: [], ids: [] };
                if (viewedHistory.cats.length > 0) {
                    let matchedByCat = allProducts.filter(p => {
                        let pCats = Array.isArray(p.cat) ? p.cat : (typeof p.cat === 'string' ? p.cat.split(',') : []);
                        return pCats.some(c => viewedHistory.cats.includes(createSafeSlug(c)));
                    });
                    matchedByCat = matchedByCat.filter(p => !viewedHistory.ids.includes(p.id));
                    matchedByCat = matchedByCat.sort(() => 0.5 - Math.random());
                    smartRecommended = matchedByCat;
                }
                
                if (smartRecommended.length < 40) { 
                    let fallbackProds = allProducts.filter(p => !smartRecommended.some(sp => sp.id === p.id) && !viewedHistory.ids.includes(p.id))
                        .sort(() => 0.5 - Math.random());
                    smartRecommended = [...smartRecommended, ...fallbackProds];
                }
                
                renderForYouGrid();

                const saleProds = allProducts.filter(p => p.type === 'Bán').slice(0, 10);
                document.getElementById('sale-scroll').innerHTML = saleProds.map(p => renderCardHTML(p)).join('');
                
                const rentProds = allProducts.filter(p => p.type === 'Thuê').slice(0, 10);
                document.getElementById('rent-scroll').innerHTML = rentProds.map(p => renderCardHTML(p)).join('');

                if (independentProjects.length > 0) {
                    document.getElementById('gr-proj-scroll').innerHTML = independentProjects.slice(0, 10).map(p => {
                        const imgUrl = window.resolveImg ? window.resolveImg(p.img) : p.img;
                        return `
                        <a href="${p.link}" class="s2-card">
                            <div class="s2-thumb-box"><span class="gr-tag-abs tag-ban" style="background:#ff9f43; color:#000;">Dự án</span><img src="${imgUrl}"></div>
                            <div class="s2-body"><h3 class="gr-tit s2-tit">${p.title}</h3><div style="margin-top:auto; font-size:11px; color:#888;"><i class="far fa-star" style="color:#c5a059;"></i> Đang mở bán</div></div>
                        </a>`;
                    }).join('');
                }

            } catch (e) {
                console.log(e);
                document.getElementById('luc-grid-result').innerHTML = "<div style='grid-column:1/-1; text-align:center; padding:50px; color:#ff4d4f;'>Không thể tải dữ liệu sản phẩm. Vui lòng F5 lại trang.</div>";
                document.querySelector('.luc-loader').style.display = 'none';
            }
        });

        function runFilter(isLoadMore = false) {
            if(!isLoadMore) currentPage = 1;
            
            filteredData = allProducts.filter(p => {
                if(filterState.keyword !== '') {
                    const kw = filterState.keyword.toLowerCase();
                    return (p.title && String(p.title).toLowerCase().includes(kw)) || 
                           (p.loc && String(p.loc).toLowerCase().includes(kw)) || 
                           (p.cat && String(p.cat).toLowerCase().includes(kw));
                }
                
                let matchType = true;
                if (filterState.type === 'Bán') matchType = (p.type === 'Bán');
                else if (filterState.type === 'Thuê') matchType = (p.type === 'Thuê');
                
                let matchCat = true;
                if (filterState.cat !== '') matchCat = isCatMatch(p, filterState.cat);
                
                return matchType && matchCat;
            });

            const statusDiv = document.getElementById('luc-search-status');
            if(filterState.keyword !== '') {
                statusDiv.style.display = 'flex';
                statusDiv.innerHTML = `Tìm thấy <strong class="luc-count-badge" style="margin: 0 5px;">${filteredData.length}</strong> kết quả cho: "<strong>${filterState.keyword}</strong>" <span style='cursor:pointer;color:#ff6b6b;text-decoration:underline;margin-left:10px;' onclick='clearLucSearch()'>Xóa</span>`;
            } else { statusDiv.style.display = 'none'; }

            const paginatedData = filteredData.slice(0, currentPage * itemsPerPage);
            const grid = document.getElementById('luc-grid-result');
            
            if(paginatedData.length > 0) {
                grid.innerHTML = paginatedData.map(p => renderCardHTML(p)).join('');
            } else {
                grid.innerHTML = "<div style='grid-column:1/-1;text-align:center;padding:50px;color:#888;'>Không tìm thấy sản phẩm phù hợp.</div>";
            }

            const loadBtnWrap = document.querySelector('.luc-load-wrap');
            if(paginatedData.length >= filteredData.length) { loadBtnWrap.style.display = 'none'; } 
            else { loadBtnWrap.style.display = 'block'; document.getElementById('luc-load-more-btn').innerHTML = "XEM THÊM <i class='fas fa-chevron-down'></i>"; }
        }

        // ĐÃ SỬA: SỬ DỤNG LẠI HÀM RENDERCARD CÓ ĐẦY ĐỦ THÔNG SỐ (BỎ QUA THUỘC TÍNH HIDEMETA)
        function renderForYouGrid() {
            const grid = document.getElementById('foryou-grid-v67');
            const wrap = document.getElementById('foryou-load-wrap-v67');
            const paginated = smartRecommended.slice(0, forYouPage * forYouItemsPerPage);
            
            if (paginated.length > 0) {
                grid.innerHTML = paginated.map(p => renderCardHTML(p)).join('');
                if (paginated.length >= smartRecommended.length) {
                    wrap.style.display = 'none';
                } else {
                    wrap.style.display = 'block';
                }
            } else {
                grid.innerHTML = "<p style='color:#888; text-align:center; grid-column:1/-1;'>Chưa có gợi ý.</p>";
            }
        }

        document.querySelectorAll('.luc-nav-item:not(.luc-dd-trigger)').forEach(tab => {
            tab.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.luc-nav-item').forEach(t => t.classList.remove('active')); this.classList.add('active');
                
                filterState.type = this.getAttribute('data-type') || '';
                filterState.cat = ''; 
                
                document.querySelectorAll('.luc-drop-item').forEach(i => i.classList.remove('selected'));
                document.getElementById('luc-current-cat-name').innerText = "Danh mục khác";
                
                updateSeoUI('', filterState.type);

                clearLucSearch(false); 
                runFilter(); 
                window.scrollTo({ top: document.getElementById('luc-grid-anchor').getBoundingClientRect().top + window.scrollY - 120, behavior: 'smooth' });
            });
        });

        document.getElementById('dyn-cat-list').addEventListener('click', function(e) {
            const item = e.target.closest('.luc-drop-item');
            if(item) {
                e.preventDefault();
                document.querySelectorAll('.luc-drop-item').forEach(i => i.classList.remove('selected')); item.classList.add('selected');
                document.querySelectorAll('.luc-nav-item').forEach(t => t.classList.remove('active')); document.getElementById('tab-all').classList.add('active');
                
                filterState.cat = item.getAttribute('data-cat'); 
                filterState.type = ''; 
                filterState.keyword = ''; 
                document.getElementById('luc-keyword').value = '';
                
                const catName = item.getAttribute('data-name');
                document.getElementById('luc-current-cat-name').innerText = catName;
                document.getElementById('luc-cat-dropdown-group').classList.remove('active-drop');
                
                updateSeoUI(filterState.cat, '');

                runFilter(); 
                window.scrollTo({ top: document.getElementById('luc-grid-anchor').getBoundingClientRect().top + window.scrollY - 100, behavior: 'smooth' });
            }
        });

        document.getElementById('luc-search-form').addEventListener('submit', function(e) {
            e.preventDefault(); const val = document.getElementById('luc-keyword').value.trim();
            if(val !== '') { 
                filterState.keyword = val; 
                document.getElementById('luc-seo-header').style.display = 'none';
                runFilter(); 
                window.scrollTo({ top: document.getElementById('luc-grid-anchor').getBoundingClientRect().top + window.scrollY - 100, behavior: 'smooth' });
            }
        });

        document.getElementById('luc-load-more-btn').addEventListener('click', function() { this.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Đang tải..."; currentPage++; setTimeout(() => runFilter(true), 300); });
        
        document.getElementById('foryou-load-btn-v67').addEventListener('click', function() { this.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Đang tải..."; forYouPage++; setTimeout(() => renderForYouGrid(), 300); });

        window.clearLucSearch = function(doRun = true) { 
            filterState.keyword = ''; document.getElementById('luc-keyword').value = ''; 
            updateSeoUI(filterState.cat, filterState.type);
            if(doRun) runFilter(); 
        }

        const ddGroup = document.getElementById('luc-cat-dropdown-group');
        ddGroup.querySelector('.luc-dd-trigger').addEventListener('click', function(e) {
            e.preventDefault(); e.stopPropagation(); ddGroup.classList.toggle('active-drop');
        });
        document.addEventListener('click', e => { if(!ddGroup.contains(e.target)) ddGroup.classList.remove('active-drop'); });

        var grScrollTimer;
        window.grScroll = function(dir, id) { const el = document.getElementById(id); if(el) { const item = el.querySelector('.s2-card'); if(item) { const w = item.offsetWidth + 20; el.scrollBy({left: w * dir, behavior: 'smooth'}); } } }
        window.grPlay = function() { grScrollTimer = setInterval(function() { window.grScroll(1, 'gr-proj-scroll'); }, 4000); }
        window.grPause = function() { clearInterval(grScrollTimer); }
        grPlay();
    </script>
</body>
</html>
