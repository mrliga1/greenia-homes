        #luc-search-btn { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); color: #c5a059; font-size: 13px; cursor: pointer; z-index: 5; background: transparent; border: none; outline: none; padding: 5px 10px; }

        /* CSS CHO KHỐI XEM THÊM DANH MỤC TRONG BÀI VIẾT ĐÃ SỬA THEO YÊU CẦU */
        .v261-readmore-cat { margin-top: 30px; padding-top: 20px; border-top: 1px dashed rgba(197, 160, 89, 0.3); font-size: 14px; color: #b0b8c4; display: flex; align-items: center; flex-wrap: wrap; gap: 5px;}
        .v261-readmore-cat span { color: #888; margin-right: 5px; }

        /* LIGHTBOX CSS */
        .v261-lb-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); backdrop-filter:blur(8px); z-index:99999; display:none; justify-content:center; align-items:center; opacity:0; transition:opacity 0.3s; }

utton><button class="btn-action del-btn" onclick="deleteItem(${item.id}, '${item.typeKey}')"><i class="fas fa-trash"></i></button></div></div>`; }); container.innerHTML = html || "<div style='text-align:center;color:#666;'>Trống.</div>"; }

    function slugify(text) { return text.toString().toLowerCase().trim().replace(/\s+/g, '-').replace(/[áàảãạâấầẩẫậăắằẳẵặ]/g, 'a').replace(/[éèẻẽẹêếềểễệ]/g, 'e').replace(/[íìỉĩị]/g, 'i').replace(/[óòỏõọôốồổỗộơớờởỡợ]/g, 'o').replace(/[úùủũụưứừửữự]/g, 'u').replace(/[ýỳỷỹỵ]/g, 'y').replace(/đ/g, 'd').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-'); }

    async function getTemplateFile(fileName) {

            const url = `/${CONFIG.repo}/${fileName}?t=${Date.now()}`;
            const response = await fetch(url, { cache: "no-store" });
            if (!response.ok) throw new Error("Lỗi HTTP: " + response.status);
            return await response.text();
        } catch (error) {
            console.error(`Không thể tải khuôn mẫu ${fileName}:`, error);
            alert(`LỖI: Không tìm thấy file khuôn mẫu '${fileName}' trên web của bác! \nVui lòng đảm bảo file này đang tồn tại trên GitHub.`);
            return null;
        }
    }

    ================================================================= */
    async function createGithubFile(path, contentStr, commitMessage) {
        if (!TOKEN_GITHUB) { alert("CẢNH BÁO: Bác chưa điền mã TOKEN_GITHUB!"); return false; }
        try {
            let currentSha = null;
            // API Get phải truyền tham số ?t để lấy SHA mới nhất chống Cache
            const checkUrl = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}?t=${Date.now()}`;
            const checkRes = await fetch(checkUrl, { headers: { "Authorization": `token ${TOKEN_GITHUB}` } });
            
            if (checkRes.status === 401) { alert("MÃ TOKEN GITHUB BỊ LỖI HOẶC BỊ KHÓA!\nVui lòng vào GitHub tạo lại Token mới!"); return false; }
            if (checkRes.ok) { const checkData = await checkRes.json(); currentSha = checkData.sha; }

            const bodyData = { message: commitMessage, content: btoa(unescape(encodeURIComponent(contentStr))) };
            if (currentSha) bodyData.sha = currentSha;

            // API Put KHÔNG được chứa tham số ?t (Nếu không sẽ bị lỗi Invalid Request)
            const putUrl = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`;
            const res = await fetch(putUrl, {
                method: "PUT", headers: { "Authorization": `token ${TOKEN_GITHUB}`, "Content-Type": "application/json" }, body: JSON.stringify(bodyData)
            });
            
            if(res.ok) return true;
            else { const errData = await res.json(); alert(`Lỗi lưu file GitHub: ${errData.message}`); return false; }
        } catch (e) { console.error(e); alert("Lỗi mạng khi ghi file Github."); return false; }
    }

    /* =================================================================
       8. CÁC HÀM BƠM DỮ LIỆU VÀO TEMPLATE HTML
    ================================================================= */
    async function autoCreateCategoryFolder(catData) {
        let folderName = '';
        if (catData.type === 'prod') folderName = 'san-pham';
        else if (catData.type === 'news') folderName = 'tin-tuc';
        else if (catData.type === 'proj') folderName = 'du-an';
        else return false;

        const path = `${folderName}/${catData.slug}/index.html`;
        let templateHtml = await getTemplateFile('danh-muc-sp.html');
        if (!templateHtml) return false;

        let finalHtml = templateHtml
            .replace(/\{\{TITLE\}\}/g, () => catData.seoTitle || catData.title)
            .replace(/\{\{DESC\}\}/g, () => catData.seoDesc || catData.desc || '')
            .replace(/\{\{KEYWORDS\}\}/g, () => catData.seoKeywords || `${catData.title}, greenia homes`)
            .replace(/\{\{FOLDER\}\}/g, () => folderName)
            .replace(/\{\{SLUG\}\}/g, () => catData.slug);

        return await createGithubFile(path, finalHtml, `Cập nhật danh mục: ${catData.title}`);
    }

    async function autoCreateProductFolder(prodData) {

        if (!templateHtml) return false;

        let finalHtml = templateHtml
            .replace(/\{\{TITLE\}\}/g, () => prodData.seoTitle || prodData.title)
            .replace(/\{\{TITLE_JSON\}\}/g, () => (prodData.title || "").replace(/"/g, '\\"'))
            .replace(/\{\{DESC\}\}/g, () => prodData.seoDesc || '')
            .replace(/\{\{KEYWORDS\}\}/g, () => prodData.seoKeywords || `${prodData.title}, greenia homes`)
            .replace(/\{\{CAT_SLUG\}\}/g, () => catSlug)
            .replace(/\{\{SLUG\}\}/g, () => prodData.slug)
            .replace(/\{\{ID\}\}/g, () => prodData.id)
            .replace(/\{\{TYPE\}\}/g, () => prodData.type || 'Bán')
            .replace(/\{\{CAT\}\}/g, () => prodData.cat || '')
            .replace(/\{\{LOC\}\}/g, () => prodData.loc ? prodData.loc.replace(/"/g, '\\"') : '')
            .replace(/\{\{PRICE\}\}/g, () => prodData.price || '')
            .replace(/\{\{AREA\}\}/g, () => prodData.area || '')
            .replace(/\{\{DIR\}\}/g, () => prodData.dir || '')
            .replace(/\{\{FLOOR\}\}/g, () => prodData.floor || '')
            .replace(/\{\{BED\}\}/g, () => prodData.bed || '')
            .replace(/\{\{WC\}\}/g, () => prodData.wc || '')
            .replace(/\{\{FRONT\}\}/g, () => prodData.front || '')
            .replace(/\{\{LEGAL\}\}/g, () => prodData.legal || '')
            .replace(/\{\{IMG\}\}/g, () => prodData.img || '')
            .replace(/\{\{GALLERY_JSON\}\}/g, () => JSON.stringify(prodData.gallery || []))
            .replace(/\{\{VIDEO\}\}/g, () => prodData.video || '')
            .replace(/\{\{MAP_JSON\}\}/g, () => prodData.map ? prodData.map.replace(/"/g, '\\"').replace(/\n/g, '') : '')
            .replace(/\{\{CONTENT_JSON\}\}/g, () => prodData.content ? prodData.content.replace(/\\/g, '\\\\').replace(/\`/g, '\\`').replace(/\$/g, '\\$') : '');

        return await createGithubFile(path, finalHtml, `Đăng/Sửa SP: ${prodData.title}`);
    }

    async function autoCreateNewsFolder(newsData) {

        const path = `tin-tuc/${catSlug}/${newsData.slug}/index.html`;

            .replace(/\{\{DATE\}\}/g, () => newsData.date || '')
            .replace(/\{\{AUTHOR\}\}/g, () => newsData.author || '')
            .replace(/\{\{CONTENT_JSON\}\}/g, () => newsData.content ? newsData.content.replace(/\\/g, '\\\\').replace(/\`/g, '\\`').replace(/\$/g, '\\$') : '');

    async function autoCreateProjectFolder(projData) {
        const path = `du-an/${projData.slug}/index.html`;
        let templateHtml = await getTemplateFile('chi-tiet-da.html'); // Nếu bác có file chi-tiet-da.html
        if (!templateHtml) return false;

        let finalHtml = templateHtml
            .replace(/\{\{TITLE\}\}/g, () => projData.seoTitle || projData.title)
            .replace(/\{\{TITLE_JSON\}\}/g, () => (projData.title || "").replace(/"/g, '\\"'))
            .replace(/\{\{DESC\}\}/g, () => projData.seoDesc || '')
            .replace(/\{\{KEYWORDS\}\}/g, () => projData.seoKeywords || `${projData.title}, greenia homes`)
            .replace(/\{\{SLUG\}\}/g, () => projData.slug)
            .replace(/\{\{STATUS\}\}/g, () => projData.status || '')
            .replace(/\{\{LOC\}\}/g, () => projData.loc ? projData.loc.replace(/"/g, '\\"') : '')
            .replace(/\{\{PRICE\}\}/g, () => projData.price || '')
            .replace(/\{\{IMG\}\}/g, () => projData.img || '');

        return await createGithubFile(path, finalHtml, `Đăng dự án: ${projData.title}`);
    }

    /* =================================================================
       9. PUSHDATA TỔNG HỢP: LƯU FIREBASE VÀ ĐÚC GITHUB ĐỒNG BỘ
    ================================================================= */
    async function pushData(type) {
        const collectionMap = { 'prod': 'products', 'news': 'posts', 'proj': 'projects', 'cat': 'categories' };
        const colName = collectionMap[type];
        
        let titleVal, slugVal, contentVal, rawDesc, autoDesc, newData;
        const btn = document.getElementById(`btn-submit-${type}`);
        const originalBtnText = btn.innerHTML;

        if (type === 'prod') {
            titleVal = document.getElementById('p-title').value; if(!titleVal) { alert("Tiêu đề Sản phẩm là bắt buộc!"); return; }
            slugVal = document.getElementById('p-slug').value || slugify(titleVal); contentVal = CKEDITOR.instances['p-content'].getData(); rawDesc = document.getElementById('p-seo-desc').value; autoDesc = contentVal.replace(/<[^>]*>?/gm, '').substring(0, 150) + "...";
            newData = { id: parseInt(document.getElementById('p-id').value) || Date.now(), type: document.getElementById('p-type').value, title: titleVal, slug: slugVal, cat: document.getElementById('p-cat').value, projectCode: document.getElementById('p-projectCode').value || "", loc: document.getElementById('p-loc').value, price: document.getElementById('p-price').value, area: document.getElementById('p-area').value, dir: document.getElementById('p-dir').value || "", floor: document.getElementById('p-floor').value || "", bed: document.getElementById('p-bed').value || "", wc: document.getElementById('p-wc').value || "", front: document.getElementById('p-front').value || "", legal: document.getElementById('p-legal').value || "", map: document.getElementById('p-map').value || "", img: uploadedFiles.main, gallery: uploadedFiles.gallery, content: contentVal, seoTitle: document.getElementById('p-seo-title').value || titleVal, seoDesc: rawDesc || autoDesc, seoKeywords: document.getElementById('p-seo-key').value || `${document.getElementById('p-cat').value}, bất động sản` };
        } else if (type === 'news') {
            titleVal = document.getElementById('n-title').value; if(!titleVal) { alert("Tiêu đề Tin tức là bắt buộc!"); return; }
            slugVal = document.getElementById('n-slug').value || slugify(titleVal); contentVal = CKEDITOR.instances['n-content'].getData(); rawDesc = document.getElementById('n-seo-desc').value; autoDesc = contentVal.replace(/<[^>]*>?/gm, '').substring(0, 150) + "...";
            newData = { id: parseInt(document.getElementById('n-id').value) || Date.now(), title: titleVal, slug: slugVal, cat: document.getElementById('n-cat').value, date: document.getElementById('n-date').value, author: document.getElementById('n-author').value, thumb: uploadedFiles.newsThumb, content: contentVal, seoTitle: document.getElementById('n-seo-title').value || titleVal, seoDesc: rawDesc || autoDesc, seoKeywords: document.getElementById('n-seo-key').value || `${document.getElementById('n-cat').value}, tin tức` };
        } else if (type === 'proj') {
            titleVal = document.getElementById('pj-title').value; if(!titleVal) { alert("Tên Dự án là bắt buộc!"); return; }
            slugVal = document.getElementById('pj-slug').value || slugify(titleVal);
            newData = { id: parseInt(document.getElementById('pj-id').value) || Date.now(), title: titleVal, slug: slugVal, status: document.getElementById('pj-status').value, loc: document.getElementById('pj-loc').value, price: document.getElementById('pj-price').value, img: uploadedFiles.projMain, link: `${GITHUB_PAGES_DOMAIN}/du-an/${slugVal}/`, seoTitle: document.getElementById('pj-seo-title').value || titleVal, seoDesc: document.getElementById('pj-seo-desc').value || `Dự án ${titleVal}`, seoKeywords: document.getElementById('pj-seo-key').value || `dự án ${titleVal}, bất động sản` };
        } else if (type === 'cat') {
            titleVal = document.getElementById('c-title').value; if(!titleVal) { alert("Tên Danh mục là bắt buộc!"); return; }
            slugVal = document.getElementById('c-slug').value || slugify(titleVal); rawDesc = document.getElementById('c-seo-desc').value;
            newData = { id: parseInt(document.getElementById('c-id').value) || Date.now(), type: document.getElementById('c-type').value, title: titleVal, slug: slugVal, desc: document.getElementById('c-desc').value, seoTitle: document.getElementById('c-seo-title').value || titleVal, seoDesc: rawDesc || document.getElementById('c-desc').value, seoKeywords: document.getElementById('c-seo-key').value || `${titleVal}, bất động sản` };
        }

        try {
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ĐANG LƯU VÀO FIREBASE...'; btn.disabled = true;
            await db.collection(colName).doc(String(newData.id)).set(newData);
            
            // Cập nhật Data nội bộ ngay để Danh mục lấy được sản phẩm vừa lưu
            let targetArray = currentData[collectionMap[type] === 'posts' ? 'posts' : colName];
            const idx = targetArray.findIndex(item => item.id === newData.id);
            if (idx !== -1) targetArray[idx] = newData; else targetArray.push(newData);

            btn.innerHTML = '<i class="fas fa-sync fa-spin"></i> ĐANG TẠO TRANG CHI TIẾT...';
            let gitSuccess = false;
            
            if (type === 'cat') gitSuccess = await autoCreateCategoryFolder(newData);
            else if (type === 'prod') {
                gitSuccess = await autoCreateProductFolder(newData);
                // ĐỒNG BỘ: Cập nhật lại trang Danh Mục chứa sản phẩm này
                if(newData.cat && gitSuccess) {
                    btn.innerHTML = '<i class="fas fa-sync fa-spin"></i> ĐANG CẬP NHẬT DANH MỤC...';
                    let matchedCat = currentData.categories.find(c => c.title === newData.cat || c.slug === slugify(newData.cat));
                    if (matchedCat) await autoCreateCategoryFolder(matchedCat);
                }
            }
            else if (type === 'news') {
                gitSuccess = await autoCreateNewsFolder(newData);
                // ĐỒNG BỘ: Cập nhật lại trang Danh Mục chứa tin tức này
                if(newData.cat && gitSuccess) {
                    btn.innerHTML = '<i class="fas fa-sync fa-spin"></i> ĐANG CẬP NHẬT DANH MỤC...';
                    let matchedCat = currentData.categories.find(c => c.title === newData.cat || c.slug === slugify(newData.cat));
                    if (matchedCat) await autoCreateCategoryFolder(matchedCat);
                }
            }
            else if (type === 'proj') gitSuccess = await autoCreateProjectFolder(newData);

            if (gitSuccess) {
                alert(`Xuất bản thành công! Đã đồng bộ Database và đúc trang GitHub.`);
                cancelEdit(); buildLinkLibrary(); 
            }
        } catch(e) { alert("LỖI:\n" + e.message); }
        btn.innerHTML = originalBtnText; btn.disabled = false;
    }
