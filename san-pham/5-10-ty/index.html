        const defaultSeoDesc = "Cập nhật các sản phẩm bán, cho thuê giá tốt được phân phối tại Greenia Homes. Các sản phẩm: Nhà phố, căn hộ, biệt thự riêng lẻ và các khu đô thị tại Tp HCM và khu vực lân cận.";

        let independentProjects = [];
        let filteredData = [];

        try { defaultCat = { slug: "5-10-ty", name: "5- 10 tỷ", desc: "" }; } catch(e) {}
        window.GREENIA_CURRENT_CATEGORY = defaultCat;
        
        let filterState = { mainType: '', catType: '', catPrice: '', catLoc: '', keyword: '' };
        
        let smartRecommended = [];
        let forYouPage = 1;
        const forYouItemsPerPage = 10;

        function createSafeSlug(title) {
            if(!title) return 'san-pham';
            return String(title).toLowerCase().trim().replace(/\s+/g, '-').replace(/[áàảãạâấầẩẫậăắằẳẵặ]/g, 'a').replace(/[éèẻẽẹêếềểễệ]/g, 'e').replace(/[íìỉĩị]/g, 'i').replace(/[óòỏõọôốồổỗộơớờởỡợ]/g, 'o').replace(/[úùủũụưứừửữự]/g, 'u').replace(/[ýỳỷỹỵ]/g, 'y').replace(/đ/g, 'd').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-');
        }

        function beautifyCatName(slug) {
            if (!slug) return '';
            const words = String(slug).split('-');
            const map = {'ban':'Bán', 'cho':'Cho', 'thue':'Thuê', 'chuyen':'Chuyển', 'nhuong':'Nhượng', 'nha':'Nhà', 'pho':'Phố', 'can':'Căn', 'ho':'Hộ', 'du':'Dự', 'an':'Án', 'quan':'Quận'};
            return words.map(w => map[w.toLowerCase()] || (w.charAt(0).toUpperCase() + w.slice(1))).join(' ');
        }

        function extractCatsSafely(catData) {
            if (!catData) return [];
            if (typeof catData === 'string' && catData.startsWith('[') && catData.endsWith(']')) {
                try {
                    let parsed = JSON.parse(catData);
                    return parsed.map(c => String(c).trim()).filter(c => c !== '');
                } catch(e) {}
            }
            let catsArr = typeof catData === 'string' ? catData.split(',') : (Array.isArray(catData) ? catData : []);
            return catsArr.map(c => String(c).replace(/['"\[\]{}]/g, '').trim()).filter(c => c !== '');
        }

        function getPrimaryCatSlug(catData, defaultSlug) {
            if (!catData) return defaultSlug;
            let cleanArray = extractCatsSafely(catData);
            if(cleanArray.length > 0) return createSafeSlug(cleanArray[0]);
            return defaultSlug;
        }

        function isCatMatch(pData, targetSlug) {
            if (!targetSlug || targetSlug === '') return true;
            let catsArray = extractCatsSafely(pData.cat);
            return catsArray.some(c => createSafeSlug(c) === targetSlug);
        }

        function renderCardHTML(p) {
            const catSlug = getPrimaryCatSlug(p.cat, 'san-pham');
            const pSlug = p.slug || createSafeSlug(p.title);
            
            const tagClass = p.type === 'Bán' ? 'tag-ban' : 'tag-thue';
            const tagName = p.type === 'Bán' ? 'Đang bán' : 'Cho thuê';
            const imgUrl = window.resolveImg ? window.resolveImg(p.img) : (p.img || '');
            const fallbackImg = "https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=600";
            
            const link = `${safeBaseUrl}san-pham/${catSlug}/${pSlug}/`;
            
            const locStr = p.loc ? String(p.loc) : '';
            const locHtml = locStr ? `<div class="gr-loc"><i class="fas fa-map-marker-alt"></i> ${locStr.substring(0,40)}...</div>` : '';
            const areaHtml = p.area ? `<span class="gr-hl" style="font-size:12px;font-weight:400;">${p.area} m²</span>` : '';
            const bedHtml = p.bed ? `<span style="color:#444;">|</span> <span class="gr-hl" style="font-size:12px;font-weight:400;">${p.bed} PN</span>` : '';

            return `
            <a href="${link}" class="s2-card">
                <div class="s2-thumb-box">
                    <span class="gr-tag-abs ${tagClass}">${tagName}</span>
                    <img src="${imgUrl}" onerror="this.onerror=null; this.src='${fallbackImg}';">
                </div>
                <div class="s2-body">
                    <h3 class="gr-tit s2-tit">${p.title}</h3>
                    ${locHtml}
                    <div class="gr-meta">
                        <span class="gr-hl">${p.price || 'Liên hệ'}</span>
                        <div style="display:flex; gap:10px;">${areaHtml}${bedHtml}</div>
                    </div>
                </div>
            </a>`;
        }

        function updateSeoUI(targetCatSlug, targetType) {
            let displayTitle = "Danh mục Bất động sản";
            let displayDesc = "Danh sách các bất động sản đang bán và cho thuê giá tốt nhất tại Greenia Homes.";
            let searchSlug = targetCatSlug;
            
            if (!searchSlug || searchSlug === '') {
                if (targetType === 'Bán') {
                    displayTitle = "Bất động sản Đang Bán";
                    displayDesc = "Cập nhật danh sách nhà phố, biệt thự, căn hộ đang chào bán mới nhất tại Greenia Homes.";
                } else if (targetType === 'Thuê') {
                    displayTitle = "Bất động sản Cho Thuê";
                    displayDesc = "Cập nhật danh sách nhà phố, biệt thự, căn hộ cho thuê giá tốt nhất tại Greenia Homes.";
                } else {
                    displayTitle = defaultSeoTitle;
                    displayDesc = defaultSeoDesc;
                }
            } else {
                let matchedCat = allCategories.find(c => createSafeSlug(c.slug || c.title || c.name) === searchSlug);
                if (matchedCat) {
                    displayTitle = matchedCat.seoTitle || matchedCat.title || matchedCat.name || beautifyCatName(searchSlug);
                    displayDesc = matchedCat.seoDesc || matchedCat.desc || "";
                } else { 
                    displayTitle = beautifyCatName(searchSlug); 
                    displayDesc = ""; 
                }
            }
            
            const titleEl = document.getElementById('luc-seo-title');
            const descEl = document.getElementById('luc-seo-desc');
            const boxEl = document.getElementById('luc-seo-header');
            
            if(titleEl) titleEl.innerText = displayTitle;
            if(descEl) { 
                descEl.innerHTML = displayDesc; 
                descEl.style.display = displayDesc ? 'block' : 'none'; 
            }
            if(boxEl) boxEl.style.display = 'block';
        }

        document.addEventListener("DOMContentLoaded", async function() {
            const urlParams = new URLSearchParams(window.location.search);
            let keywordFromUrl = urlParams.get('keyword');
            
            let initialCatSlug = '';
            let pathParts = window.location.pathname.replace(/\/index\.html$/, '').replace(/\/$/, '').split('/').filter(Boolean);
            if (pathParts.length >= 2 && pathParts[0] === 'san-pham') {
                initialCatSlug = createSafeSlug(pathParts[pathParts.length - 1]);
                if (initialCatSlug === 'san-pham') initialCatSlug = '';
            }

            if (keywordFromUrl) {
                filterState.keyword = keywordFromUrl;
                let searchInput = document.getElementById('luc-keyword');
                if (searchInput) searchInput.value = keywordFromUrl;
            }

            try {
                document.querySelector('.luc-loader').classList.add('show');
                const [pSnap, cSnap, pjSnap] = await Promise.all([
                    db.collection('products').get(),
                    db.collection('categories').get(),
                    db.collection('projects').get()
                ]);

                allProducts = pSnap.docs.map(d => d.data()).sort((a,b) => b.id - a.id);
                allCategories = cSnap.docs.map(d => d.data());
                independentProjects = pjSnap.docs.map(d => d.data()).sort((a,b) => b.id - a.id);

                document.querySelectorAll('.luc-nav-item:not(.luc-dd-trigger)').forEach(t => t.classList.remove('active'));
                
                if (initialCatSlug === 'chuyen-nhuong') {
                    const b = document.getElementById('tab-ban'); if(b) b.classList.add('active');
                    filterState.mainType = 'Bán';
                } else if (initialCatSlug === 'cho-thue') {
                    const t = document.getElementById('tab-thue'); if(t) t.classList.add('active');
                    filterState.mainType = 'Thuê';
                } else if (initialCatSlug) {
                    let matchedCat = allCategories.find(c => createSafeSlug(c.slug || c.name) === initialCatSlug);
                    if (matchedCat) {
                        let grp = matchedCat.group || 'type';
                        if (grp === 'price') filterState.catPrice = initialCatSlug;
                        else if (grp === 'loc') filterState.catLoc = initialCatSlug;
                        else filterState.catType = initialCatSlug;
                    } else {
                        filterState.catType = initialCatSlug; 
                    }
                } else {
                    const a = document.getElementById('tab-all'); if(a) a.classList.add('active');
                }

                let ddTypeHTML = '';
                let ddPriceHTML = '';
                let ddLocHTML = '';

                if (allCategories && allCategories.length > 0) {
                    let prodCategories = allCategories.filter(c => c.type === 'prod' || !c.type);
                    prodCategories.forEach(c => {
                        let catName = c.title || c.name || "";
                        let cleanSlug = createSafeSlug(c.slug || catName);
                        let catGroup = c.group || 'type'; 
                        
                        if(cleanSlug !== 'ban' && cleanSlug !== 'cho-thue' && cleanSlug !== 'chuyen-nhuong' && catName !== '') {
                            let count = allProducts.filter(p => isCatMatch(p, cleanSlug)).length;
                            if (count > 0 || c.showEmpty) {
                                let isSelected = false;
                                if (catGroup === 'price' && filterState.catPrice === cleanSlug) isSelected = true;
                                if (catGroup === 'loc' && filterState.catLoc === cleanSlug) isSelected = true;
                                if (catGroup === 'type' && filterState.catType === cleanSlug) isSelected = true;

                                let textColor = isSelected ? '#c5a059' : '#b0b8c4';
                                let fontWeight = isSelected ? '700' : '400';
                                let bgHoverClass = isSelected ? 'background: rgba(197, 160, 89, 0.1);' : '';
                                
                                let itemUrl = `${safeBaseUrl}san-pham/${cleanSlug}/`;
                                
                                let itemHTML = `<a href="${itemUrl}" class="luc-drop-item" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; color: ${textColor}; font-size: 13px; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: ${fontWeight}; ${bgHoverClass}"><span>${catName}</span> <span style="color:#666; font-size:10px;">(${count})</span></a>`;
                                
                                if (catGroup === 'price') ddPriceHTML += itemHTML;
                                else if (catGroup === 'loc') ddLocHTML += itemHTML;
                                else ddTypeHTML += itemHTML;
                            }
                        }
                    });
                }

                document.getElementById('dyn-cat-type').innerHTML = `<a href="${safeBaseUrl}san-pham/" class="luc-drop-item" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; font-size: 13px; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); color: ${!filterState.catType ? '#c5a059' : '#b0b8c4'}; font-weight: ${!filterState.catType ? '700' : '400'};"><span>Tất cả Loại hình</span></a>` + ddTypeHTML;
                document.getElementById('dyn-cat-price').innerHTML = `<a href="${safeBaseUrl}san-pham/" class="luc-drop-item" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; font-size: 13px; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); color: ${!filterState.catPrice ? '#c5a059' : '#b0b8c4'}; font-weight: ${!filterState.catPrice ? '700' : '400'};"><span>Tất cả Khoảng giá</span></a>` + ddPriceHTML;
                document.getElementById('dyn-cat-loc').innerHTML = `<a href="${safeBaseUrl}san-pham/" class="luc-drop-item" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; font-size: 13px; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); color: ${!filterState.catLoc ? '#c5a059' : '#b0b8c4'}; font-weight: ${!filterState.catLoc ? '700' : '400'};"><span>Tất cả Khu vực</span></a>` + ddLocHTML;

                if(filterState.catType) {
                    let n = allCategories.find(c => createSafeSlug(c.slug || c.name) === filterState.catType);
                    if(n) document.getElementById('lbl-cat-type').innerText = n.title || n.name;
                }
                if(filterState.catPrice) {
                    let n = allCategories.find(c => createSafeSlug(c.slug || c.name) === filterState.catPrice);
                    if(n) document.getElementById('lbl-cat-price').innerText = n.title || n.name;
                }
                if(filterState.catLoc) {
                    let n = allCategories.find(c => createSafeSlug(c.slug || c.name) === filterState.catLoc);
                    if(n) document.getElementById('lbl-cat-loc').innerText = n.title || n.name;
                }

                const saleProds = allProducts.filter(p => p.type === 'Bán');
                window.allSaleProdsData = saleProds;
                const saleScroll = document.getElementById('sale-scroll');
                if (saleScroll) {
                    if (saleProds.length > 0) {
                        saleScroll.innerHTML = saleProds.slice(0, 10).map(p => renderCardHTML(p)).join('');
                    } else {
                        saleScroll.innerHTML = '<div style="color:#888; padding:20px; font-style:italic;">Chưa có dữ liệu.</div>';
                    }
                }

                const rentProds = allProducts.filter(p => p.type === 'Thuê');
                window.allRentProdsData = rentProds;
                const rentScroll = document.getElementById('rent-scroll');
                if (rentScroll) {
                    if (rentProds.length > 0) {
                        rentScroll.innerHTML = rentProds.slice(0, 10).map(p => renderCardHTML(p)).join('');
                    } else {
                        rentScroll.innerHTML = '<div style="color:#888; padding:20px; font-style:italic;">Chưa có dữ liệu.</div>';
                    }
                }

                const projScroll = document.getElementById('gr-proj-scroll');
                if (projScroll) {
                    if (independentProjects.length > 0) {
                        projScroll.innerHTML = independentProjects.slice(0, 10).map(p => {
                            const imgUrl = window.resolveImg ? window.resolveImg(p.img) : (p.img || '');
                            return `<a href="${p.link}" class="s2-card">
                                <div class="s2-thumb-box"><span class="gr-tag-abs tag-ban" style="background:#ff9f43; color:#000;">Dự án</span><img src="${imgUrl}" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=500';"></div>
                                <div class="s2-body"><h3 class="gr-tit s2-tit">${p.title}</h3><div style="margin-top:auto; font-size:11px; color:#888;"><i class="far fa-star" style="color:#c5a059;"></i> Đang mở bán</div></div>
                            </a>`;
                        }).join('');
                    } else {
                        projScroll.innerHTML = '<div style="color:#888; padding:20px; font-style:italic;">Chưa có dữ liệu.</div>';
                    }
                }

                let viewedHistory = JSON.parse(localStorage.getItem('greenia_smart_history')) || { cats: [], ids: [] };
                if (viewedHistory.cats.length > 0) {
                    let matchedByCat = allProducts.filter(p => {
                        let pCats = extractCatsSafely(p.cat);
                        return pCats.some(c => viewedHistory.cats.includes(createSafeSlug(c)));
                    });
                    smartRecommended = matchedByCat.sort(() => 0.5 - Math.random()).slice(0, 20);
                }
                if (smartRecommended.length < 20) {
                    let fallbackProds = allProducts.sort(() => 0.5 - Math.random()).slice(0, 20);
                    smartRecommended = [...new Set([...smartRecommended, ...fallbackProds])].slice(0, 20);
                }
                window.smartRecommendedData = smartRecommended;
                renderForYouGrid();

                let activeTitleSlug = filterState.catType || filterState.catLoc || filterState.catPrice || initialCatSlug;
                updateSeoUI(activeTitleSlug, filterState.mainType);

                document.querySelector('.luc-loader').classList.remove('show');
                runFilter();

            } catch (error) {
                console.error("Lỗi:", error);
                document.querySelector('.luc-loader').classList.remove('show');
                document.getElementById('luc-grid-result').innerHTML = "<div style='grid-column:1/-1;text-align:center;padding:50px;color:#ff4d4f;'>Lỗi kết nối máy chủ. Vui lòng tải lại trang!</div>";
            }
        });

        function autoGenerateProductCategorySchema(currentData) {
            const oldSchema = document.getElementById('gr-dynamic-schema-product');
            if (oldSchema) oldSchema.remove();

            let schemaName = document.getElementById('luc-seo-title') ? document.getElementById('luc-seo-title').innerText : "Danh mục Bất Động Sản";
            let schemaDesc = document.getElementById('luc-seo-desc') ? document.getElementById('luc-seo-desc').innerText : "Danh sách các bất động sản đang bán và cho thuê giá tốt nhất tại Greenia Homes.";
            
            const listItems = currentData.slice(0, 20).map((p, index) => {
                let pCat = 'san-pham';
                if(p.cat) {
                    let cleanArray = extractCatsSafely(p.cat);
                    if (cleanArray.length > 0) pCat = cleanArray[0];
                }
                const catSlug = createSafeSlug(pCat);
                const pSlug = p.slug || createSafeSlug(p.title);
                const link = `${window.location.origin}${safeBaseUrl}san-pham/${catSlug}/${pSlug}/`;
                return { "@type": "ListItem", "position": index + 1, "url": link, "name": p.title };
            });

            const schemaObj = {
                "@context": "https://schema.org",
                "@graph": [
                    {
                        "@type": "CollectionPage",
                        "@id": window.location.href + "#webpage",
                        "url": window.location.href,
                        "name": schemaName,
                        "description": schemaDesc,
                        "publisher": {
                            "@type": "Organization", "name": "Greenia Homes",
                            "logo": { "@type": "ImageObject", "url": "https://i.ibb.co/M515GTDh/Gemini-Generated-Image-px9jf4px9jf4px9j-removebg-preview-150x150.png" }
                        }
                    },
                    { "@type": "ItemList", "itemListElement": listItems }
                ]
            };

            const script = document.createElement('script');
            script.id = 'gr-dynamic-schema-product';
            script.type = "application/ld+json";
            script.text = JSON.stringify(schemaObj);
            document.head.appendChild(script);
        }

        function runFilter(isLoadMore = false) {
            if(!isLoadMore) currentPage = 1;
            
            filteredData = allProducts.filter(p => {
                let matchKeyword = true;
                if(filterState.keyword !== '') {
                    const kw = filterState.keyword.toLowerCase();
                    matchKeyword = (p.title && String(p.title).toLowerCase().includes(kw)) || 
                                   (p.loc && String(p.loc).toLowerCase().includes(kw)) || 
                                   (p.cat && String(p.cat).toLowerCase().includes(kw));
                }
                
                let matchMainType = true;
                if (filterState.mainType) matchMainType = (p.type === filterState.mainType);
                
                let matchType = true;
                if (filterState.catType) matchType = isCatMatch(p, filterState.catType);
                
                let matchPrice = true;
                if (filterState.catPrice) matchPrice = isCatMatch(p, filterState.catPrice);
                
                let matchLoc = true;
                if (filterState.catLoc) matchLoc = isCatMatch(p, filterState.catLoc);
                
                return matchKeyword && matchMainType && matchType && matchPrice && matchLoc;
            });

            const statusDiv = document.getElementById('luc-search-status');
            const seoHeaderDiv = document.getElementById('luc-seo-header');
            if(filterState.keyword !== '') {
                statusDiv.style.display = 'flex';
                statusDiv.innerHTML = `Tìm thấy <strong class="luc-count-badge" style="margin: 0 5px;">${filteredData.length}</strong> kết quả cho: "<strong>${filterState.keyword}</strong>" <span style='cursor:pointer;color:#ff6b6b;text-decoration:underline;margin-left:10px;' onclick='window.location.href="/san-pham/"'>Xóa</span>`;
                if(seoHeaderDiv) seoHeaderDiv.style.display = 'none'; // Ẩn Tiêu đề khi đang tìm kiếm
            } else { 
                statusDiv.style.display = 'none'; 
                if(seoHeaderDiv) seoHeaderDiv.style.display = 'block'; // Hiện lại Tiêu đề khi không tìm kiếm
            }

            const paginatedData = filteredData.slice(0, currentPage * itemsPerPage);
            const grid = document.getElementById('luc-grid-result');
            
            if(paginatedData.length > 0) {
                grid.innerHTML = paginatedData.map(p => renderCardHTML(p)).join('');
            } else {
                grid.innerHTML = "<div style='grid-column:1/-1;text-align:center;padding:50px;color:#888;'>Không tìm thấy sản phẩm phù hợp.</div>";
            }

            autoGenerateProductCategorySchema(paginatedData);

            const loadBtnWrap = document.querySelector('.luc-load-wrap');
            if(paginatedData.length >= filteredData.length) { loadBtnWrap.style.display = 'none'; } 
            else { loadBtnWrap.style.display = 'block'; document.getElementById('luc-load-more-btn').innerHTML = "XEM THÊM <i class='fas fa-chevron-down'></i>"; }
        }

        function renderForYouGrid() {
            const grid = document.getElementById('foryou-grid-v67');
            const wrap = document.getElementById('foryou-load-wrap-v67');
            const paginated = window.smartRecommendedData.slice(0, forYouPage * forYouItemsPerPage);
            if (paginated.length > 0) {
                if(grid) grid.innerHTML = paginated.map(p => renderCardHTML(p)).join('');
                if (paginated.length >= window.smartRecommendedData.length) { if(wrap) wrap.style.display = 'none'; }
                else { if(wrap) wrap.style.display = 'block'; }
            } else { if(grid) grid.innerHTML = "<div style='grid-column:1/-1;text-align:center;padding:50px;color:#888;'>Chưa có gợi ý.</div>"; }
        }

        document.querySelectorAll('.luc-dd-trigger').forEach(trigger => {
            trigger.addEventListener('click', function(e) {
                e.preventDefault(); e.stopPropagation();
                const targetId = this.getAttribute('data-target');
                document.querySelectorAll('.luc-dropdown').forEach(dd => {
                    if (dd.id !== targetId) dd.style.display = 'none';
                });
                const dropBox = document.getElementById(targetId);
                if (dropBox) {
                    dropBox.style.display = (dropBox.style.display === 'none' || dropBox.style.display === '') ? 'block' : 'none';
                }
            });
        });

        document.addEventListener('click', e => { 
            if(!e.target.closest('.luc-nav-group')) {
                document.querySelectorAll('.luc-dropdown').forEach(dd => dd.style.display = 'none');
            }
        });

        document.getElementById('luc-search-form').addEventListener('submit', function(e) {
            e.preventDefault(); 
            const val = document.getElementById('luc-keyword').value.trim();
            if(val !== '') {
                window.location.href = safeBaseUrl + 'san-pham/?keyword=' + encodeURIComponent(val);
            }
        });

        document.getElementById('luc-load-more-btn').addEventListener('click', function() { this.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Đang tải..."; currentPage++; setTimeout(() => runFilter(true), 300); });
        
        const forYouBtn = document.getElementById('foryou-load-btn-v67');
        if(forYouBtn) {
            forYouBtn.addEventListener('click', function() { this.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Đang tải..."; forYouPage++; setTimeout(() => renderForYouGrid(), 300); });
        }

        window.clearLucSearch = function() { 
            window.location.href = safeBaseUrl + 'san-pham/';
        }

        var grScrollTimer;
        window.grScroll = function(dir, id) { const el = document.getElementById(id); if(el) { const item = el.querySelector('.s2-card'); if(item) { const w = item.offsetWidth + 20; el.scrollBy({left: w * dir, behavior: 'smooth'}); } } }
        window.grPlay = function() { grScrollTimer = setInterval(function() { window.grScroll(1, 'gr-proj-scroll'); }, 4000); }
        window.grPause = function() { clearInterval(grScrollTimer); }
        grPlay();
        
        const filterBar = document.getElementById('luc-filter-bar');
        if(filterBar) {
            window.addEventListener('scroll', () => {
                if (window.scrollY > 100) filterBar.classList.add('is-stuck');
                else filterBar.classList.remove('is-stuck');
            });
        }
    </script>
</body>
</html>
