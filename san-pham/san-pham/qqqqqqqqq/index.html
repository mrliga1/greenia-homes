<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Greenia Admin V2 - Database System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.ckeditor.com/4.22.1/standard/ckeditor.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        :root { --gold: #c5a059; --bg: #05080f; --card: #0e121b; --border: rgba(197, 160, 89, 0.2); --text: #b0b8c4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow: hidden; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; }
        .login-box { background: var(--card); padding: 40px; border-radius: 12px; border: 1px solid var(--gold); box-shadow: 0 10px 40px rgba(197, 160, 89, 0.1); width: 380px; text-align: center; max-width: 90%; }
        .login-box h2 { color: var(--gold); margin-top: 0; letter-spacing: 2px; }
        .login-box input { width: 100%; padding: 15px; margin: 10px 0; background: #1a1f2b; border: 1px solid var(--border); color: #fff; border-radius: 5px; text-align: center; letter-spacing: 2px; font-size: 16px; }
        .login-box input:focus { outline: none; border-color: var(--gold); }
        .btn-login { background: linear-gradient(135deg, #c5a059 0%, #e8c783 100%); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; font-size: 16px; margin-top: 10px;}
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(197,160,89,0.4); }
        #login-error { color: #ff4d4f; font-size: 13px; margin-bottom: 15px; display: none; }
       
        @media (max-width: 900px) {
            body { padding: 10px; overflow-x: hidden !important; }
            #admin-dashboard { height: auto !important; overflow: visible !important; padding: 0; overflow-x: hidden !important; }
            .layout-wrapper { flex-direction: column; width: 100%; display: flex; }
            .col-left, .col-right { width: 100%; padding: 15px 10px; position: static; max-height: none; overflow: visible; border-radius: 8px; margin: 0; }
            .col-right { border-top: 2px dashed var(--gold); margin-top: 15px; }
            .form-grid { display: flex; flex-direction: column; gap: 15px; }
            .form-group { margin-bottom: 0; width: 100%; }
            .tabs { display: flex; flex-wrap: wrap; gap: 5px; }
            .tab-btn { flex: 1 1 22%; padding: 10px 5px; font-size: 11px; text-align: center; }
            .btn-push { font-size: 14px; padding: 12px; }
            .login-box { padding: 25px 20px; }
            input, select, textarea { max-width: 100%; width: 100%; }
            .cke_chrome, .cke_inner, .cke_contents, .cke_top, .cke_bottom { max-width: 100% !important; width: 100% !important; }
            .preview-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
        }
       
        .cke_notifications_area { display: none !important; }
        #admin-dashboard { display: none; padding: 20px; overflow-y: auto; height: 100vh; }
        .layout-wrapper { display: flex; gap: 30px; max-width: 1450px; margin: 0 auto; align-items: flex-start; }
        .col-left { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .col-right { width: 450px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 25px; position: sticky; top: 20px; max-height: calc(100vh - 40px); display: flex; flex-direction: column; }
        h1 { color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 10px; font-size: 22px; text-transform: uppercase; margin-top: 0;}
       
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; flex-wrap: wrap;}
        .tab-btn { padding: 12px 20px; background: transparent; border: 1px solid var(--border); color: #fff; cursor: pointer; border-radius: 5px; font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 6px;}
        .tab-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }
        .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.05); }
        .btn-cancel-edit { display: none; background: #ff4757; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .form-section { display: none; animation: fadeIn 0.3s; }
        .form-section.active { display: block; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 15px; position: relative;}
        .form-group.full { grid-column: 1 / -1; }
        .form-group.third { grid-column: span 1; }
        label { display: block; margin-bottom: 8px; color: #fff; font-weight: 600; font-size: 13px; text-transform: uppercase;}
        input, select { width: 100%; padding: 12px; background: #1a1f2b; border: 1px solid var(--border); color: #fff; border-radius: 5px; font-family: inherit; font-size: 14px;}
        input:focus { outline: none; border-color: var(--gold); }
        input:disabled { opacity: 0.4; cursor: not-allowed; background: #000; }
        textarea.seo-txt, textarea.map-txt { width: 100%; padding: 12px; background: #1a1f2b; border: 1px solid var(--border); color: #fff; border-radius: 5px; font-family: inherit; font-size: 14px;}
        
        .btn-unlock { position: absolute; right: 10px; top: 38px; background: transparent; border: none; color: #888; cursor: pointer; font-size: 14px; transition: 0.3s;}
        .btn-unlock:hover { color: var(--gold); }
        .btn-unlock.unlocked { color: #00b894; }

        .seo-box { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); margin-top: 20px; position: relative;}
        .seo-box::before { content: 'Tùy chỉnh SEO (Google)'; position: absolute; top: -12px; left: 20px; background: var(--card); padding: 0 10px; color: var(--gold); font-size: 12px; font-weight: bold; }
        .char-count { font-size: 11px; color: #888; float: right; margin-top: 5px; }
        .char-count.error { color: #ff4757; }
        .btn-push { background: linear-gradient(135deg, #c5a059 0%, #e8c783 100%); color: #000; border: none; padding: 16px 30px; font-weight: 800; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 25px; transition: 0.3s; text-transform: uppercase;}
        .btn-push:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(197,160,89,0.3); }
        .btn-push.update-mode { background: linear-gradient(135deg, #00b894 0%, #55efc4 100%); }
       
        .upload-area { border: 2px dashed rgba(255,255,255,0.2); padding: 25px; text-align: center; border-radius: 8px; cursor: pointer; transition: 0.3s; background: rgba(0,0,0,0.2); }
        .upload-area:hover { border-color: var(--gold); background: rgba(197, 160, 89, 0.05); }
        .upload-area i { color: var(--gold); margin-bottom: 10px; }
        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 15px; }
        .preview-item { width: 100%; height: 90px; object-fit: cover; border-radius: 6px; border: 1px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.3);}
       
        .sidebar-header { margin-bottom: 15px; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 15px;}
        .side-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .side-tab-btn { flex: 1; padding: 10px; background: #1a1f2b; color: #fff; border: 1px solid #444; cursor: pointer; border-radius: 4px; font-size: 12px; font-weight: bold; transition: 0.3s;}
        .side-tab-btn.active { background: rgba(197,160,89,0.1); border-color: var(--gold); color: var(--gold); }
       
        .link-list-scroll { flex: 1; overflow-y: auto; padding-right: 5px; display: flex; flex-direction: column; gap: 10px; display: none; }
        .link-list-scroll.active { display: flex; }
        .link-list-scroll::-webkit-scrollbar { width: 6px; }
        .link-list-scroll::-webkit-scrollbar-thumb { background: rgba(197,160,89,0.5); border-radius: 10px; }
       
        .link-item { display: flex; flex-direction: column; padding: 15px 12px; border: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.3); border-radius: 6px; transition: 0.2s;}
        .link-item:hover { background: rgba(197, 160, 89, 0.05); border-color: var(--gold); }
        .link-item.editing { border-color: #00b894; background: rgba(0, 184, 148, 0.1); }
        .link-tit { font-size: 14px; font-weight: bold; color: #fff; margin-bottom: 12px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-decoration: none;}
        .link-cat { font-size: 10px; color: var(--gold); background: rgba(197,160,89,0.1); padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 8px; font-weight: bold;}
        .link-cat.is-category { background: rgba(0, 184, 148, 0.15); color: #00b894; border: 1px solid #00b894; }
       
        .media-item { display: flex; flex-direction: column; gap: 10px; padding: 15px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px;}
        .media-thumb-large { width: 100%; height: 120px; object-fit: contain; border-radius: 4px; background: #000; border: 1px solid #333;}
        .media-url { font-size: 11px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 5px; background: #111; border-radius: 4px; }

        .btn-group { display: flex; gap: 5px; margin-top: 5px;}
        .btn-action { flex: 1; background: #1a1f2b; color: #fff; border: 1px solid #444; padding: 8px 6px; font-size: 11px; border-radius: 4px; cursor: pointer; transition: 0.2s; font-weight: bold; text-align: center;}
        .btn-action:hover { background: #fff; color: #000; border-color: #fff; }
        .btn-action.del-btn { flex: 0 0 35px; background: rgba(255, 71, 87, 0.1); border-color: #ff4757; color: #ff4757;}
        .btn-action.del-btn:hover { background: #ff4757; color: #fff; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0);} }

        .select-edit-box { background: rgba(197,160,89,0.1); border: 1px dashed var(--gold); border-radius: 8px; padding: 15px; margin-bottom: 25px; }
        .select-edit-box select { background: #000; border-color: var(--gold); color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2><i class="fas fa-lock"></i> ADMIN LOGIN</h2>
        <div id="login-error">Mật khẩu không chính xác!</div>
        <input type="password" id="sys-password" placeholder="Mật khẩu Admin" onkeypress="if(event.key === 'Enter') checkLogin()">
        <input type="password" id="sys-gh-token" placeholder="GitHub Token (ghp_...)" style="font-size: 12px; letter-spacing: 1px;" onkeypress="if(event.key === 'Enter') checkLogin()">
        <button class="btn-login" onclick="checkLogin()">TRUY CẬP HỆ THỐNG</button>
    </div>
</div>

<div id="admin-dashboard">
    <div class="layout-wrapper">
        <div class="col-left">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h1 id="admin-heading"><i class="fas fa-cogs"></i> QUẢN TRỊ CMS</h1>
                <div id="sync-status" style="color: #00b894; font-weight: bold; font-size: 13px;"><i class="fas fa-circle-notch fa-spin"></i> Chờ đồng bộ...</div>
            </div>

            <div class="tabs" style="margin-top: 20px;">
                <button class="tab-btn active" id="tab-prod-btn" onclick="switchTab('prod')"><i class="fas fa-building"></i> SẢN PHẨM</button>
                <button class="tab-btn" id="tab-news-btn" onclick="switchTab('news')"><i class="fas fa-edit"></i> TIN TỨC</button>
                <button class="tab-btn" id="tab-proj-btn" onclick="switchTab('proj')"><i class="fas fa-project-diagram"></i> DỰ ÁN</button>
                <button class="tab-btn" id="tab-cat-btn" onclick="switchTab('cat')"><i class="fas fa-folder-open"></i> DANH MỤC</button>
                <button class="btn-cancel-edit" id="btn-cancel-edit" onclick="cancelEdit()"><i class="fas fa-times"></i> HỦY SỬA</button>
            </div>

            <div id="section-cat" class="form-section">
                <div class="select-edit-box full">
                    <label style="color: var(--gold);"><i class="fas fa-search"></i> Chọn danh mục đã có để Sửa / Xóa:</label>
                    <select id="c-existing" onchange="if(this.value) triggerEdit(parseInt(this.value), 'cat')">
                        <option value="">-- Click để chọn danh mục --</option>
                    </select>
                </div>
                <div class="form-grid">
                    <div class="form-group"><label>Mã Danh Mục:</label><input type="text" id="c-id" disabled value="..."></div>
                    <div class="form-group"><label>Thuộc phân hệ:</label>
                        <select id="c-type"><option value="news">Tin Tức</option><option value="prod">Sản Phẩm</option><option value="proj">Dự Án</option></select>
                    </div>
                    <div class="form-group full"><label>Tên Danh Mục:</label><input type="text" id="c-title" oninput="handleTitleInput(this, 'c-slug'); checkLength(this, 'c-title-count', 60);" placeholder="VD: Tin dự án"><div class="char-count" id="c-title-count">0/60</div></div>
                    <div class="form-group full"><label>Đường dẫn tĩnh (Slug):</label><input type="text" id="c-slug" placeholder="VD: tin-du-an"><button class="btn-unlock" id="c-slug-lock" onclick="toggleSlugLock('c-slug')" title="Mở khóa để sửa link thủ công"><i class="fas fa-lock"></i></button></div>
                    <div class="form-group full"><label>Mô tả ngắn danh mục:</label><textarea id="c-desc" rows="3" style="width:100%; padding:12px; background:#1a1f2b; border:1px solid var(--border); color:#fff; border-radius:5px;" placeholder="Hiển thị dưới tiêu đề danh mục trên web"></textarea></div>
                </div>
                <div class="seo-box">
                    <div class="form-group"><label>SEO Title:</label><input type="text" id="c-seo-title" placeholder="Tiêu đề chuẩn SEO cho danh mục"></div>
                    <div class="form-group"><label>SEO Description:</label><textarea id="c-seo-desc" class="seo-txt" rows="3" oninput="checkLength(this, 'c-desc-count', 155)"></textarea><div class="char-count" id="c-desc-count">0/155</div></div>
                    <div class="form-group" style="margin-bottom:0;"><label>SEO Keywords:</label><input type="text" id="c-seo-key"></div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button id="btn-submit-cat" class="btn-push" onclick="pushData('cat')"><i class="fas fa-save"></i> LƯU DANH MỤC</button>
                    <button id="btn-delete-cat" class="btn-push del-btn-master" style="background:#ff4757; flex: 0 0 150px; display:none;" onclick="if(editMode.active && editMode.type==='cat') deleteItem(editMode.id, 'cat')"><i class="fas fa-trash"></i> XÓA</button>
                </div>
            </div>

            <div id="section-prod" class="form-section active">
                <div class="form-grid">
                    <div class="form-group"><label>Mã SP (Tự động):</label><input type="text" id="p-id" disabled value="..."></div>
                    <div class="form-group"><label>Trạng thái GD:</label><select id="p-type"><option value="Bán">Bán</option><option value="Thuê">Cho Thuê</option></select></div>
                    <div class="form-group full">
                        <label>Tên Sản Phẩm / Tiêu đề:</label>
                        <input type="text" id="p-title" oninput="handleTitleInput(this, 'p-slug'); checkLength(this, 'p-title-count', 65)" placeholder="VD: Biệt thự The Global City">
                        <div class="char-count" id="p-title-count">0/65</div>
                    </div>
                     <div class="form-group full">
                        <label>Đường dẫn tĩnh (Slug):</label>
                        <input type="text" id="p-slug" placeholder="Tu-dong-tao-link-khi-go-tieu-de">
                        <button class="btn-unlock" id="p-slug-lock" onclick="toggleSlugLock('p-slug')" title="Mở khóa để sửa link thủ công"><i class="fas fa-lock"></i></button>
                    </div>
                    <div class="form-group"><label>Danh mục:</label><input list="p-cats" id="p-cat" placeholder="Chọn hoặc nhập mới..."><datalist id="p-cats"></datalist></div>
                    <div class="form-group"><label>Mã Dự Án:</label><input type="text" id="p-projectCode" placeholder="VD: P123"></div>
                    <div class="form-group full"><label>Địa chỉ hiển thị trên đầu:</label><input type="text" id="p-loc" placeholder="Nhập địa chỉ cụ thể (Hiển thị văn bản)"></div>
                    
                    <div class="form-group third"><label>Giá hiển thị:</label><input type="text" id="p-price" placeholder="VD: 5 Tỷ"></div>
                    <div class="form-group third"><label>Diện tích (m2):</label><input type="text" id="p-area" placeholder="VD: 120"></div>
                    <div class="form-group third"><label>Hướng nhà:</label><input type="text" id="p-dir" placeholder="VD: Đông Nam"></div>
                    
                    <div class="form-group third"><label>Số tầng:</label><input type="text" id="p-floor" placeholder="VD: 3"></div>
                    <div class="form-group third"><label>Phòng Ngủ (PN):</label><input type="number" id="p-bed" placeholder="VD: 4"></div>
                    <div class="form-group third"><label>Số WC:</label><input type="number" id="p-wc" placeholder="VD: 3"></div>
                    
                    <div class="form-group third"><label>Mặt tiền (m):</label><input type="text" id="p-front" placeholder="VD: 5"></div>
                    <div class="form-group third"><label>Pháp lý:</label><input type="text" id="p-legal" placeholder="VD: Sổ hồng"></div>
                    <div class="form-group third"></div> 
                    
                    <div class="form-group full">
                        <label>1. Ảnh Bìa (Auto Cloud):</label>
                        <div class="upload-area" onclick="document.getElementById('p-main-img-file').click()"><i class="fas fa-cloud-upload-alt fa-2x"></i><input type="file" id="p-main-img-file" hidden onchange="handleSingleUpload(this, 'p-main-preview')"></div>
                        <div id="p-main-preview" class="preview-grid"></div>
                    </div>
                    
                    <div class="form-group full">
                        <label style="color:#00b894;"><i class="fas fa-map-marked-alt"></i> Mã nhúng Bản đồ Google Maps (Iframe hoặc Link):</label>
                        <textarea id="p-map" class="map-txt" rows="2" placeholder="Nhập đường link chia sẻ của Google Map hoặc dán nguyên mã nhúng <iframe> vào đây..."></textarea>
                    </div>

                    <div class="form-group full">
                        <label>2. Album Ảnh (Auto Cloud):</label>
                        <div class="upload-area" onclick="document.getElementById('p-gallery-files').click()"><i class="fas fa-images fa-2x"></i><input type="file" id="p-gallery-files" hidden multiple onchange="handleMultiUpload(this, 'p-gallery-preview', 'gallery')"></div>
                        <div id="p-gallery-preview" class="preview-grid"></div>
                    </div>
                    
                    <div class="form-group full" style="color: #000;">
                        <label style="color:#fff;">Nội dung chi tiết (Copy mã HTML từ cột bên phải dán vào đây):</label>
                        <textarea id="p-content" name="p-content"></textarea>
                    </div>
                </div>

                <div class="seo-box">
                    <div class="form-group"><label>SEO Title:</label><input type="text" id="p-seo-title"></div>
                    <div class="form-group"><label>SEO Description:</label><textarea id="p-seo-desc" class="seo-txt" rows="3" oninput="checkLength(this, 'p-desc-count', 155)"></textarea><div class="char-count" id="p-desc-count">0/155</div></div>
                    <div class="form-group" style="margin-bottom:0;"><label>SEO Keywords:</label><input type="text" id="p-seo-key"></div>
                </div>
                <button id="btn-submit-prod" class="btn-push" onclick="pushData('prod')"><i class="fas fa-rocket"></i> XUẤT BẢN SẢN PHẨM</button>
            </div>

            <div id="section-news" class="form-section">
                <div class="form-grid">
                    <div class="form-group"><label>Mã Bài:</label><input type="text" id="n-id" disabled value="..."></div>
                    <div class="form-group"><label>Ngày đăng:</label><input type="text" id="n-date" disabled></div>
                    <div class="form-group full">
                        <label>Tiêu Đề:</label>
                        <input type="text" id="n-title" oninput="handleTitleInput(this, 'n-slug'); checkLength(this, 'n-title-count', 65)">
                        <div class="char-count" id="n-title-count">0/65</div>
                    </div>
                    <div class="form-group full">
                        <label>Đường dẫn tĩnh (Slug):</label>
                        <input type="text" id="n-slug" placeholder="Tu-dong-tao-link-khi-go-tieu-de">
                        <button class="btn-unlock" id="n-slug-lock" onclick="toggleSlugLock('n-slug')" title="Mở khóa để sửa link thủ công"><i class="fas fa-lock"></i></button>
                    </div>
                    <div class="form-group"><label>Danh mục:</label><input list="n-cats" id="n-cat"><datalist id="n-cats"></datalist></div>
                    <div class="form-group"><label>Tác giả:</label><input type="text" id="n-author" value="Chuyên gia Greenia"></div>
                    <div class="form-group full">
                        <label>Ảnh Đại Diện (Auto Cloud):</label>
                        <div class="upload-area" onclick="document.getElementById('n-thumb-file').click()"><i class="fas fa-image fa-2x"></i><input type="file" id="n-thumb-file" hidden onchange="handleSingleUpload(this, 'n-thumb-preview', 'newsThumb')"></div>
                        <div id="n-thumb-preview" class="preview-grid"></div>
                    </div>
                    <div class="form-group full" style="color: #000;">
                        <label style="color:#fff;">Nội dung bài viết (Copy mã HTML từ cột bên phải dán vào đây):</label>
                        <textarea id="n-content" name="n-content"></textarea>
                    </div>
                </div>

                <div class="seo-box">
                    <div class="form-group"><label>SEO Title:</label><input type="text" id="n-seo-title"></div>
                    <div class="form-group"><label>SEO Description:</label><textarea id="n-seo-desc" class="seo-txt" rows="3" oninput="checkLength(this, 'n-desc-count', 155)"></textarea><div class="char-count" id="n-desc-count">0/155</div></div>

    async function loadDataFromFirebase() {
        const status = document.getElementById('sync-status');
        status.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Đang tải từ Firebase...';
        status.style.color = "#c5a059";
        document.getElementById('n-date').value = new Date().toLocaleDateString('vi-VN');

        try {
            const [pSnap, nSnap, pjSnap, cSnap] = await Promise.all([
                db.collection('products').get(),
                db.collection('posts').get(),
                db.collection('projects').get(),
                db.collection('categories').get()
            ]);

            currentData.products = pSnap.docs.map(d => d.data());
            currentData.posts = nSnap.docs.map(d => d.data());
            currentData.projects = pjSnap.docs.map(d => d.data());
            currentData.categories = cSnap.docs.map(d => d.data());

            resetFormCalculations(); buildLinkLibrary();
            status.innerHTML = '<i class="fas fa-check-circle"></i> Đã đồng bộ Firebase';
            status.style.color = "#00b894";
        } catch (e) { 
            console.error(e);
            status.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Lỗi tải dữ liệu!';
            status.style.color = "#ff4d4f";
        }
    }

    function switchSideTab(type) {
        document.getElementById('side-tab-links').classList.remove('active');
        document.getElementById('side-tab-media').classList.remove('active');
        document.getElementById('list-links').classList.remove('active');
        document.getElementById('list-media').classList.remove('active');
        document.getElementById(`side-tab-${type}`).classList.add('active');
        document.getElementById(`list-${type}`).classList.add('active');
    }

    function resetFormCalculations() {
        document.getElementById('p-id').value = Math.max(...currentData.products.map(x => x.id || 0), 0) + 1;
        document.getElementById('n-id').value = Math.max(...currentData.posts.map(x => x.id || 0), 0) + 1;
        document.getElementById('pj-id').value = Math.max(...currentData.projects.map(x => x.id || 0), 0) + 1;
        document.getElementById('c-id').value = Math.max(...currentData.categories.map(x => x.id || 0), 0) + 1;
        
        const catSelect = document.getElementById('c-existing');
        if(catSelect) {
            catSelect.innerHTML = '<option value="">-- Tạo danh mục mới (Click Hủy Sửa) --</option>' + 
                currentData.categories.map(c => {
                    const prefix = c.type === 'news' ? '[Tin Tức]' : (c.type === 'prod' ? '[Sản Phẩm]' : '[Dự Án]');
                    return `<option value="${c.id}">${prefix} ${c.title}</option>`;
                }).join('');
        }
        const prodCats = currentData.categories.filter(c => c.type === 'prod').map(c => c.title).concat(currentData.products.map(x => x.cat));
        const newsCats = currentData.categories.filter(c => c.type === 'news').map(c => c.title).concat(currentData.posts.map(x => x.cat));
        populateCats('p-cats', prodCats); populateCats('n-cats', newsCats);
        ['p-slug', 'n-slug', 'pj-slug', 'c-slug'].forEach(id => {
            const el = document.getElementById(id);
            if(el) { el.disabled = false; const icon = document.querySelector(`#${id}-lock i`); if(icon) { icon.className = "fas fa-lock"; document.getElementById(`${id}-lock`).classList.remove('unlocked'); } }
        });
    }

    function populateCats(id, cats) {
        const list = document.getElementById(id);
        list.innerHTML = [...new Set(cats.filter(Boolean))].map(c => `<option value="${c}">`).join('');
    }

    function switchTab(type) {
        if(editMode.active && editMode.type !== type) {
            if(!confirm("Đang sửa mục khác. Chuyển tab sẽ mất dữ liệu. Chuyển?")) return;
            cancelEdit();
        }
        document.querySelectorAll('.tab-btn:not(.btn-cancel-edit)').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        document.getElementById(`tab-${type}-btn`).classList.add('active');
        document.getElementById(`section-${type}`).classList.add('active');
    }

    function checkLength(input, countId, max) {
        const len = input.value.length;
        const countDiv = document.getElementById(countId);
        countDiv.innerText = `${len}/${max}`;
        countDiv.className = 'char-count ' + (len > max ? 'error' : '');
    }

    function triggerEdit(id, type) {
        let item;
        if (type === 'prod') item = currentData.products.find(p => p.id === id);
        else if (type === 'news') item = currentData.posts.find(p => p.id === id);
        else if (type === 'proj') item = currentData.projects.find(p => p.id === id);
        else if (type === 'cat') item = currentData.categories.find(p => p.id === id);
        if(!item) return;

        editMode = { active: true, type: type, id: id };
        switchTab(type);
        document.getElementById('btn-cancel-edit').style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });

        document.querySelectorAll('.link-item').forEach(el => el.classList.remove('editing'));
        const linkCard = document.getElementById(`link-item-${type}-${id}`);
        if(linkCard) linkCard.classList.add('editing');

        if(type === 'prod') {
            document.getElementById('p-id').value = item.id; document.getElementById('p-type').value = item.type || "Bán";
            document.getElementById('p-title').value = item.title || ""; document.getElementById('p-slug').value = item.slug || "";
            document.getElementById('p-cat').value = item.cat || ""; document.getElementById('p-projectCode').value = item.projectCode || "";
            document.getElementById('p-loc').value = item.loc || ""; document.getElementById('p-price').value = item.price || "";
            document.getElementById('p-area').value = item.area || ""; document.getElementById('p-dir').value = item.dir || "";
            document.getElementById('p-floor').value = item.floor || ""; document.getElementById('p-bed').value = item.bed || "";
            document.getElementById('p-wc').value = item.wc || ""; document.getElementById('p-front').value = item.front || "";
            document.getElementById('p-legal').value = item.legal || ""; document.getElementById('p-map').value = item.map || ""; 
            CKEDITOR.instances['p-content'].setData(item.content || ""); 
            document.getElementById('p-seo-title').value = item.seoTitle || ""; document.getElementById('p-seo-desc').value = item.seoDesc || ""; document.getElementById('p-seo-key').value = item.seoKeywords || "";
            uploadedFiles.main = item.img || ""; uploadedFiles.gallery = item.gallery || [];
            document.getElementById('p-main-preview').innerHTML = item.img ? `<img src="${item.img}" class="preview-item">` : '';
            document.getElementById('p-gallery-preview').innerHTML = (item.gallery || []).map(url => `<img src="${url}" class="preview-item">`).join('');
            const btn = document.getElementById('btn-submit-prod'); btn.innerHTML = '<i class="fas fa-save"></i> LƯU CẬP NHẬT'; btn.classList.add('update-mode');
            checkLength(document.getElementById('p-title'), 'p-title-count', 65); checkLength(document.getElementById('p-seo-desc'), 'p-desc-count', 155);
            document.getElementById('p-slug').disabled = true; document.querySelector('#p-slug-lock i').className = "fas fa-lock";
        } else if (type === 'news') {
            document.getElementById('n-id').value = item.id; document.getElementById('n-date').value = item.date || new Date().toLocaleDateString('vi-VN');
            document.getElementById('n-title').value = item.title || ""; document.getElementById('n-slug').value = item.slug || "";
            document.getElementById('n-cat').value = item.cat || ""; document.getElementById('n-author').value = item.author || "Chuyên gia Greenia";
            CKEDITOR.instances['n-content'].setData(item.content || ""); document.getElementById('n-seo-title').value = item.seoTitle || "";
            document.getElementById('n-seo-desc').value = item.seoDesc || ""; document.getElementById('n-seo-key').value = item.seoKeywords || "";
            uploadedFiles.newsThumb = item.thumb || ""; document.getElementById('n-thumb-preview').innerHTML = item.thumb ? `<img src="${item.thumb}" class="preview-item">` : '';
            const btn = document.getElementById('btn-submit-news'); btn.innerHTML = '<i class="fas fa-save"></i> LƯU CẬP NHẬT'; btn.classList.add('update-mode');
            checkLength(document.getElementById('n-title'), 'n-title-count', 65); checkLength(document.getElementById('n-seo-desc'), 'n-desc-count', 155);
            document.getElementById('n-slug').disabled = true; document.querySelector('#n-slug-lock i').className = "fas fa-lock";
        } else if (type === 'proj') {
            document.getElementById('pj-id').value = item.id; document.getElementById('pj-status').value = item.status || "Đang mở bán";
            document.getElementById('pj-title').value = item.title || ""; document.getElementById('pj-slug').value = item.slug || "";
            document.getElementById('pj-loc').value = item.loc || ""; document.getElementById('pj-price').value = item.price || "";
            document.getElementById('pj-seo-title').value = item.seoTitle || ""; document.getElementById('pj-seo-desc').value = item.seoDesc || ""; document.getElementById('pj-seo-key').value = item.seoKeywords || "";
            uploadedFiles.projMain = item.img || ""; document.getElementById('pj-main-preview').innerHTML = item.img ? `<img src="${item.img}" class="preview-item">` : '';
            const btn = document.getElementById('btn-submit-proj'); btn.innerHTML = '<i class="fas fa-save"></i> LƯU CẬP NHẬT'; btn.classList.add('update-mode');
            checkLength(document.getElementById('pj-title'), 'pj-title-count', 65); checkLength(document.getElementById('pj-seo-desc'), 'pj-desc-count', 155);
            document.getElementById('pj-slug').disabled = true; document.querySelector('#pj-slug-lock i').className = "fas fa-lock";
        } else if (type === 'cat') {
            document.getElementById('c-existing').value = item.id; document.getElementById('c-id').value = item.id;
            document.getElementById('c-type').value = item.type || "news"; document.getElementById('c-title').value = item.title || "";
            document.getElementById('c-slug').value = item.slug || ""; document.getElementById('c-desc').value = item.desc || "";
            document.getElementById('c-seo-title').value = item.seoTitle || ""; document.getElementById('c-seo-desc').value = item.seoDesc || ""; document.getElementById('c-seo-key').value = item.seoKeywords || "";

    function cancelEdit() {
        editMode = { active: false, type: null, id: null };
        document.getElementById('btn-cancel-edit').style.display = "none";
        document.getElementById('btn-delete-cat').style.display = "none";
        document.querySelectorAll('input[type="text"], input[type="number"], textarea:not(#p-content):not(#n-content)').forEach(el => el.value = '');
        document.getElementById('c-existing').value = ""; 
        CKEDITOR.instances['p-content'].setData(""); CKEDITOR.instances['n-content'].setData("");
        document.querySelectorAll('.preview-grid').forEach(el => el.innerHTML = '');
        uploadedFiles = { main: "", gallery: [], newsThumb: "", projMain: "" };
        resetFormCalculations();
        document.getElementById('btn-submit-prod').innerHTML = '<i class="fas fa-rocket"></i> XUẤT BẢN SẢN PHẨM'; document.getElementById('btn-submit-prod').classList.remove('update-mode');
        document.getElementById('btn-submit-news').innerHTML = '<i class="fas fa-rocket"></i> XUẤT BẢN TIN TỨC'; document.getElementById('btn-submit-news').classList.remove('update-mode');
        document.getElementById('btn-submit-proj').innerHTML = '<i class="fas fa-save"></i> LƯU THÔNG TIN DỰ ÁN'; document.getElementById('btn-submit-proj').classList.remove('update-mode');

        document.querySelectorAll('.link-item').forEach(el => el.classList.remove('editing'));

    async function deleteItem(id, type) {
        if (currentUserRole !== 'admin') { alert("⛔ BẠN KHÔNG CÓ QUYỀN XÓA NỘI DUNG NÀY!\nVui lòng liên hệ Quản trị viên."); return; }
        if(!confirm(`⚠️ BẠN CÓ CHẮC CHẮN MUỐN XÓA VĨNH VIỄN KHỎI DATABASE?`)) return;
        
        const collectionMap = { 'prod': 'products', 'news': 'posts', 'proj': 'projects', 'cat': 'categories' };
        const colName = collectionMap[type];

        try {
            await db.collection(colName).doc(String(id)).delete();
            let arrName = collectionMap[type] === 'posts' ? 'posts' : colName;
            currentData[arrName] = currentData[arrName].filter(item => item.id !== id);

            if(editMode.id === id) cancelEdit(); buildLinkLibrary(); 
            alert("Đã xóa dữ liệu thành công!");
        } catch(e) { console.error(e); alert("Lỗi kết nối máy chủ khi xóa!"); }
    }

    function buildLinkLibrary() {
        const container = document.getElementById('list-links');
        let html = '';
        const allItems = [
            ...currentData.categories.map(c => ({...c, folder: c.type === 'news' ? 'tin-tuc' : (c.type === 'prod' ? 'san-pham' : 'du-an'), label: 'DM ' + (c.type==='news'?'Tin tức':(c.type==='prod'?'Sản phẩm':'Dự án')), typeKey: 'cat'})),
            ...currentData.posts.map(p => ({...p, folder: 'tin-tuc', label: 'Tin tức', typeKey: 'news'})), 
            ...currentData.products.map(p => ({...p, folder: 'san-pham', label: 'Sản phẩm', typeKey: 'prod'})),
            ...currentData.projects.map(p => ({...p, folder: 'du-an', label: 'Dự án', typeKey: 'proj'}))
        ].sort((a,b) => b.id - a.id);

        allItems.forEach(item => {
            let fullUrl;
            if (item.typeKey === 'proj') {
                fullUrl = item.link || `${GITHUB_PAGES_DOMAIN}/du-an/${item.slug}/`;
            } else if (item.typeKey === 'cat') {
                fullUrl = `${GITHUB_PAGES_DOMAIN}/${item.folder}/${item.slug}/`;
            } else {
                const itemSlug = item.slug || slugify(item.title); 
                const catSlug = item.cat ? slugify(item.cat) : (item.typeKey === 'prod' ? 'san-pham' : 'tin-tuc');
                fullUrl = `${GITHUB_PAGES_DOMAIN}/${item.folder}/${catSlug}/${itemSlug}/`;
            }
            
            const safeTitle = item.title.replace(/'/g, "\\'").replace(/"/g, "&quot;");
            const isCatClass = item.typeKey === 'cat' ? 'is-category' : '';
            
            html += `
                <div class="link-item" id="link-item-${item.typeKey}-${item.id}" data-title="${item.title.toLowerCase()}" data-cat="${(item.cat || item.label || '').toLowerCase()}">
                    <div><span class="link-cat ${isCatClass}">${item.label} | ${item.cat || item.status || 'Mục SEO'}</span></div>
                    <a href="${fullUrl}" target="_blank" class="link-tit">${item.title}</a>
                    <div class="btn-group">
                        <button class="btn-action" onclick="copyToClip('${fullUrl}')"><i class="fas fa-link"></i> Link</button>
                        <button class="btn-action html-btn" onclick="copyEmbedCode('${fullUrl}', '${safeTitle}')"><i class="fas fa-code"></i> Gợi ý</button>
                        <button class="btn-action edit-btn" onclick="triggerEdit(${item.id}, '${item.typeKey}')"><i class="fas fa-edit"></i> Sửa</button>
                        <button class="btn-action del-btn" onclick="deleteItem(${item.id}, '${item.typeKey}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html || "<div style='text-align:center;color:#666;'>Trống.</div>";
    }

    function filterLinks() {
        const kw = document.getElementById('link-search').value.toLowerCase();
        let targetList = document.getElementById('side-tab-links').classList.contains('active') ? '.link-item' : '.media-item';
        
        document.querySelectorAll(targetList).forEach(el => {
            if(targetList === '.link-item') {
                if(el.getAttribute('data-title').includes(kw) || el.getAttribute('data-cat').includes(kw)) el.style.display = "flex";
                else el.style.display = "none";
            } else {
                if(el.innerText.toLowerCase().includes(kw)) el.style.display = "flex";
                else el.style.display = "none";
            }
        });
    }
    
    function copyToClip(text) { navigator.clipboard.writeText(text); alert("Đã Copy URL:\n" + text); }
    function copyEmbedCode(url, title) {
        const code = `<div class="gr-related-item"><span class="gr-hot-icon">👉</span> <a href="${url}" class="gr-related-link" target="_blank">${title}</a></div>`;
        navigator.clipboard.writeText(code); 
        alert("Đã copy MÃ GỢI Ý BÀI VIẾT LIÊN QUAN!\n\nDán vào chế độ NGUỒN của Nội dung chi tiết.");
    }
    function slugify(text) {
        return text.toString().toLowerCase().trim().replace(/\s+/g, '-').replace(/[áàảãạâấầẩẫậăắằẳẵặ]/g, 'a').replace(/[éèẻẽẹêếềểễệ]/g, 'e').replace(/[íìỉĩị]/g, 'i').replace(/[óòỏõọôốồổỗộơớờởỡợ]/g, 'o').replace(/[úùủũụưứừửữự]/g, 'u').replace(/[ýỳỷỹỵ]/g, 'y').replace(/đ/g, 'd').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-');
    }
    function handleTitleInput(titleInput, slugInputId) {
        const slugInput = document.getElementById(slugInputId);
        if (!editMode.active || !slugInput.disabled) { slugInput.value = slugify(titleInput.value); }
    }
    function toggleSlugLock(slugInputId) {
        const input = document.getElementById(slugInputId);
        const icon = document.querySelector(`#${slugInputId}-lock i`);
        if(input.disabled) {
            if(confirm("CẢNH BÁO: Đổi Slug có thể gây lỗi 404. Chắc chắn mở khóa?")) {
                input.disabled = false; icon.className = "fas fa-unlock"; document.getElementById(`${slugInputId}-lock`).classList.add('unlocked');
            }
        } else {
            input.disabled = true; icon.className = "fas fa-lock"; document.getElementById(`${slugInputId}-lock`).classList.remove('unlocked');
        }
    }

    async function uploadToCloud(file) {
        let formData = new FormData(); formData.append("image", file);
        try {
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${AUTO_IMGBB_KEY}`, { method: "POST", body: formData });
            const data = await res.json();
            if(data.success) { const directUrl = data.data.url; addToMediaLibrary(directUrl, file.name); return directUrl; } 
            else { throw new Error(data.error.message); }
        } catch(e) { alert("Lỗi Cloud ImgBB!"); return null; }
    }

    function addToMediaLibrary(url, name) {
        document.getElementById('media-placeholder').style.display = 'none';
        const imgHtmlCode = `<img src="${url}" alt="${name}" style="max-width:100%; height:auto; display:block; margin: 15px auto; border-radius:8px;">`;
        const encodedHtml = btoa(unescape(encodeURIComponent(imgHtmlCode)));
        const item = document.createElement('div'); item.className = 'media-item';
        item.innerHTML = `<img src="${url}" class="media-thumb-large"><div class="media-url">${name}</div><div class="btn-group"><button class="btn-action" onclick="copyToClip('${url}')"><i class="fas fa-link"></i> Link</button><button class="btn-action" onclick="copyDecodedHTML('${encodedHtml}')" style="background:#00b894; border-color:#00b894;"><i class="fas fa-code"></i> HTML</button></div>`;
        document.getElementById('list-media').prepend(item);
    }
    function copyDecodedHTML(encodedStr) { navigator.clipboard.writeText(decodeURIComponent(escape(atob(encodedStr)))); alert("ĐÃ COPY MÃ HTML!\n\nDán vào chế độ NGUỒN của Nội dung chi tiết."); }
    async function handleSingleUpload(input, previewId, targetObj = 'main') {
        if(!input.files[0]) return;
        document.getElementById(previewId).innerHTML = '<i class="fas fa-spinner fa-spin" style="color:#fff; padding:10px;"></i> Đang tải...';
        const url = await uploadToCloud(input.files[0]);
        if(url) { uploadedFiles[targetObj] = url; document.getElementById(previewId).innerHTML = `<img src="${url}" class="preview-item">`; } else { document.getElementById(previewId).innerHTML = ''; }
    }
    async function handleMultiUpload(input, previewId) {
        document.getElementById(previewId).innerHTML = '<i class="fas fa-spinner fa-spin" style="color:#fff; padding:10px;"></i> Đang tải...';
        uploadedFiles.gallery = []; 
        for(let file of input.files) { const url = await uploadToCloud(file); if(url) uploadedFiles.gallery.push(url); }
        document.getElementById(previewId).innerHTML = uploadedFiles.gallery.map(url => `<img src="${url}" class="preview-item">`).join('');
    }

    /* =================================================================
       🔥 MÀNG LỌC CƯỠNG CHẾ: XÓA SẠCH VẾT TÍCH BẢO MẬT (ANTI-CACHE) 🔥
    ================================================================= */
    async function getTemplateFile(fileName) {
        try {
            // Thêm đuôi random để chống trình duyệt lưu cache
            const url = `/${CONFIG.repo}/${fileName}?nocache=${Math.random()}`;
            const response = await fetch(url, { cache: "no-store", headers: { 'Pragma': 'no-cache' } });
            if (!response.ok) throw new Error("Lỗi HTTP: " + response.status);
            
            let text = await response.text();
            

            return text;
        } catch (error) {
            console.error(`Không thể tải khuôn mẫu ${fileName}:`, error);
            alert(`LỖI: Không tìm thấy file khuôn mẫu '${fileName}' trên GitHub!\nHãy chắc chắn file này có tồn tại trong thư mục public.`);
            return null;
        }
    }

    async function createGithubFile(path, contentStr, commitMessage) {
        let tokenInput = document.getElementById('sys-gh-token');
        let currentToken = tokenInput ? tokenInput.value.trim() : TOKEN_GITHUB;

        if (!currentToken) { alert("CẢNH BÁO: Bác chưa điền mã TOKEN GITHUB ở màn hình Đăng nhập!"); return false; }
        
        try {
            let currentSha = null;
            const checkUrl = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`;
            const checkRes = await fetch(checkUrl, { headers: { "Authorization": `token ${currentToken}` }, cache: 'no-store' });
            
            if (checkRes.status === 401) { alert("MÃ TOKEN GITHUB BỊ LỖI HOẶC HẾT HẠN!\nVui lòng tạo lại Token mới trên GitHub."); return false; }
            if (checkRes.ok) { const checkData = await checkRes.json(); currentSha = checkData.sha; }

            // MÃ HÓA BASE64 ĐỂ LÁCH BOT GITHUB
            const base64Content = btoa(unescape(encodeURIComponent(contentStr)));
            
            const bodyData = { message: commitMessage, content: base64Content };
            if (currentSha) bodyData.sha = currentSha;

            const res = await fetch(checkUrl, {
                method: "PUT", headers: { "Authorization": `token ${currentToken}`, "Content-Type": "application/json" }, body: JSON.stringify(bodyData)
            });
            
            if(res.ok) return true;
            else { const errData = await res.json(); alert(`Lỗi lưu file GitHub: ${errData.message}`); return false; }
        } catch (e) { console.error(e); alert("Lỗi mạng khi kết nối Github."); return false; }
    }

    async function autoCreateCategoryFolder(catData) {
        let folderName = '', templateFileName = '';
        if (catData.type === 'prod') { folderName = 'san-pham'; templateFileName = 'danh-muc-sp.html'; }
        else if (catData.type === 'news') { folderName = 'tin-tuc'; templateFileName = 'danh-muc.html'; }
        else return;

        const path = `${folderName}/${catData.slug}/index.html`;
        let templateHtml = await getTemplateFile(templateFileName);
        if (!templateHtml) return;

        let finalHtml = templateHtml
            .replace(/\{\{TITLE\}\}/g, () => catData.seoTitle || catData.title)
            .replace(/\{\{DESC\}\}/g, () => catData.seoDesc || catData.desc || '')
            .replace(/\{\{KEYWORDS\}\}/g, () => catData.seoKeywords || `${catData.title}, greenia homes`)
            .replace(/\{\{FOLDER\}\}/g, () => folderName)
            .replace(/\{\{SLUG\}\}/g, () => catData.slug);

        await createGithubFile(path, finalHtml, `Cập nhật Danh mục: ${catData.title}`);
    }

        let finalHtml = templateHtml

            .replace(/\{\{DESC\}\}/g, () => prodData.seoDesc || '')
            .replace(/\{\{KEYWORDS\}\}/g, () => prodData.seoKeywords || `${prodData.title}, greenia homes`)
            .replace(/\{\{CAT_SLUG\}\}/g, () => catSlug)
            .replace(/\{\{SLUG\}\}/g, () => prodData.slug)
            .replace(/\{\{ID\}\}/g, () => prodData.id)
            .replace(/\{\{TYPE\}\}/g, () => prodData.type || 'Bán')
            .replace(/\{\{CAT\}\}/g, () => prodData.cat || '')
            .replace(/\{\{LOC\}\}/g, () => prodData.loc ? prodData.loc.replace(/"/g, '\\"') : '')
            .replace(/\{\{PRICE\}\}/g, () => prodData.price || '')

            .replace(/\{\{DIR\}\}/g, () => prodData.dir || '')
            .replace(/\{\{FLOOR\}\}/g, () => prodData.floor || '')
            .replace(/\{\{BED\}\}/g, () => prodData.bed || '')
            .replace(/\{\{WC\}\}/g, () => prodData.wc || '')
            .replace(/\{\{FRONT\}\}/g, () => prodData.front || '')
            .replace(/\{\{LEGAL\}\}/g, () => prodData.legal || '')
            .replace(/\{\{IMG\}\}/g, () => prodData.img || '')
            .replace(/\{\{GALLERY_JSON\}\}/g, () => JSON.stringify(prodData.gallery || []))
            .replace(/\{\{VIDEO\}\}/g, () => prodData.video || '')
            .replace(/\{\{MAP_JSON\}\}/g, () => prodData.map ? prodData.map.replace(/"/g, '\\"').replace(/\n/g, '') : '')

        await createGithubFile(path, finalHtml, `Đăng Sản Phẩm: ${prodData.title}`);

            .replace(/\{\{PRICE\}\}/g, () => projData.price || '')

        await createGithubFile(path, finalHtml, `Đăng Dự án: ${projData.title}`);

    async function pushData(type) {
        const collectionMap = { 'prod': 'products', 'news': 'posts', 'proj': 'projects', 'cat': 'categories' };
        const colName = collectionMap[type];
        
        let titleVal, slugVal, contentVal, rawDesc, autoDesc, newData;
        const btn = document.getElementById(`btn-submit-${type}`);
        const originalBtnText = btn.innerHTML;

        if (type === 'prod') {
            titleVal = document.getElementById('p-title').value;
            if(!titleVal) { alert("Tiêu đề Sản phẩm là bắt buộc!"); return; }
            slugVal = document.getElementById('p-slug').value || slugify(titleVal);
            contentVal = CKEDITOR.instances['p-content'].getData();
            rawDesc = document.getElementById('p-seo-desc').value;
            autoDesc = contentVal.replace(/<[^>]*>?/gm, '').substring(0, 150) + "...";
            newData = { id: parseInt(document.getElementById('p-id').value) || Date.now(), type: document.getElementById('p-type').value, title: titleVal, slug: slugVal, cat: document.getElementById('p-cat').value, projectCode: document.getElementById('p-projectCode').value || "", loc: document.getElementById('p-loc').value, price: document.getElementById('p-price').value, area: document.getElementById('p-area').value, dir: document.getElementById('p-dir').value || "", floor: document.getElementById('p-floor').value || "", bed: document.getElementById('p-bed').value || "", wc: document.getElementById('p-wc').value || "", front: document.getElementById('p-front').value || "", legal: document.getElementById('p-legal').value || "", map: document.getElementById('p-map').value || "", img: uploadedFiles.main, gallery: uploadedFiles.gallery, content: contentVal, seoTitle: document.getElementById('p-seo-title').value || titleVal, seoDesc: rawDesc || autoDesc, seoKeywords: document.getElementById('p-seo-key').value || `${document.getElementById('p-cat').value}, bất động sản` };
        } else if (type === 'news') {
            titleVal = document.getElementById('n-title').value;
            if(!titleVal) { alert("Tiêu đề Tin tức là bắt buộc!"); return; }
            slugVal = document.getElementById('n-slug').value || slugify(titleVal);
            contentVal = CKEDITOR.instances['n-content'].getData();
            rawDesc = document.getElementById('n-seo-desc').value;
            autoDesc = contentVal.replace(/<[^>]*>?/gm, '').substring(0, 150) + "...";
            newData = { id: parseInt(document.getElementById('n-id').value) || Date.now(), title: titleVal, slug: slugVal, cat: document.getElementById('n-cat').value, date: document.getElementById('n-date').value, author: document.getElementById('n-author').value, thumb: uploadedFiles.newsThumb, content: contentVal, seoTitle: document.getElementById('n-seo-title').value || titleVal, seoDesc: rawDesc || autoDesc, seoKeywords: document.getElementById('n-seo-key').value || `${document.getElementById('n-cat').value}, tin tức` };
        } else if (type === 'proj') {
            titleVal = document.getElementById('pj-title').value;
            if(!titleVal) { alert("Tên Dự án là bắt buộc!"); return; }
            slugVal = document.getElementById('pj-slug').value || slugify(titleVal);
            newData = { id: parseInt(document.getElementById('pj-id').value) || Date.now(), title: titleVal, slug: slugVal, status: document.getElementById('pj-status').value, loc: document.getElementById('pj-loc').value, price: document.getElementById('pj-price').value, img: uploadedFiles.projMain, link: `${GITHUB_PAGES_DOMAIN}/du-an/${slugVal}/`, seoTitle: document.getElementById('pj-seo-title').value || titleVal, seoDesc: document.getElementById('pj-seo-desc').value || `Dự án ${titleVal}`, seoKeywords: document.getElementById('pj-seo-key').value || `dự án ${titleVal}, bất động sản` };
        } else if (type === 'cat') {
            titleVal = document.getElementById('c-title').value;
            if(!titleVal) { alert("Tên Danh mục là bắt buộc!"); return; }
            slugVal = document.getElementById('c-slug').value || slugify(titleVal);
            rawDesc = document.getElementById('c-seo-desc').value;
            newData = { id: parseInt(document.getElementById('c-id').value) || Date.now(), type: document.getElementById('c-type').value, title: titleVal, slug: slugVal, desc: document.getElementById('c-desc').value, seoTitle: document.getElementById('c-seo-title').value || titleVal, seoDesc: rawDesc || document.getElementById('c-desc').value, seoKeywords: document.getElementById('c-seo-key').value || `${titleVal}, bất động sản` };
        }

        try {
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ĐANG LƯU VÀO FIREBASE...';
            btn.disabled = true;
            await db.collection(colName).doc(String(newData.id)).set(newData);
            
            let targetArray = currentData[collectionMap[type] === 'posts' ? 'posts' : colName];
            const idx = targetArray.findIndex(item => item.id === newData.id);
            if (idx !== -1) targetArray[idx] = newData;
            else targetArray.push(newData);

            btn.innerHTML = '<i class="fas fa-sync fa-spin"></i> ĐANG TẠO TRANG TRÊN GITHUB...';
            if (type === 'cat') await autoCreateCategoryFolder(newData);
            else if (type === 'prod') {
                await autoCreateProductFolder(newData);
                if(newData.cat) {
                    btn.innerHTML = '<i class="fas fa-sync fa-spin"></i> ĐANG CẬP NHẬT DANH MỤC...';
                    let matchedCat = currentData.categories.find(c => c.title === newData.cat || c.slug === slugify(newData.cat));
                    if (matchedCat) await autoCreateCategoryFolder(matchedCat);
                }
            }
            else if (type === 'news') {
                await autoCreateNewsFolder(newData);
                if(newData.cat) {
                    btn.innerHTML = '<i class="fas fa-sync fa-spin"></i> ĐANG CẬP NHẬT DANH MỤC...';
                    let matchedCat = currentData.categories.find(c => c.title === newData.cat || c.slug === slugify(newData.cat));
                    if (matchedCat) await autoCreateCategoryFolder(matchedCat);
                }
            }
            else if (type === 'proj') await autoCreateProjectFolder(newData);

            alert(`Xuất bản thành công! Đã đồng bộ Database và cập nhật các file liên quan trên GitHub.`);
            cancelEdit(); buildLinkLibrary(); 
            btn.innerHTML = originalBtnText; btn.disabled = false;
        } catch(e) { 
            console.error("LỖI CHI TIẾT:", e); alert("LỖI:\n" + e.message); 
            btn.innerHTML = originalBtnText; btn.disabled = false;
        }
    }
